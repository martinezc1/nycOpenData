        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"asdj-rj9b","name":"Children's Play Areas (CPAs)","description":"This dataset represents Children’s Play Areas (CPAs) in NYC Parks. Each CPA is a designated space featuring play equipment specifically designed for children and is mapped as a central point (Point geometry) within a park property. While commonly known as playgrounds, the term \"playground\" is avoided because some properties or subproperties labeled as \"playgrounds\" may include features like adult fitness equipment or handball and basketball courts and may not contain play equipment for children. Note: The schema and methodology of the dataset was updated in 2024, replacing the previous version from 2019.","type":"map","category":"Recreation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/asdj-rj9b","update_updatefrequency":"To be determined","last_data_updated_date":"2025-03-28T15:36:02.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"3254","downloads":"5","parent_uid":"j55h-3upk","derived_view":true}
        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"5ijn-vbdv","name":"311 Resolution Satisfaction Survey","description":"Every customer who makes a <a href=\"https://data.cityofnewyork.us/d/erm2-nwe9\" target=\"_blank\" rel=\"noopener\">Service Request to 311</a> and provides their contact information is offered the 311 Resolution Satisfaction Survey to provide feedback on their satisfaction with how a City Agency resolved their problem. Each row of data represents a survey response, and contains information about the survey response and the underlying service request. \n\nIn order to protect the anonymity of survey responses, the time the response is completed is aggregated to the month, and the location the service request pertains to is aggregated to the borough.\n\nSee the <a href=\"https://data.cityofnewyork.us/d/kizp-4dfk\" target=\"_blank\" rel=\"noopener\">311 Customer Satisfaction Survey</a> dataset for customer feedback on the performance of 311 call takers.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/5ijn-vbdv","update_datemadepublic":"5/23/2025","update_updatefrequency":"Weekly","last_data_updated_date":"2026-03-23T13:13:03.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Weekly","legislativecompliance_removedrecords":"No","visits":"2588","downloads":"929","row_count":"489282","column_count":"11","derived_view":false}
