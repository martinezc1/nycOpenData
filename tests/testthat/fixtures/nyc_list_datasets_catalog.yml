        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"7sc8-jtbz","name":"Topobathymetric LiDAR Data (2017)","description":"<b>Note: The files can be downloaded from the Attachments section below. Please note that the total size is 180GB, so the download may take some time depending on your system’s capabilities and configuration. You can also visit https://finder.nyc.gov/orthoimagery to download raw LiDAR data for specific tiles.</b>\n\nTopographic and bathymetric LiDAR data was collected for New York City in 2017.  Topographic data was collected for the entire city, plus an additional 100 meter buffer, using a Leica ALS80 sensor equipped to capture at least 8 pulse/m<sup>2</sup>. Dates of capture for topographic data were between 05/03/2017 and 05/17/2017 during 50% leaf-off conditions. Bathymetric data was collected in select areas of the city (where bathymetric data capture was expected) using a Riegl VQ-880-G sensor equipped to capture approximately 15 pulses/m<sup>2</sup> (1.5 Secchi depths). Dates of capture for bathymetric were between 07/04/2017 - 07/26/2017. LiDAR data was tidally-coordinated and captured between mean lower low water (+30% of mean tide) ranges.\n\nThe horizontal datum for all datasets is NAD83, the vertical datum is NAVD88, Geoid 12B, and the data is projected in New York State Plane - Long Island. Units are in US Survey Feet. To learn more about these datasets, visit the interactive “Understanding the 2017 New York City LiDAR Capture” Story Map -- https://maps.nyc.gov/lidar/2017/\nPlease see the following link for additional documentation on this dataset -- https://github.com/CityOfNewYork/nyc-geo-metadata/blob/master/Metadata/Metadata_LiDAR_Summary.md","type":"href","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/7sc8-jtbz","update_datemadepublic":"3/11/2019","update_updatefrequency":"As needed","last_data_updated_date":"2018-12-12T18:21:36.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"N/A","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"16168","downloads":"0","derived_view":false}
