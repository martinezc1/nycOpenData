        ,{"datasetinformation_agency":"City Council (NYCC)","uid":"6ctv-n46c","name":"City Council Legislation: Bills and Local Laws","description":"This dataset contains information on New York City bills from <strong>1998 through 2024</strong>.</br>\nThe <strong>New York City Council</strong> is the City’s legislative body, responsible for proposing, debating, and voting on legislation that affects all aspects of city governance. The legislative process for Introductions in NYC follows these steps:\n<ul>\n<strong>Bill Introduced</strong> – A bill is introduced by a Council Member and assigned a number.</br>\n<strong>Committee Hearings</strong> – The bill is referred to a committee for review, where public hearings may be held for discussion, public comment, and stakeholder engagement.</br>\n<strong>Committee Vote</strong> – The committee votes on whether to advance the bill to the full Council.</br>\n<strong>Full Council Vote</strong> – If approved by the committee, the bill is voted on by the entire Council. A majority vote is required for passage.</br>\n<strong>Mayoral Action</strong> – Once passed by the Council, the bill is sent to the Mayor, who may sign it into law, veto it, or allow it to become law without a signature. If vetoed, the Council can override the veto with a two-thirds majority vote.</br>\n<strong>Enactment</strong> – Once signed or passed via override, the bill is assigned a local law number and becomes part of the city’s legal code. Bills may be enacted immediately, or upon a date defined in the bill.\n</ul>\nThis dataset provides information on all introductions, regardless of whether they were enacted.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/6ctv-n46c","update_datemadepublic":"2/17/2015","update_updatefrequency":"As needed","last_data_updated_date":"2025-03-27T17:28:11.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2963","downloads":"41064","row_count":"11622","column_count":"15","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"6rrm-vxj9","name":"NYC Parks Monuments","description":"This data is table of monuments that is maintained by NYC Parks. Prior to being stored electronically the original data was stored on index cards dating back to the 1940s. The database is updated periodically to include new monuments, and information updated for existing monuments. For questions about the dataset please contact Parks’ Art & Antiquities division at (212) 360-8143.\r\n\r\nFor the data dictionary, please follow <a href=\"https://docs.google.com/spreadsheets/d/1YPLkiqZnifXhp6lZftSHTpGYSJ5NkIl-nGfwJAdD3P0/edit?usp=sharing\"> this link</a>.","type":"dataset","category":"Recreation","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/6rrm-vxj9","update_datemadepublic":"9/15/2016","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-02T06:00:31.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"Yes","visits":"7870","downloads":"10630","row_count":"3760","column_count":"34","derived_view":false}
        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"u5j4-zxpn","name":"NYC 3D Model by Community District","description":"The NYC 3D Model by Community District is a publicly available model consisting of every building in New York City present in 2014. The model is based on DOITT’s 2014 aerial survey, which provides roof structure details, including a high-level of detail for certain iconic buildings. The Department of City Planning imported and enhanced the DOITT files by converting the entire model into .3dm format, which is compatible with Rhinoceros 3D modeling software. DCP also divided the model into the City’s 59 Community Districts and enriched each CD with base layers, including lots, streets, parks, and rail lines.\nThe 3D model is capable of being imported into most common 3D-modeling software, including Sketchup and AutoCAD.","type":"href","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/u5j4-zxpn","update_datemadepublic":"11/13/2018","update_updatefrequency":"As needed","last_data_updated_date":"2018-11-08T21:23:20.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"N/A","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"10688","downloads":"0","derived_view":false}
