        ,{"datasetinformation_agency":"Fire Department of New York City (FDNY)","uid":"tm6d-hbzd","name":"Incidents Responded to by Fire Companies","description":"This dataset contains detailed information on incidents handled by FDNY Fire (non-EMS) units and includes fire, medical and non-fire emergencies. The data is collected in the New York Fire Incident Reporting System (NYFIRS), which is structured by the FDNY to provide data to the National Fire Incident Reporting System (NFIRS).  NFIRS is a modular all-incident reporting system designed by the U.S. Fire Administration. After responding to an incident, FDNY officers complete one or more of the NFIRS modules, depending upon the type of incident. The information in these modules describes the kind of incident responded to, where it occurred, the resources used to mitigate it.  Although NFIRS was designed specifically to understand the nature and causes of fire, as well as civilian fire casualties and firefighter injuries, it has been expanded to collect basic information on all incidents to which fire units respond.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/tm6d-hbzd","update_datemadepublic":"8/1/2016","update_updatefrequency":"Annually","last_data_updated_date":"2025-10-10T18:23:41.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"23912","downloads":"6969","row_count":"6033991","column_count":"24","derived_view":false}
