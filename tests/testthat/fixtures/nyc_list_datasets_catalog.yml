        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"sidw-jf8y","name":"CPI_Zones","description":"CPI Zones are neighborhoods where NYC Parks pursued a combination of capital investment and/or targeted physical improvements, enhanced programming, and public outreach efforts through the Community Parks Initiative launched in 2014.  CPI Zones were boundaries based on the NYC Department of City Planning's Neighborhood Tabulation Areas. These NTAs were selected as they capture neighborhoods that met several criteria for the initiative. They are densely populated and growing neighborhoods where there are higher-than-average concentrations of poverty as measured through the 2010 US Census, and they contain parks that are suitable for recreational redevelopment and received less than $250,000 in capital investment from 1992-2013.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/sidw-jf8y","update_datemadepublic":"8/20/2015","update_updatefrequency":"Historical data","last_data_updated_date":"2015-08-20T20:51:47.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"387","downloads":"1220","row_count":"55","column_count":"8","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"rear-wh5i","name":"2016 - 2017 School Safety Report","description":"Since 1998, the New York City Police Department (NYPD) has been tasked with the collection and maintenance of crime data for incidents that occur in New York City public schools. The NYPD has provided this data to the New York City Department of Education (DOE). The DOE has compiled this data by schools and locations for the information of our parents and students, our teachers and staff, and the general public. \r\nIn some instances, several Department of Education learning communities co-exist within a single building. In other instances, a single school has locations in several different buildings. In either of these instances, the data presented here is aggregated by building location rather than by school, since safety is always a building-wide issue. We use “consolidated locations” throughout the presentation of the data to indicate the numbers of incidents in buildings that include more than one learning community.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/rear-wh5i","update_datemadepublic":"02/22/2018","update_updatefrequency":"Historical data","last_data_updated_date":"2018-10-09T18:05:15.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"3335","downloads":"5990","row_count":"2046","column_count":"42","derived_view":false}
