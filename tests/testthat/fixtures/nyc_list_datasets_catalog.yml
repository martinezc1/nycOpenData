        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"eak9-f97n","name":"Digital City Map – Geodatabase","description":"The Digital City Map (DCM) data represents street lines and other features shown on the City Map, which is the official street map of the City of New York. The City Map consists of 5 different sets of maps, one for each borough, totaling over 8000 individual paper maps. The DCM datasets were created in an ongoing effort to digitize official street records and bring them together with other street information to make them easily accessible to the public. The Digital City Map (DCM) is comprised of seven datasets; Digital City Map, Street Center Line, City Map Alterations, Arterial Highways and Major Streets, Street Name Changes (areas), Street Name Changes (lines), and Street Name Changes (points).\r\n\r\nAll of the Digital City Map (DCM) datasets are featured on the <a href=\"https://streets.planning.nyc.gov/about\">Streets App</a>\r\n\r\nAll previously released versions of this data are available at BYTES of the <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BIG APPLE- Archive </a>","type":"file","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/eak9-f97n","update_datemadepublic":"6/1/2020","update_updatefrequency":"Monthly","last_data_updated_date":"2020-05-27T14:57:03.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"3680","downloads":"1290","derived_view":false}
