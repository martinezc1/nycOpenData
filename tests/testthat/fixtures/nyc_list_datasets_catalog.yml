        ,{"datasetinformation_agency":"Department of Citywide Administrative Services (DCAS)","uid":"fc53-9hrv","name":"NYC EV Fleet Station Network","description":"DCAS is rapidly expanding its base of electric chargers to support its electric and plug-in hybrid vehicles. We have installed over 1,600 charging ports across over 1,025 charging stations, including over 180 fast-charging stations, at City garages and parking locations around the city. We have deployed over 80 solar carports that allow EVs to be completely independent from the electrical grid and fossil fuel energy. We have partnered with City schools to provide both solar chargers and EVs to support education programs and adopted other solar powered city equipment.\r\n\r\nThis list of addresses for EV charging sites is intended for City Vehicle Operators. DCAS provides public access to a selected list of the fleet EV chargers above. Members of the public may charge their EVs at these sites for a nominal charging fee. A list of publicly available chargers can be found here: https://www.nyc.gov/assets/dcas/downloads/pdf/fleet/electric-vehicle-public-charging-rules.pdf. In addition, NYC DOT is rolling out a network of dedicated public access curbside EV charging sites.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/fc53-9hrv","update_datemadepublic":"2/3/2021","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-12T16:02:48.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"7562","downloads":"2299","row_count":"1638","column_count":"18","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"wqhs-q6wd","name":"VZV Street Improvement Projects (SIPs) Corridor","description":"Safety-oriented engineering improvements that use multiple treatments (signals, markings, concrete etc) on both corridors and intersections. Improvements are generally aimed at better organizing traffic, improving travel times, creating shorter, safer pedestrian crossings, and safe routes for bicycle travel. The map displays operational (non-capital) projects from 2009 to YTD. For more information on the individual projects, please visit the DOT website: https://www1.nyc.gov/html/dot/html/about/current-projects.shtml \r\n\r\n\r\nFor a complete list of Vision Zero maps, please follow <a href=\"https://data.cityofnewyork.us/browse?q=vzv&sortBy=last_modified&utf8=%E2%9C%93\">this link</a>","type":"map","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/wqhs-q6wd","update_datemadepublic":"05/31/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:18:08.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"3677","downloads":"389","parent_uid":"if4c-w48d","derived_view":true}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"n8q6-i44s","name":"NYC Parks Structures","description":"This dataset includes structures within NYC Parks properties. Structures are broadly defined as \"an assembly of materials forming construction for occupancy or use.\"\n\nOne line of data is a structure. The dataset contains fields that are maintained by multiple agencies including NYC Parks, NYC DoITT, and NYC Planning. Where possible, updated values are pulled from authoritative sources and updated weekly - for more details about specific fields and where they come from please see https://github.com/NYCParks-data/Structures/wiki\n\nThe System ID and BIN (Building Identification Number) are both required fields.\n\nA known limitation to this dataset is that functions other than 'public restroom' and 'recreation center' can and should be attributed to many of the structures. This information will eventually live and be maintained in a related table where all the functions of individual structures can be seen.\n\nData Dictionary here: https://docs.google.com/spreadsheets/d/17ptFZkuhrquuvSfEb2dum3Q6jNbVT98WohR-pl646o4/edit?usp=sharing","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/n8q6-i44s","update_updatefrequency":"Weekly","last_data_updated_date":"2026-03-20T13:50:48.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"5219","downloads":"4052","row_count":"2843","column_count":"22","derived_view":false}
