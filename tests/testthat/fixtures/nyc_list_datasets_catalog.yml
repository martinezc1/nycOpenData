        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"kj4p-ruqc","name":"Buildings Subject to HPD Jurisdiction","description":"Pursuant to New York City’s Housing Maintenance Code, the Department of Housing \r\nPreservation and Development (HPD) collects information on multiple dwellings in New York \r\nCity, and other buildings that fall under its jurisdiction. HPD’s Buildings Open Data covers all \r\nbuildings which meet any of the following criteria: \r\n \r\na. HPD has required the owner to register the building under the Housing Maintenance \r\nCode (HMC) \r\nb. HPD has initiated a litigation action under the HMC \r\nc. HPD has received a complaint for the building \r\nd. HPD has initiated a work order for the purposes of emergency repair, demolition, or \r\nthe Alternative Enforcement Program (AEP) for the building \r\ne. HPD has added the property to the AEP program\r\n\r\nBuildings are identified by a BuildingID.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/kj4p-ruqc","update_datemadepublic":"2/14/2014","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-02T20:26:35.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"24602","downloads":"11914","row_count":"377469","column_count":"23","derived_view":false}
        ,{"datasetinformation_agency":"Other","uid":"gfqj-f768","name":"2018 Central Park Squirrel Census - Stories","description":"The Squirrel Census (https://www.thesquirrelcensus.com/) is a multimedia science, design, and storytelling project focusing on the Eastern gray (Sciurus carolinensis). They count squirrels and present their findings to the public. \r\n\r\nThis table contains stories, observations, and notes written on tally sheets by Squirrel Sighters during the Census. Individual stories have been tagged with common story themes, such as “squirrel experience,” “park experience,” “dogs,” “other animals,” “accidental poems,” and “squirrels acting odd.”","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/gfqj-f768","update_datemadepublic":"10/15/2019","update_updatefrequency":"Historical data","last_data_updated_date":"2019-10-15T15:39:06.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"5911","downloads":"3123","row_count":"809","column_count":"12","derived_view":false}
