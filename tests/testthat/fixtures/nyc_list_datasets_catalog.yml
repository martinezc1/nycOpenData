        ,{"datasetinformation_agency":"Human Resources Administration (HRA)","uid":"wh8n-imgd","name":"Local Law 3 of 2022 - Supportive Housing - Reporting on Coordinated Assessment and Placement System","description":"Local Law 3 of 2022 requires the New York City Department of Social Services (DSS) to produce a detailed report on supportive housing data contained in the Coordinated Assessment and Placement System (CAPS). CAPS was developed to meet HUD requirements and more importantly, to streamline and improve the assessment, prioritization, housing referral, and placement process for homeless and at-risk households within the NYC Continuum of Care (CoC) geographic region. CAPS assesses homeless or at-risk individuals and families for potential housing options, provides detailed instructions on how to apply for the housing options (including supportive housing categories), assists in prioritizing referrals (based on vulnerability and length of time homeless), and connects households to units according to verified information on eligibility, client preference, and available vacancies. This annual report provides data on the following groups broken out by age: Supportive Housing Eligible Clients; Clients Referred for Supportive Housing Interview; Clients Not Referred for Supportive Housing Interview; Clients Interviewed for Supportive Housing; Clients Referred but Not Interviewed for Supportive Housing; Clients Accepted to Supportive Housing; Clients Not Accepted to Supportive Housing by Housing Provider; Clients Did Not Accept Supportive Housing Unit; Clients Referred Awaiting Placement.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/wh8n-imgd","update_updatefrequency":"Annually","last_data_updated_date":"2026-02-17T18:38:16.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativ