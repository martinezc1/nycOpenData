        ,{"datasetinformation_agency":"NYC Independent Budget Office (IBO)","uid":"5i9t-mvdt","name":"NYC Independent Budget Office (IBO) Debt Outstanding Since FY 2000","description":"Amount of debt outstanding as of June 30 of each year.\r\n\r\nSOURCES: IBO; New York City Comprehensive Annual Financial Report of the Comptroller (various years); Annual Report of the Comptroller on Capital Debt and Obligations (various years); New York City Municipal Water Finance Authority Comprehensive Annual Financial Reports (various years)\r\nNOTES: 1In determining what to include as outstanding debt of the City of New York, IBO considered: (1) the city's obligation (contractual and moral) to repay the debt, (2) whether the revenues pledged toward the repayment of the debt would have otherwise accrued to the city, and (3) whether the proceeds of the debt issuance accrue directly to the city.\r\n2GO debt is net of bonds held for debt service on other city-related obligations, referred to in the Comptroller's Comprehensive Annual Financial Report (CAFR) as Treasury Obligations. The 2000–2002 CAFRs show outstanding general obligation debt, before Treasury Obligations, in 2000 and 2001 as $26,892 million and $26,836 million, respectively. However, CAFRs from 2003 on show higher GO debt for the two years, $353 million more for 2000 and $311 million more for 2001; the 2003 CAFR does not provide a note explaining the revisions. IBO uses the numbers reported from 2003 forward.\r\n3Fiscal years 2000, 2002, and 2003 include short-term bond anticipation notes outstanding at year-end of $515 million, $2.2 billion, and $1.1 billion, respectively.\r\n4For fiscal year 2000, Capital Lease Obligations to HHC and PCDC are reported jointly. \r\n5In FY 2008, JSDC bonds outstanding were redeemed with GO bond proceeds, resulting in the elimination of JSDC debt, a reduction in conduit debt outstanding and partially accounting for the increase in GO debt from 2007 to 2008\r\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\r\nGeneral Obligation:\r\nGeneral obligation bonds are backed by the full faith and credit of the city. City property tax collections are pledged first to pay the principal and interest on these bonds.\r\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\r\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\r\nTreasury Obligations:\r\nTreasury obligations are New York City bonds held as investments by the city or by the related entities covered here, including MAC and SFC. They are netted out in order to avoid double counting of the city's obligations.\r\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\r\nTransitional Finance Authority:\r\nCreated in 1997, the Transitional Finance Authority (TFA) is a separate legal entity from the City of New York. TFA General Purpose Bonds are secured by the city's collections of personal income tax and, if necessary, sales tax.  Recovery Bonds, issued in response to the events of September 11, 2001 differ from general purpose bonds in that they are excluded from the calculation of outstanding TFA debt allowed under the debt limit.\r\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\r\nTFA Building Aid Revenue Bonds:\r\nIn fiscal year 2006, the city was authorized by the state Legislature to assign to the TFA all or any portion of the state building aid payable to the city or its school district. The TFA in turn is authorized to issue bonds secured by the aid and dedicated to financing a portion of the city's educational facilities capital plan.\r\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\r\nTSASC:\r\nTSASC Inc. (formerly known as the Tobacco Settlement Asset Securitization Corporation) is a separate legal entity from the City of New York. TSASC bonds are secured by the corporation's purchase from the city of the future revenue stream under a settlement agreement resolving cigarette smoking-related litigation between the settling states and participating manufacturers.\r\n\t\t\t\t\t\t\t\t\t\t\t\t\t\t\r\nMunicipal Assistance Corporation for the City of New York:\r\nThe Municipal Assistance Corporation (MAC) was a separate legal entity from the City of New York, created in 1975 and formally dissolved in 2008. With New York City experiencing a severe fiscal crisis in 1975, MAC allowed the city continued access to credit markets and assisted in the prevention of a default of city general obligation bonds. MAC bonds were secured by state collections of","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/5i9t-mvdt","update_datemadepublic":"3/6/2014","update_updatefrequency":"Annually","last_data_updated_date":"2021-06-18T19:13:08.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1956","downloads":"3345","row_count":"21","column_count":"22","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"mk9u-qu7i","name":"Greenstreets","description":"Launched in 1996, the Greenstreets program began as a partnership between the NYC Parks and the New York City Department of Transportation (DOT). The program was created to change unused road areas into green spaces that beautify neighborhoods, improve air quality, reduce air temperatures, and calm traffic. Greenstreets later became a component of the City's \"green infrastructure,\" with some containing bioswales or rain gardens to divert and/or filter stormwater. For more information about the Greenstreets program and green infrastructure, visit https://www.nycgovparks.org/greening/green-infrastructure.\n \n This dataset uses the standard NYC projection of NAD_1983_StatePlane_New_York_Long_Island_FIPS_3104_Feet. Lengths are in feet and areas in square feet.\n\nData Dictionary: https://docs.google.com/spreadsheets/d/1HiHluhaqGWPC4QPy9q5iXkXJCGZrm3nAggJzVeKuP0E/edit?usp=sharing","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/mk9u-qu7i","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T14:08:59.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"3009","downloads":"1704","row_count":"24","column_count":"26","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"s47t-kwt5","name":"2020-2021 Local Law 102 Physical Education","description":"Local Law 102 enacted in 2015 requires the Department of Education of the New York City School District to submit to the Council an annual report concerning physical education for the prior school year.   This report provides information about the provision of physical education instruction, including the number and percentage of students who received or were scheduled to receive the required amount of PE instruction, average PE class size, PE instruction received by students who have an IEP with an adaptive physical education recommendation, the ratio of licensed physical education instructors, and the number of licensed instructors who have received physical education professional development in the preceding two school years.\nIn prior years, this report provided information about physical education instructional spaces, PE substitutions granted to students, and the average frequency and average total minutes per week of physical education students received as defined in Local Law 102. Because of the shift to blended and remote learning during the 2020-21 school year as a result of the COVID-19 Pandemic:\nThis report consists of eleven tabs:\n1. PE Instruction Borough-Level\n2. PE Instruction School-Level\n3. PE Instruction District-Level\n4  PE Instruction Citywide-Level\n5. Adapted Physical Education – School Level\n6. Adapted Physical Education – District Level \n7. Adapted Physical Education – Borough Level\n8. Licensed PE Teachers\n9. Professional Development \n10. Supplemental Programs\n11. PE Scope and Sequence","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/s47t-kwt5","update_datemadepublic":"10/18/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-10-18T21:07:35.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"N/A","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1810","downloads":"896","row_count":"119","column_count":"6","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"p48c-iqtu","name":"NYC Wetlands","description":"In 2016 NYC Parks contracted with the UVM Spatial Analysis Lab to use modern remote sensing and object-based image analysis to create a new wetlands map for New York City. Data inputs include Light Detection and Ranging Data, State and Federal Wetland Inventories, soils, and field data. Because the map was conservative in its wetland predictions, NYC Parks staff improved the map through a series of desktop and field verification efforts beginning in 2020.The map will be opportunistically updated depending on available information.\n\nThis dataset was developed to increase awareness regarding the location and extent of wetlands to promote restoration and conservation in New York City. This map does not supersede U.S. Fish and Wildlife Service National Wetlands Inventory (NWI) and New York State Department of Environmental Conservation (NYSDEC) wetlands maps and has no jurisdictional authority. It should be used alongside NWI and NYSDEC datasets as a resource for identifying likely locations of wetlands in New York City. Mapped features vary in the confidence of their verification status, ranging from \"Unverified\" (meaning the feature exists in its original remotely mapped form and has not been ground truthed) to \"Verified - Wetland Delineation\" (meaning the boundaries and type of wetland have been verified during an official wetland delineation). Because of the rapid nature of the protocol and the scale of data collection, this product is not a substitute for on-site investigations and field delineations. The dataset also includes broad classifications for each wetland type, e.g. estuarine, emergent wetland, forested wetland, shrub/scrub wetland, or water. Cowardin classifications were not used given rapid verification methods.\n\nThe accuracy of the wetlands map has improved over time as a result of the verification process. Fields were modified over time as necessitated by the workflow and values were updated with information, either from the field verifications, delineation reports, construction designs, or desktop reviews.\n\nHttps://www.nycgovparks.org/greening/natural-resources-group \n\nData Dictionary:\nHttps://docs.google.com/spreadsheets/d/1UyJssBTcWSOzfOpP2r45ok_s3wZlc6RQ/edit?usp=sharing&ouid=100172030647057411202&rtpof=true&sd=true \n\nMap:\nhttps://data.cityofnewyork.us/dataset/NYC-Wetlands/7piy-bhr9","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/p48c-iqtu","update_updatefrequency":"Annually","last_data_updated_date":"2025-12-06T14:02:16.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"5204","downloads":"1483","row_count":"6544","column_count":"5","derived_view":false}
