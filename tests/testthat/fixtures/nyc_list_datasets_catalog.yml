        ,{"datasetinformation_agency":"Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV)","uid":"augs-s4dd","name":"Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV) Annual Fact Sheet","description":"The Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV) develops policies and programs, provides training and prevention education, conducts research and evaluations, performs community outreach, and operates the New York City Family Justice Centers. The office collaborates with City agencies and community stakeholders to ensure access to inclusive services for survivors of domestic and gender-based violence (GBV) services. GBV can include intimate partner and family violence, elder abuse, sexual assault, stalking, and human trafficking. ENDGBV operates the New York City Family Justice Centers. These co‐located multidisciplinary domestic violence service centers provide vital social service, civil legal and criminal justice assistance for survivors of intimate partner violence and their children under one roof. The Brooklyn Family Justice Center opened in July 2005; the Queens Family Justice Center opened in July 2008; the Bronx Family Justice Center opened in April 2010; Manhattan Family Justice Center opened in December 2013 and Staten Island Family Justice Center opened in June 2015. OCDV also has a Policy and Training Institute that provides trainings on intimate partner violence to other City agencies. The New York City Healthy Relationship Academy, with is part of the Policy and Training Institute, provides peer lead workshops on healthy relationships and teen dating violence to individuals between the age of 13 and 24, their parents and staff of agencies that work with youth in that age range.  The dataset is collected to produce an annual fact sheet on intimate partner violence in New York City. The fact sheet is produced annually by the end of February and is placed on the ENDGBV website. The criminal justice numbers (IPV Homicides, DIRs) are provided by the New York City Police Department; the NYC Domestic Violence Hotline call numbers are provided by Safe Horizon, which is contracted by the City to manage the hotline. The other data is provided by ENDGBV.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/augs-s4dd","update_datemadepublic":"8/5/2020","update_updatefrequency":"Annually","last_data_updated_date":"2025-06-04T15:59:26.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"2425","downloads":"1305","row_count":"333","column_count":"8","derived_view":false}
