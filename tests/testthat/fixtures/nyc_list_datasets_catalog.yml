        ,{"datasetinformation_agency":"Mayor's Office of Climate and Environmental Justice (MOCEJ)","uid":"mrjc-v9pm","name":"New York City's Flood Vulnerability Index","description":"The Flood Vulnerability Index (FVI) assesses the distribution of vulnerability to flooding across NYC in order to guide flood resilience policies and programs. Vulnerability contains three components: exposure to a hazard, susceptibility to harm from the exposure, and capacity to recover (Cutter et al., 2009). There are six hazard-specific FVIs, one for each of the six different flood hazard scenarios, which include current and two future storm surge scenarios and current and two future tidal flooding scenarios. Exposures vary for different types of flooding and different scenarios within each flood type. \n\nEach FVI consists of two component sub-indices: an exposure index and an index that reflects susceptibility to harm and capacity to recover. The exposure index is different in each FVI in order to capture the different exposures to each of the flood hazard scenarios. The sub-index that reflects susceptibility to harm and capacity to recover -- the Flood Susceptibility to Harm and Recovery Index (FSHRI) -- is the same for each FVI. It aggregates 12 socio-economic indicators correlated with various types of hardships that people may suffer due to flooding and different dimensions of ability to recover. \n\nFor additional information, please visit <a href=\"https://climate.cityofnewyork.us/initiatives/vulnerability-impacts-and-adaptation-analysis/\">this link</a>.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/mrjc-v9pm","update_datemadepublic":"4/11/2024","update_updatefrequency":"As needed","last_data_updated_date":"2024-03-06T19:39:32.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"8662","downloads":"1991","row_count":"2209","column_count":"9","derived_view":false}
