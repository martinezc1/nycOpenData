        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"7qs7-yv7y","name":"TAX_LOT_POLYGON","description":"This polygon-based spatial data represents the shape, location, and identity of Tax Lots in the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Department+of+Finance+Digital+Tax+Map&sortBy=relevance&page=1&pageSize=20\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map Collection</a>.\n\n• <strong>Updates:</strong> Data is extracted from DOF’s internal system on the last Friday of each month and refreshed on ArcGIS Online on the 1st. The online map always shows the most recent version.\n\n• <strong>Accessing the Data:</strong>  \n  • <strong>Digital Tax Map on NYC Open Data:</strong> See the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Department+of+Finance+Digital+Tax+Map&sortBy=relevance&page=1&pageSize=20\" target=\"_blank\" rel=\"noreferrer\">complete collection</a>.  \n  • <strong>Individual layers:</strong> Downloadable from the <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/ArcGIS/rest/services/DTM_ETL_DAILY_view/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map Feature Server</a>.  \n  • <strong>Complete source:</strong> Available through the <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_A/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map service</a>, which always points to the latest monthly release.\n\n<strong>Note:</strong> To ensure reliability, the Tax Map alternates between <em>Set A</em> and <em>Set B</em> each month. If one set has issues, the previous month’s copy remains online. Both sets are kept about a month apart and are available for download:  \n    &nbsp;&nbsp;&nbsp;&nbsp;• <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_A/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Set A link</a>  \n    &nbsp;&nbsp;&nbsp;&nbsp;• <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_B/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Set B link</a>\n\n• <strong>Digital Alteration Book (DAB):</strong> The DAB is the official log of map changes—such as new lots, merges, or boundary shifts—providing a clear record of how the Tax Map evolves. It is available through the <a href=\"https://propertyinformationportal.nyc.gov/\" target=\"_blank\" rel=\"noreferrer\">Property Information Portal</a>.\n\n<b>Disclaimer:</b>  \nThis dataset reflects formal applications submitted to DOF but may not reflect the latest changes in other City systems (e.g., exemptions or buildings data). It is provided for informational purposes only and is not guaranteed to be accurate as of today’s date.","type":"map","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/7qs7-yv7y","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-22T01:18:59.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"Yes","visits":"134","downloads":"0","parent_uid":"i38t-6if2","derived_view":true}
        ,{"datasetinformation_agency":"Law Department (LAW)","uid":"yk6f-pa7p","name":"LAW Public Service Program","description":"Early in his tenure at the Law Department, Corporation Counsel Michael A. Cardozo initiated the Public Service Program - a private/public partnership with the City's prominent law firms, where firms either lend their attorneys to the Law Department for a finite period of time or agree to take on City cases in-house. The Program benefits both the City and the law firms. The City receives the assistance of an incredibly well-trained and talented group of attorneys while the attorneys receive the kind of hands-on, in-court litigation experience that is often hard to come by at the best private law firms. While participation in the Program will not lead to offers of permanent employment at the Law Department, it will enable the volunteers to keep their skills fresh while serving the public. \r\nTrial Attorney Volunteers: A number of firms lend mid-level litigation associates to the Law Department for a period of four to six months to work full-time in our Tort Division trial units. These attorneys conduct back-to-back civil trials, selecting juries, examining and cross-examining witnesses and presenting opening statements and closing arguments.\r\nLaw Firm Volunteers: Other firms have chosen to take entire matters in-house, giving their attorneys the chance to participate in court conferences, settlement negotiations, depositions, and, ultimately, trials.\r\nDeposition Program: Firms also lend associates to the Law Department either to conduct a series of depositions in an individual case or to spend two to three weeks in our offices conducting back-to-back depositions in a variety of cases.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/yk6f-pa7p","update_datemadepublic":"2/6/2013","update_updatefrequency":"Annually","last_data_updated_date":"2013-06-21T20:07:07.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"1479","downloads":"2752","row_count":"63","column_count":"1","derived_view":false}
