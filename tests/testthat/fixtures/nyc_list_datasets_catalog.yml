        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"pshf-uxpw","name":"2016 School Survey","description":"Every year, all parents, all teachers, and students take the NYC School Survey. The survey ranks among the largest surveys of any kind ever conducted nationally. \nSurvey results provide insight into a school's learning environment and contribute a measure of diversification that goes beyond test scores on the Progress Report. Survey questions assess the community's opinions on academic expectations, communication, engagement, and safety and respect. School leaders can use survey results to better understand their own school's strengths and target areas for improvement.","type":"file","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/pshf-uxpw","update_datemadepublic":"05/03/2019","update_updatefrequency":"Historical data","last_data_updated_date":"2019-05-03T19:55:51.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"435","downloads":"18278","derived_view":false}
        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"pwts-g83w","name":"DOHMH HIV Service Directory","description":"This directory is for at-risk for HIV and eligible persons living with HIV in New York City seeking HIV medical and supportive services. The agencies and their listed programs receive CDC and Ryan White Part-A funding to provide: Targeted-Testing among Priority Populations, Food and Nutrition Services, Health Education and Risk Reduction Services, Harm Reduction Services, Legal Services, Mental Health Services, Case Management and Care Coordination Services, and Supportive Counseling Services. To be eligible to recieve these services, prospective clients must: 1)be HIV-positive; 2) have a total household income below 435% of the Federal Poverty Level (FPL) (this is the same as the income eligible guidelines for the New York State AIDS Drug Assistance Program (ADAP) and higher than the income eligiblity guidelines for Medicaid in New York State); and 3) reside in New York City or the counties of Westchester, Rockland, and Putnam. For providers, to make a referral, please contact the program directly using the information provided in the diretory (please be sure to call before directing clients to the program). When making a referral, you may also find it useful to talk to your client about executing a release of information form authorizing you to share confidential health and HIV-related information with another service provider in order to coordinate care (for more information, go to https://www.health.ny.gov/diseases/aids/providers/forms/informedconsent.htm).","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/pwts-g83w","update_datemadepublic":"5/21/2018","update_updatefrequency":"Annually","last_data_updated_date":"2025-01-14T18:12:33.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"2147","downloads":"1380","row_count":"71","column_count":"20","derived_view":false}
        ,{"datasetinformation_agency":"Department of Small Business Services (SBS)","uid":"jege-pgbz","name":"NYC Business Solutions for NYCHA Residents by Borough - Local Law 163","description":"This dataset contains information about NYC <a href=\"https://maps.nyc.gov/sbs/\">Business Solutions</a> service, a service offered by the Department of Small Business Services (SBS) aimed at giving New Yorkers free services to start, operate and grow their businesses. Each row in the dataset represents the number of public housing residents on a Borough-level who receive or utilize this service.\n\nFor datasets related to other services provided to NYCHA residents, view the data collection “Services available to NYCHA Residents - Local Law 163”.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/jege-pgbz","update_datemadepublic":"5/17/2019","update_updatefrequency":"Annually","last_data_updated_date":"2025-12-02T16:24:22.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"951","downloads":"1330","row_count":"48","column_count":"3","derived_view":false}
        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"6umk-irkx","name":"Housing Database","description":"The NYC Department of City Planning’s (DCP) <a href = \"https://www.nyc.gov/site/planning/data-maps/open-data/dwn-housing-database.page#housingdevelopmentproject\">Housing Database</a> contains all NYC Department of Buildings (DOB) approved housing construction and demolition jobs filed or completed in NYC since January 1, 2010. It includes the three primary construction job types that add or remove residential units: new buildings, major alterations, and demolitions, and can be used to determine the change in legal housing units across time and space. Records in the Housing Database Project-Level Files are geocoded to the greatest level of precision possible, subject to numerous quality assurance and control checks, recoded for usability, and joined to other housing data sources relevant to city planners and analysts.\n\nData are updated semiannually, at the end of the second and fourth quarters of each year.\n\nPlease see DCP’s annual Housing Production Snapshot summarizing findings from the 21Q4 data release <a href=\"https://storymaps.arcgis.com/stories/1c9138dc24064b2e8142ff156345a719\">here</a>. Additional Housing and Economic analyses are also <a href=\"https://www.nyc.gov/site/planning/planning-level/housing-economy/housing-economy.page\">available</a>.\n\nThe NYC Department of City Planning’s (DCP) <a href=\"https://www.nyc.gov/site/planning/data-maps/open-data/dwn-housing-database.page#housingdevelopmentunit\">Housing Database Unit Change Summary Files</a> provide the net change in Class A housing units since 2010, and the count of units pending completion for commonly used political and statistical boundaries (Census Block, Census Tract, City Council district, Community District, Community District Tabulation Area (CDTA), Neighborhood Tabulation Area (NTA). These tables are aggregated from the DCP Housing Database Project-Level Files, which is derived from Department of Buildings (DOB) approved housing construction and demolition jobs filed or completed in NYC since January 1, 2010. Net housing unit change is calculated as the sum of all three construction job types that add or remove residential units: new buildings, major alterations, and demolitions. These files can be used to determine the change in legal housing units across time and space.","type":"href","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/6umk-irkx","update_datemadepublic":"4/7/2021","update_updatefrequency":"Every 6 months","last_data_updated_date":"2021-03-19T00:07:46.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"N/A","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"No","visits":"19985","downloads":"0","derived_view":false}
