        ,{"datasetinformation_agency":"Police Department (NYPD)","uid":"bm4k-52h4","name":"Motor Vehicle Collisions - Vehicles","description":"The Motor Vehicle Collisions vehicle table contains details on each vehicle involved in the crash. Each row represents a motor vehicle involved in a crash. The data in this table goes back to April 2016 when crash reporting switched to an electronic system.\r\n</p>\r\nThe Motor Vehicle Collisions data tables contain information from all police reported motor vehicle collisions in NYC. The police report (MV104-AN) is required to be filled out for collisions where someone is injured or killed, or where there is at least $1000 worth of damage (https://www.nhtsa.gov/sites/nhtsa.dot.gov/files/documents/ny_overlay_mv-104an_rev05_2004.pdf).  It should be noted that the data is preliminary and subject to change when the MV-104AN forms are amended based on revised crash details.\r\n</p>\r\nDue to success of the CompStat program, NYPD began to ask how to apply the CompStat principles  to other problems.  Other than homicides, the fatal incidents with which police have the most contact with the public are fatal traffic collisions.  Therefore in April 1998, the Department implemented TrafficStat, which uses the CompStat model to work towards improving traffic safety.  Police officers complete form MV-104AN  for all vehicle collisions.  The MV-104AN is a New York State form that has all of the details of a traffic collision.  Before implementing Trafficstat, there was no uniform traffic safety data collection procedure for all of the NYPD precincts.  Therefore, the Police Department implemented the Traffic Accident Management System (TAMS) in July 1999 in order to collect traffic data in a uniform method across the City.  TAMS required the precincts manually enter a few selected MV-104AN fields to collect very basic intersection traffic crash statistics which included the number of accidents, injuries and fatalities. As the years progressed, there grew a need for additional traffic data so that more detailed analyses could be conducted. The Citywide traffic safety initiative, Vision Zero started in the year 2014.  Vision Zero further emphasized the need for the collection of more traffic data in order to work towards the Vision Zero goal, which is to eliminate traffic fatalities.  Therefore, the Department in March 2016 replaced the TAMS with the new Finest Online Records Management System (FORMS).  FORMS enables the police officers to electronically, using a Department cellphone or computer, enter all of the MV-104AN data fields and stores all of the MV-104AN data fields in the Department’s crime data warehouse.  Since all of the MV-104AN data fields are now stored for each traffic collision, detailed traffic safety analyses can be conducted as applicable.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/bm4k-52h4","update_datemadepublic":"11/27/2019","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-23T23:23:22.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"N/A","visits":"36116","downloads":"17796","row_count":"4513305","column_count":"25","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office of Management & Budget (OMB)","uid":"95zn-7w5f","name":"NYC Climate Budgeting Report: Resiliency Exposure Forecast - Outdoor Heat","description":"The Resiliency Exposure Forecast for Outdoor Heat serves as an effort to evaluate the scope of planned adaption initiatives and their potential to reduce exposure to increasing temperatures in future decades. The Outdoor Heat Forecast projects temperatures across city neighborhoods using an urban heat flux model. This is broken into two main subsections: 1) a Control Scenario to determine future neighborhood-level temperature in the absence of new adaptation interventions and progress, and 2) a Planned Action Scenario to determine how tree canopy expansion could change heat profiles compared to the Control Scenario. This dataset defines the Planned Actions as tree canopy growth being maintained across jurisdictions, which requires efforts by private and public landowners, and being expanded through the NYC Parks Department’s Neighborhood Tree Planting Program. This is based on data from the Neighborhood Tree Planting Program plans, Land Cover raster data from the city's Light Detection and Ranging (LiDAR) assessments, and the Surface Urban Energy and Water Balance Scheme (SUEWS) tool. Temperature projections should only be compared to the baseline for this exercise, and not other models, as they hold separate assumptions that this evaluation may not account for. The overarching measure is the amount of extreme heat by the 2050s that is managed by projected tree canopy expansion. \n\nFor more information on the components of the data set, please visit OMB's Technical Appendix for the FY 2026 Climate Budgeting Publication. https://www.nyc.gov/assets/omb/downloads/pdf/exec25/exec25-nyccbta.pdf","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/95zn-7w5f","update_datemadepublic":"09/30/2025","update_updatefrequency":"Annually","last_data_updated_date":"2025-05-20T19:01:44.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"428","downloads":"280","row_count":"262","column_count":"8","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"d54t-ywim","name":"Open Storefronts Applications (Historical)","description":"Program had ended.\r\nThe Open Storefronts program assists existing ground-floor storefront businesses who want to use outdoor areas on a temporary bases due to the COVID-19 crisis. Note: Geospatial data is based on the application address, geocoding error may be the result from an incorrect address submission. \r\n\r\nFor real time business application updates, please visit NYC Open Storefront dashboard: http://nycopenstorefronts.info/","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/d54t-ywim","update_datemadepublic":"1/27/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2022-11-04T19:51:12.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"Yes","visits":"1789","downloads":"2205","row_count":"941","column_count":"34","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"qnem-b8re","name":"Athletic Facilities","description":"This dataset contains facilities that were designed specifically with sports in mind. These facilities are not the only places within parks where sports can be played. This layer contains all of the facilities that can be permitted for athletic activity and facilities that are specifically designated for sports but are not available for permitting. \n \nThis information is used by the Citywide Event Management System (CEMS) to book permits for Parks' athletic facilities. More information about athletic facility permits can be viewed at https://www.nycgovparks.org/permits/\n \nThis dataset uses the standard NYC projection of NAD_1983_StatePlane_New_York_Long_Island_FIPS_3104_Feet. Lengths are in feet and areas in square feet.\n\nData Dictionary: https://docs.google.com/spreadsheets/d/1iIhwuLBlIus2n1EQ2a329jX4oJciXt9dEaxOFPpHfE8/edit?usp=sharing","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/qnem-b8re","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T14:07:39.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"2759","downloads":"2539","row_count":"6927","column_count":"45","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"36nr-7fbp","name":"VZV Priority Corridors","description":"All corridors in each borough were ranked on a pedestrian KSI (killed and severely injured) per-mile basis. Corridors were selected from the top of this list until the cumulative number of KSI reached half of the borough’s total. Developed as part of the Borough Pedestrian Safety Action Plans.\r\n\r\nFor a complete list of Vision Zero maps, please follow <a href=\"https://data.cityofnewyork.us/browse?q=vzv&sortBy=last_modified&utf8=%E2%9C%93\">this link</a>","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/36nr-7fbp","update_datemadepublic":"05/31/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:15:52.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"Yes","visits":"473","downloads":"677","row_count":"199","column_count":"2","derived_view":false}
