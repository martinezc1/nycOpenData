        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"mvn6-575n","name":"2020 - 2021 Remote Learning Legislation Device Request","description":"For fall 2020, when buildings reopened  and students were able to return on-site, schools were advised to review any requests from families submitted via the remote learning device form and conduct an assessment of all of their devices (including recent purchases) in order to assign available devices to families in need .  For any families where the school could not meet the need, schools confirmed that a device was needed by requesting that a device be prepared for that student after the City ordered the additional 100K ipads.  Once receiving this confirmation, the central office prepared and shipped the device.   ","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/mvn6-575n","update_datemadepublic":"3/11/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-03-11T22:15:21.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"645","downloads":"738","row_count":"0","column_count":"2","derived_view":false}
