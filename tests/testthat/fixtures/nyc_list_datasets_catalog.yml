        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"ifu9-zqkd","name":"NYC Parks Forest Restoration Planting Sites","description":"The polygons in this dataset show mapped forest restoration planting polygons. These polygons depict areas where invasive plants were removed and native trees and/or shrubs were planted under the purview of NYC Parks? Natural Resources Group as part of the MillionTreesNYC initiative on property under the jurisdiction of NYC Parks. Spring plantings occur between January 1 and June 30, while Fall plantings occur between July 1 and December 31 of any year. Older restoration polygons were mapped via heads-up digitizing while the location of newer polygons have been collected using a high-accuracy GPS device.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/ifu9-zqkd","update_datemadepublic":"9/29/2015","update_updatefrequency":"Historical data","last_data_updated_date":"2015-09-29T17:27:25.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"588","downloads":"1498","row_count":"618","column_count":"6","derived_view":false}
