        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"8vk5-fzts","name":"2020 - 2021 Diversity Report","description":"Report on Demographic Data in New York City Public Schools, 2020-21Enrollment counts are based on the November 13 Audited Register for 2020.\nCategories with total enrollment values of zero were omitted.\nPre-K data includes students in 3-K.\nData on students with disabilities, English language learners, and student poverty status are as of March 19, 2021. \nDue to missing demographic information in rare cases and suppression rules, demographic categories do not always add up to total enrollment and/or citywide totals.\nNYC DOE \"Eligible for free or reduced-price lunch” counts are based on the number of students with families who have qualified for free or reduced-price lunch or are eligible for Human Resources Administration (HRA) benefits.\nEnglish Language Arts and Math state assessment results for students in grade 9 are not available for inclusion in this report, as the spring 2020 exams did not take place.\nSpring 2021 ELA and Math test results are not included in this report for K-8 students in 2020-21. Due to the COVID-19 pandemic’s complete transformation of New York City’s school system during the 2020-21 school year, and in accordance with New York State guidance, the 2021 ELA and Math assessments were optional for students to take. As a result, 21.6% of students in grades 3-8 took the English assessment in 2021 and 20.5% of students in grades 3-8 took the Math assessment. These participation rates are not representative of New York City students and schools and are not comparable to prior years, so results are not included in this report. \nDual Language enrollment includes English Language Learners and non-English Language Learners. \nDual Language data are based on data from STARS; as a result, school participation and student enrollment in Dual Language programs may differ from the data in this report. STARS course scheduling and grade management software applications provide a dynamic internal data system for school use; while standard course codes exist, data are not always consistent from school to school.\nThis report does not include enrollment at District 75 & 79 programs. Students enrolled at Young Adult Borough Centers are represented in the 9-12 District data but not the 9-12 School data.\n“Prior Year” data included in Comparison tabs refers to data from 2019-20. “Year-to-Year Change” data included in Comparison tabs indicates whether the demographics of a school or special program have grown more or less similar to its district or attendance zone (or school, for special programs) since 2019-20. Year-to-year changes must have been at least 1 percentage point to qualify as “More Similar” or “Less Similar”; changes less than 1 percentage point are categorized as “No Change”. \nThe admissions method tab contains information on the admissions methods used for elementary, middle, and high school programs during the Fall 2020 admissions process. Fall 2020 selection criteria are included for all programs with academic screens, including middle and high school programs. Selection criteria data is based on school-reported information. Fall 2020 Diversity in Admissions priorities is included for applicable middle and high school programs. Note that the data on each school’s demographics and performance includes all students of the given subgroup who were enrolled in the school on November 13, 2020. Some of these students may not have been admitted under the admissions method(s) shown, as some students may have enrolled in the school outside the centralized admissions process (via waitlist, over-the-counter, or transfer), and schools may have changed admissions methods over the past few years. Admissions methods are only reported for grades K-12.\n\"3K and Pre-Kindergarten data are reported at the site level. See below for definitions of site types included in this report. Additionally, please note that this report excludes all students at District 75 sites, reflecting slightly lower enrollment than our total of 60,265 students","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/8vk5-fzts","update_updatefrequency":"Historical data","last_data_updated_date":"2022-03-04T23:38:00.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"4630","downloads":"2785","row_count":"2484","column_count":"8","derived_view":false}
        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"3kfa-rvez","name":"NYC Pool Inspections","description":"A permit is required to install, operate or construct any indoor or outdoor bathing establishment with a pool in New York City. This permit may also include saunas, steam rooms, or spray grounds \nthat are at the same location as the pool(s). This permit applies to bathing establishments owned or operated by city agencies, commercial interests or private entities including, but not limited to, public or private schools, corporations, hotels, motels, camps, apartment houses, condominiums, country clubs, gymnasia and health establishments. This dataset contains results of indoor and outdoor pool inspections. \n</p>\nDue to the COVID-19 public health emergency, there were periods of time in 2020 when facilities were subject to mandatory closure orders or chose not to open, and inspections were subsequently paused or modified.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/3kfa-rvez","update_updatefrequency":"Annually","last_data_updated_date":"2025-07-24T13:43:48.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"N/A","visits":"5652","downloads":"2869","row_count":"5842","column_count":"23","derived_view":false}
