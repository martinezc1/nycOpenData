        ,{"datasetinformation_agency":"Police Department (NYPD)","uid":"98wc-x49t","name":"ARCHIVED_NYPD Shooting Incident Data (Year To Date)","description":"<b>NOTE:</b> This NYPD Shooting Incident dataset was replaced with three related datasets – for shootings, shooting victims, and shooting offenders. The new structure should be clearer and easier to use, especially for shootings with multiple victims or multiple offenders. Please follow <a href=\"https://data.cityofnewyork.us/browse?q=&sortBy=relevance&utf8=%E2%9C%93&pageSize=20&Data-Collection_Data-Collection=NYPD+Shootings\">this link</a> for the most current available information.\n\nList of every shooting incident that occurred in NYC  during the current calendar year.\n\nThis is a breakdown of every shooting incident that occurred in NYC during the current calendar year. This data is manually extracted every quarter and reviewed by the Office of Management Analysis and Planning before being posted on the NYPD website. \n Each record represents a shooting incident in NYC and includes information about the event, the location and time of occurrence. In addition, information related to suspect and victim demographics is also included. This data can be used by the public to explore the nature of police enforcement activity. Please refer to the attached data footnotes for additional information about this dataset.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/98wc-x49t","update_datemadepublic":"11/1/2018","update_updatefrequency":"Historical data","last_data_updated_date":"2025-10-27T16:55:13.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/