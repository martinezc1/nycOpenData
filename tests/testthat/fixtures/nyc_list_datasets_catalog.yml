        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"s6eb-zqd5","name":"2019-2020 PSAL Report - (December 2020)","description":"After School Athletic Funding - Local Law 120 \nPublic Schools Athletic League (PSAL) participation includes all students who appeared on a roster during the 2019-20 school year were enrolled at a NYC DOE school as of October 31, 2019.  Enrollment includes all schools in districts 1-32 & 75.  Report excludes students from schools in district 79, 84 (Charter Schools), 88, and home and hospital schools.  Report also includes only students in grades 9-12.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/s6eb-zqd5","update_datemadepublic":"10/19/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-10-19T12:45:23.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"N/A","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1527","downloads":"928","row_count":"39","column_count":"37","derived_view":false}
        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"g6zj-tzgn","name":"DCM_StreetCenterLine","description":"The Digital City Map (DCM) data represents street lines and other features shown on the City Map, which is the official street map of the City of New York. The City Map consists of 5 different sets of maps, one for each borough, totaling over 8000 individual paper maps. The DCM datasets were created in an ongoing effort to digitize official street records and bring them together with other street information to make them easily accessible to the public. The Digital City Map (DCM) is comprised of seven datasets; Digital City Map, Street Center Line, City Map Alterations, Arterial Highways and Major Streets, Street Name Changes (areas), Street Name Changes (lines), and Street Name Changes (points).\r\n\r\nAll of the Digital City Map (DCM) datasets are featured on the <a href=\"https://streets.planning.nyc.gov/about\">Streets App</a>\r\n\r\nAll previously released versions of this data are available at BYTES of the <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BIG APPLE- Archive </a>\r\n\r\nUpdates for this dataset, along with other multilayered maps on NYC Open Data, are temporarily paused while they are moved to a new mapping format. Please visit https://www.nyc.gov/site/planning/data-maps/open-data/dwn-digital-city-map.page to utilize this data in the meantime.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/g6zj-tzgn","update_datemadepublic":"6/1/2020","update_updatefrequency":"Monthly","last_data_updated_date":"2024-05-03T19:32:42.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsextern