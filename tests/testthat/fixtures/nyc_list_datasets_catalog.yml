        ,{"datasetinformation_agency":"City Council (NYCC)","uid":"b9km-gdpy","name":"City Council Constituent Services (2015 to 2025)","description":"The data contains issues raised by a constituent to their District office. Each case can raise multiple issues - each row represents an issue, rather than a case. \"\"Casework\"\"/\"\"case\"\" is a single interaction with a constituent, while an \"\"issue\"\" represents a specific concern raised by a constituent; each casework can contain multiple issues. \n\nTo find who represents you and the location of your District office, the \"\"Who Represents Me\"\" Tool (https://www.mygovnyc.org/) from the CUNY Graduate Center and the League of Women Voters can provide you the City Hall office address, District office address, email address, and phone number of the representatives for any given address.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/b9km-gdpy","update_datemadepublic":"3/1/2016","update_updatefrequency":"Historical data","last_data_updated_date":"2026-01-20T19:48:25.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"7262","downloads":"8143","row_count":"341299","column_count":"11","derived_view":false}
