        ,{"datasetinformation_agency":"Department of Consumer and Worker Protection (DCWP)","uid":"8hgr-brxd","name":"DCA Monthly Compliance Report Date for Process Servers","description":"This data set features a list of randomly generated dates used for auditing Process Servers required to complete DCA’s Monthly Compliance Report under a signed consent order. \n\nSome licensed process serving agencies agreed to a Department of Consumer Affairs (DCA) consent order and must use DCA’s Monthly Compliance Report to comply with the review and report requirements. Each month, DCA posts a randomly generated audit date that these process serving agencies should use to answer Questions 30, 31, and 32, for every process server who served process on behalf of the agency during the previous month.\n\nThe dates are selected at random every month.\n\nEach record in the dataset represents a calendar month.\n\nIf the process server did not serve on either the randomly generated audit date or the alternate date selected then responses to questions 30, 31, and 32 must be based on the last day of the month that the process server did serve process.","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/8hgr-brxd","update_datemadepublic":"12/19/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2018-12-13T18:44:24.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"1665","downloads":"1482","row_count":"83","column_count":"3","derived_view":false}
