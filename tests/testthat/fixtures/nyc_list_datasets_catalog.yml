        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"27x4-cbi6","name":"Pregnancy-Associated Mortality","description":"Maternal mortality is widely considered an indicator of overall population health and the status of women in the population. DOHMH uses multiple methods including death certificates, vital records linkage, medical examiner records, and hospital discharge data to identify all pregnancy-associated deaths (deaths that occur during pregnancy or within a year of the end of pregnancy) of New York state residents in NYC each year. DOHMH convenes the Maternal Mortality and Morbidity Review Committee (M3RC), a multidisciplinary and diverse group of  40 members that conducts an in-depth, expert review of each pregnancy-associated death of New York state residents occurring in NYC from both clinical and social determinants of health perspectives. The data in this table come from vital records and the M3RC review process. Data are not cross-classified on all variables:  cause of death data are available by the relation to pregnancy (pregnancy-related, pregnancy-associated but not related, unable to determine), race/ethnicity and borough of residence data are each separately available for the total number of pregnancy-associated deaths and pregnancy-related deaths only.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/27x4-cbi6","update_updatefrequency":"Annually","last_data_updated_date":"2024-10-07T21:27:29.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"12629","downloads":"8165","row_count":"236","column