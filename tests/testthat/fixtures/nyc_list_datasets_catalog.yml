        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"hnxz-kkn5","name":"NYC Urban Tree Canopy Assessment Metrics 2010","description":"Tree Canopy (TC) Assessment metrics for New York City.  This dataset consists of TC metrics summarized to several different sets of geographic base layers. The metrics presented in this table are based on 2010 high resolution land cover dataset.\r\n\r\nThe TC Assessment is a top-down approach to analyzing the forest.  Its purpose is to integrate high resolution land cover data with other GIS datasets to produce a set of detailed metrics on the forest that allow decision makers to know how much tree canopy currently exists (termed Existing TC) and amount of land where is it biophysically feasible to establish tree canopy on (termed Possible TC). \r\n\r\nExisting TC is determined by extracting all features classified as tree canopy from a high resolution land cover dataset.  Possible TC is determined by identifying land where canopy could possibly exist.  Possible TC in a GIS context is determined by overlaying high resolution land cover with cadastral and planimetric datasets to include building polygons and road polygons.  \r\n\r\nPossible TC is queried out from this overlay and consists of all land that was not existing canopy, not water, not a building, and not a road.  Possible TC is further divided into two subcategories:  Possible-impervious and Possible-vegetation.  Possible-impervious consists of all impervious land that, through modification, could support tree canopy.  Examples of such features are parking lots, driveways (through overhanging coverage) and playgrounds.  Possible-vegetation consists of all land that is low-lying vegetation, primarily grass or shrubs, which could conceivably be converted to support tree canopy.  Examples of such features include residential lawns and playing fields.  TC metrics do not serve to address the issues of where it is socially desirable or financially feasible to plant trees.  Rather, the TC metrics serve as the basis for beginning to form answers to these questions.   \r\n\r\nTC metrics are presented in the attribute table as both absolute area (in map units) and relative area (percentage of land area) per parcel.  For example, an Existing TC Area (TC_E_A) value of 13,677 and an Existing TC Percentage (TC_E_P) of 21.8 indicate that for the parcel in question the area of Existing TC is 13,677 (in map units) and 21.8% of that feature is tree canopy.   This assessment was completed by the University of Vermont's Spatial Analysis Laboratory with funding from National Urban and Community Forestry Advisory Council (NUCFAC) and the National Science Fundation (NSF) and in cooperation with the USDA Forest Service's Northern Research Station.\r\n\r\nThe TC Assessment protocols were developed by the USDA Forest Service's Northern Research Station and the University of Vermont's Spatial Analysis Laboratory in collaboration with the Maryland Department of Natural Resources.  TC assessments have been conducted for numerous communities throughout the U.S. where the results have been instrumental in helping to establishing TC goals.","type":"file","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/hnxz-kkn5","update_datemadepublic":"6/28/2012","update_updatefrequency":"Historical data","last_data_updated_date":"2012-06-28T16:57:57.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"8975","downloads":"4297","derived_view":false}
        ,{"datasetinformation_agency":"Police Department (NYPD)","uid":"d6zx-ckhd","name":"NYPD Calls for Service (Historic)","description":"Calls for Service to NYPD's 911 system</br>\r\nThis dataset documents entries  into the NYPD 911 system, ICAD.  The data is collected from the ICAD system which call takers and dispatchers use to communicate with callers and the NYPD.  Each record represents an entry into the system.  The data includes entries generated by members of the public as well as self-initiated entries by NYPD Members of Service. The data can be used for issues being responded to by the NYPD.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/d6zx-ckhd","update_datemadepublic":"5/3/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2025-04-17T16:49:04.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"15444","downloads":"5775","row_count":"47854059","column_count":"25","derived_view":false}
        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"8znf-7b2c","name":"DSNY Litter Basket Inventory","description":"Locations and types of refuse litter baskets tracked by DSNY. This data is collected through periodic surveys by DSNY field personnel. For more information about NYC rules and regulations about litter and litter baskets, please see: <a href=\"https://www.nyc.gov/site/dsny/what-we-do/cleaning/litter-baskets.page\" target=\"_blank\" rel=\"noreferrer\">https://www.nyc.gov/site/dsny/what-we-do/cleaning/litter-baskets.page</a>.\n \nEach record represents the approximate location, ownership, and physical type of a single refuse litter basket. Litter basket locations are subject to frequent change, for reasons that include but are not limited to litter basket damage; nearby construction; graffiti; and/or persistent, illegal use of basket for household or commercial waste. There is often a lag time between a change in basket type or location and the reflection of that change in this dataset. This dataset includes information on BID-owned and Privately-owned litter baskets. Non-profit and private entities wishing to place a litter basket on a public street must receive permission from the Department of Sanitation. This dataset does not track public litter baskets placed by other City, State, or Federal agencies, notably the NYC Department of Parks and Recreation. Recycling baskets are also not tracked in this dataset.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/8znf-7b2c","update_updatefrequency":"As needed","last_data_updated_date":"2025-12-24T16:44:18.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"N/A","visits":"10466","downloads":"4313","row_count":"20413","column_count":"19","derived_view":false}
