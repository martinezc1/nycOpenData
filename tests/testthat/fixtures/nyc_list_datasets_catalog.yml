        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"4mhf-duep","name":"Heat Vulnerability Index Rankings","description":"The Heat Vulnerability Index (HVI) shows neighborhoods whose residents are more at risk for dying during and immediately following extreme heat. It uses a statistical model to summarize the most important social and environmental factors that contribute to neighborhood heat risk. The factors included in the HVI are surface temperature, green space, access to home air conditioning, and the percentage of residents who are low-income or non-Latinx Black. Differences in these risk factors across neighborhoods are rooted in past and present racism.  Neighborhoods are scored from 1 (lowest risk) to 5 (highest risk) by summing the following factors and assigning them into 5 groups (quintiles):                                                                                                                                                                     \n<br>Median Household Income (American Community Survey 5 year estimate, 2016-2020)\nPercent vegetative cover (trees, shrubs or grass) (2017 LiDAR, NYC DOITT)\nPercent of population reported as Non-Hispanic Black on Census 2020\nAverage surface temperature Fahrenheit from ECOSSTRESS thermal imaging, August 27,2020\nPercent of households reporting Air Conditioning access, Housing ad Vacancy Survey, 2017","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/4mhf-duep","update_datemadepublic":"9/19/2024","update_updatefrequency":"As needed","last_data_updated_date":"2024-09-19T14:16:07.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_exter