        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"wswf-9pts","name":"Parks Closure Status Due to COVID-19: Dog Runs","description":"In response to the COVID-19 pandemic, NYC Parks temporarily closed several amenities, including Dog Runs. This data collection contains the status of each Dog Run, and is subject to change. Although the data feed is refreshed daily, it may not reflect current conditions.\r\n\r\nData Dictionary:\r\n\r\nhttps://docs.google.com/spreadsheets/d/1aaYE82BS-SYh-xjI-t_oyJcNEPFWJNPfdI7T220-rv4/edit#gid=1499621902","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/wswf-9pts","update_updatefrequency":"Historical data","last_data_updated_date":"2021-11-22T14:49:49.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1538","downloads":"1838","row_count":"85","column_count":"16","derived_view":false}
        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"sbnd-xujn","name":"Handyman Work Order (HWO) Charges","description":"Contains information about work orders created to conduct emergency repair work when an owner fails to address a hazardous condition pursuant to the requirements of an HPD issued violation. HPD issues violations when an owner fails to address a condition pursuant New York City Housing Maintenance Code (HMC) or the New York State Multiple Dwelling Law (MDL), a Department of Buildings Declaration of Emergency, a Department of Health Commissioner's Order to Abate or an emergency violation issued by another City Agency. The work orders were carried out by agency staff.\r\n</p>\r\nThis is part of the <a href=https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=HPD+Charge+Data>HPD Charge Data collection of data tables.</a>","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/sbnd-xujn","update_datemadepublic":"2/20/2014","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-24T15:37:26.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"7289","downloads":"8548","row_count":"98083","column_count":"32","derived_view":false}
        ,{"datasetinformation_agency":"Police Department (NYPD)","uid":"hxbk-grd3","name":"NYPD OATH Summons Data","description":"Incident-level summons data, each record representing one summons. This data may be used to gain insight into OATH summonses issued, basic demographic information of respondents, and geolocation data where violations were cited. Find Your Precinct and Sector tool at nyc.gov: https://www.nyc.gov/site/nypd/bureaus/patrol/find-your-precinct.page","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/hxbk-grd3","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-02-06T17:36:05.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"3866","downloads":"1236","row_count":"251124","column_count":"21","derived_view":false}
        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"wvxf-dwi5","name":"Housing Maintenance Code Violations","description":"Pursuant to New York City’s Housing Maintenance Code, the Department of Housing Preservation and Development (HPD) issues violations against conditions, in rental dwelling units and buildings, that have been verified to violate the New York City Housing Maintenance Code (HMC) or the New York State Multiple Dwelling Law (MDL).\r\nEach row in this dataset contains discrete information about one violation of the New York City Housing Maintenance Code or New York State Multiple Dwelling Law. Each violation is identified using a unique Violation ID. These Laws are in place to provide requirements for the maintenance of residential dwelling units within New York City. \r\nViolations are issued by Housing Inspectors after a physical inspection is conducted (except for class I violations which are generally  administratively issued).  Violations are issued in four classes: Class A (non-hazardous), Class B (hazardous), Class C (immediately hazardous) and Class I (information orders).  For more information on violations, see https://www1.nyc.gov/site/hpd/owners/compliance-clear-violations.page  \r\nThe base data for this file is all violations open as of October 1, 2012.  Violation data is updated daily.  The daily update includes both new violations and updates to the status of previously issued violations. An open violation is a violation which is still active on the Department records. See the status table for determining how to filter for open violations versus closed violations, and within open violations for a more detailed current status. \r\nThe property owner may or may not have corrected the physical condition if the status is open. The violation status is closed when the violation is observed/verified as corrected by HPD or as certified by the landlord.   The processes for having violations dismissed are described at http://www1.nyc.gov/site/hpd/owners/compliance-clear-violations.page\r\nUsing other HPD datasets, such as the Building File or the Registration File, a user can link together violations issued for given buildings or for given owners.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/wvxf-dwi5","update_datemadepublic":"2/14/2014","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-24T15:03:23.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"195448","downloads":"42816","row_count":"8349119","column_count":"41","derived_view":false}
