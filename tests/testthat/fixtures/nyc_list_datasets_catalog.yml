        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"6yag-pnij","name":"DSNY Other Organics Collection Tonnages","description":"Annual tons of food scraps dropped off at Green Markets and nonprofit partners. Also includes deliveries of organics such as leaf and wood wastes to nonprofit partners. In FY 2021, DSNY suspended its collection of food scraps from Green Markets due to COVID and COVID-related budget cuts. In FY 2021, nonprofit partners started to haul their own organic material.\n</br>\n<ul style=\"line-height:1.7em;\">\n<li>For DSNY monthly tonnages collected curbside by DSNY vehicles, see: <a href=\"https://data.cityofnewyork.us/City-Government/DSNY-Monthly-Tonnage-Data/ebb7-mvp5\" target=\"_blank\" rel=\"noopener noreferrer\">https://data.cityofnewyork.us/City-Government/DSNY-Monthly-Tonnage-Data/ebb7-mvp5</a>. </li>\n<li>Visit <a href=\"https://www.nyc.gov/site/dsny/collection/residents/food-scrap-drop-off.page\" target=\"_blank\" rel=\"noopener noreferrer\"> https://www.nyc.gov/site/dsny/collection/residents/food-scrap-drop-off.pages</a> for food scrap drop-off updates. </li>\n<li>For more information about NYC's organics collection programs, see: <a href=\"https://www.nyc.gov/site/dsny/collection/residents/curbside-composting.page\" target=\"_blank\" rel=\"noopener noreferrer\">https://www.nyc.gov/site/dsny/collection/residents/curbside-composting.page</a>.</li>\n</ul>","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/6yag-pnij","update_datemadepublic":"9/15/2018","update_updatefrequency":"Annually","last_data_updated_date":"2025-02-10T15:58:26.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_ex