        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"s6qk-qkvb","name":"School Bus Route Reporting April2020_21_996 - July 1, - December 31, 2019","description":"Student ride times were reported as defined by the time difference between the scheduled stop time and the school session time. This was reported at the student level as this is a more useful metric for judging service provided. A full route, including all pick ups and drop offs would not be reflective of the time any individual student spent on the bus.","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/s6qk-qkvb","update_datemadepublic":"01/29/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-01-29T23:24:15.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1145","downloads":"951","row_count":"64","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"tnry-kwh5","name":"Children Under 6 yrs with Elevated Blood Lead Levels (BLL)","description":"These data are an indicator of children younger that 6 years of age tested in NYC in a given year with blood lead levels of 5 mcg/dL or greater.\r\n\r\nAbout the Data\r\n\r\nAll NYC children are required to be tested for lead poisoning at around age 1 and age 2, and to be screened for risk of lead poisoning, and tested if at risk, up until age 6. These data are an indicator of children younger that 6 years of age tested in NYC in a given year with blood lead levels of 5 mcg/dL or greater. In 2012, CDC established that a blood lead level of 5 mcg/dL is the reference level for exposure to lead in children. This level is used to identify children who have blood lead levels higher than most children's levels. The reference level is determined by measuring the NHANES blood lead distribution in US children ages 1 to 5 years, and is reviewed every 4 years.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/tnry-kwh5","update_datemadepublic":"1/2/2019","update_updatefrequency":"Annually","last_data_updated_date":"2018-07-12T19:48:18.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"N/A","visits":"6560","downloads":"2812","row_count":"576","column_count":"19","derived_view":false}
        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"c9ex-t8kt","name":"Housing Database by 2020 Census Block (Map)","description":"Net change in housing units arising from new buildings, demolitions, or alterations for NYC Census Blocks since 2010. The NYC Department of City Planning’s (DCP) <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/dwn-housing-database.page#housingdevelopmentproject\">Housing Database</a> provide the 2010 census count of housing units, the net change in Class A housing units since the census, and the count of units pending completion for commonly used political and statistical boundaries. These tables are aggregated from the DCP Housing Database, which is derived from Department of Buildings (DOB)-approved housing construction and demolition jobs filed or completed in NYC since January 1, 2010. Net housing unit change is calculated as the sum of all three construction job types that add or remove residential units: new buildings, major alterations, and demolitions, and can be used to determine the change in legal housing units across time and space.\r\n\r\nAll previously released versions of this data are available at a <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BYTES of the BIG APPLE- Archive</a>","type":"map","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/c9ex-t8kt","update_datemadepublic":"4/7/2021","update_updatefrequency":"Every 6 months","last_data_updated_date":"2026-03-16T16:52:27.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecor