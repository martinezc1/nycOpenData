        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"3qfc-4tta","name":"DOF: Condominium Comparable Rental Income – Bronx – FY 2011/2012","description":"Condominiums and cooperatives are valued as if they were residential rental apartments. Income information from similar rental properties is applied to determine value.\r\nThe Department of Finance (DOF) chooses similar properties to value condos and coops. Properties are selected based on a combination of factors such as: land location, income levels, building age and construction and exemptions and subsidies.\r\nUpdate Schedule: Annually","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/3qfc-4tta","update_datemadepublic":"10/7/2011","update_updatefrequency":"Historical data","last_data_updated_date":"2017-09-11T16:29:45.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"2749","downloads":"3486","row_count":"69","column_count":"70","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"yig9-9zum","name":"2010 - 2011 School Progress Reports - All Schools","description":"2010/11 Progress Report results for all schools (As of 9/23/2011)\r\n\r\nPeer indexes are calculated differently depending on School Level.  Schools are only compared to other schools in the same School Level (e.g., Elementary, K-8, Middle, High, Transfer)\r\n\r\n1) Elementary, K-8, Early Childhood - peer index is a value from 0-100.  A composite demographic statistic based on % ELL, % Students with Disabilities, % Title I free lunch, and % Black/Hispanic is used.  Higher values indicate student populations with higher need.\r\n\r\n2) Middle - peer index is a value from 1.00-4.50.  For middle schools, the average 4th grade proficiency ratings in ELA and Math and the % Students with Disabilities is used. Lower values indicate student populations with higher need.\r\n\r\n3) High School - peer index is a value from 1.00-4.50. For high schools, the average 8th grade proficiency, the % Students with Disabilities, the % Self-contained, and the % overage is used. Lower values indicate student populations with higher need.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/yig9-9zum","update_datemadepublic":"10/11/2011","update_updatefrequency":"Historical data","last_data_updated_date":"2011-10-06T20:12:54.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"3884","downloads":"5864","row_count":"1219","column_count":"17","derived_view":false}
