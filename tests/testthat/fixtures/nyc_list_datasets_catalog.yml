        ,{"datasetinformation_agency":"Department of Buildings (DOB)","uid":"juyv-2jek","name":"DOB NOW: Build Elevator Device Details","description":"This collection contains elevator applications, aka job filings, submitted online through the \"DOB NOW: BUILD\" portal. An approved application allows the applicant to pull a permit and begin work on an elevator project.\n</p>\nDOB NOW: BUILD is an online portal that allows users to file for permit applications, check the status of an application, make payments, schedule appointments, and print permits. \n\nData in this collection is limited to elevator applications (also known as ELV1) submitted through DOB NOW, and includes Initial (New), Subsequent, and Post Approval Amendment (PAA) filing types. The collection includes all electrical applications submitted to the Department of Buildings since December 11, 2017, when the applications were launched in DOB NOW and were no longer accepted through other submission processes.\n\nThis dataset contains details for each device on the application. There should be one row per device/Job Filing Number in this dataset. For example, an Initial Permit Application for Device 1234 and Device 5678 would have 2 rows (one for 1234 and one for 5678). If a Post Approval Amendment (PAA) was submitted for this application, then the Device rows would be repeated but the Job Filing Number would have a P1 suffix to indicate the PAA.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/juyv-2jek","update_datemadepublic":"10/31/2019","update_updatefrequency":"Daily","last_data_updated_date":"2025-09-27T19:05:15.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"Yes","visits":"9280","downloads":"9400","row_count":"108588","column_count":"167","derived_view":false}
        ,{"datasetinformation_agency":"Police Department (NYPD)","uid":"uip8-fykc","name":"NYPD Arrest Data (Year to Date)","description":"This is a breakdown of every arrest effected in NYC by the NYPD during the current year.\n This data is manually extracted every quarter and reviewed by the Office of Management Analysis and Planning. \n Each record represents an arrest effected in NYC by the NYPD and includes information about the type of crime, the location and time of enforcement. \nIn addition, information related to suspect demographics is also included. \nThis data can be used by the public to explore the nature of police enforcement activity. \nPlease refer to the attached data footnotes for additional information about this dataset.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/uip8-fykc","update_datemadepublic":"11/1/2018","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-02-09T16:28:28.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"246303","downloads":"46532","row_count":"278953","column_count":"24","derived_view":false}
