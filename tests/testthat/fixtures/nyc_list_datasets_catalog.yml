        ,{"datasetinformation_agency":"Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV)","uid":"ipu7-kigb","name":"ENDGBV in Focus: Outreach Campaigns and Activities, 2018-2019","description":"The data set contains information on outreach activities conducted by staff of the Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV) in calendar year 2018 and 2019. Outreach Coordinators ENDGBV raise awareness about resources and services for survivors of domestic and gender-based violence in New York City and conduct public engagement and education events to build community capacity to recognize, respond to, and prevent domestic and gender-based violence. ENDGBV Outreach builds community partnerships, situates ENDGBV’s work within City and community initiatives, and keeps its finger on the pulse of domestic and gender-based violence crime trends and survivor needs.\r\nENDGBV Outreach conducts most of ENDGBV’s public awareness and outreach activity, and it works closely with colleagues across our Policy, Training, the Healthy Relationship Training Academy, Family Justice Center (FJC), and Executive teams to engage communities across the city. ENDGBV Outreach often leads grassroots advocacy efforts and gathers support for public awareness initiatives at the local level by participating in task forces and working group meetings citywide and nationwide, including with Peace Over Violence, the United Nations (UN), and diplomatic offices. ENDGBV Outreach collaborates with a diverse range of partners, including its New York City sister agencies, community-based organizations (CBOs), and houses of worship, on outreach and public engagement campaigns and events. In 2018 and 2019, ENDGBV Outreach worked with more than 350 unique NYC agencies, CBOs, and houses of worship.\r\nKey Definitions:  Civic Service Agencies include Mayor’s Community Affairs Unit (CAU), Community Boards, Commission on Human Rights (CCHR), NYC Council members, and New York State (NYS) government representatives (e.g., NYS Senators, Office of the NYS Attorney General, etc.). Education Agencies include City University of New York (CUNY), Department of Education (DOE), and Commission on Gender Equity (CGE). Health Agencies include Department of Health and Mental Hygiene (DOHMH), Health and Hospitals Corporation (HHC), and ThriveNYC. Public Safety Agencies include Fire Department of the City of New York (FDNY), New York City Police Department (NYPD), and Department of Probation (DOP). Social Service Agencies include Department for the Aging (DFTA), Administration for Children’s Services (ACS), Department of Homeless Services (DHS), Human Resources Administration (HRA), Mayor’s Office for Economic Opportunity (MOEO), Mayor’s Office for People with Disabilities (MOPD), Young Men’s Initiative (YMI), and Department of Veterans’ Services (DVS). Community-based organizations (CBOs) include organizations like Sanctuary for Families, Safe Horizon, etc. Outreach Events any event in which the ENDGBV outreach team participated as part of its mission to raise awareness about domestic and gender-based violence and the services that are available to survivors.  General Outreach: Is an event that ENDGBV participated to raise awareness of the occurrence of domestic and gender-based violence and the services available with the public. Events could include fairs, block parties, distributing materials in public spaces, such as subway and bus stops. Outreach meetings include meetings attended by the outreach staff in community, such as community-board meetings or meetings with community-based organizations. Educational Trainings: Workshops conducted by ENDGBV staff to raise awareness of the occurrence of domestic and gender-based violence and the services available. FJC are outreach, educational activities, and tours conducted at, or by New York City Family Justice Center (FJC) staff.  FJCs are co-located multidisciplinary service centers, situated in the five boroughs, providing vital social services as well as civil legal and criminal justice assistance for survivors of domestic and gender-based violence and their children.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/ipu7-kigb","update_datemadepublic":"1/17/2023","update_updatefrequency":"Historical data","last_data_updated_date":"2022-11-01T17:47:36.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"672","downloads":"949","row_count":"128","column_count":"29","derived_view":false}
