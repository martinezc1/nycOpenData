        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"rrtd-iyd7","name":"485-x Affordable Neighborhoods for New Yorkers: Registrations of Prospective Applicants for Tax Benefits","description":"On April 20th, 2024, New York State enacted New York State Real Property Tax Law Section 485-x. This legislation requires prospective applicants for 485-x tax exemption benefits to file an agency-supplied online form with HPD. Information submitted to the agency via this form: \n(i) states an intention to file for such benefits under the provisions of this section, \n(ii) includes the commencement date, and (iii) establishes the intended number of total dwelling units and, if applicable, restricted units. This form also includes information on prospective applicants including, but not limited to, applicant information, the reported number of dwelling units, restricted units anticipated to be included in the building, reported commencement dates, and reported anticipated completion dates.\n \nTo learn more, please refer to: https://www.nyc.gov/site/hpd/services-and-information/tax-incentives-485-x.page","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/rrtd-iyd7","update_datemadepublic":"5/23/2025","update_updatefrequency":"Every 6 months","last_data_updated_date":"2025-11-25T20:20:43.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"4476","downloads":"713","row_count":"198","column_count":"25","derived_view":false}
