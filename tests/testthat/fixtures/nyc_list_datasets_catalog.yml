        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"fwpa-qxaf","name":"Pedestrian Mobility Plan Pedestrian Demand","description":"Based on citywide data sources for pedestrian generators, NYC DOT developed a holistic, data-driven framework to categorize streets based on pedestrian needs. The plan aims to improve pedestrian comfort and convenience as well as increase walking citywide. NYC DOT created five broad street categories to determine the pedestrian needs on the city’s sidewalks. For more information, please visit NYC DOT website: https://www1.nyc.gov/html/dot/html/pedestrians/pedestrian-mobility.shtml","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/fwpa-qxaf","update_datemadepublic":"12/29/2022","update_updatefrequency":"Every 6 months","last_data_updated_date":"2026-03-06T17:25:15.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"9304","downloads":"2834","row_count":"127277","column_count":"20","derived_view":false}
