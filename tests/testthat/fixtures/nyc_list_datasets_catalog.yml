        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"ez4e-fazm","name":"Bus Breakdown and Delays","description":"The Bus Breakdown and Delay system collects information from school bus vendors operating out in the field in real time. Bus staff that encounter delays during the route are instructed to radio the dispatcher at the bus vendor’s central office. The bus vendor staff are then instructed to log into the Bus Breakdown and Delay system to record the event and notify OPT. OPT customer service agents use this system to inform parents who call with questions regarding bus service. The Bus Breakdown and Delay system is publicly accessible and contains real time updates. All information in the system is entered by school bus vendor staff.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/ez4e-fazm","update_datemadepublic":"4/11/2016","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-24T10:32:16.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"No","visits":"46584","downloads":"16263","row_count":"1269705","column_count":"21","derived_view":false}
        ,{"datasetinformation_agency":"Fire Department of New York City (FDNY)","uid":"8m42-w767","name":"Fire Incident Dispatch Data","description":"The Fire Incident Dispatch Data file contains data that is generated by the Starfire Computer Aided Dispatch System. The data spans from the time the incident is created in the system to the time the incident is closed in the system.  It covers information about the incident as it relates to the assignment of resources and the Fire Department’s response to the emergency. To protect personal identifying information in accordance with the Health Insurance Portability and Accountability Act (HIPAA), specific locations of incidents are not included and have been aggregated to a higher level of detail.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/8m42-w767","update_datemadepublic":"11/21/2016","update_updatefrequency":"Annually","last_data_updated_date":"2025-05-05T16:57:30.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"62580","downloads":"10510","row_count":"11184141","column_count":"29","derived_view":false}
