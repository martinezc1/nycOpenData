        ,{"datasetinformation_agency":"Police Department (NYPD)","uid":"f4tj-796d","name":"NYPD Use of Force Incidents","description":"Dataset containing information related to Force Incidents involving NYPD Members of Service.\r\n\r\nThe Threat, Resistance, or Injury (TRI) Report is the primary means by which the NYPD records use of force incidents. All reportable instances of force – whether used by a member of the Department, or against the member – are recorded on a TRI Report. Data provided here are a result of the information captured on TRI Reports.  Each record corresponds to an incident where a member of service used force.  The data can be used to explore the various categories of force incidents and when and in which precinct they occurred. The data is used to populate the public facing Force Dashboard (https://app.powerbigov.us/view?r=eyJrIjoiOGNhMjVhYTctMjk3Ny00MTZjLTliNDAtY2M2ZTQ5YWI3N2ViIiwidCI6IjJiOWY1N2ViLTc4ZDEtNDZmYi1iZTgzLWEyYWZkZDdjNjA0MyJ9).","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/f4tj-796d","update_datemadepublic":"12/16/2020","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-02-06T17:19:09.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"No","visits":"10630","downloads":"4240","row_count":"56994","column_count":"7","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"fnzt-d3f7","name":"2019 - 2020 School Year Local Law 226 Report for the Demographics of School Staff - Gender","description":"This report is prepared pursuant to Local Law 226 of 2019 regarding the demographics of school staff in New York City public schools.  The law specifies the reporting of demographics (gender and race or ethnicity) for schools staff in three categories:  teaching staff, leadership staff, and other professional and paraprofessional staff.  Consistent with the law, the data is further disaggregated to show length of experience in the school and length of experience in the title.  The data is shown for each school and aggregated for each community school district,  by borough, and citywide.  The following additional notes apply:","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/fnzt-d3f7","update_datemadepublic":"12/11/2020","update_updatefrequency":"Historical data","last_data_updated_date":"2020-12-12T00:54:57.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1609","downloads":"1084","row_count":"1583","column_count":"22","derived_view":false}
