        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"7n5j-865y","name":"VZV Speed Limits","description":"On November 7, 2014, New York City’s default speed limit was changed from 30 mph to 25 mph. Unless otherwise signed, all streets in New York City are governed by this 25 mph speed limit. Driving at or below 25 MPH decreases stopping distance, gives drivers and pedestrians more time to see each other and react, and improves drivers’ ability to avoid crashes. Pedestrians struck by vehicles traveling at 25 MPH are half as likely to die as those struck at 30 MPH. If crashes do occur, the severity of injuries is reduced a lower speeds. The information shown here was compiled by the New York City Department of Transportation for governmental purposes. The information is updated as soon as reasonably practicable. The public is advised that speed limits are subject to temporary or permanent change and that posted signage must be observed for compliance with laws and regulations.\r\n\r\nFor a complete list of Vision Zero maps, please follow <a href=\"https://data.cityofnewyork.us/browse?q=vzv&sortBy=last_modified&utf8=%E2%9C%93\">this link</a>","type":"map","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/7n5j-865y","update_datemadepublic":"05/31/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:21:53.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"23404","downloads":"734","parent_uid":"5mad-ntua","derived_view":true}
        ,{"datasetinformation_agency":"Other","uid":"ej9h-v6g2","name":"2018 Central Park Squirrel Census - Hectare Data","description":"The Squirrel Census (https://www.thesquirrelcensus.com/) is a multimedia science, design, and storytelling project focusing on the Eastern gray (Sciurus carolinensis). They count squirrels and present their findings to the public. This table contains environmental data related to each of the 350 “countable” hectares of Central Park. Examples include weather, litter, animals sighted, and human density.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/ej9h-v6g2","update_datemadepublic":"10/15/2019","update_updatefrequency":"Historical data","last_data_updated_date":"2019-10-15T16:40:30.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"5701","downloads":"3905","row_count":"700","column_count":"13","derived_view":false}
