        ,{"datasetinformation_agency":"Department of Consumer and Worker Protection (DCWP)","uid":"kwss-yksz","name":"Archived DCWP Inspections","description":"An archival list of all inspections in DCWP's Accela system.\nThis dataset features business inspections conducted by DCWP. DCWP enforces key consumer protection, licensing, weights and measures, and workplace laws. In addition to patrol (routine) inspections at brick-and-mortar businesses, DCWP inspects licensed vehicles such as horse-drawn cabs, pedicabs, sightseeing buses, and tow trucks to ensure they are in compliance with their respective asset class requirements. DCWP also conducts 'Business Education' inspections, which are educational, violation-free visits. These visits are designed to help business owners learn about and comply with the laws that DCWP enforces.\n\nFor the current list of inspections, please refer to https://data.cityofnewyork.us/d/jzhd-m6uv","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/kwss-yksz","update_datemadepublic":"3/19/2025","update_updatefrequency":"Historical data","last_data_updated_date":"2025-02-26T16:59:05.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"848","downloads":"453","row_count":"1426882","column_count":"26","derived_view":false}
