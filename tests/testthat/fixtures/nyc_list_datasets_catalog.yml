        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"33c5-b922","name":"Summary of DBP Quarterly Report","description":"The data tables summarizes the disinfection by-product results for TTHM and HAA5 from distribution sites and calculated compliance values for each quarter\r\n\r\n\r\n\r\n(a) : analyzed by EPA Method 524.3\t\t\t\t\t\t\t\t\t\t\r\n(b) : analyzed by EPA Method 552.3\t\t\t\t\t\t\t\t\t\t\r\nLRAA:   The Locational Running Annual Average (LRAA) is calculated by taking the value of this quarter and the three previous consecutive quarters.\t\t\t\t\t\t\t\t\t\t\r\nRAA:  \tThe System-wide Running Annual Average (RAA) is calculated by taking the average of the Quarterly Average of this quarter and the three previous consecutive quarters.\t\t\t\t\t\t\t\t\t\r\nOEL:    The Operational Evalution Level (OEL) is calculated by averaging 2 times this quarter's value and the two previous consecutive quarters.\t\t\t\t\t\t\t\t\t\t\r\n   Both the LRAA and the System-wide RAA is not to exceed 80 µg/L for TTHM and 60 µg/L for HAA5.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/33c5-b922","update_datemadepublic":"10/17/2017","update_updatefrequency":"Quarterly","last_data_updated_date":"2025-12-16T15:26:51.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1645","downloads":"2181","row_count":"920","column_count":"11","derived_view":false}
