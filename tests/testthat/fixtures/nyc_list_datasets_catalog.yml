        ,{"datasetinformation_agency":"Department of Buildings (DOB)","uid":"e5aq-a4j2","name":"DOB NOW Elevator Safety Compliance","description":"This data set includes elevator inspection and report filing information through the New York City Department of Buildings' DOB NOW: Elevator Compliance Filings module. The data is collected because the Department of Buildings tracks elevator inspection information.This data include items such as device number, device status, report filing dates, inspetion dates, BIN, and other location information.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/e5aq-a4j2","update_datemadepublic":"5/19/2023","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-23T20:32:55.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"No","visits":"6670","downloads":"3378","row_count":"119493","column_count":"24","derived_view":false}
