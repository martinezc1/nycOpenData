        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"cm6g-t7ye","name":"Inclusionary Housing Properties","description":"The Inclusionary Housing Program is designed to preserve and promote affordable housing within neighborhoods where zoning has been modified to encourage new development.  The Voluntary Inclusionary Housing program, enacted in 1987, enables a development to receive a density bonus in return for the new construction, substantial rehabilitation, or preservation of permanently affordable housing.  The Inclusionary Housing Properties table includes both generating sites and compensated developments.  Please note that some properties are both generating sites and compensated developments.\r\nThe Voluntary Inclusionary Housing (VIH) open data is published in four tables. Please see the documentation for more information on how these four tables relate.\r\n\r\nFor a complete list of Inclusionary Housing datasets, please follow <a href=\"https://data.cityofnewyork.us/browse?q=HPD%20Inclusionary%20Housing&sortBy=relevance\">this link</a>.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/cm6g-t7ye","update_datemadepublic":"12/7/2018","update_updatefrequency":"Annually","last_data_updated_date":"2019-09-24T13:36:53.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"3762","downloads":"1664","row_count":"619","column_count":"18","derived_view":false}
