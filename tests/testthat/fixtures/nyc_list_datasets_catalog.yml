        ,{"datasetinformation_agency":"Department of Consumer and Worker Protection (DCWP)","uid":"2c9f-2ta9","name":"Financial Services for NYCHA Residents by Borough - Local Law 163","description":"This datasets contains information about NYCHA residents’ use of:\r\n\r\na) <a href=\"https://www1.nyc.gov/site/dca/consumers/get-free-financial-counseling.page\">NYC Financial Empowerment Centers</a>: a program that provides free, one-on-one professional financial counseling and coaching to all NYC residents. Each row in the dataset represents the number of NYCHA residents on a Borough-level who utilized this service;\r\n\r\nb) <a href=\"https://www1.nyc.gov/site/dca/partners/EmpoweredNYC.page\">EmpoweredNYC</a>: is an initiative to assist New Yorkers with disabilities and their families to better manage their finances and become more financially stable. Each row in the dataset represents the number of NYCHA residents on a Borough-level who utilized this service; \r\n\r\nc) <a href=\"https://www1.nyc.gov/site/dca/media/pr012618.page\">Student Loan Debt clinic</a>: is an initiative to help New Yorkers understand their student loans and how to repay them. Each row in the dataset represents the number of NYCHA residents on a Borough-level who utilized this service; and \r\n\r\nd) <a href=\"https://www1.nyc.gov/site/hpd/renters/ready-to-rent.page\">Ready to Rent</a>: a program providing free one-on-one financial counseling to New Yorkers seeking to apply for affordable housing units through HPD’s Housing Connect lottery. Each row in the dataset represents the number of NYCHA residents on a Borough-level who utilized this service.\r\n\r\nThe dataset is part of the annual report compiled by the Mayor’s Office of Operations as mandated by the <a href=\"https://legistar.council.nyc.gov/LegislationDetail.aspx?ID=2745761&GUID=2A9FB1D2-A1A8-4484-9D49-6F8332171B66\">Local Law 163 of 2016</a> on different services provided to NYCHA residents. See other datasets in this report by searching the keyword “Services available to NYCHA Residents - Local Law 163 (2016)” on the Open Data Portal.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/2c9f-2ta9","update_datemadepublic":"12/11/2020","update_updatefrequency":"Annually","last_data_updated_date":"2025-12-02T15:20:07.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1135","downloads":"1384","row_count":"34","column_count":"30","derived_view":false}
        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"crbs-vur7","name":"DOF: Condominium Comparable Rental Income – Queens – FY 2009/2010","description":"The Department of Finance (DOF) is required by NY State law to value condominiums or cooperatives as if they were residential rental apartment buildings.   DOF uses income information from rental properties similar in physical features and location to the condominiums or cooperatives. DOF applies this income data to the condominium or cooperative and determine its value in the same way DOF values rental apartment buildings.\r\nUpdate Frequency: Annually","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/crbs-vur7","update_datemadepublic":"10/11/2011","update_updatefrequency":"Historical data","last_data_updated_date":"2017-09-11T18:50:30.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1075","downloads":"3698","row_count":"306","column_count":"46","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"arzb-yfdv","name":"2015-2016 Physical Education - PE Instruction - District Level","description":"Background, Methodology: \r\n\r\nLocal Law 102 enacted in 2015 requires the Department of Education of the New York City School District to submit to the Council an annual report concerning physical education for the prior school year.\r\n\r\n\r\nThis report provides information about average frequency and average total minutes per week of physical education as defined in Local Law 102 as reported through the 2015-2016 STARS database. It is important to note that schools self-report their scheduling information in STARS. The report also includes information regarding the number and ratio of certified physical education instructors and designated physical education instructional space.\r\n\r\n\r\nThis report consists of six tabs:\r\n\r\n\r\n1.    PE Instruction Borough-Level\r\n2.    PE Instruction District-Level\r\n3.    PE Instruction School-Level\r\n4.    Certified PE Teachers\r\n5.    PE Space\r\n6. Supplemental Programs\r\n\r\n\r\n1. PE Instruction Borough-Level\r\n\r\nThis tab includes the average frequency and average total minutes per week of physical education by borough, disaggregated by grade, race and ethnicity, gender, special education status and English language learner status. This report only includes students who were enrolled in the same school across all academic terms in the 2015-16 school year. Data on students with disabilities and English language learners are as of the end of the 2015-16 school year. Data on adaptive PE is based on individualized education programs (IEP) finalized on or before 05/31/2016.\r\n\r\n\r\n2. PE Instruction District-Level\r\n\r\nThis tab includes the average frequency and average total minutes per week of physical education by district, disaggregated by grade, race and ethnicity, gender, special education status and English language learner status. This report only includes students who were enrolled in the same school across all academic terms in the 2015-16 school year. Data on students with disabilities and English language learners are as of the end of the 2015-16 school year. Data on adaptive PE is based on individualized education programs (IEP) finalized on or before 05/31/2016.\r\n\r\n\r\n3. PE Instruction School-Level\r\n\r\nThis tab includes the average frequency and average total minutes per week of physical education by school, disaggregated by grade, race and ethnicity, gender, special education status and English language learner status. This report only includes students who were enrolled in the same school across all academic terms in the 2015-16 school year. Data on students with disabilities and English language learners are as of the end of the 2015-16 school year. Data on adaptive PE is based on individualized education programs (IEP) finalized on or before 05/31/2016.\r\n\r\n\r\n4. Certified PE Teachers\r\n\r\nThis tab provides the number of designated full-time and part-time physical education certified instructors. Does not include elementary, early childhood and K-8 physical education teachers that provide physical education instruction under a common branches license. Also includes ratio of full time instructors teaching in a physical education license to students by school. Data reported is for the 2015-2016 school year as of 10/31/2015.\r\n\r\n\r\n5. PE Space\r\n\r\nThis tab provides information on all designated indoor, outdoor and off-site spaces used by the school for physical education as reported through the Principal Annual Space Survey and the Outdoor Yard Report. It is important to note that information on each room category is self-reported by principals, and principals determine how each room is classified. Data captures if the PE space is co-located, used by another school or used for another purpose. Includes gyms, athletic fields, auxiliary exercise spaces, dance rooms, field houses, multipurpose spaces, outdoor yards, off-site locations, playrooms, swimming pools and weight rooms as designated PE Space.\r\n\r\n\r\n6. Supplemental Programs\r\n\r\nThis tab provides information on the department's supplemental physical education","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/arzb-yfdv","update_datemadepublic":"12/4/2017","update_updatefrequency":"Historical data","last_data_updated_date":"2017-06-26T22:43:33.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"922","downloads":"1981","row_count":"4288","column_count":"11","derived_view":false}
