        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"spax-mybh","name":"NYC Truck Routes (Historical)","description":"New York City has over 1,000 miles of truck routes. These data sets contain the centerlines of through and local truck routes, and were created from LION, the City's base map of streets.\r\nNote: This is historical data, for the most up to date New York City Truck Routes data, please visit: https://data.cityofnewyork.us/Transportation/New-York-City-Truck-Routes/jjja-shxy","type":"href","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/spax-mybh","update_datemadepublic":"3/13/2015","update_updatefrequency":"Historical data","last_data_updated_date":"2015-03-13T20:17:18.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"Yes","visits":"23438","downloads":"57","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"vzj6-pcjy","name":"Greenstreets","description":"Launched in 1996, the Greenstreets program began as a partnership between the NYC Parks and the New York City Department of Transportation (DOT). The program was created to change unused road areas into green spaces that beautify neighborhoods, improve air quality, reduce air temperatures, and calm traffic. Greenstreets later became a component of the City's \"green infrastructure,\" with some containing bioswales or rain gardens to divert and/or filter stormwater. For more information about the Greenstreets program and green infrastructure, visit https://www.nycgovparks.org/greening/green-infrastructure.\n \n This dataset uses the standard NYC projection of NAD_1983_StatePlane_New_York_Long_Island_FIPS_3104_Feet. Lengths are in feet and areas in square feet.\n\nData Dictionary: https://docs.google.com/spreadsheets/d/1HiHluhaqGWPC4QPy9q5iXkXJCGZrm3nAggJzVeKuP0E/edit?usp=sharing","type":"map","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/vzj6-pcjy","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T14:08:59.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"4356","downloads":"3","parent_uid":"mk9u-qu7i","derived_view":true}
        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"7kuu-zah7","name":"1 foot Digital Elevation Model (DEM) Integer Raster","description":"A bare-earth, hydro-flattened, digital-elevation surface model derived from 2010 Light Detection and Ranging (LiDAR) data. Surface models are raster representations derived by interpolating the LiDAR point data to produce a seamless gridded elevation data set. A Digital Elevation Model (DEM) is a surface model generated from the LiDAR returns that correspond to the ground with all buildings, trees and other above ground features removed. The cell values represent the elevation of the ground relative to sea level. The DEM was generated by interpolating the LiDAR ground points to create a 1 foot resolution seamless surface. Cell values correspond to the ground elevation value (feet) above sea level. A proprietary approach to surface model generation was developed that reduced spurious elevation values in areas where there were no LiDAR returns, primarily beneath buildings and over water. This was combined with a detailed manual QA/QC process, with emphasis on accurate representation of docks and bare-earth within 2000ft of the water bodies surrounding each of the five boroughs.","type":"href","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/7kuu-zah7","update_datemadepublic":"11/13/2017","update_updatefrequency":"Annually","last_data_updated_date":"2017-11-13T18:44:33.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"N/A","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"17714","downloads":"0","derived_view":false}
