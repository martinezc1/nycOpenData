        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"xhvt-s4va","name":"Functional Parkland","description":"This dataset, formally referred to as \"\"Functional Parkland\"\" consists of park properties under the jurisdiction of NYC Parks. The shapes in this dataset are drawn to make printed maps clear and easy to read. Consequently, the shapes in this file should not be used for any spatial calculations. For non-cartographic purposes, consult https://data.cityofnewyork.us/Recreation/Parks-Properties/enfh-gkve\n\nThis dataset uses the standard NYC projection of NAD_1983_StatePlane_New_York_Long_Island_FIPS_3104_Feet. Lengths are in feet and areas in square feet.","type":"dataset","category":"Recreation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/xhvt-s4va","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T14:03:14.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2899","downloads":"1680","row_count":"2058","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Taxi and Limousine Commission (TLC)","uid":"8meu-9t5y","name":"NYC Taxi Zones","description":"TLC trip records contain a field corresponding to the location of the pickup or drop-off of the trip called a taxi zone.\n\nTaxi Zones are roughly based on NYC Department of City Planning’s Neighborhood Tabulation Areas (NTAs) and are meant to approximate neighborhoods, so you can see which neighborhood a passenger was picked up in, and which neighborhood they were dropped off in.\n\nTLC uses the taxi zone shapefile and trip records data to provide the public with data visualization tools to analyze our data. The TLC Factbook (https://nyc.gov/tlcdata), once a static report released by the agency every two years, is now a living, interactive, ever-expanding data dashboard updated with the latest data every month.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/8meu-9t5y","update_updatefrequency":"As needed","last_data_updated_date":"2025-06-09T17:12:22.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"N/A","visits":"2375","downloads":"2537","row_count":"263","column_count":"6","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office of Operations (OPS)","uid":"pqdc-ncdn","name":"OneNYC 2050 (Historical)","description":"This dataset contains the indicators included in the <a href=\"http://onenyc.cityofnewyork.us/strategies/onenyc-2050/\">OneNYC 2050</a> Strategic Plan that will be used to assess progress in achieving the eight overreaching goals of the plan: (1) Vibrant Democracy; (2) Inclusive Economy; (3) Thriving Neighborhoods; (4) Healthy Lives; (5) Equity and Excellence in Education; (6) Livable Climate; (7) Efficient Mobility; and (8) Modern Infrastructure. Each line of data provides the goal, the relevant sub-initiative, the indicator, the baseline year and value for the indicator and the goal. Data is collected by the Mayor’s Office of Operations from the relevant agency.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/pqdc-ncdn","update_datemadepublic":"10/23/2019","update_updatefrequency":"Historical data","last_data_updated_date":"2022-05-26T20:26:47.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2631","downloads":"3358","row_count":"337","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"ahzi-mykc","name":"NYC Parks Structures Map","description":"This dataset includes structures within NYC Parks properties. Structures are broadly defined as \"an assembly of materials forming construction for occupancy or use.\"\n\nOne line of data is a structure. The dataset contains fields that are maintained by multiple agencies including NYC Parks, NYC DoITT, and NYC Planning. Where possible, updated values are pulled from authoritative sources and updated weekly - for more details about specific fields and where they come from please see https://github.com/NYCParks-data/Structures/wiki.\n\nThe System ID and BIN (Building Identification Number) are both required fields.\n\nThe Geosupport table is a related table that has information about addresses for these structures. A separate table was necessary because there is a one-to-many relationship between structures and addresses (i.e., one structure can have more than one address).\n\nA known limitation to this dataset is that functions other than 'comfort station' can and should be attributed to many of the structures. This information will eventually live and be maintained in a related table where all the functions of individual structures can be seen.","type":"map","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/ahzi-mykc","update_updatefrequency":"Weekly","last_data_updated_date":"2026-03-20T13:50:48.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1141","downloads":"2","parent_uid":"n8q6-i44s","derived_view":true}
