        ,{"datasetinformation_agency":"Taxi and Limousine Commission (TLC)","uid":"xjfq-wh2d","name":"For Hire Vehicles (FHV) - Active Drivers","description":"PLEASE NOTE: This dataset of all TLC licensed for-hire drivers in good standing is updated daily between 4–7 PM. Check the “Last Update Date” to confirm it shows today’s or yesterday’s date. If it’s older, find the latest data here: <a href=\"https://app.powerbigov.us/view?r=eyJrIjoiMGIxY2IxMTEtMTBlOS00NGUxLTgyYzMtMTFkMGQ5MmZiMmJjIiwidCI6IjMyZjU2ZmM3LTVmODEtNGUyMi1hOTViLTE1ZGE2NjUxM2JlZiJ9\">Drivers List</a>\n\nNYC TLC Licensed FHV drivers that are currently active and in good standing and able to drive. This list is accurate to the date and time represented in the Last Date Updated and Last Time Updated fields. For inquiries about the contents of this dataset, please email licensinginquiries@tlc.nyc.gov.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/xjfq-wh2d","update_datemadepublic":"7/20/2015","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-23T19:24:44.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1714271","downloads":"480306","row_count":"178657","column_count":"7","derived_view":false}
