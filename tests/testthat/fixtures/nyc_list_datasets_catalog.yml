        ,{"datasetinformation_agency":"Human Resources Administration (HRA)","uid":"4kkh-qhtc","name":"Jobs Plus for NYCHA Residents - Local Law 163","description":"The dataset is collected and owned by the Department of Social Services (DSS). The Human Resources Administration or Department of Social Services (HRA/DSS) is the department of the government of New York City in charge of the majority of the city's social services programs. HRA helps New Yorkers in need through a variety of services that promote employment and personal responsibility while providing temporary assistance and work supports. Its regulations are compiled in title 68 of the New York City Rules. If you have a question related to the dataset, please submit your query via the Contact Us Page on NYC Open Data (https://opendata.cityofnewyork.us/engage/), and someone from the Open Data Team will reach out. This datasets contains information about Jobs-Plus service (http://opportunitynycha.org/workforce-development/jobs-plus/), a place-based employment program designed to increase the earnings and employment of working-age residents in designated public housing developments or a cluster of developments.\n\n\nFor datasets related to other services provided to NYCHA residents, view the data collection “Services available to NYCHA Residents - Local Law 163”.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/4kkh-qhtc","update_datemadepublic":"5/17/2019","update_updatefrequency":"Annually","last_data_updated_date":"2025-11-21T16:31:16.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits