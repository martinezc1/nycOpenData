        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"qiyv-ty5u","name":"2017-2018 Physical Education Instruction - District Level","description":"Local Law 102 enacted in 2015 requires the Department of Education of the New York City School District to submit to the Council an annual report concerning physical education for the prior school year.    \nThis report provides information about average frequency and average total minutes per week of physical education as defined in Local Law 102 as reported through the 2017-18 STARS database. It is important to note that schools self-report their scheduling information in STARS. The report also includes information regarding the number and ratio of certified physical education instructors and designated physical education instructional space.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/qiyv-ty5u","update_datemadepublic":"12/22/2020","update_updatefrequency":"Historical data","last_data_updated_date":"2020-12-22T15:19:08.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"299","downloads":"870","row_count":"4290","column_count":"12","derived_view":false}
