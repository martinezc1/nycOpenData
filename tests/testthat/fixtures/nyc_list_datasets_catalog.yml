        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"udk9-t2yf","name":"Taxi and For Hire Vehicle (FHV) Relief Stands (Map)","description":"This data details the location of the Taxi and For Hire Vehicle(FHV) stands and the number of spaces provided. Taxi and FHV relief stands allow drivers to park their vehicles for up to one hour. This gives drivers the opportunity to leave their vehicles and take care of personal needs. \n\n<b>TNOTE:</b> Taxi and FHV relief stands should not be confused with taxi stands. Taxi stands allow drivers to wait in their cars to pick up passengers.","type":"map","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/udk9-t2yf","update_datemadepublic":"10/27/2023","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:12:06.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"Yes","visits":"22181","downloads":"2","parent_uid":"vqu8-xef9","derived_view":true}
        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"43nn-pn8j","name":"DOHMH New York City Restaurant Inspection Results","description":"The dataset contains every sustained or not yet adjudicated violation citation from every full or special program inspection conducted up to three years prior to the most recent inspection for restaurants and college cafeterias in an active status on the RECORD DATE (date of the data pull). When an inspection results in more than one violation, values for associated fields are repeated for each additional violation record.  Establishments are uniquely identified by their CAMIS (record ID) number. Keep in mind that thousands of restaurants start business and go out of business every year; only restaurants in an active status are included in the dataset. \r\nRecords are also included for each restaurant that has applied for a permit but has not yet been inspected and for inspections resulting in no violations. Establishments with inspection date of 1/1/1900 are new establishments that have not yet received an inspection. Restaurants that received no violations are represented by a single row and coded as having no violations using the ACTION field. \r\nBecause this dataset is compiled from several large administrative data systems, it contains some illogical values that could be a result of data entry or transfer errors. Data may also be missing. \r\nThis dataset and the information on the Health Department’s Restaurant Grading website come from the same data source.  The Health Department’s Restaurant Grading website is here: \r\nhttp://www1.nyc.gov/site/doh/services/restaurant-grades.page\r\nSee the data dictionary file in the Attachments section of the OpenData website for a summary of data fields and allowable values.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/43nn-pn8j","update_datemadepublic":"7/