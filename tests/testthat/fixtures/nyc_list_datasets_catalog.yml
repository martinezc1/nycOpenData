        ,{"datasetinformation_agency":"Civic Engagement Commission (CEC)","uid":"ajin-gkbp","name":"Population and Languages of the Limited English Proficient (LEP) Speakers by Community District","description":"Many residents of New York City speak more than one language; a number of them speak and understand non-English languages more fluently than English. This dataset, derived from the Census Bureau's American Community Survey (ACS), includes information on over 1.7 million limited English proficient (LEP) residents and a subset of that population called limited English proficient citizens of voting age (CVALEP) at the Community District level. There are 59 community districts throughout NYC, with each district being represented by a Community Board.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/ajin-gkbp","update_datemadepublic":"5/5/2021","update_updatefrequency":"Annually","last_data_updated_date":"2022-04-25T19:11:54.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"7794","downloads":"1758","row_count":"8024","column_count":"9","derived_view":false}
