        ,{"datasetinformation_agency":"City Council (NYCC)","uid":"m48u-yjt8","name":"City Council Meetings (1999 to 2024)","description":"City Council hearings are a core part of the legislative and oversight process. Through <b>committee hearings and stated meetings</b>, the Council reviews proposed legislation, conducts oversight of City agencies, and <b>provides a public forum for testimony from residents</b>, advocates, and government officials. These hearings are generally open to the public and are an important way constituents can engage directly with Council activity. \n\nThis dataset contains information on New York City Council hearings and meetings. Each record represents a committee or body convening at a hearing or meeting (so hearings may appear multiple times if they are hosted by more than one committee), and includes information on meeting time, date, and location.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/m48u-yjt8","update_datemadepublic":"2/17/2015","update_updatefrequency":"To be determined","last_data_updated_date":"2025-12-30T15:28:54.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2383","downloads":"2511","row_count":"16104","column_count":"10","derived_view":false}
