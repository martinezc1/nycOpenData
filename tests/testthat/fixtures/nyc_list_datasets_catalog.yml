        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"wymh-dvmd","name":"DOHMH Call Center Summary","description":"Total number of calls received by the agency's call center\r\n\r\nThis data is collected to assess and assist residents of NYC. The data is collected by a 3rd party application that goes by the name PRIMA. Data is collected as a meausre of workvolume and customer demand for services offered by the Dept. of Health. Data is collected automatically by call management software. Each record represents a type of service offered to the public by the Dept. of Health. Data is used to assess quality of service offered, collect customer feedback for service improvements and determine size of staff needed to appropriate deliver the service. Data available counts number of calls related to a particular topic. There is no drill down available to disect specific reasons why customers may be calling.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/wymh-dvmd","update_datemadepublic":"7/11/2018","update_updatefrequency":"Annually","last_data_updated_date":"2026-01-13T18:05:25.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"5732","downloads":"4050","row_count":"336","column_count":"6","derived_view":false}
