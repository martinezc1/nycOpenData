        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"872g-cjhh","name":"City Council Districts","description":"The City Council district boundaries for New York City.\n\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/city-council\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 26a","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/872g-cjhh","update_datemadepublic":"4/18/2013","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-03-09T20:51:03.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"Yes","visits":"941","downloads":"612","row_count":"51","column_count":"4","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"4pt5-3vv4","name":"Forestry Inspections","description":"Record of Forestry inspections for NYC Parks & Recreation. Inspections are initiated by a service request or internal process and may result in a work order. \n\nInspections are used to record field observations.  ForMS 2.0 requires that Inspections can only be created from either a Tree Point or Planting Space based on the asset in question.  Inspection types vary depending on the inspector’s workflow: \n• level 1 (limited visual)\n• level 2 (basic) \n• level 3 (advanced)\n• Re-inspection\n• Sidewalk Rating (Trees and Sidewalks Inspections)\n• General – Planting Space (Street Tree Planting Inspections)\n\nThis dataset can be joined to the Forestry Tree Points dataset by joining TreePointGlobalID from Forestry Inspections to GLOBALID from Forestry Tree Points.\n\nUser guide: https://docs.google.com/document/d/1PVPWFi-WExkG3rvnagQDoBbqfsGzxCKNmR6n678nUeU/edit?usp=sharing\n\nData dictionary: https://docs.google.com/spreadsheets/d/1yMfZgcsrvx9M0b3-ZdEQ3WCk2dFxgitCWytTrJSwEAs/edit?usp=sharing","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/4pt5-3vv4","update_datemadepublic":"3/8/2017","update_updatefrequency":"Every 2 weeks","last_data_updated_date":"2026-03-24T18:47:19.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"5268","downloads":"2569","row_count":"5","column_count":"30","derived_view":false}
        ,{"datasetinformation_agency":"Taxi and Limousine Commission (TLC)","uid":"m3yx-mvk4","name":"2020 For Hire Vehicles Trip Data","description":"These records are generated from the For-Hire Vehicle (“FHV”) Trip Record submissions made by traditional livery, luxury, and black car bases. The FHV trip records include fields capturing the dispatching base license number and the pick-up date, time, and taxi zone location ID, which correspond with the NYC Taxi Zones open dataset. Each row represents a single trip in an FHV.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/m3yx-mvk4","update_datemadepublic":"9/29/2020","update_updatefrequency":"Historical data","last_data_updated_date":"2021-10-01T20:00:25.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"3682","downloads":"1743","row_count":"14914817","column_count":"7","derived_view":false}
        ,{"datasetinformation_agency":"Fire Department of New York City (FDNY)","uid":"ii3r-svjz","name":"Bureau of Fire Investigations - Fire Causes","description":"Findings of investigations by the Bureau of Fire Investigations.\n\nThis data lists the causes of fires found by the Bureau of Fire Investigations. Each record represents a fire related incident investigated by BFI. This dataset contains only closed and completed cases.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/ii3r-svjz","update_datemadepublic":"6/22/2021","update_updatefrequency":"Annually","last_data_updated_date":"2025-09-26T13:56:14.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"9562","downloads":"2042","row_count":"60835","column_count":"10","derived_view":false}
        ,{"datasetinformation_agency":"Office of Payroll Administration (OPA)","uid":"k397-673e","name":"Citywide Payroll Data (Fiscal Year)","description":"Data is collected because of public interest in how the City’s budget is being spent on salary and overtime pay for all municipal employees. Data is input into the City's Personnel Management System (“PMS”) by the respective user Agencies. Each record represents the following statistics for every city employee: Agency, Last Name, First Name, Middle Initial, Agency Start Date, Work Location Borough, Job Title Description, Leave Status as of the close of the FY (June 30th), Base Salary, Pay Basis, Regular Hours Paid, Regular Gross Paid, Overtime Hours worked, Total Overtime Paid, and Total Other Compensation (i.e. lump sum and/or retro payments). This data can be used to analyze how the City's financial resources are allocated and how much of the City's budget is being devoted to overtime. The reader of this data should be aware that increments of salary increases received over the course of any one fiscal year will not be reflected. All that is captured, is the employee's final base and gross salary at the end of the fiscal year.  In very limited cases, a check replacement and subsequent refund may reflect both the original check as well as the re-issued check in employee pay totals.  \r\n<br>\r\n<b>NOTE 1: </b>To further improve the visibility into the number of employee OT hours worked, beginning with the FY 2023 report, an updated methodology will be used which will eliminate redundant reporting of OT hours in some specific instances.  In the previous calculation, hours associated with both overtime pay as well as an accompanying overtime “companion code” pay were included in the employee total even though they represented pay for the same period of time.  With the updated methodology, the dollars shown on the Open Data site will continue to be inclusive of both types of overtime, but the OT hours will now reflect a singular block of time, which will result in a more representative total of employee OT hours worked.   The updated methodology will primarily impact the OT hours associated with City employees in uniformed civil service titles.  The updated methodology will be applied to the Open Data posting for Fiscal Year 2023 and cannot be applied to prior postings and, as a result, the reader of this data should not compare OT <b>hours</b>  prior to the 2023 report against OT hours published starting Fiscal Year 2023.  The reader of this data may continue to compare OT <b>dollars</b> across all published Fiscal Years on Open Data. \r\n<br>\r\n<b>NOTE 2: </b>As a part of FISA-OPA’s routine process for reviewing and releasing Citywide Payroll Data, data for some agencies (specifically NYC Police Department (NYPD) and the District Attorneys’ Offices (Manhattan, Kings, Queens, Richmond, Bronx, and Special Narcotics)) have been redacted since they are exempt from disclosure pursuant to the Freedom of Information Law, POL § 87(2)(f), on the ground that disclosure of the information could endanger the life and safety of the public servants listed thereon. They are further exempt from disclosure pursuant to POL § 87(2)(e)(iii), on the ground that any release of the information would identify confidential sources or disclose confidential information relating to a criminal investigation, and POL § 87(2)(e)(iv), on the ground that disclosure would reveal non-routine criminal investigative techniques or procedures. Some of these redactions will appear as XXX in the name columns.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/k397-673e","update_datemadepublic":"10/31/2015","update_updatefrequency":"Annually","last_data_updated_date":"2025-10-08T15:57:11.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes",