        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"6wp7-y8uw","name":"NYC Parks Sectors Map","description":"In order to appropriately manage City parks and allocate resources, NYC Parks has implemented three tiers of management [below the Borough level]. These three tiers can be represented as administrative geographic boundaries and are defined below: <br /><br />District - One or more parks that are combined and generally align with New York City Community Boards. <br /><br />Sector - One or more Park Districts that are combined in order share resources for daily maintenance. <br /><br />Region - One or more Park Sectors that are combined and assigned a regional managers who provides high-level, strategic planning and support for Parks managers, including maximizing resources between Districts and Sectors.<br /><br />Data Dictionary: <a href=\"https://docs.google.com/spreadsheets/d/1-FS_NDOUx0-OfKploVC0fIJrwOSdNmh1HKpkfyeoD1E/edit?usp=sharing\" target=\"_blank\" rel=\"nofollow external\">https://docs.google.com/spreadsheets/d/1-FS_NDOUx0-OfKploVC0fIJrwOSdNmh1HKpkfyeoD1E/edit?usp=sharing</a>","type":"map","category":"City Government","url":"https://data.cityofnewyork.us/d/6wp7-y8uw","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T13:41:33.000","update_automation":"Yes","visits":"717","downloads":"10","parent_uid":"t4re-ksn6","derived_view":true}
