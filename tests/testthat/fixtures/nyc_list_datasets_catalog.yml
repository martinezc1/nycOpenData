        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"rqgf-94xs","name":"Pregnancy Risk Assessment Monitoring System (PRAMS)","description":"The Pregnancy Risk Assessment Monitoring System (PRAMS) is an ongoing, population-based risk factor surveillance system designed to identify and monitor selected maternal experiences and behaviors that occur before, during, and shortly after pregnancy, among a stratified sample of mothers delivering a live birth. PRAMS is a partnership with the CDC and presently exists in 50 jurisdictions, including 47 states, New York City, Washington, D.C., and Puerto Rico. In NYC, PRAMS participants are randomly selected from the City’s birth certificate records (approximately 2,100 participants per year).","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/rqgf-94xs","update_datemadepublic":"4/30/2019","update_updatefrequency":"Annually","last_data_updated_date":"2024-11-19T15:28:40.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"N/A","visits":"5004","downloads":"6708","row_count":"98","column_count":"6","derived_view":false}
