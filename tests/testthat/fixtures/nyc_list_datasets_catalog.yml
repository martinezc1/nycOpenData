        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"w8cn-6mjd","name":"NYC Parks Districts Map","description":"In order to appropriately manage City parks and allocate resources, NYC Parks has implemented three tiers of management [below the Borough level]. These three tiers can be represented as administrative geographic boundaries and are defined below: <br /><br />District - One or more parks that are combined and generally align with New York City Community Boards. <br /><br />Sector - One or more Park Districts that are combined in order share resources for daily maintenance. <br /><br />Region - One or more Park Sectors that are combined and assigned a regional managers who provides high-level, strategic planning and support for Parks managers, including maximizing resources between Districts and Sectors.<br /><br />Data Dictionary: <a href=\"https://docs.google.com/spreadsheets/d/1-FS_NDOUx0-OfKploVC0fIJrwOSdNmh1HKpkfyeoD1E/edit?usp=sharing\" target=\"_blank\" rel=\"nofollow external\">https://docs.google.com/spreadsheets/d/1-FS_NDOUx0-OfKploVC0fIJrwOSdNmh1HKpkfyeoD1E/edit?usp=sharing</a>","type":"map","category":"City Government","url":"https://data.cityofnewyork.us/d/w8cn-6mjd","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T13:40:57.000","update_automation":"Yes","visits":"6744","downloads":"10","parent_uid":"mebz-ditc","derived_view":true}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"82zj-84is","name":"Forestry Planting Spaces","description":"Record of Forestry planting spaces for NYC Parks & Recreation. \n\nTree Points and Planting Spaces form the basis of ForMS 2.0’s data inventory and are the core entities that all Service Requests, Inspections, and Work Orders are associated to.  The system has built-in rules to ensure that every Tree Point has a Planting Space and each Planting Space can have no more than one active Tree Point at a given time.  Locations that have had one tree removed and another tree replanted will appear in ForMS 2.0 as a single Planting Space associated with one retired Tree Point (that has a removal Work Order) and one active Tree Point.\n\nUser guide: https://docs.google.com/document/d/1PVPWFi-WExkG3rvnagQDoBbqfsGzxCKNmR6n678nUeU/edit?usp=sharing\n\nData dictionary: https://docs.google.com/spreadsheets/d/1yMfZgcsrvx9M0b3-ZdEQ3WCk2dFxgitCWytTrJSwEAs/edit?usp=sharing","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/82zj-84is","update_datemadepublic":"3/8/2017","update_updatefrequency":"Every 2 weeks","last_data_updated_date":"2025-03-05T14:54:16.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"4969","downloads":"14386","row_count":"1091709","column_count":"40","derived_view":false}
        ,{"datasetinformation_agency":"Taxi and Limousine Commission (TLC)","uid":"5tub-eh45","name":"Street Hail Livery (SHL) Drivers - Active","description":"PLEASE NOTE: This dataset of all TLC licensed street hail livery (SHL) drivers in good standing is updated daily between 4–7 PM. Check the “Last Update Date” to confirm it shows today’s or yesterday’s date. If it’s older, find the latest data here: <a href=\"https://app.powerbigov.us/view?r=eyJrIjoiMGIxY2IxMTEtMTBlOS00NGUxLTgyYzMtMTFkMGQ5MmZiMmJjIiwidCI6IjMyZjU2ZmM3LTVmODEtNGUyMi1hOTViLTE1ZGE2NjUxM2JlZiJ9\">Drivers List</a>\n\nNYC TLC Licensed Street Hail Livery drivers that are currently active and in good standing and able to drive. This list is accurate to the date and time represented in the Last Date Updated and Last Time Updated fields. For inquiries about the contents of this dataset, please email licensinginquiries@tlc.nyc.gov.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/5tub-eh45","update_datemadepublic":"8/25/2014","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-23T19:19:18.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"397259","downloads":"113817","row_count":"179134","column_count":"7","derived_view":false}
        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"aq7i-eu5q","name":"FloodNet: Street Flooding Events Measured by FloodNet Sensors","description":"For the  FloodNet data collection page, please follow <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=FloodNet+NYC\">this link</a>.\n\nData presented here were collected by the FloodNet project, which is a collaboration between researchers at academic institutions (New York University and the City University of New York) and NYC government agencies (NYC Department of Environmental Protection, Mayor's Office of Climate & Environmental Justice, Office of Technology & Innovation), working with NYC residents. Data on flood water depth were collected by FloodNet sensors in one minute intervals, then analyzed to develop the flood event summary statistics presented here. A flood event is defined as a series of water depth measurements greater than 10 mm; all measured flood events presented here have undergone QC by a member of the FloodNet team. \n\nSee attached data description document for more details on data collection, analysis & the publication to cite if using the data or including it in any publication or public presentation.\n\nMore information on the FloodNet project can be found here: https://www.floodnet.nyc \n\nVisualization of the data in an online data dashboard can be found here: https://dataviz.floodnet.nyc","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/aq7i-eu5q","update_datemadepublic":"3/3/2026","update_updatefrequency":"Every 2 weeks","last_data_updated_date":"2026-02-26T15:11:56.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015"