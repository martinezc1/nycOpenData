        ,{"datasetinformation_agency":"Police Department (NYPD)","uid":"sv2w-rv3k","name":"NYPD Criminal Court Summons (Historic)","description":"List of every criminal summons issued in NYC going back to 2006 through the end of the previous calendar year.\n\nThis is a breakdown of every criminal summons issued in NYC by the NYPD going back to 2006 through the end of the previous calendar year.\nThis data is manually extracted every quarter and reviewed by the Office of Management Analysis and Planning before being posted on the NYPD website. Each record represents a criminal summons issued in NYC by the NYPD and includes information about the type of crime, the location and time of enforcement. In addition, information related to suspect demographics is also included. \nThis data can be used by the public to explore the nature of police enforcement activity. \nPlease refer to the attached data footnotes for additional information about this dataset.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/sv2w-rv3k","update_datemadepublic":"11/1/2018","update_updatefrequency":"Annually","last_data_updated_date":"2025-04-15T18:10:36.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"17138","downloads":"4300","row_count":"5641111","column_count":"22","derived_view":false}
        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"9i7c-xyvv","name":"NYC Stormwater Flood Maps","description":"A collection of citywide Geographic Information System (GIS) layers that show areas of potential flooding scenarios under varying sea level rise conditions. Please see the New York City Stormwater Resiliency Plan for more information about the methodology applied to develop the maps. Please direct questions or comments to StormwaterResiliency@cityhall.nyc.gov.\r\n\r\n<b>This collection contains the following NYC Stormwater Flood Maps:</b>\r\n<em><ul>\r\n<li>NYC Stormwater Flood Map - Extreme Flood (3.66 inches/hr) with 2080 Sea Level Rise </li>\r\n<li>NYC Stormwater Flood Map - Moderate Flood (2.13 inches/hr) with 2050 Sea Level Rise </li>\r\n<li>NYC Stormwater Flood Map - Moderate Flood (2.13 inches/hr) with Current Sea Levels </li>\r\n<li>NYC Stormwater Flood Map - Limited Flood (1.77 inches/hr) with Current Sea Levels </li></ul></em>\r\n<a href=\"https://www1.nyc.gov/assets/orr/pdf/publications/stormwater-resiliency-plan.pdf\" target=\"_blank\">https://www1.nyc.gov/assets/orr/pdf/publications/stormwater-resiliency-plan.pdf</a>\r\n\r\nSource Data: <a href=\"https://experience.arcgis.com/experience/e83a49daef8a472da4a7e34dc25ac445/\" target=\"_blank\">http://nyc.gov/stormwater-map</a>","type":"file","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/9i7c-xyvv","update_updatefrequency":"Annually","last_data_updated_date":"2024-07-03T21:04:08.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"13862","downloads":"