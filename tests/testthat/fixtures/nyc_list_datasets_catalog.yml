        ,{"datasetinformation_agency":"City Council (NYCC)","uid":"wwhr-5ven","name":"Participatory Budgeting Projects","description":"Participatory Budgeting is a democratic process in which community members directly decide how to spend part of a public budget. Council Members choose to join Participatory Budgeting New York City (PBNYC), giving at least $1 million from their budget for the whole community to participate in decision-making. It’s a yearlong process of public meetings, to ensure that people have the time and resources to make informed decisions. Community members discuss local needs and develop proposals to meet these needs. Through a public vote, residents then decide which proposals to fund.\r\n \r\nMore info can be found at http://council.nyc.gov/pb/","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/wwhr-5ven","update_datemadepublic":"5/12/2017","update_updatefrequency":"As needed","last_data_updated_date":"2017-05-12T14:30:23.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"15057","downloads":"16794","row_count":"1491","column_count":"20","derived_view":false}
        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"pawq-tjb4","name":"Tidally Coordinated Shoreline","description":"A dataset representing the shorelines of tidally influenced areas of New York City. This dataset is derived from the 2017 Light Detection and Ranging (LiDAR) data capture. In most areas, LiDAR was captured during low tide (defined here as a range between Mean Lower Low Water (MLLW) and MLLW + 30% of the mean tide range). All bathymetric LiDAR and most near-infrared (NIR) LiDAR was captured during low tide. Flights flown over NIR LiDAR shoreline areas that are largely made up of sea walls and riprap were not flown during low tide. Tidal gauges used to determine low tide: Kings Point, Bergen West, Sandy Hook, and The Battery. See dataset attributes for which areas are tidally-coordinated. \n\nTo learn more about this dataset, visit the interactive \"Understanding the 2017 New York City LiDAR Capture\" Story Map -- https://maps.nyc.gov/lidar/2017/\nPlease see the following link for additional documentation on this dataset -- https://github.com/CityOfNewYork/nyc-geo-metadata/blob/master/Metadata/Metadata_TidalShoreline.md","type":"file","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/pawq-tjb4","update_datemadepublic":"12/12/2018","update_updatefrequency":"As needed","last_data_updated_date":"2018-11-21T21:14:01.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2047","downloads":"859","derived_view":false}
