        ,{"datasetinformation_agency":"Law Department (LAW)","uid":"svyi-maaj","name":"Minority and Women-Owned  Business Enterprise Statistics","description":"New York City's \"MWBE\" program, enacted by the City Council and signed by the Mayor as Local Law 129 of 2005, is designed to promote government contracting opportunities for businesses owned by minorities and women. Our \"Emerging Business Enterprise\" program, enacted by the City Council and signed by the Mayor as Local Law 12 of 2006, is designed to promote such opportunities for businesses owned by persons who are \"socially and economically disadvantaged.\" Together, the programs establish the following Citywide goals for contracts and subcontracts in amounts under $1 million.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/svyi-maaj","update_datemadepublic":"2/5/2013","update_updatefrequency":"Annually","last_data_updated_date":"2013-06-21T19:55:36.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"7182","downloads":"4642","row_count":"5","column_count":"7","derived_view":false}
