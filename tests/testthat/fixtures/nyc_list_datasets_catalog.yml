        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"uqtr-3rjs","name":"2022 Annual Sustainability Project Grant","description":"In the program’s 6th cycle, the DOE Office of Sustainability offered an opportunity for all schools to apply for a grant of up to $5,000 for a school-based sustainability project in any of the following categories: Green Teams, Sustainability Education, Gardens & Outdoor Learning, and Demonstration Solar Installation projects. Interest in the grant continues to grow and this year more projects were funded than ever before! Highlights include:\n•\t117 schools across all boroughs were awarded $537,242\n•\tHighest Demand Category: Gardening & Outdoor Learning (75 schools awarded)\n•\tAverage Economic Need Index of awarded schools: 84% (citywide average: 71%) \nFunding for the grants is provided by the participation and performance of over 350 DOE buildings in the Demand Response Program. These buildings commit to reducing electrical usage during emergency utility events in order to prevent brownouts and blackouts for NYC residents. The Office of Sustainability reinvests funds earned through the DOE’s performance in Demand Response directly back into our building infrastructure and school sustainability initiatives, including the annual grant program.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/uqtr-3rjs","update_datemadepublic":"03/08/2022","update_updatefrequency":"Historical data","last_data_updated_date":"2022-03-08T16:06:17.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"1444","downloa