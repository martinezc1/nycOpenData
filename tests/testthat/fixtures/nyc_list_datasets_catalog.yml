        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"j57c-rqtq","name":"Municipal Separate Storm Sewer System (MS4) Data","description":"New York City’s Municipal Separate Storm Sewer System (MS4) Stormwater Management Program is a multiagency effort led by the Department of Environmental Protection (DEP) to reduce pollution in stormwater runoff in the MS4 Area of NYC. This MS4 Map represents the known MS4 outfalls and drainage areas as of August 1, 2020 and provides additional data relevant to the MS4 Permit. The MS4 map only shows areas draining to the Municipal Separate Storm Sewer System. DEP also maintains combined sewer and sanitary sewer systems; these service area delineations are not represented on this map. More information about the MS4 Stormwater Management Program is available at www.nyc.gov/dep/ms4","type":"file","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/j57c-rqtq","update_datemadepublic":"08/01/2018","update_updatefrequency":"As needed","last_data_updated_date":"2018-07-25T16:56:26.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"10895","downloads":"3011","derived_view":false}
        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"genf-2k76","name":"General Issuer's Allocation Percentage Report","description":"Issuer's Allocation Percentage for all corporations subject to taxes.\n\nThese reports are used by general corporations and unincorporated taxpayers to compute their investment allocation percentages, and by general corporation taxpayers to compute their allocated subsidiary capital. For 2006 and prior, the list include only corporations whose issuer's allocation percentages are known to be less than 100%. For 2007 and later, the lists include corporations whose issuer's allocation percentages are 100% or less.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/genf-2k76","update_datemadepublic":"2/25/2019","update_updatefrequency":"Annually","last_data_updated_date":"2023-06-13T21:48:44.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"3102","downloads":"86802","row_count":"2379299","column_count":"3","derived_view":false}
        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"vy5i-a666","name":"Advertised Lotteries on Housing Connect by Lottery","description":"This dataset contains information about housing lotteries that have been advertised on Housing Connect (https://housingconnect.nyc.gov/PublicWeb/) since July 2020 at the lottery level. A Housing Connect lottery is a one-time advertising effort to solicit applications for a set of units or places on a waiting list for immediate occupancy, typically in a single building/development. Sometimes, a lottery may be for units spread across two or more buildings. You can find the number of buildings included in a lottery under the 'Building Count' column. You can connect the 'Advertised Lotteries on Housing Connect by Lottery' dataset and the '<a href =\"https://data.cityofnewyork.us/d/nibs-na6y/about_data\">Advertised Lotteries on Housing Connect By Building</a>' dataset by using the 'Lottery ID'. These datasets do not include 'mini lotteries', which are newly vacant re-rental or resale units that may be filled directly with eligible Housing Connect users who have opted to be considered for those. In the current version of the dataset, it also does not include lotteries advertised for the Mitchell-Lama developments since these are to replenish the waiting list for future vacancies. More information is available in the 'FAQ' (Frequently Asked Questions) tab. Note: We will be publishing a dataset on Housing Connect applicants (household size, income, demographics, etc.) in the future.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/vy5i-a666","update_datemadepublic":"12/19/2025","update_updatefrequency":"Monthly","last_data_updated_date":"2026-02-02T16:47:37.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"