        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"6ztr-wgff","name":"Transit Zones","description":"The Transit Zones dataset is composed of areas related to the Greater Transit Zone. \n\nThe Greater Transit Zone is broken up into separate areas where special rules governing residential parking are applied. The Greater Transit Zone is composed of the following areas:\n\n  • Manhattan Core and Long Island City parking areas: No parking required.\n  • Inner Transit Zone: No parking required.\n• Outer Transit Zone: Some parking required. Certain housing types do not require parking. \n  • Special ZR# 25-241 Parking Provision areas: Parking required.\n    Affordable housing has significantly less required parking than market rate housing and certain housing types have no requirement.\n\n \nBeyond the Greater Transit Zone areas are not within the Greater Transit Zone. Parking is required but affordable housing has less required parking than market rate housing and certain housing types have no requirement.\n\nThe boundaries for the Greater Transit Zone for Qualifying Residential Sites differs from the defined Transit Zones where they overlap with Special Coastal Risk Districts. (See the Greater Transit Zone for Qualifying Residential Sites dataset at https://data.cityofnewyork.us/d/vhqf-adkz).","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/6ztr-wgff","update_datemadepublic":"12/16/2025","update_updatefrequency":"As needed","last_data_updated_date":"2025-12-09T22:08:09.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords"