        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"pum2-pec2","name":"DSNY Waste Characterization 2023 - Subsort Results","description":"The NYC Department of Sanitation (DSNY) conducted the 2023 Waste Characterization Study in the Fall of 2022 and Spring of 2023. The 2023 Study determined the waste composition of several major sources from which DSNY collects: residential households, New York City Public Schools, the New York City Housing Authority (NYCHA), and on-street litter baskets. Waste from these generators was categorized into 96 main material categories. In addition to the 96 sort categories, certain material groups were further subsorted into 826 subsort categories which are provided in this dataset by residential strata and time period. Because not all the main material categories were subsorted, there are two separate datasets — one for the main sort results and one for the subsort results. Results for both datasets are presented in absolute terms as the quantity by weight of each material type, per stream. The quantity of each material is calculated by applying the percent composition to the total quantity of specified DSNY collections.","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/pum2-pec2","update_datemadepublic":"5/2/2024","update_updatefrequency":"Historical data","last_data_updated_date":"2024-04-24T18:27:51.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"N/A","visits":"1399","downloads":"1007","row_count":"18172","column_count":"12","derived_view":false}
