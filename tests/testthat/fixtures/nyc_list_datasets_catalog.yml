        ,{"datasetinformation_agency":"Office of the City Clerk (OCC)","uid":"7arw-dbem","name":"Lobbyists' Fundraising and Political Consulting Reports","description":"This dataset contains information from Fundraising and Political Consulting reports that lobbyists, individuals or organizations hired to influence government officials, are legally required to file. Fundraising reports include: (1) the solicitation or collection of campaign contributions for <i>candidates</i> for Mayor, Public Advocate, Comptroller, Borough President, or City Council; or (2) solicitation or collection of campaign contributions for any City <i>public servant</i> running for any office at any level (city, state, or federal.) Political Consulting reports include any lobbyist who receives compensation to provide political advice to any of the above listed offices. Definitions of all of these terms and the requirements for reporting are contained in sections <a href=\"https://codelibrary.amlegal.com/codes/newyorkcity/latest/NYCadmin/0-0-0-210491\">§ 3-211 - § 3-223 of the New York City Administrative Code</a.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/7arw-dbem","update_datemadepublic":"6/10/2025","update_updatefrequency":"Other","last_data_updated_date":"2026-03-04T15:09:07.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"650","downloads":"591","row_count":"440","column_count":"24","derived_view":false}
