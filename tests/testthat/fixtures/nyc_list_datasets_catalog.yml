        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"x98t-3bbk","name":"DOHMH COVID-19 Antibody-by-Borough","description":"This dataset contains information on antibody testing for COVID-19: the number of people who received a test, the number of people with positive results, the percentage of people tested who tested positive, and the rate of testing per 100,000 people, stratified by borough of residence. These data can also be accessed here: https://github.com/nychealth/coronavirus-data/blob/master/totals/antibody-by-boro.csv","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/x98t-3bbk","update_updatefrequency":"Weekly","last_data_updated_date":"2024-07-01T04:03:26.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"N/A","visits":"3288","downloads":"7791","row_count":"5","column_count":"5","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV)","uid":"a35y-93e7","name":"Family Violence Related Snapshots: New York City Community Board Districts","description":"The dataset contains annual count data for the number of family-related domestic incident reports, family-related felony assaults, domestic violence related felony assaults, family-related rapes and domestic violence related rapes.\r\n</p>\r\nThe Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV) develops policies and programs, provides training and prevention education, conducts research and evaluations, performs community outreach, and operates the New York City Family Justice Centers. The office collaborates with City agencies and community stakeholders to ensure access to inclusive services for survivors of domestic and gender-based violence (GBV) services. GBV can include intimate partner and family violence, elder abuse, sexual assault, stalking, and human trafficking. ENDGBV operates the New York City Family Justice Centers. These co‐located multidisciplinary domestic violence service centers provide vital social service, civil legal and criminal justice assistance for survivors of intimate partner violence and their children under one roof. The Brooklyn Family Justice Center opened in July 2005; the Queens Family Justice Center opened in July 2008; the Bronx Family Justice Center opened in April 2010; Manhattan Family Justice Center opened in December 2013 and Staten Island Family Justice Center opened in June 2015. ENDGBV also has a Policy and Training Institute that provides trainings on intimate partner violence to other City agencies. The New York City Healthy Relationship Academy, with is part of the Policy and Training Institute, provides peer lead workshops on healthy relationships and teen dating violence to individuals between the age of 13 and 24, their parents and staff of agencies that work with youth in that age range. The dataset is collected to produce an annual report on the number of family-related and domestic violence related incidents that occur at the community board district level in New York City. The New York City Police Department provides ENDGBV with count data on: family-related domestic incident reports, family-related felony assaults, domestic violence felony assaults, family-violence related rapes and domestic violence related rapes.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/a35y-93e7","update_datemadepublic":"8/29/2018","update_updatefrequency":"Annually","last_data_updated_date":"2021-05-11T13:27:06.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"3106","downloads":"2841","row_count":"291","column_count":"8","derived_view":false}
