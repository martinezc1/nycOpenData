        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"u4es-gw3m","name":"2015 NYC School Survey","description":"Every year, all parents, all teachers, and students in grades 6 - 12 take the NYC School Survey. The survey ranks among the largest surveys of any kind ever conducted nationally. \r\n\r\nSurvey results provide insight into a school's learning environment and contribute a measure of diversification that goes beyond test scores on the Progress Report. NYC School Survey results contribute 10% - 15% of a school's Progress Report grade (the exact contribution to the Progress Report is dependent on school type). Survey questions assess the community's opinions on academic expectations, communication, engagement, and safety and respect. School leaders can use survey results to better understand their own school's strengths and target areas for improvement. \r\n\r\nThe NYC School Survey helps school leaders understand what key members of the school community say about the learning environment at each school. The information captured by the survey is designed to support a dialogue among all members of the school community about how to make the school a better place to learn.","type":"file","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/u4es-gw3m","update_datemadepublic":"11/21/2018","update_updatefrequency":"Historical data","last_data_updated_date":"2018-11-21T20:48:13.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"504","downloads":"486","derived_view":false}
