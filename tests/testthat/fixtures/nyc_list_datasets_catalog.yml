        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"9nt8-h7nd","name":"2020 Neighborhood Tabulation Areas (NTAs)","description":"2020 Neighborhood Tabulation Areas (NTAs) are medium-sized statistical geographies for reporting Decennial Census and American Community Survey (ACS). 2020 NTAs are created by aggregating 2020 census tracts and nest within Community District Tabulation Areas (CDTA). NTAs were delineated with the need for both geographic specificity and statistical reliability in mind. Consequently, each NTA contains enough population to mitigate sampling error associated with the ACS yet offers a unit of analysis that is smaller than a Community District.\n\nThough NTA boundaries and their associated names roughly correspond with many neighborhoods commonly recognized by New Yorkers, NTAs are not intended to definitively represent neighborhoods, nor are they intended to be exhaustive of all possible names and understandings of neighborhoods throughout New York City. Additionally, non-residential areas including large parks, airports, cemeteries, and other special areas are represented separately within this dataset and are assigned codes according to their type (See NTAType field).\n\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/neighborhood-tabulation\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 26a","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/9nt8-h7nd","update_datemadepublic":"9/13/2021","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-03-09T20:52:09.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"Yes","visits":"35377","downloads":"5799","row_count":"262","column_count":"12","derived_view":false}
        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"8ev8-jjxq","name":"DSNY Commercial Waste Zones","description":"While the NYC Department of Sanitation (DSNY) collects trash, recycling, and compostable material from residents, businesses are required to hire private carters to collect their waste. Following significant planning, analysis, and contract development, DSNY is overhauling the City's commercial waste industry mandated under Local Law 199 of 2019 to make our City cleaner and safer. Commercial Waste Zones create a regulatory framework that establishes new safety standards for workers in the commercial carting industry, improving service for businesses, and reducing harmful emissions from waste hauling vehicles. DSNY has broken the five boroughs into 20 Commercial Waste Zones and authorized three carters to offer curbside services in each zone. For more information, see:\n<a href=\"https://www.nyc.gov/site/dsny/businesses/commercial-waste-zones.page\" target=\"_blank\">https://www.nyc.gov/site/dsny/businesses/commercial-waste-zones.page</a>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/8ev8-jjxq","update_updatefrequency":"As needed","last_data_updated_date":"2026-03-24T10:00:06.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"N/A","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"5463","downloads":"2980","row_count":"20","column_count":"7","derived_view":false}
