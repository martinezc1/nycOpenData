        ,{"datasetinformation_agency":"Mayor's Office of Management & Budget (OMB)","uid":"umve-k9rk","name":"NYC Climate Budgeting Report: Emission Factors","description":"This dataset contains forecasted emissions factors for electricity generation and transportation. These factors are used to convert activity data to particulate matter 2.5 (PM2.5) emissions and metric ton of carbon dioxide equivalent (mTCO2e). This dataset can be applied to <a href=\"https://data.cityofnewyork.us/City-Government/NYC-Climate-Budgeting-Report-Forecast-of-Emissions/3z69-v9cd\" target=\"_blank\">\"Forecast of Emissions and PM 2.5 Reductions from City Actions\" </a>and the <a href=\"https://data.cityofnewyork.us/City-Government/NYC-Climate-Budgeting-Report-Forecast-of-Citywide-/czei-7bxd\" target=\"_blank\">\"Forecast of Citywide Emissions\" </a>dataset to convert from activity data to emissions. For any additional detail please refer to section 6 of the New York City Climate Budgeting Technical Appendices (https://www.nyc.gov/assets/omb/downloads/pdf/exec24-nyccbta.pdf). This dataset is going to be updated once a year during the Executive Budget.\r\n\r\nYou can find the complete collection of Climate Budget data by <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Climate+Budgeting\" rel=\"noopener noreferrer\" target=\"_blank\">clicking here.</a>","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/umve-k9rk","update_updatefrequency":"Annually","last_data_updated_date":"2025-05-09T15:44:15.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1013","downloads":"8