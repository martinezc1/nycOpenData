        ,{"datasetinformation_agency":"Commission to Combat Police Corruption (CCPC)","uid":"56t2-bzsy","name":"19th Annual Report of the Commission","description":"The Commission has, since its inception, and in accordance with its Executive Order, released annual reports detailing its activities for each past year. The annual reports also include follow-up reviews of recommendations made in Commission studies, including the Department's ongoing handling of off-duty misconduct cases and discipline of officers who have made false official statements.\r\n\r\nCategories of NYPD Internal Affairs Bureau cases reviewed by CCPC, that were closed during the 2017 and 2018 calendar years.</p>For CCPC's 19th Annual Report, CCPC reviewed 133 NYPD Internal Affairs Bureau (IAB) investigations that were closed during the 2017 and 2018 calendar years. CCPC analyzed these cases and evaluated whether they were fair, thoroguh, accurate, and impartial. This dataset reflects the most serious allegation and the number of cases for each category. \r\n\r\n<b>NOTE: CCPC only reviewed a sample of IAB’s closed cases.</b>","type":"file","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/56t2-bzsy","update_datemadepublic":"7/14/2020","update_updatefrequency":"Historical data","last_data_updated_date":"2020-07-14T21:11:16.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"618","downloads":"346","derived_view":false}
