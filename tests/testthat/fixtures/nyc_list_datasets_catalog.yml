        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"epne-qv9x","name":"Hurricane Evacuation Zones","description":"The New York City Hurricane Evacuation Zones represent varying threat levels of flooding resulting from storm surge. New York City's hurricane contingency plans are based on six evacuation zones.\n\nHurricane evacuation zones should not be confused with flood insurance risk zones, which are designated by FEMA and available in the form of Flood Insurance Rate Maps (FIRMs).\n\nFor more information visit NYC.gov or call 311 (TTY: 212-504-4155).\n\nThese zones were created by New York City Emergency Management (NYCEM) and are maintained by the Department of City Planning (DCP).\n\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/hurricane-evacuation-zones\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 26a","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/epne-qv9x","update_datemadepublic":"7/14/2015","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-03-09T20:48:07.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"Yes","visits":"1091","downloads":"355","row_count":"8","column_count":"4","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"dbmp-698d","name":"Schoolyard to Playgrounds","description":"The Schoolyards to Playgrounds initiative began with PlaNYC 2007 as a way to expand public use at existing City facilities and improve access to open spaces during non-school hours which includes weekends, holidays, and during the summer. \n \nNYC Parks, in collaboration with the Department of Education (DOE) and the nonprofit Trust for Public Land have improved hundreds of DOE operated schoolyards through capital improvements, including play equipment, painted sports surfaces, trees, and benches.\n \nThe program is an important approach to reaching the city’s target to getting more New Yorkers within walking distance to open-space. In many neighborhoods, these DOE schoolyards are one of the few resources that can be improved and provide publicly accessible open space.\n \nEach record in this dataset represents a participating DOE Schoolyard at the time of the dataset's publication. The schoolyard's boundaries have been drawn in whole or part using secondary data. Data accuracy is limited by the scale and accuracy of the original sources. Site-specific conditions should be field-verified. \n \n For more information on the Schoolyard to Playgrounds program, visit: https://www.nycgovparks.org/greening/planyc/schoolyards\n \nThis dataset may be updated throughout the year as school's join or exit the program.\n\nData Dictionary: https://docs.google.com/spreadsheets/d/10yVRhmdIAS1g8c3L0jC4XxSTptdIf5wESL5ks1e6Gto/edit?usp=sharing","type":"map","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/dbmp-698d","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T14:06:56.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"8637","downloads":"10","parent_uid":"bbtf-6p3c","derived_view":true}
