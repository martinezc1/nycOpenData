        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"7434-7ua6","name":"DOHMH Covid-19 Milestone Data: Percent of NYC residents tested who tested positive","description":"This dataset shows daily citywide counts of persons tested by nucleic acid amplification tests (NAAT, also known as a molecular test; e.g. a PCR test) for SARS-CoV-2 , counts of persons with positive tests, and the percent positivity. Also included is a calculation of the average percent positivity over a 7-day period. \r\n</p>\r\nNAAT tests work through direct detection of the virus’s genetic material, and typically involve collecting a nasal swab. These tests are highly accurate and recommended for diagnosing current COVID-19 infection. After specimen collection, molecular tests are processed in a laboratory, and results are electronically reported to the New York State (NYS) Electronic Clinical Laboratory Results System (ECLRS). Test results for NYC residents are then sent electronically to NYC DOHMH. There is typically a lag of a few days between when a specimen is collected and when a result is reported to NYC DOHMH. \r\nData is sourced from electronic laboratory reporting from NYS ECLRS. \r\nAll identifying health information is excluded from the dataset.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/7434-7ua6","update_updatefrequency":"Daily","last_data_updated_date":"2021-11-18T16:56:59.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"N/A","visits":"1632","downloads":"1161","row_count":"470","column_count":"6","derived_view":false}
