        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"8vgb-zm6e","name":"Revised Notice of Property Value (RNOPV)","description":"Every January, Finance mails New York City property owners a Notice of Property Value (NOPV). This important notice has information about your property’s market and assessed values. Finance determines your property’s value every year, according to State law. The Cityʼs property tax rates are applied to the assessed value to calculate your property taxes for the next tax year. You get your first tax bill for the year in June. If you believe the values or property descriptions on the NOPV are not correct.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/8vgb-zm6e","update_datemadepublic":"4/5/2016","update_updatefrequency":"Historical data","last_data_updated_date":"2022-10-26T20:12:20.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"Yes","visits":"17242","downloads":"14878","row_count":"27312","column_count":"39","derived_view":false}
