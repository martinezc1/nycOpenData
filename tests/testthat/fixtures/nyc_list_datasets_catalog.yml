        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"msid-end4","name":"Mosquito control events in NYC – Adult Mosquito Truck Spraying and Aerial Larviciding Events","description":"This dataset shows the mosquito spraying events in NYC.\n</br>\nThe Health Department monitors mosquito populations and applies pesticides when appropriate throughout the summer to reduce the number of mosquitoes and to minimize the risk of mosquito-borne diseases such as the West Nile Virus and the Zika Virus.\t\t\t\n</p>\nThis dataset contains information about when and where mosquito spraying events occur in NYC. DOHMH sprays pesticides from trucks to kill adult mosquitoes (adulticiding) or to kill mosquito larvae (larviciding) in areas that have an increased risk of mosquito spreading disease. These events – in residential and non-residential areas – are carefully planned by DOHMH to minimize human exposure to the pesticides.   DOHMH creates the spray event boundaries and stores them in a GIS. Each record represent the extent/boundaries of a spray treatment area. The spray events are not fixed, each year the locations, boundaries and extents are determined by a variety of factors throughout the mosquito season.\t\t\t\n\nFor the historical data, please visit this <a href=\"https://www1.nyc.gov/site/doh/health/health-topics/west-nile-virus-spray.page\">page.</a>","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/msid-end4","update_datemadepublic":"8/4/2020","update_updatefrequency":"Annually","last_data_updated_date":"2025-02-27T15:59:37.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Weekly","legislativecompliance_removedrecords":"Yes","visits":"1703","downloads":"1207","row_count":"189","column_count":"7","derived_view":false}
