        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"j55h-3upk","name":"Children's Play Areas (CPAs)","description":"This dataset represents Children’s Play Areas (CPAs) in NYC Parks. Each CPA is a designated space featuring play equipment specifically designed for children and is mapped as a central point (Point geometry) within a park property. While commonly known as playgrounds, the term \"playground\" is avoided because some properties or subproperties labeled as \"playgrounds\" may include features like adult fitness equipment or handball and basketball courts and may not contain play equipment for children. \n\nExplore the <a href=\"https://docs.google.com/spreadsheets/d/1ks2CzWUkjGKl5bRgCBFta5wslGWNfrr_6iNgwcQSe9s/edit?gid=1059367562#gid=1059367562\">Data Dictionary</a> \n\nNote: The schema and methodology of the dataset was updated in 2024, replacing the previous version from 2019.\n\nPlay equipment is tracked via the Parks Inspection Program. Parks that are currently rated by the Parks Inspection Program and contain play equipment are considered active Children's Play Areas. Please see the <a href=\"https://data.cityofnewyork.us/City-Government/Parks-Inspection-Program-All-Sites-MAPPED-/buk3-3qpr/about_data\">All Sites (Mapped) dataset</a> on Open Data for more detail.","type":"dataset","category":"Recreation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/j55h-3upk","update_datemadepublic":"12/27/2024","update_updatefrequency":"Other","last_data_updated_date":"2025-03-28T15:36:02.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"5416","down