        ,{"datasetinformation_agency":"Department of Investigation (DOI)","uid":"jstn-jaut","name":"Policy and Procedure Recommendations (PPR) Portal","description":"The New York City Department of Investigation’s Policy and Procedure Recommendations (PPR) Portal provides the public with a greater understanding of the recommendations DOI issues to City agencies and entities. PPRs are formal written recommendations to City agencies that correct policy, procedural and operational vulnerabilities identified through DOI investigations.  These PPRs are part of DOI’s distinct approach to attacking corruption: through prevention, education, arrests, public reports, and reforms that tighten internal controls and prevent fraud and corruption from re-occurring. PPRs help improve the efficiency and effectiveness of City government, defend the City from fraudulent activity, and protect City workers and the public from conditions that could affect health and safety. This dataset pulls the most recent information from DOIs PPR portal, available on their website.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/jstn-jaut","update_datemadepublic":"12/22/2020","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-03-18T18:26:48.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"No","visits":"2635","downloads":"11710","row_count":"5865","column_count":"7","derived_view":false}
