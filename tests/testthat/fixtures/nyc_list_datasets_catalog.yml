        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"cgz5-877h","name":"2008 - 2009 School Progress Reports - All Schools","description":"2008/09 Progress Report results for all schools (data as of 3/23/2010)\r\n\r\nPeer indices are calculated differently depending on School Level.  Schools are only compared to other schools in the same School Level (e.g., Elementary, K-8, Middle, High, Transfer)\r\n\r\n1) Elementary & K-8 - peer index is a value from 0-100.  We use a composite demographic statistic based on % ELL, % SpEd, % Title I free lunch, and % Black/Hispanic.  Higher values indicate student populations with higher need.\r\n\r\n2) Middle & High - peer index is a value from 1.00-4.50.  For middle schools, we use the average 4th grade proficiency ratings in ELA and Math for all their students that have 4th grade test scores.  For high schools, we use the average 8th grade proficiency ratings in ELA and Math for all their students that have 8th grade test scores, % SpEd, and % Overage.  Lower values indicate student populations with higher need.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/cgz5-877h","update_datemadepublic":"10/11/2011","update_updatefrequency":"Historical data","last_data_updated_date":"2011-10-06T20:24:24.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1775","downloads":"5185","row_count":"1686","column_count":"20","derived_view":false}
