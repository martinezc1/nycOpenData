        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"gcys-vvnq","name":"Asset Management Parks System (AMPS) – Transactions","description":"This table contains information about transactions. A transaction tracks the movement of parts and materials between store houses and work orders. Each record represents a single transaction. The primary key is TRA_CODE. When TRA_TOENTITY is “EVNT” then you can use the TRA_TOCODE field to join to the Work Orders table on EVT_CODE to know which transactions are associated with each work order.\r\n\r\nFor the User Guide, please follow <a href=\"https://docs.google.com/document/d/1UwyGGncb6oFMiOfgz73G-iM8Yea9ubz4931hPeBO9YQ/edit?usp=sharing\">this link</a>\r\nFor the Data Dictionary, please follow <a href=\"https://docs.google.com/spreadsheets/d/1pDr-BUe4LS7DvATfbOnd8UrV6s77krJgzqdq_gVYWqc/edit?usp=sharing\">this link </a>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/gcys-vvnq","update_datemadepublic":"01/29/2018","update_updatefrequency":"As needed","last_data_updated_date":"2026-03-23T08:57:59.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"1677","downloads":"3412","row_count":"740462","column_count":"14","derived_view":false}
        ,{"datasetinformation_agency":"Department of Consumer and Worker Protection (DCWP)","uid":"rpeq-j89e","name":"License Revocations, Suspensions, Surrenders, and Reinstatements","description":"<b>NOTE:</b> This dataset reflects data as of 7/21/2023. The Department of Consumer and Worker Protection (DCWP) is working on an updated version of this dataset.\n\nThis dataset features DCWP licenses that have been revoked, suspended, or surrendered as well as licenses that have been reinstated, if applicable.</br></p>\n\nLicenses can be suspended or revoked for several reasons including, an order by the Office of Administrative Trials and Hearings; non-payment of fines and/or fees; or not maintaining a license requirement such as a current driver’s license or insurance coverage.\n\nLicenses are typically surrendered when a business closes, changes ownership, changes location, changes business name, or discontinues the activity that required the license.</br>\n\nLicenses can be reinstated based on appeal of a revocation, expiration of a suspension, or new application after surrendering it.</br>\n\nEach record in the dataset represents a time that a license was revoked, suspended, surrendered, or reinstated so a license can appear more than once.\n\nThis dataset can be linked to other DCA datasets using the DCA License Number column. This dataset cannot be linked to an administrative hearing decision or provide a specific reason for the change in status.","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/rpeq-j89e","update_datemadepublic":"12/19/2018","update_updatefrequency":"Weekly","last_data_updated_date":"2023-10-11T13:44:49.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyl