        ,{"datasetinformation_agency":"Department of Consumer and Worker Protection (DCWP)","uid":"r3dx-pew9","name":"Neighborhood Financial Health Digital Mapping and Data Tool","description":"\"Neighborhood Financial Health (NFH) Digital Mapping and Data Tool provides neighborhood financial health indicator data for every neighborhood in New York City. DCWP's Office of Financial Empowerment (OFE) also developed NFH Indexes to present patterns in the data within and across neighborhoods. NFH Index scores describe relative differences between neighborhoods across the same indicators; they do not evaluate neighborhoods against fixed standards. OFE intends for the NFH Indexes to provide an easy reference tool for comparing neighborhoods, and to establish patterns in the relationship of NFH indicators to economic and demographic factors, such as race and income. Understanding these connections is potentially useful for uncovering systems that perpetuate the racial wealth gap, an issue with direct implications for OFE’s mission to expand asset building opportunities for New Yorkers with low and moderate incomes. This data tool was borne out of the Collaborative for Neighborhood Financial Health, a community-led initiative designed to better understand how neighborhoods influence the financial health of their residents.","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/r3dx-pew9","update_datemadepublic":"6/24/2022","update_updatefrequency":"Historical data","last_data_updated_date":"2022-05-02T15:12:34.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"8034