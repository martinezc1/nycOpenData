        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"jbtw-tj3x","name":"School Bus Report October_2021_21-993","description":"For the 2020-2021 school year, only students who were enrolled in blended learning were assigned to bus routes. Therefore, students who are routed are assumed to be enrolled in blended learning.\nStudents are reported as those who were planned and routed, but may or may not have used the service provided.\nRoutes were determined by those routed with a vendor and student(s) assigned\nVehicles are identified by school bus company reported data. This data is subject to data entry error and is dependent on the school bus companies to maintain.\nAll transportation sites were included, and reported by type. A transportation site was defined by a unique location identified by a street address. Please note: multiple students or schools can be located in the same address and would therefore represent a stop for multiple students at the same site.\nMetroCard passes are assigned at the school. For public and charter schools, OPT reports students assigned to MetroCard, which includes those assigned a MetroCard by serial number or \"T'd\" for MetroCard, meaning the school indicated the student as eligible for a MetroCard but did not yet assign a serial number. For Non-Public schools, OPT reports on students who are eligible for MetoCards if they are not assigned to yellow bus service\nSome special education schools do not classify students by grade level. Students attending such schools are identified as “NG.”\nService type is representative only of the type of busing a student is assigned to and is not reflective of the educational classification of a student. Students who are classified as special education but do not have an IEP mandate for specific transportation accommodations may be assigned to general education busing. General education students under certain circumstances including, but not limited to temporary housing status, orders of protection and medical conditions may be assigned to special education busing.\nOPT assigns students to busing but cannot confirm student ridership. This reporting would have to be captured at the school level.\nStudents in temporary housing (STH) situations other than those reported to be living in a DHS shelter* were excluded from the report due to data quality issues. While the DOE student data system (ATS) has a housing indicator flag, it is often inaccurate and unreliable. Therefore, OPT cannot reliably report on the temporary housing status of students other than those residing in DHS shelters, where a daily report indicating shelter status is provided. \n*Transportation data for students in Foster Care is also provided. Please see section 21-993 B7 for reporting.\nStop to school bus service is typically not provided to students after the 6th grade. Those assigned to this service are students who are granted individual or school-wide exceptions.\nIn addition to students who applied for transportation because of foster care placement, also reported were students known to be in foster care who received busing or A MetroCard to provide a more complete report of students in foster care who received service.\nStudents in foster care were identified by a monthly data feed from ACS to OPT via DIIT. Source is subject to error due to data matching to identify OSIS based on name and data of birth.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/jbtw-tj3x","update_datemadepublic":"11/23/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-11-23T14:19:23.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"1752","downloads":"1045","row_count":"114","column_count":"4","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office of Ethnic and Community Media (MOECM)","uid":"n56u-3hzv","name":"Local Law 83 - City Agency Advertising Spend","description":"MOECM functions as financial oversight for all City of New York media placement spend, providing guidance on marketing efficiency and strategy, as well as, monitoring alignment with\nthe budgetary goals set out in LL83, where each city agency should seek to spend at least 50 percent of applicable media placement budgets with ECM outlets. MOECM is required to report annually on specific city agencies' full advertising spend across all media categories, including ethnic and community (ECM), mainstream, out-of-home, social media, etc. This dataset as well as the dashboards found in this portal reflects the media placement spend of city agencies that had marketing campaigns and their individual alignment with LL83’s goals. \n\nMOECM works closely with media placement vendors and city agencies to gather accurate media placement spend data through reports, effectively tracking each paid advertisement\nplaced on behalf of the City of New York. This data is collected, analyzed, and publicly posted to promote transparency regarding media placement budget allocation.\n\nFor more information, please visit the MOECM website https://www.nyc.gov/site/ethnicmedia/index.page).","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/n56u-3hzv","update_datemadepublic":"11/27/2023","update_updatefrequency":"Annually","last_data_updated_date":"2025-12-31T18:27:45.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2301","downloads":"1538","row_count":"23680","column_count":"14","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office of Operations (OPS)","uid":"gyhf-rsr3","name":"Capital Projects Dashboard - Citywide Budget and Spend by Fiscal Year","description":"All major capital infrastructure projects with a committed budget and spend by fiscal year. Financial information and agency schedule details for each project are joined via FMS ID. Only projects in the design phase or later have project schedules displayed. This dataset is part of the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Capital+Projects+Dashboard\">Capital Projects Dashboard</a>.\r\n\r\nNote: Each row is uniquely identified by its Financial Management Service (FMS) ID. FMS ID is the unique ID that OMB uses for the FMS (Financial Information System). This ID can be universally joined with any OMB dataset that has the same field. The Capital Projects Dashboard is the result of joining OMB’s fiscal data with the agency’s schedule data.  FMS IDs and agency projects don't always have a one-to-one relationship (ie. one project schedule may correlate to multiple FMS IDs, and one FMS may correct to multiple projects with different schedules).","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/gyhf-rsr3","update_datemadepublic":"12/20/2023","update_updatefrequency":"Other","last_data_updated_date":"2025-12-26T15:00:30.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Tri-annually","legislativecompliance_removedrecords":"No","visits":"2484","downloads":"1581","row_count":"255932","column_count":"8","derived_view":false}
        ,{"datasetinformation_agency":"Fire Department of New York City (FDNY)","uid":"na5f-2vg7","name":"In-Service Alarm Box Locations (Map)","description":"This dataset contains the location of physical alarm boxes. It includes operational voice capable Emergency Reporting System (ERS) devices as well as pull-activated Box Alarm Reporting System (BARS) devices. Out-of-service BARS devices are not identified as such and may be included in this dataset. This dataset excludes the location of Class-3, Private Fire Alarm boxes.","type":"map","category":"Public Safety","url":"https://data.cityofnewyork.us/d/na5f-2vg7","update_datemadepublic":"11/07/2019","update_updatefrequency":"Annually","last_data_updated_date":"2019-10-25T17:54:52.000","update_automation":"No","visits":"5450","downloads":"9","parent_uid":"v57i-gtxb","derived_view":true}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"shr7-eqdc","name":"VZV Street Improvement Projects (SIP) Intersections","description":"Safety-oriented engineering improvements that use multiple treatments (signals, markings, concrete etc) on both corridors and intersections. Improvements are generally aimed at better organizing traffic, improving travel times, creating shorter, safer pedestrian crossings, and safe routes for bicycle travel. The map displays operational (non-capital) projects from 2009 to YTD. For more information on the individual projects, please visit the DOT website: https://www1.nyc.gov/html/dot/html/about/current-projects.shtml \r\n\r\n\r\nFor a complete list of Vision Zero maps, please follow <a href=\"https://data.cityofnewyork.us/browse?q=vzv&sortBy=last_modified&utf8=%E2%9C%93\">this link</a>","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/shr7-eqdc","update_datemadepublic":"05/31/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:18:39.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"459","downloads":"736","row_count":"421","column_count":"8","derived_view":false}
        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"nsqj-6wg3","name":"DCM_StreetNameChanges_Lines","description":"The Digital City Map (DCM) data represents street lines and other features shown on the City Map, which is the official street map of the City of New York. The City Map consists of 5 different sets of maps, one for each borough, totaling over 8000 individual paper maps. The DCM datasets were created in an ongoing effort to digitize official street records and bring them together with other street information to make them easily accessible to the public. The Digital City Map (DCM) is comprised of seven datasets; Digital City Map, Street Center Line, City Map Alterations, Arterial Highways and Major Streets, Street Name Changes (areas), Street Name Changes (lines), and Street Name Changes (points).\r\n\r\nAll of the Digital City Map (DCM) datasets are featured on the <a href=\"https://streets.planning.nyc.gov/about\">Streets App</a>\r\n\r\nAll previously released versions of this data are available at BYTES of the <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BIG APPLE- Archive </a>\r\n\r\nUpdates for this dataset, along with other multilayered maps on NYC Open Data, are temporarily paused while they are moved to a new mapping format. Please visit https://www.nyc.gov/site/planning/data-maps/open-data/dwn-digital-city-map.page to utilize this data in the meantime.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/nsqj-6wg3","update_datemadepublic":"6/1/2020","update_updatefrequency":"Monthly","last_data_updated_date":"2024-05-03T19:32:37.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_exist