        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"tnru-abg2","name":"3-D Building Model","description":"This three-dimensional (3-D) building massing model of New York City is one of the many digital tools provided by the Office of Technology and Innovation.  There are three file formats available to download via the buttons below. <br> <br> For more information on all the tools available, view the <a href=\"https://www.nyc.gov/content/oti/pages/tools\">OTI's Digital Tools</a> web page.","type":"href","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/tnru-abg2","update_datemadepublic":"4/18/2016","update_updatefrequency":"Historical data","last_data_updated_date":"2016-04-18T14:19:56.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"18322","downloads":"2","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"jfsk-arcd","name":"Walk to a Park Service Area for CEQR Open Space Assessment","description":"This dataset builds on the Walk to A Park Service Area to provide a dataset that can be viewed as an on-line map or downloaded to support the preparation of an Open Space assessment pursuant to City Environment Quality Review Technical Manual. The data has been modified to ensure that if 50% or more of a tax lot is within a Walk to a Park Service area, then the entire lot is shown as served.\r\n\r\nNew York City, as part of the OneNYC 2050 Building a Strong and Fair City plan, has put forth a goal of 85 percent of New York City residents living within a walking distance of a park by 2030. The Walk to a Park initiative focuses on increasing access to parks and open spaces, concentrating on areas of the city that are under-resourced and where residents are living further than a walk to a park. NYC Parks calculates the number of New Yorkers within walking distance of a park and reports on this as part of the Mayor’s Management Report. “Walking distance” is defined as a 1/4-mile or less for sites such as small playgrounds and sitting areas; or a 1/2-mile or less for larger parks that serve a wider region, typically over 6 acres or with access to recreation center. Certain properties in NYC Parks' portfolio, such as cemeteries, community gardens, or sites with no recreational equipment were not included in this analysis. Similarly, some publicly accessible parks and open-space amenities not under the jurisdiction of NYC Parks were included in this analysis, as they provide recreational value.\r\n\r\nThis information is periodically updated and is only current as of the last publication date. The analysis is performed in part using secondary data. Data accuracy is limited by the scale and accuracy of the original sources. For more information about this analysis and the Walk to a Park Initiati