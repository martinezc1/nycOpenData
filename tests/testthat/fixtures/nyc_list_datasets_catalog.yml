        ,{"datasetinformation_agency":"Police Department (NYPD)","uid":"v5jd-6wqn","name":"NYPD Use of Force: Members of Service","description":"Dataset containing information related to NYPD Members of Service involved in Force Incidents.\r\n</p>\r\nThe Threat, Resistance, or Injury (TRI) Report is the primary means by which the NYPD records use of force incidents. All reportable instances of force – whether used by a member of the Department, or against the member – are recorded on a TRI Report. Data provided here are a result of the information captured on TRI Reports.  Each record corresponds to an NYPD member of service involved in a force incident.  The data can be used to explore the various categories of force incidents and when and in which precinct they occurred. For any given incident, there may be one or more members of service involved.  Since NYPD policy requires two-person patrols, most incidents will have at least two members. The data is used to populate the public facing Force Dashboard.  (https://app.powerbigov.us/view?r=eyJrIjoiOGNhMjVhYTctMjk3Ny00MTZjLTliNDAtY2M2ZTQ5YWI3N2ViIiwidCI6IjJiOWY1N2ViLTc4ZDEtNDZmYi1iZTgzLWEyYWZkZDdjNjA0MyJ9).","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/v5jd-6wqn","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-02-06T17:20:35.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"No","visits":"2461","downloads":"1625","row_count":"135253","column_count":"8","derived_view":false}
