        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"4hft-v355","name":"2020 Neighborhood Tabulation Areas (NTAs) - Mapped","description":"2020 Neighborhood Tabulation Areas (NTAs) are medium-sized statistical geographies for reporting Decennial Census and American Community Survey (ACS). 2020 NTAs are created by aggregating 2020 census tracts and nest within Community District Tabulation Areas (CDTA). NTAs were delineated with the need for both geographic specificity and statistical reliability in mind. Consequently, each NTA contains enough population to mitigate sampling error associated with the ACS yet offers a unit of analysis that is smaller than a Community District.\r\n\r\nThough NTA boundaries and their associated names roughly correspond with many neighborhoods commonly recognized by New Yorkers, NTAs are not intended to definitively represent neighborhoods, nor are they intended to be exhaustive of all possible names and understandings of neighborhoods throughout New York City. Additionally, non-residential areas including large parks, airports, cemeteries, and other special areas are represented separately within this dataset and are assigned codes according to their type (See NTAType field). All previously released versions of this data are available at <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BYTES of the BIG APPLE- Archive</a>.","type":"map","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/4hft-v355","update_datemadepublic":"September 21, 2021","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-03-09T20:52:09.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"No","legislativecompliance_hasdatadictionary":"N/A","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"No","visits":"12805","downloads":"42","parent_uid":"9nt8-h7nd","derived_view":true}
