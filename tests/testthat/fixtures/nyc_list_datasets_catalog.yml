        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"i6ds-scnc","name":"High School Equivalency (HSE) Diplomas Awarded to NYCHA Residents by Council District – Local Law 163","description":"This datasets contains information about NYCHA residents who earned a high school equivalency (HSE) diploma in a given year. Only Pathways to Graduation HSE graduates are included. Pathways to Graduation is a full-time free NYC Department of Education program that helps students earn their HSE Diploma. Each row in the dataset represents the number of public housing residents on a Council District-level who earned a HSE diploma through participation in Pathways to Graduation. \nUp until December 2021, in New York State, HSE diplomas were awarded to students who passed the Test Assessing Secondary Completion (TASC) exam. In December 2021 New York Staten transitioned from using the TASC to the <a href=\"https://ged.com/\">GED Test</a> as the state’s HSE exam.\nFor datasets related to other services provided to NYCHA residents, view the data collection “Services available to NYCHA Residents - Local Law 163”.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/i6ds-scnc","update_datemadepublic":"11/29/2019","update_updatefrequency":"Annually","last_data_updated_date":"2025-12-02T16:14:08.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"731","downloads":"1156","row_count":"197","column_count":"3","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV)","uid":"vtsq-3d95","name":"Early Relationship Abuse Prevention Program (Early RAPP) Pre and Post Surveys","description":"The Early Relationship Abuse Prevention Program (Early RAPP) seeks to help middle schoolers identify unhealthy behaviors to prevent them from forming patterns of abuse while learning to build healthy relationship skills at a critical time in their development. Importantly, Early RAPP works to create a school culture that supports those respectful relationships, and creates safe spaces for young people to seek help for themselves and their peers. Community Educators facilitate interactive workshops for students, parents, and community members, as well as trainings to school staff.\r\nThe Early RAPP aims to improve student knowledge and understanding of the types of abuse and healthy relationships. In order to measure the changes in knowledge and attitudes resulting from their workshops and trainings, Community Educators conduct surveys before and after workshops. Every school year, Community Educators are required to conduct at least three workshops in the fall semester and at least three workshops in the spring semester, in which pre- and post-workshop surveys are conducted. Participant responses are anonymous. The Early RAPP pre- and post-workshop surveys are identical, consisting of fourteen standard questions about teen dating violence and healthy relationships with response options: Agree/Disagree (10 questions) and Healthy/Not Sure/Unhealthy (4 questions). The questions aim to measure each participant’s understanding of the topics covered in the workshop. This report provides a summary of pooled results from 1,325 pre- surveys and 1,093 post- surveys from workshops conducted with middle school students between January 30, 2019 and January 21, 2021.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/vtsq-3d95","update_datemadepublic":"1/17/2023","update_updatefrequency":"Historical data","last_data_updated_date":"2025-05-20T15:48:26.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"785","downloads":"880","row_count":"4863","column_count":"28","derived_view":false}
