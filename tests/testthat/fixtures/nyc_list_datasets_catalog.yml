        ,{"datasetinformation_agency":"New York City Housing Authority (NYCHA)","uid":"h65x-gk9r","name":"Resident Economic Empowerment and Sustainability (REES) for NYCHA Residents – Council District - Local Law 163","description":"This dataset contains information about the New York City Housing Authority’s (NYCHA) Office of <a href=\"https://www1.nyc.gov/site/nycha/residents/rees.page\">Resident Economic Empowerment and Sustainability (REES)</a>. REES supports NYCHA public housing and Section 8 residents’ increased income and assets through programs, policies and formal partnerships in the areas of employment and advancement, adult education and training, financial literacy and asset building and resident business development.   Each row in the dataset represents the number of public housing residents on a City Council District level who receive or utilize this service. Data on interagency collaborations such as Jobs-Plus and Business Pathways are not part of this data but are accounted for in NYC Business Solutions and Human Resources data respectively. As per HUD regulations REES serves NYCHA public housing, NYCHA Section 8 and Section 3 residents.\r\n\r\nThe dataset is part of the annual report compiled by the Mayor’s Office of Operations as mandated by the <a href=\"https://legistar.council.nyc.gov/LegislationDetail.aspx?ID=2745761&GUID=2A9FB1D2-A1A8-4484-9D49-6F8332171B66\">Local Law 163 of 2016</a> on different services provided to NYCHA residents. See other datasets in this report by searching the keyword “Services available to NYCHA Residents - Local Law 163 (2016)” on the Open Data Portal.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/h65x-gk9r","update_datemadepublic":"11/29/2019","update_updatefrequency":"Annually","last_data_updated_date":"2025-10-28T19:54:29.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislati