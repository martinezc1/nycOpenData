        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"grnn-mvqe","name":"New York City Work and Family Leave Survey (WFLS) 2014","description":"The New York City Work and Family Leave Survey (WFLS), conducted in March 2016, was a telephone survey of New York City residents who gave birth in 2014. Its goal was to improve understanding about the availability and accessibility of paid family leave to working parents. The WFLS also sought to describe the role that paid family leave policies play in achieving health equity for parents and children.  The WFLS was made possible through funding by the U.S. Department of Labor Women’s Bureau.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/grnn-mvqe","update_datemadepublic":"4/6/2017","update_updatefrequency":"Historical data","last_data_updated_date":"2017-03-03T19:53:21.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"9139","downloads":"3681","row_count":"1063","column_count":"153","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"vvdx-b56i","name":"Community Parks Initiative Zone Boundaries","description":"CPI Zones are neighborhoods where NYC Parks pursued a combination of capital investment and/or targeted physical improvements, enhanced programming, and public outreach efforts through the Community Parks Initiative launched in 2014.  CPI Zones were boundaries based on the NYC Department of City Planning's Neighborhood Tabulation Areas. These NTAs were selected as they capture neighborhoods that met several criteria for the initiative. They are densely populated and growing neighborhoods where there are higher-than-average concentrations of poverty as measured through the 2010 US Census, and they contain parks that are suitable for recreational redevelopment and received less than $250,000 in capital investment from 1992-2013.","type":"map","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/vvdx-b56i","update_datemadepublic":"8/20/2015","update_updatefrequency":"Historical data","last_data_updated_date":"2015-08-20T20:51:47.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"4012","downloads":"676","parent_uid":"sidw-jf8y","derived_view":true}
