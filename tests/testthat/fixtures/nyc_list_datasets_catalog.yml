        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"swpk-hqdp","name":"New York City Population By Neighborhood Tabulation Areas","description":"Population Numbers By New York City Neighborhood Tabulation Areas\r\n\r\nThe data was collected from Census Bureaus' Decennial data dissemination (SF1). \r\nNeighborhood Tabulation Areas (NTAs), are aggregations of census tracts that are subsets of New York City's 55 Public Use Microdata Areas (PUMAs). Primarily due to these constraints, NTA boundaries and their associated names may not definitively represent neighborhoods. \r\nThis report shows change in population from 2000 to 2010 for each NTA.\r\nCompiled by the Population Division – New York City Department of City Planning.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/swpk-hqdp","update_datemadepublic":"3/4/2013","update_updatefrequency":"Annually","last_data_updated_date":"2013-06-26T17:16:15.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"67559","downloads":"20189","row_count":"390","column_count":"6","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"rx8t-6euq","name":"Bus Lanes - Local Streets (Map)","description":"Bus lanes are travel lanes that are restricted to buses during certain hours of the day. All bus lanes have signs posted along the route with specific regulations; lanes marked \"Bus Only\" and /or painted red. Bus lanes help to keep buses from getting stuck in traffic, generally making travel for bus riders faster and reliable and improving the overall traffic flow of a corridor. Each record represents a segment of a bus lane based on the LION geographic base file of NYC streets. User may use the SegmentID field in this dataset to join with the LION data for more information.","type":"map","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/rx8t-6euq","update_datemadepublic":"12/7/2020","update_updatefrequency":"Annually","last_data_updated_date":"2025-09-16T18:23:25.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"13032","downloads":"4","parent_uid":"ycrg-ses3","derived_view":true}
