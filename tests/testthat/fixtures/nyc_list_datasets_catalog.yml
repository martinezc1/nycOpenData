        ,{"datasetinformation_agency":"Department of Consumer and Worker Protection (DCWP)","uid":"5kqf-fg3n","name":"NYC Free Tax Prep Sites","description":"This dataset provides a machine-readable format for the data that populates the \"NYC Free Tax Preparation Site Finder\" map hosted on DCA's website.  The dataset includes the name and address of the service provider, its hours of operation, services available, and required geo-spacial data elements used by the map.\n\nDCA's Office of Financial Empowerment (OFE) DCA coordinates the City’s Annual Tax Season Initiative which offers free tax preparation services to qualifying New Yorkers. NYC Free Tax Prep sites are displayed on a map at nyc.gov/taxprep (https://www1.nyc.gov/assets/dca/TaxMap/index.html)\n\nThe map is updated whenever a new site is added or an existing site changes its hours of operation or services provided.\n\nFor more information about Free Tax Preparation Sties visit the DCA website (https://www1.nyc.gov/site/dca/consumers/file-your-taxes-faqs.page).","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/5kqf-fg3n","update_datemadepublic":"12/19/2018","update_updatefrequency":"Weekly","last_data_updated_date":"2019-07-24T18:10:46.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"5998","downloads":"2421","row_count":"184","column_count":"81","derived_view":false}
