        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"qbce-2kcu","name":"DOF: Cooperative Comparable Rental Income – Bronx – FY 2010/2011","description":"The Department of Finance (DOF) is required by NY State law to value condominiums or cooperatives as if they were residential rental apartment buildings.   DOF uses income information from rental properties similar in physical features and location to the condominiums or cooperatives. DOF applies this income data to the condominium or cooperative and determine its value in the same way DOF values rental apartment buildings.\r\nUpdate Frequency: Annually","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/qbce-2kcu","update_datemadepublic":"10/11/2011","update_updatefrequency":"Historical data","last_data_updated_date":"2017-09-14T19:32:23.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"921","downloads":"3658","row_count":"440","column_count":"57","derived_view":false}
