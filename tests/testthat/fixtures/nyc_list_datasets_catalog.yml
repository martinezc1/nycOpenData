        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"p7iz-d7br","name":"DEP Green Infrastructure Map (Porous Pavement Right of Way Practices)","description":"This dataset contains the locations and detailed information of green infrastructure practices in NYC neighborhoods built primarily through NYC Green Infrastructure Program initiatives. Green infrastructure (GI) collects stormwater from streets, sidewalks, and other hard surfaces before it can enter the sewer system or cause local flooding. The GI practice data contained in this dataset includes the location, program area, status, and type of GI. This dataset is updated by the NYC Department of Environmental Protection on a monthly basis.    \nThe “Porous_Permeable_Pavement” polygon layer contains constructed porous permeable pavement practices only, which fall under the ROW program area category. The three ROW Porous Permeable Pavement asset types in this shapefile are Porous Concrete, Permeable Pavement, and Porous Asphalt.\n\nThis layer is part of a larger Green Infrastructure dataset. You can download the full dataset and the data dictionary below under “Attachments”.\n\nSource Data: <a href=\"https://www.nyc.gov/dep/gimap\">DEP Green Infrastructure Program Map</a>","type":"map","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/p7iz-d7br","update_datemadepublic":"10/17/2017","update_updatefrequency":"Monthly","last_data_updated_date":"2025-10-02T14:31:15.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"N/A","visits":"688","downloads":"2","parent_uid":"n7f2-dyvt","derived_vi