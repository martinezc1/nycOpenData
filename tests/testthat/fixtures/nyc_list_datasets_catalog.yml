        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"s27g-2w3u","name":"2013 NYC School Survey","description":"Every year, all parents, all teachers, and students in grades 6 - 12 take the NYC School Survey. The survey ranks among the largest surveys of any kind ever conducted nationally. Survey results provide insight into a school's learning environment and contribute a measure of diversification that goes beyond test scores on the Progress Report. NYC School Survey results contribute 10% - 15% of a school's Progress Report grade (the exact contribution to the Progress Report is dependent on school type). Survey questions assess the community's opinions on academic expectations, communication, engagement, and safety and respect. School leaders can use survey results to better understand their own school's strengths and target areas for improvement. The NYC School Survey helps school leaders understand what key members of the school community say about the learning environment at each school. The information captured by the survey is designed to support a dialogue among all members of the school community about how to make the school a better place to learn.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/s27g-2w3u","update_datemadepublic":"11/21/2018","update_updatefrequency":"Historical data","last_data_updated_date":"2018-11-21T18:17:05.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"1015","downloads":"1491","row_count":"1775","column_count":"10","derived_view":false}
