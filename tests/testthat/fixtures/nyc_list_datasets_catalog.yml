        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"qsh3-jj2w","name":"Housing Database by 2020 Census Tract (Map)","description":"Net change in housing units arising from new buildings, demolitions, or alterations for NYC Census Tracts since 2010. The NYC Department of City Planning’s (DCP) <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/dwn-housing-database.page#housingdevelopmentproject\">Housing Database</a>  provide the 2010 census count of housing units, the net change in Class A housing units since the census, and the count of units pending completion for commonly used political and statistical boundaries. These tables are aggregated from the DCP Housing Database, which is derived from Department of Buildings (DOB)-approved housing construction and demolition jobs filed or completed in NYC since January 1, 2010. Net housing unit change is calculated as the sum of all three construction job types that add or remove residential units: new buildings, major alterations, and demolitions, and can be used to determine the change in legal housing units across time and space.\r\n\r\nAll previously released versions of this data are available at a <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BYTES of the BIG APPLE- Archive</a>","type":"map","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/qsh3-jj2w","update_datemadepublic":"4/7/2021","update_updatefrequency":"Every 6 months","last_data_updated_date":"2026-03-16T16:52:15.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedreco