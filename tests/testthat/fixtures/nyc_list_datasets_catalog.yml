        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"fzh2-sxib","name":"Children Tested for Lead by Age 3","description":"All NYC children are required to be tested for lead poisoning at around age 1 and age 2, and to be screened for risk of lead poisoning, and tested if at risk, up until age 6. These data are an indicator of the number and percentage of children turning 3 years old in a given year who were tested for lead poisoning.\r\n\r\nAbout the Data\r\nAll NYC children are required to be tested for lead poisoning at around age 1 and age 2, and to be screened for risk of lead poisoning, and tested if at risk, up until age 6. These data are an indicator of the number and percentage of children turning 3 years old in a given year who were tested for lead poisoning. \r\nHow calculated: To identify children tested for lead poisoning, birth records for all children born in New York City to New York City resident mothers, and turning 3 years old in a given year were matched to children tested for lead poisoning before age 3.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/fzh2-sxib","update_datemadepublic":"1/2/2019","update_updatefrequency":"Annually","last_data_updated_date":"2018-07-12T21:10:29.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"N/A","visits":"3158","downloads":"2056","row_count":"432","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"sj3k-gzyx","name":"DOHMH Covid-19 Milestone Data: Daily Number of People Admitted to NYC hospitals for Covid-19 like Illness","description":"This dataset shows the number of hospital admissions for influenza-like illness, pneumonia, or include ICD-10-CM code (U07.1) for 2019 novel coronavirus. Influenza-like illness is defined as a mention of either: fever and cough, fever and sore throat, fever and shortness of breath or difficulty breathing, or influenza. Patients whose ICD-10-CM code was subsequently assigned with only an ICD-10-CM code for influenza are excluded. Pneumonia is defined as mention or diagnosis of pneumonia. \nBaseline data represents the average number of people with COVID-19-like illness who are admitted to the hospital during this time of year based on historical counts. The average is based on the daily avg from the rolling same week (same day +/- 3 days) from the prior 3 years. Percent change data represents the change in count of people admitted compared to the previous day. \nData sources include all hospital admissions from emergency department visits in NYC. Data are collected electronically and transmitted to the NYC Health Department hourly. This dataset is updated daily.\nAll identifying health information is excluded from the dataset.","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/sj3k-gzyx","update_updatefrequency":"Daily","last_data_updated_date":"2021-06-15T23:14:16.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"No","visits":"1721","downloads":"1270","row_count":"470","column_count":"6","derived_view":false}
