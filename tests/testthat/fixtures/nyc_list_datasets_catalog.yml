        ,{"datasetinformation_agency":"Mayor's Office of Management & Budget (OMB)","uid":"ic46-fvh8","name":"NYC Climate Budgeting Report: Avoided Health Events By NTA (Archived)","description":"This dataset contains the estimated number of cumulative health events avoided per neighborhood tabulation area (NTA) resident due to reductions in fine particulates or particulate matter less than 2.5 micrometers in diameter (PM2.5). The Mayor’s Office of Management and Budget (OMB) obtained the health events avoided value through collaboration with the New York City (NYC) Health Department. The reductions in PM2.5 are the same reductions found in the  <a href=\"https://data.cityofnewyork.us/City-Government/NYC-Climate-Budgeting-Report-Forecast-of-Emissions/3z69-v9cd\" rel=\"noopener noreferrer\" target=\"_blank\">\"Forecasted Emissions and PM2.5 Reductions from City Actions\"</a> dataset.  This dataset uses the same data included in the  <a href=\"https://data.cityofnewyork.us/City-Government/NYC-Climate-Budgeting-Report-Forecasted-Avoided-He/v988-8fd7\" rel=\"noopener noreferrer\" target=\"_blank\">\"Forecasted Avoided Health Events\"</a>, the main difference is that this dataset is mapped geographically. For any additional detail about PM2.5, refer to the \"Impact of Fossil Fuel Use on Air Quality and Health\" sub-section of the FY25 New York City Climate Budgeting publication (https://www.nyc.gov/assets/omb/downloads/pdf/exec24-nyccb.pdf).\n\nYou can find the complete collection of Climate Budget data by <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Climate+Budgeting\" rel=\"noopener noreferrer\" target=\"_blank\">clicking here.</a>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/ic46-fvh8","update_datemadepublic":"6/11/2024","update_updatefrequency":"Historical data","last_data_updated_date":"2024-06-06T20:38:36.000","legislativecompliance_can