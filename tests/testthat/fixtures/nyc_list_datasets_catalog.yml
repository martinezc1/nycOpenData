        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"ce23-cck4","name":"POSSESSION_HOOK","description":"This point-based spatial data indicates the location and type of possession hooks in the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Department+of+Finance+Digital+Tax+Map&sortBy=relevance&page=1&pageSize=20\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map Collection</a>.\n\n• <strong>Updates:</strong> Data is extracted from DOF’s internal system on the last Friday of each month and refreshed on ArcGIS Online on the 1st. The online map always shows the most recent version.\n\n• <strong>Accessing the Data:</strong>  \n  • <strong>Digital Tax Map on NYC Open Data:</strong> See the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Department+of+Finance+Digital+Tax+Map&sortBy=relevance&page=1&pageSize=20\" target=\"_blank\" rel=\"noreferrer\">complete collection</a>.  \n  • <strong>Individual layers:</strong> Downloadable from the <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/ArcGIS/rest/services/DTM_ETL_DAILY_view/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map Feature Server</a>.  \n  • <strong>Complete source:</strong> Available through the <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_A/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map service</a>, which always points to the latest monthly release.\n\n<strong>Note:</strong> To ensure reliability, the Tax Map alternates between <em>Set A</em> and <em>Set B</em> each month. If one set has issues, the previous month’s copy remains online. Both sets are kept about a month apart and are available for download:  \n    &nbsp;&nbsp;&nbsp;&nbsp;• <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_A/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Set A link</a>  \n    &nbsp;&nbsp;&nbsp;&nbsp;• <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_B/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Set B link</a>\n\n• <strong>Digital Alteration Book (DAB):</strong> The DAB is the official log of map changes—such as new lots, merges, or boundary shifts—providing a clear record of how the Tax Map evolves. It is available through the <a href=\"https://propertyinformationportal.nyc.gov/\" target=\"_blank\" rel=\"noreferrer\">Property Information Portal</a>.\n\n<b>Disclaimer:</b>  \nThis dataset reflects formal applications submitted to DOF but may not reflect the latest changes in other City systems (e.g., exemptions or buildings data). It is provided for informational purposes only and is not guaranteed to be accurate as of today’s date.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/ce23-cck4","update_updatefrequency":"Weekly","last_data_updated_date":"2026-02-02T07:33:43.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"Yes","visits":"134","downloads":"231","row_count":"94888","column_count":"3","derived_view":false}
