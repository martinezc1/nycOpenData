        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"9auy-76zt","name":"Landcover Raster Data (2010) – 3ft Resolution","description":"High resolution land cover data set for New York City.  This is the 3ft version of the high-resolution land cover dataset for New York City. Seven land cover classes were mapped: (1) tree canopy, (2) grass/shrub, (3) bare earth, (4) water, (5) buildings, (6) roads, and (7) other paved surfaces.  The minimum mapping unit for the delineation of features was set at 3 square feet. The primary sources used to derive this land cover layer were the 2010 LiDAR and the 2008 4-band orthoimagery.  Ancillary data sources included GIS data (city boundary, building footprints, water, parking lots, roads, railroads, railroad structures, ballfields) provided by New York City (all ancillary datasets except railroads); UVM Spatial Analysis Laboratory manually created railroad polygons from manual interpretation of 2008 4-band orthoimagery.  The tree canopy class was considered current as of 2010; the remaining land-cover classes were considered current as of 2008. Object-Based Image Analysis (OBIA) techniques were employed to extract land cover information using the best available remotely sensed and vector GIS datasets.  OBIA systems work by grouping pixels into meaningful objects based on their spectral and spatial properties, while taking into account boundaries imposed by existing vector datasets.  Within the OBIA environment a rule-based expert system was designed to effectively mimic the process of manual image analysis by incorporating the elements of image interpretation (color/tone, texture, pattern, location, size, and shape) into the classification process.  A series of morphological procedures were employed to insure that the end product is both accurate and cartographically pleasing. More than 35,000 corrections were made to the classification.  Overall accuracy was 96%. This dataset was developed as part of the Urban Tree Canopy (UTC) Assessment for New York City.  As such, it represents a 'top down' mapping perspective in which tree canopy over hanging other features is assigned to the tree canopy class.  At the time of its creation this dataset represents the most detailed and accurate land cover dataset for the area. This project was funded by National Urban and Community Forestry Advisory Council (NUCFAC) and the National Science Fundation (NSF), although it is not specifically endorsed by either agency.  The methods used were developed by the University of Vermont Spatial Analysis Laboratory, in collaboration with the New York City Urban Field Station, with funding from the USDA Forest Service.","type":"file","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/9auy-76zt","update_datemadepublic":"6/28/2012","update_updatefrequency":"Historical data","last_data_updated_date":"2012-06-28T16:45:04.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"22689","downloads":"10478","derived_view":false}
        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"pq4c-wbq4","name":"421-a(16) Affordable New York Housing Program Completion Extension - Letters of Intent","description":"Buildings which intend to seek partial real estate tax exemption under New York State Real Property Tax Law Section 421-a Subdivision 16 are required to commence and complete construction, as those terms are defined by the law, by certain dates. On April 20th, 2024, New York State extended the date by which buildings can complete construction from June 15, 2026 to June 15, 2031, for projects that, among other things, submit a form created by the agency within 90 days of the agency providing such form to the public. This form includes owner reported data including, but not limited to, information about ownership, the reported number of dwelling units and affordable housing units anticipated to be included in the building and reported commencement dates and reported, anticipated completion dates.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/pq4c-wbq4","update_datemadepublic":"10/16/2024","update_updatefrequency":"Historical data","last_data_updated_date":"2024-10-08T20:57:02.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"4765","downloads":"3114","row_count":"740","column_count":"27","derived_view":false}
