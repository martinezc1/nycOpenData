        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"gkgs-za6m","name":"DSNY DonateNYC Directory","description":"Sites listed in the DonateNYC Directory. For more information, see: https://www1.nyc.gov/assets/donate/site/Directory\n\nTo reduce needless waste and increase diversion of reusable material from landfills, the NYC Department of Sanitation established donateNYC in 2016. donateNYC helps New Yorkers give goods, find goods, and do good, with tools that make it easy to donate or find used goods.\n\nBy donating and reusing goods instead of discarding them, New Yorkers can greatly reduce waste, conserve energy and resources, save money, and help provide jobs and human services for New Yorkers in need. donateNYC is an essential part of NYC’s Zero Waste Goals.\n\ndonateNYC also provides vital support for New York City’s reuse community, helping nonprofit organizations and local reuse businesses increase and promote their reuse efforts.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/gkgs-za6m","update_datemadepublic":"8/20/2020","update_updatefrequency":"As needed","last_data_updated_date":"2026-03-24T09:30:27.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"Yes","visits":"3608","downloads":"15584","row_count":"1514","column_count":"35","derived_view":false}
        ,{"datasetinformation_agency":"Taxi and Limousine Commission (TLC)","uid":"u253-aew4","name":"2023 High Volume FHV Trip Data","description":"These records are generated from the trip record submissions made by High Volume For-Hire Vehicle (FHV) bases. On August 14, 2018, Mayor de Blasio signed Local Law 149 of 2018, creating a new license category for TLC-licensed FHV businesses that currently dispatch or plan to dispatch more than 10,000 FHV trips in New York City per day under a single brand, trade, or operating name, referred to as High-Volume For-Hire Services (HVFHS). This law went into effect on Feb 1, 2019. Each row represents a single trip in a FHV dispatched by a high volume base.  The trip records include fields capturing the high volume license number, the pickup and drop-off date, time, and taxi zone location ID, which correspond with the NYC Taxi Zones open dataset.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/u253-aew4","update_datemadepublic":"7/16/2024","update_updatefrequency":"Historical data","last_data_updated_date":"2024-07-15T17:29:03.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"5644","downloads":"2974","row_count":"232490020","column_count":"24","derived_view":false}
        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"6jjp-if35","name":"Housing Database by 2020 CDTA (Map)","description":"Net change in housing units arising from new buildings, demolitions, or alterations for specified geography (Census Block, Census Tract, City Council district, Community District, Community District Tabulation Area (CDTA), Neighborhood Tabulation Area (NTA). These tables are aggregated from the DCP Housing Database, which is derived from Department of Buildings (DOB)-approved housing construction and demolition jobs filed or completed in NYC since January 1, 2010. Net housing unit change is calculated as the sum of all three construction job types that add or remove residential units: new buildings, major alterations, and demolitions, and can be used to determine the change in legal housing units across time and space.\r\n\r\n\r\nAll previously released versions of this data are available at a <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BYTES of the BIG APPLE- Archive</a>","type":"map","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/6jjp-if35","update_datemadepublic":"6/27/2023","update_updatefrequency":"Every 6 months","last_data_updated_date":"2026-03-16T16:51:00.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"No","visits":"763","downloads":"6","parent_uid":"48dt-mn3z","derived_view":true}
