        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"2xir-kwzz","name":"Beach Water Samples","description":"The DOHMH office of Public Health Engineering administers the Beach Surveillance and Monitoring Program for all permitted New York City beaches. The Beach Water Samples data set contains the enterococci measurements of beach water samples collected while administering the Monitoring Program. Monitoring Program conducts inspections from April through September of each year. For more information on the program, see: https://www.nyc.gov/site/doh/health/health-topics/beach-class.page","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/2xir-kwzz","update_datemadepublic":"6/14/2016","update_updatefrequency":"As needed","last_data_updated_date":"2025-10-06T14:24:27.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"9513","downloads":"4121","row_count":"29693","column_count":"6","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"cqsj-cfgu","name":"Bi-Annual Pedestrian Counts","description":"An index of pedestrian volumes tracking the long-term trends of neighborhood commercial corridors. Data is collected at 114 locations, including 100 on-street locations (primarily retail corridors), 13 East River and Harlem River bridge locations, and the Hudson River Greenway. Screenline sampling is conducted during May and September on the sidewalk, mid-block (or mid-bridge) on both sides of street where applicable. Pedestrian volumes at 50 sample locations around the City are combined to create the Pedestrian Volume Index for the Mayor’s Management Report.\r\n\r\n\r\nClick here for metadata - http://www.nyc.gov/html/dot/downloads/pdf/bi-annual-ped-count-readme.pdf","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/cqsj-cfgu","update_datemadepublic":"12/29/2015","update_updatefrequency":"Every 6 months","last_data_updated_date":"2025-10-02T17:40:39.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"No","visits":"4659","downloads":"4274","row_count":"114","column_count":"113","derived_view":false}
        ,{"datasetinformation_agency":"Landmarks Preservation Commission (LPC)","uid":"jcj6-zji6","name":"Designated and Calendared Buildings and Sites (Map)","description":"Provides information on all items designated or under consideration for designation (i.e. calendared) by the New York City Landmarks Preservation Commission (LPC). </br>\nThis dataset contains information on all items designated or under consideration for designation (i.e. calendared) by the New York City Landmarks Preservation Commission (LPC). The dataset contains records for each individual, scenic, or interior landmark, as well as properties or sites located within the boundaries of historic districts. Please note that points in this dataset represent individual buildings in addition to non-building sites (such as vacant lots or monuments) regulated by LPC. It is possible for a single property to have multiple designations (such as individual and interior designations, or individual and historic district). For this reason, it is not uncommon to see multiple points on a single tax lot and multiple records for a single property within the database. Please pay close attention to the \"MOST_CURRENT,\" \"BBL_STATUS and \"LAST_ACTION_ON_LP\" fields, which together denote the designation status of a site/property (see Attribute Definitions for more information). The geographic locations of the points in this dataset are derived primarily from the Department of City Planning's PLUTO data in combination with the Department of Information Technology & Telecommunication's building footprint information. Because this dataset is not automatically updated when changes occur in the underlying dataset, BIN numbers and tax lot information are potentially out of date. Please pay close attention to the field descriptions present in the file's metadata to understand how to use this data set.\n</p>\n<b><em>Time values are auto-generated and do not reflect the official time of any LPC action, including designation or calendaring.</em></b>","type":"map","category":"Housing & Development","url":"https://data.cityofnewyork.us/d/jcj6-zji6","update_datemadepublic":"3/11/2015","update_updatefrequency":"As needed","last_data_updated_date":"2026-02-02T21:09:00.000","update_automation":"No","visits":"2318","downloads":"13","parent_uid":"ncre-qhxs","derived_view":true}
