        ,{"datasetinformation_agency":"Department of Small Business Services (SBS)","uid":"5vi6-xdpy","name":"Small Business Services (SBS) Equal Employment Opportunity (EO 50) Certified Businesses","description":"This dataset contains a list of businesses that have successfully complied with Equal Employment Opportunity (EO 50) requirements and have received EO50 certificate of approval from the NYC Department of Small Business Services (SBS). Executive Order No. 50 was established in 1980 during Mayor Koch's tenure. It mandates that all contractors adhere to equal employment principles, explicitly prohibiting discriminatory hiring practices. This order safeguards individuals from discrimination based on ten protected categories: race, sex, creed, age, color, disability, national origin, marital status, sexual orientation, and citizenship status. For additional information, please visit our website at \n<a href=\"https://www.nyc.gov/site/sbs/businesses/contract-compliance.page\">https://www.nyc.gov/site/sbs/businesses/contract-compliance.page</a>","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/5vi6-xdpy","update_datemadepublic":"12/28/2023","update_updatefrequency":"Annually","last_data_updated_date":"2026-02-02T16:27:07.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"N/A","visits":"4537","downloads":"1612","row_count":"1388","column_count":"16","derived_view":false}
