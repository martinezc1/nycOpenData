        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"4kpn-sezh","name":"NYC Condom Availability Program - HIV condom distribution locations","description":"This is a list of over 325 venues, across the five boroughs that actively distribute free safer sex products.  Product availability varies by venue. </p>\r\nThe NYC Condom Availability Program maintains a robust list of active venues where New York City (NYC) residents may access free safer sex products across all 5 boroughs of NYC. This list is updated through a variety of mechanisms supported by the NYC Department of Health and Mental Hygiene (NYC DOHMH). At minimum, different sub-sets of this dataset are updated monthly by several vetted DOHMH contracted agencies. Other subsets of this dataset are updated in real-time by NYC Safer Sex Portal users. This entire dataset is refreshed in OpenData on a daily basis.\r\nThis dataset shows where New York City residents can access NYC free safer sex products throughout the five boroughs. Each row represents pertinent information related to a single venue which distributes NYC safer sex products. \r\nThis data is collected and maintained to populate the NYC HealthMap (https://a816-healthpsi.nyc.gov/NYCHealthMap/home/) and may be used by other safer sex product [condom/lubricant] locators or map publically available locations.\r\nThis dataset does not represent all locations which received orders of free safer sex products from NYC DOHMH nor have the listed venues [locations] been endorsed by NYC DOHMH. Furthermore, while the data is sourced from the NYC HealthMap there could be a lag between what is visible inside the HealthMap’s user interface and what is seen on OpenData. The NYC HealthMap is updated ~hourly while OpenData is updated daily. If there are data discrepancies between your export and what is seen inside OpenData’s “View Data” please clear your browsing history/cache and restart your browser.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/4kpn-sezh","update_datemadepublic":"12/20/2018","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-18T18:58:05.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"Yes","visits":"6364","downloads":"7571","row_count":"698","column_count":"35","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"mnz3-dyi8","name":"2011 NYC School Survey","description":"Every year, all parents, all teachers, and students in grades 6 - 12 take the NYC School Survey. The survey ranks among the largest surveys of any kind ever conducted nationally. \r\n\r\nSurvey results provide insight into a school's learning environment and contribute a measure of diversification that goes beyond test scores on the Progress Report. NYC School Survey results contribute 10% - 15% of a school's Progress Report grade (the exact contribution to the Progress Report is dependant on school type). Survey questions assess the community's opinions on academic expectations, communication, engagement, and safety and respect. School leaders can use survey results to better understand their own school's strengths and target areas for improvement. \r\n\r\nThe NYC School Survey helps school leaders understand what key members of the school community say about the learning environment at each school. The information captured by the survey is designed to support a dialogue among all members of the school community about how to make the school a better place to learn. \r\n\r\nNew York City parents, students, and teachers reached new all-time participation highs on the 2011 School Survey. 960,191 surveys were submitted.","type":"href","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/mnz3-dyi8","update_datemadepublic":"10/11/2011","update_updatefrequency":"Historical data","last_data_updated_date":"2011-10-06T22:20:26.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"42404","downloads":"572","derived_view":false}
        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"vq35-j9qm","name":"Asbestos Control Program (ACP7)","description":" ACP7 form is an asbestos project notification. Any time asbestos abatement is perform on quantities greater than a minor project amount, the applicant has to file this form with DEP Asbestos Control Program (ACP). All asbestos documents are filed through the Asbestos Reporting and Tracking System (ARTS) E-file system. This system is web based and entirely paperless. All information on the ACP7 is essential to meet the requirements setforth in the asbestos rules and regulations Title15, Chapter 1 (RCNY). ACP enforcement staff utilizes this form for inspection of asbestos abatement activities.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/vq35-j9qm","update_datemadepublic":"1/1/2019","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T21:36:12.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"20825","downloads":"13237","row_count":"349081","column_count":"35","derived_view":false}
