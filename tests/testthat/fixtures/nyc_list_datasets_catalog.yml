        ,{"datasetinformation_agency":"Administration for Children's Services (ACS)","uid":"2ubh-v9er","name":"Monthly Flash Report indicators","description":"The Flash report provides monthly performance data on key ACS child welfare, child care, and juvenile justice functions such as children using vouchers for child care, child protective caseloads, and the number of admissions to detention. \r\nEach row of data in the Excel file posted to Open Data is a distinct measure in the Flash Report.The columns are the month of the data. Data are updated semiannually in September and April using data from queries of administrative data systems and data provided directly from program areas. \r\nA graphic version of the Flash Report is posted monthly to the ACS internet webpage\r\nhttps://www1.nyc.gov/site/acs/about/flashindicators.page\r\n\r\nFor the User Guide, please follow this <a href=\"https://docs.google.com/document/d/1X6KYyW6i3idDWZfacUaMrCRjJ5gGcHZr9X0B17iu40c\">link.</a>\r\n\r\nFor the Data Dictionary, please follow this <a href=\"https://docs.google.com/spreadsheets/d/1K1NU-InBemZ_TohJXflh9RQ42zQMY_klStmNZTzKDbQ/edit#gid=0\">link.</a>","type":"file","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/2ubh-v9er","update_datemadepublic":"10/18/2019","update_updatefrequency":"Every 6 months","last_data_updated_date":"2019-10-17T19:11:09.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2485","downloads":"1303","derived_view":false}
