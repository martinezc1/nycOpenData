        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"y7az-s7wc","name":"J-51 Exemption and Abatement (Historical)","description":"This dataset provides J-51 benefit data earlier than tax year 2019 and is not updated. To view J-51 benefit data for newer tax years, visit the <a target=\"_blank\" href=\"https://data.cityofnewyork.us/City-Government/Property-Exemption-Detail/muvi-b6kx/about_data\">Property Exemption Detail</a> dataset and the <a href=\"https://data.cityofnewyork.us/City-Government/DOF-Property-Abatement-Detail/rgyu-ii48/about_data\" target=\"_blank\">Property Abatement Detail</a> dataset.\n \nJ-51 is a property tax exemption and abatement for renovating a residential apartment building. The benefit varies depending on the building's location and the type of improvements. The NYC Department of Housing Preservation and Development (HPD) determines eligibility for this program. The NYC Department of Finance (DOF) administers the benefit.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/y7az-s7wc","update_datemadepublic":"3/14/2019","update_updatefrequency":"Historical data","last_data_updated_date":"2019-03-14T16:13:15.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"N/A","visits":"68934","downloads":"9073","row_count":"4232279","column_count":"15","derived_view":false}
        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"67up-ztdf","name":"New York City Health Opinion Poll","description":"The New York City Health Opinion Poll (HOP) is a periodic rapid online poll conducted by New York City Department of Health and Mental Hygiene. The goals of the poll are to measure adult New Yorkers’ awareness, acceptance and use — or barriers to use — of our programs; knowledge, opinions and attitudes about health care and practices; and opinions about public events that are related to health. The data collected through public health polling are rapidly analyzed and disseminated. This real-time community input informs programming and policy development at the Health Department to better meet the needs of New Yorkers.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/67up-ztdf","update_updatefrequency":"As needed","last_data_updated_date":"2021-04-13T15:56:43.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"2151","downloads":"1211","row_count":"10","column_count":"3","derived_view":false}
