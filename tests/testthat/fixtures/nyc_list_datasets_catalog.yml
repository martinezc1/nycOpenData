        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"2fpa-bnsx","name":"Facilities Database - Shapefile","description":"The Department of City Planning aggregates information about 30,000+ facilities and program sites that are owned, operated, funded, licensed, or certified by a City, State, or Federal agency in the City of New York into a central database called the City Planning Facilities Database (FacDB). These facilities generally help to shape quality of life in the city’s neighborhoods, and this dataset is the basis for a series of planning activities. This public data resource allows all New Yorkers to understand the breadth of government resources in their neighborhoods. The data is also complemented with a <b><a href=\"https://capitalplanning.nyc.gov/facilities\">new interactive web map</a></b> that enables users to easily filter the data for their needs. Users are strongly encouraged to read the database documentation, particularly with regard to analytical limitations.\r\n\r\nQuestions about this database can be directed to <b><a href=\"mailto:dcpopendata@planning.nyc.gov\">dcpopendata@planning.nyc.gov</a></b>\r\n\r\nAll previously released versions of this data are available at <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BYTES of the BIG APPLE- Archive</a>","type":"map","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/2fpa-bnsx","update_datemadepublic":"7/14/2015","update_updatefrequency":"Annually","last_data_updated_date":"2024-12-23T16:15:40.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecomplia