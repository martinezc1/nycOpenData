        ,{"datasetinformation_agency":"Mayor's Office of Operations (OPS)","uid":"95tx-snak","name":"Capital Projects Dashboard - Citywide Schedule History and Variance","description":"This is the history all agency reported forecasts/actual project completion dates. Each row is the snapshot of data taken on each reporting period. The 'completion date type' column shows if the 'completion date' is either a forecast or actual date. Over time, a project would have one or more forecasted completion dates before it is actually completed. The 'variance' is the day difference between 'completion date' of each row and its prior reporting period. This dataset is part of the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Capital+Projects+Dashboard\">Capital Projects Dashboard</a>.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/95tx-snak","update_datemadepublic":"3/25/2024","update_updatefrequency":"Other","last_data_updated_date":"2025-12-26T15:00:23.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Tri-annually","legislativecompliance_removedrecords":"No","visits":"1338","downloads":"1581","row_count":"17888","column_count":"10","derived_view":false}
        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"p8i7-ix2s","name":"Low Income Housing Tax Credits Awarded by HPD: Project-Level (4% Awards)","description":"The Department of Housing Preservation and Development (HPD) receives a sub-allocation of 9% Low Income Housing Tax Credits and allocated its credits through one competitive round each calendar year.  It is also charged with allocating 4% Low Income Housing Tax Credits to projects receiving tax exempt bonds through New York City Housing Development Corporation.\r\nEach entry represents an allocation to a low income housing development project with households at or below 60% of Area Median Income.\r\n\r\nFor the Low Income Housing Tax Credits Awarded by HPD: Building-Level (4% Awards) dataset, please follow <a href=\"https://data.cityofnewyork.us/Housing-Development/Low-Income-Housing-Tax-Credits-Awarded-by-HPD-Buil/h9ws-rfd9\">this link</a>","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/p8i7-ix2s","update_datemadepublic":"4/18/2019","update_updatefrequency":"Annually","last_data_updated_date":"2025-11-13T21:01:01.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"2112","downloads":"3572","row_count":"241","column_count":"26","derived_view":false}
