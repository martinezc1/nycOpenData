        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"tzuk-eq2f","name":"Cool It! NYC 2020 - Spray Showers","description":"This dataset represents amenities activated as a part of Cool It! NYC, a Citywide plan to increase the amount of cooling features available to the public during heat emergencies, particularly in neighborhoods that face the dangers of high heat. This is part of the Cool It! NYC 2020 Data Collection, which includes the following amenities:\r\n  \r\nDrinking Fountains: Indicates whether a drinking fountain is activated, not yet activated, broken, or under construction. \r\n\r\nSpray Showers: Indicates whether a spray shower installed before July 2020 is activated, not yet activated, broken, or under construction. At this time, spray showers are mapped to the middle of parks. \r\n \r\nCooling Sites: To measure neighborhoods that are the most at risk during extreme heat, NYC Health and Columbia University developed the New York City Heat Vulnerability Index, or HVI. Parks used this data to direct new cooling elements to neighborhoods with HVIs of 4 and 5.\r\n \r\nData Dictionary: https://docs.google.com/spreadsheets/d/1GpXHX9p0e520LcAf3gstOKTQm64wxkdDUiACjhMwd9Q/edit?usp=sharing","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/tzuk-eq2f","update_updatefrequency":"Historical data","last_data_updated_date":"2020-11-27T17:12:50.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"2382","downloads":"1563","row_count":"755","column_count":"12","derived_view":false}
