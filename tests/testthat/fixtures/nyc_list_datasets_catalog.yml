        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"myei-c3fa","name":"DOF: Cooperative Comparable Rental Income (Citywide)","description":"The Department of Finance (DOF) is required by NY State law to value condominiums or cooperatives as if they were residential rental apartment buildings. DOF uses income information from rental properties similar in physical features and location to the condominiums or cooperatives. DOF applies this income data to the condominium or cooperative and determine its value in the same way DOF values rental apartment buildings.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/myei-c3fa","update_datemadepublic":"4/29/2019","update_updatefrequency":"Annually","last_data_updated_date":"2023-06-13T22:14:17.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"4508","downloads":"3894","row_count":"49260","column_count":"60","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office for Economic Opportunity","uid":"r2np-vamf","name":"Performance Metrics for Workforce Development Programs","description":"<p style=\"padding-bottom:10px\"> The report contains thirteen (13) performance metrics for City's workforce development programs. Each metric can be breakdown by three demographic types (gender, race/ethnicity, and age group) and the program target population (e.g., youth and young adults, NYCHA communities) as well.</p>\n\n<p style=\"padding-bottom:10px\">This report is a key output of an integrated data system that collects, integrates, and generates disaggregated data by Mayor's Office for Economic Opportunity (NYC Opportunity). Currently, the report is generated by the integrated database incorporating data from 18 workforce development programs managed by 5 City agencies.</p>\n\n<p style=\"padding-bottom:10px\">There has been no single \"workforce development system\" in the City of New York. Instead, many discrete public agencies directly manage or fund local partners to deliver a range of different services, sometimes tailored to specific populations. As a result, program data have historically been fragmented as well, making it challenging to develop insights based on a comprehensive picture. To overcome it, NYC Opportunity collects data from 5 City agencies and builds the integrated database, and it begins to build a complete picture of how participants move through the system onto a career pathway.</p>\n\n<p style=\"padding-bottom:10px\">Each row represents a count of unique individuals for a specific performance metric, program target population, a specific demographic group, and a specific period. For example, if the Metric Value is 2000 with Clients Served (Metric Name), NYCHA Communities (Program Target Population), Asian (Subgroup), and 2019 (Period), you can say that \"In 2019, 2,000 Asian individuals participated programs targeting NYCHA communities. </p>\n\n<p style=\"padding-bottom:10px\">Please refer to the Workforce Data Portal for further data guidance (https://workforcedata.nyc.gov/en/data-guidance), and interactive visualizations for this report (https://workforcedata.nyc.gov/en/common-metrics).</p>","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/r2np-vamf","update_updatefrequency":"Quarterly","last_data_updated_date":"2022-02-18T21:07:15.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"No","visits":"1776","downloads":"1126","row_count":"7891","column_count":"7","derived_view":false}
