        ,{"datasetinformation_agency":"Mayor's Office of Management & Budget (OMB)","uid":"dpq6-sy7w","name":"NYC Climate Budgeting Report: Resiliency Exposure Inventory","description":"The Resiliency Exposure Inventory is an index that evaluates the levels of climate adaptation capacity across neighborhoods in New York City. There are many factors that contribute to a location's resiliency to various threats - this analysis takes a holistic view, combining and analyzing datasets to compare and contrast strategies to become more resilient to the threats of outdoor heat, indoor heat, and coastal flooding. Higher scores indicate greater adaptation levels, and each neighborhood's score is relative to other neighborhoods; a neighborhood with the highest score is assessed to have the greatest relative level of adaptation measures, but overall adaptation can always be improved. This tool was developed to provide a unified way to view levels of adaptive capacity across locations, specifically neighborhoods (NTAs). OMB developed this baseline inventory of the city's existing resiliency measures based on a suite of relevant metrics, or Key Performance Indicators (KPIs). More than 30 unique KPIs are grouped into Categories, which represent adaptation strategies. The Inventory does not replace or conflict with existing efforts or data. It seeks to measure factors and efforts that reduce exposure (increase adaptive capacity) to climate threats, which would leave fewer people, areas, or assets at risk despite varying levels of threat and vulnerability.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/dpq6-sy7w","update_datemadepublic":"09/30/2025","update_updatefrequency":"Annually","last_data_updated_date":"2025-05-20T18:47:20.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_conta