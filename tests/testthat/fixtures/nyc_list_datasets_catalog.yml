        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"ete7-a5jd","name":"Housing Database Project Level Files (Map)","description":"The NYC Department of City Planning’s (DCP) Housing Database contains all NYC Department of Buildings (DOB)-approved housing construction and demolition jobs filed or completed in NYC since January 1, 2010. It includes all three construction job types that add or remove residential units: new buildings, major alterations, and demolitions, and can be used to determine the change in legal housing units across time and space. Records in the Housing Database are geocoded to the greatest level of precision possible, subject to numerous quality assurance and control checks, recoded for usability, and joined to other housing data sources relevant to city planners and analysts.\r\n\r\nThere are two versions of the project level Housing Database:\r\n1) HousingDB_post2010 - all active and completed jobs\r\n2) HousingDB_post2010_inactive_included - all active, completed jobs and inactive jobs (includes withdrawn, stalled, or duplicate jobs)\r\n\r\nAdditional documentation is available at:\r\nhttps://github.com/NYCPlanning/data-engineering/tree/main/products/developments","type":"map","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/ete7-a5jd","update_datemadepublic":"5/21/2024","update_updatefrequency":"Every 6 months","last_data_updated_date":"2026-03-16T17:09:35.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"No","visits":"771","downloads":"1","parent_uid":"br6q-ssj3","derived_view":true}
