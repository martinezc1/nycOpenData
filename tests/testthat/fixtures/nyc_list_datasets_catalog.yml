        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"5tgd-xk3z","name":"Hepatitis B & C Surveillance Registry","description":"Case counts of people newly reported with Chronic Hepatitis B and C. This surveillance data includes all confirmed and probable cases. NYC Heath Code §11.03(a) and §13.03(b) require that clinical laboratories electronically report positive hepatitis B and hepatitis C test results, as well as negative results for hepatitis B DNA and hepatitis C RNA. \t\t\t\n</br>\t\nThe Health Department often receives more than one report for each person with chronic hepatitis B and hepatitis C and uses automatic de-duplication methods to identify repeat reports based on name, date of birth, and other information. Only the first report is counted in the data presented here.\t\t\t\n</br>\nEach year, the Health Department monitors the number of people with newly reported hepatitis B and C infections in NYC by releasing Annual Reports. The Health Department uses these data to describe trends over time and across groups, prevent new infections, and promote linkage to care and treatment. Annual reports released by the Viral Hepatitis Program in the NYC Health Department can be found here: <a href=\"https://www.nyc.gov/site/doh/data/data-publications/hepatitis-abc-surveillance-data.page\" target=_blank>https://www.nyc.gov/site/doh/data/data-publications/hepatitis-abc-surveillance-data.page</a>","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/5tgd-xk3z","update_updatefrequency":"Annually","last_data_updated_date":"2024-12-03T21:11:38.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"548","downloads":"392","row_count":"1191","column_count":"6","derived_view":false}
