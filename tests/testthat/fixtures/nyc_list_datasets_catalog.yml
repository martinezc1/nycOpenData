        ,{"datasetinformation_agency":"Business Integrity Commission (BIC)","uid":"867j-5pgi","name":"Trade Waste Hauler Licensees","description":"Companies listed as of the most recent export date have been issued trade waste removal licenses by the Business Integrity Commission and, therefore, are authorized to collect and remove all types of trade waste covered by Local Law 42 of 1996.\r\n\r\nThis data is collected on the entities that apply with the commission to operate as Licensees. \r\n\r\nEach record represents an entity that is approved to operate in the City of New York by the Commission. \r\n\r\nThe  Application Type field denotes the class of application 'License'  noting the type of applicant which is a Licensee. They are able to pickup all trade waste from various businesses throughout the city.\r\n\r\nThe BIC Number field is unique to every company that applies to the Commission.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/867j-5pgi","update_datemadepublic":"4/4/2017","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-23T19:41:19.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"76261","downloads":"11756","row_count":"676959","column_count":"27","derived_view":false}
