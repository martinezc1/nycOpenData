        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"qcru-xhuq","name":"Inclusionary Housing Floor Area Generated","description":"The Inclusionary Housing Program is designed to preserve and promote affordable housing within neighborhoods where zoning has been modified to encourage new development.  The Voluntary Inclusionary Housing program, enacted in 1987, enables a development to receive a density bonus in return for the new construction, substantial rehabilitation, or preservation of permanently affordable housing.  The Inclusionary Housing Floor Area Generated table provides information on the IH floor area generated by generating sites in the program.\r\nThe Voluntary Inclusionary Housing (VIH) open data is published in four tables. Please see the documentation for more information on how these four tables relate.\r\n\r\nFor a complete list of Inclusionary Housing datasets, please follow <a href=\"https://data.cityofnewyork.us/browse?q=HPD%20Inclusionary%20Housing&sortBy=relevance\">this link</a>.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/qcru-xhuq","update_datemadepublic":"12/7/2018","update_updatefrequency":"Annually","last_data_updated_date":"2019-09-24T17:23:28.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"1155","downloads":"1165","row_count":"293","column_count":"3","derived_view":false}
        ,{"datasetinformation_agency":"Office of the Comptroller (COMPTROLLER)","uid":"nekg-b6tw","name":"Published Audit List","description":"List of published audits performed by the Comptroller's Audit Bureau.\r\n\r\nThis data set provides a list of published audits conducted by the Comptroller's Audit Bureau. The audits listed here can be requested by filing a Freedom of Information Act request with the Comptroller or accessed and downloaded through the Comptroller's website (https://comptroller.nyc.gov/reports/?fwp_type=audit).","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/nekg-b6tw","update_datemadepublic":"12/12/2017","update_updatefrequency":"Annually","last_data_updated_date":"2025-03-31T12:56:22.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1223","downloads":"1323","row_count":"7826","column_count":"5","derived_view":false}
        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"mhst-xhix","name":"POSSESSION_HOOK","description":"This point-based spatial data indicates the location and type of possession hooks in the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Department+of+Finance+Digital+Tax+Map&sortBy=relevance&page=1&pageSize=20\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map Collection</a>.\n\n• <strong>Updates:</strong> Data is extracted from DOF’s internal system on the last Friday of each month and refreshed on ArcGIS Online on the 1st. The online map always shows the most recent version.\n\n• <strong>Accessing the Data:</strong>  \n  • <strong>Digital Tax Map on NYC Open Data:</strong> See the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Department+of+Finance+Digital+Tax+Map&sortBy=relevance&page=1&pageSize=20\" target=\"_blank\" rel=\"noreferrer\">complete collection</a>.  \n  • <strong>Individual layers:</strong> Downloadable from the <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/ArcGIS/rest/services/DTM_ETL_DAILY_view/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map Feature Server</a>.  \n  • <strong>Complete source:</strong> Available through the <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_A/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map service</a>, which always points to the latest monthly release.\n\n<strong>Note:</strong> To ensure reliability, the Tax Map alternates between <em>Set A</em> and <em>Set B</em> each month. If one set has issues, the previous month’s copy remains online. Both sets are kept about a month apart and are available for download:  \n    &nbsp;&nbsp;&nbsp;&nbsp;• <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_A/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Set A link</a>  \n    &nbsp;&nbsp;&nbsp;&nbsp;• <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_B/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Set B link</a>\n\n• <strong>Digital Alteration Book (DAB):</strong> The DAB is the official log of map changes—such as new lots, merges, or boundary shifts—providing a clear record of how the Tax Map evolves. It is available through the <a href=\"https://propertyinformationportal.nyc.gov/\" target=\"_blank\" rel=\"noreferrer\">Property Information Portal</a>.\n\n<b>Disclaimer:</b>  \nThis dataset reflects formal applications submitted to DOF but may not reflect the latest changes in other City systems (e.g., exemptions or buildings data). It is provided for informational purposes only and is not guaranteed to be accurate as of today’s date.","type":"map","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/mhst-xhix","update_updatefrequency":"Daily","last_data_updated_date":"2026-02-02T07:33:43.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"Yes","visits":"64","downloads":"0","parent_uid":"ce23-cck4","derived_view":true}
