        ,{"datasetinformation_agency":"Mayor's Office of Operations (OPS)","uid":"3m3d-zzwn","name":"Language Access Secret Shopper (LASS) Ratings","description":"This dataset shows the work of the Language Access Secret Shopper (LASS) program from 2014 onward (though the LASS program did not run in 2020 and 2021 due to the COVID-19 pandemic). The LASS program assigns secret shoppers to visit more than 200 of New York City’s service centers to assess how well the service centers provide services to customers with Limited English Proficiency (LEP). As used in this dataset, LEP individuals do not speak English as their primary language and have a limited ability to read, speak, write, or understand English. \nAdditional information is available at https://www.nyc.gov/site/operations/performance/language-access-secret-shopper-program.page#:~:text=Started%20in%202010%2C%20LASS%20secret,and%20highlight%20exceptional%20customer%20service.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/3m3d-zzwn","update_datemadepublic":"5/1/2024","update_updatefrequency":"Annually","last_data_updated_date":"2024-12-16T16:19:08.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1021","downloads":"2752","row_count":"1231","column_count":"25","derived_view":false}
