        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"gs9u-q4vv","name":"DEP Green Infrastructure Map (Point Layer)","description":"This dataset contains the locations and detailed information of green infrastructure practices in NYC neighborhoods built primarily through NYC Green Infrastructure Program initiatives. Green infrastructure (GI) collects stormwater from streets, sidewalks, and other hard surfaces before it can enter the sewer system or cause local flooding. The GI practice data contained in this dataset includes the location, program area, status, and type of GI. This dataset is updated by the NYC Department of Environmental Protection on a monthly basis. \n\nThis layer is part of a larger Green Infrastructure dataset. You can download the full dataset and the data dictionary below under “Attachments”.\n\nSource Data: <a href=\"https://www.nyc.gov/dep/gimap\">DEP Green Infrastructure Program Map</a>","type":"map","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/gs9u-q4vv","update_datemadepublic":"10/17/2017","update_updatefrequency":"Monthly","last_data_updated_date":"2025-10-02T14:30:20.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"N/A","visits":"832","downloads":"4","parent_uid":"df32-vzax","derived_view":true}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"pchn-eaxn","name":"2016 Public Data File Parent","description":"2016 NYC School Survey parent data for all schools\r\nTo understand the perceptions of families, students, and teachers regarding their school.  School leaders use feedback from the survey to reflect and make improvements to schools and programs. Also, results from the survey used to help measure school quality. \r\nEach year, all parents, teachers, and students in grades 6-12 take the NYC School Survey. The survey is aligned to the DOE's Framework for Great Schools. It is designed to collect important information about each school's ability to support student success.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/pchn-eaxn","update_datemadepublic":"12/21/2018","update_updatefrequency":"Historical data","last_data_updated_date":"2018-12-21T15:33:04.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"567","downloads":"1344","row_count":"3254","column_count":"5","derived_view":false}
        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"by9k-vhck","name":"Tree Canopy Change (2010 - 2017)","description":"A 6-in resolution tree canopy change (2010 - 2017) dataset derived from the 2017 Light Detection and Ranging (LiDAR) data capture. This dataset represents a \"top-down\" mapping perspective and all tree polygons are classed as: (1) No Change, (2) Gain, (3) Loss. No change indicates that this portion of the canopy has undergone no modifications during the time period. Gain indicates that new tree canopy has appeared during the time period. Loss indicates that this portion of the tree canopy was removed during the time period.\n\nTo learn more about this dataset, visit the interactive \"Understanding the 2017 New York City LiDAR Capture\" Story Map -- https://maps.nyc.gov/lidar/2017/\nPlease see the following link for additional documentation on this dataset -- https://github.com/CityOfNewYork/nyc-geo-metadata/blob/master/Metadata/Metadata_TreeCanopyChange.md","type":"file","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/by9k-vhck","update_datemadepublic":"12/12/2018","update_updatefrequency":"As needed","last_data_updated_date":"2018-12-07T19:12:16.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"8535","downloads":"2390","derived_view":false}
        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"gaq9-z3hz","name":"Recycling Diversion and Capture Rates","description":"For each Community District, its Recycling Diversion rate (percentage of total municipal solid waste collected by the Department of Sanitation that is disposed of by recycling) and Capture Rate (percentage of total Paper or Metal/Glass/Plastic in the waste stream that is disposed of by recycling). For more information about DSNY's recycling programs, see: https://www1.nyc.gov/assets/dsny/site/services/recycling. Capture rate is the amount of materials set out for residential recycling collection as a percentage of designated recyclable materials in both recycling and refuse streams. This ratio measures how much of the targeted materials are actually being recycled, which is a measure of how successfully such materials are recycled. Please note that since 2013, DSNY no longer uses capture rate information. For information on what is in NYC's waste, see: http://www1.nyc.gov/assets/dsny/site/resources/reports/waste-characterization.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/gaq9-z3hz","update_datemadepublic":"10/21/2011","update_updatefrequency":"Monthly","last_data_updated_date":"2019-07-24T18:28:28.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"23197","downloads":"11735","row_count":"2832","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"53m8-jdtg","name":"Parks Concessions","description":"NYC Parks uses a Commercial Off-The-Shelf database for maintaining its concession-related data.  In its raw form, the Parks data within the Yardi Voyager database has a convoluted structure, the majority of which is not being used by Parks to store any data. In an effort to make the data more user friendly, the multitude of tables used by the source database have been distilled into two that contain the essential information for a concessions database. One table (Parks Concessions) represents the concession asset – the place and thing which is being operated – and who holds the contract.  The other (Parks Concession Transactions) represents transactions between those contract holders and NYC Parks.  Parks Concession Transactions is here https://data.cityofnewyork.us/City-Government/Parks-Concession-Transactions/vmkw-p55f and can be joined to Parks Concessions using  PersonID, PropertyID and UnitID.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/53m8-jdtg","update_updatefrequency":"Monthly","last_data_updated_date":"2026-01-18T14:33:16.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2152","downloads":"2596","row_count":"4429","column_count":"59","derived_view":false}
        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"s52s-navf","name":"Automations Dashboard","description":"Open Data is most useful when it’s up-to-date. Over the past eight years, NYC Open Data has invested in dataset automation, so that data is updated without human intervention. \r\nAs the demand for City data continues to increase, and new technologies continue to surface, our goal is to automate more data, at a faster rate. In the last few months we have been testing tools and processes that should bring us closer to achieving this goal. \r\nThese efforts will lead to more reliable data, while allowing the Open Data Team and agency staff to work more efficiently. We plan to invest more time into testing new methods of automation, and have released a this dataset so anyone can track our progress on automations.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/s52s-navf","update_datemadepublic":"9/15/2019","update_updatefrequency":"As needed","last_data_updated_date":"2020-03-09T20:47:39.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"862","downloads":"2027","row_count":"21","column_count":"6","derived_view":false}
