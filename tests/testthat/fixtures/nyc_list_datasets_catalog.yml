        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"jsrs-ggnx","name":"E-Designations","description":"This data set contains information and locations of (E) Designations, including CEQR\nEnvironment Requirements (Table 1) and CEQR Restrictive Declarations (Table 2), in\nAppendix C of the Zoning Resolution. An (E) Designation provides notice of the\npresence of an environmental requirement pertaining to potential hazardous materials\ncontamination, high ambient noise levels or air emission concerns on a particular\ntax lot.\n\n\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/e-designations\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 20251106","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/jsrs-ggnx","update_datemadepublic":"06/13/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2025-11-26T18:49:58.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"Yes","visits":"999","downloads":"1353","row_count":"11199","column_count":"10","derived_view":false}
