        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"kwk4-6u9e","name":"2017 NYC School Survey","description":"The Survey helps school leaders understand what key members of the school community say about the learning environment at each school. The information captured by the survey is designed to support a dialogue among all members of the school community about how to make the school a better place to learn.  \r\n\r\nSurvey results provide insight into a school's learning environment and contribute a measure of diversification that goes beyond test scores on the Progress Report. NYC School Survey results contribute 10% - 15% of a school's Progress Report grade (the exact contribution to the Progress Report is dependent on school type). Survey questions assess the community's opinions on academic expectations, communication, engagement, and safety and respect. School leaders can use survey results to better understand their own school's strengths and target areas for improvement.","type":"href","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/kwk4-6u9e","update_datemadepublic":"3/25/2013","update_updatefrequency":"Annually","last_data_updated_date":"2013-03-22T19:47:53.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"N/A","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"7238","downloads":"363","derived_view":false}
