        ,{"datasetinformation_agency":"Mayor's Office of Management & Budget (OMB)","uid":"7n9x-tbtd","name":"NYC Climate Budgeting Report: Resiliency Exposure Forecast - Coastal Flooding","description":"The Resiliency Exposure Forecast for Coastal Flooding serves as an effort to evaluate the scope of planned adaption initiatives and their potential to reduce exposure to storm-surge and tidal flooding in future decades. The Coastal Flood Forecast describes the amount of buildings at risk (buildings in areas likely to flood) using spatial analysis. This is broken into two main subsections: 1) a Control Scenario to determine how many buildings will be at risk of flooding in the absence of large-scale coastal flood protection projects at points in the future, and 2) a Planned Action Scenario that to determine how many buildings will no longer be at risk (and how many will remain at risk) if planned infrastructure projects are built. This dataset defines the Planned Action as select neighborhood-scale coastal flood protection projects. These are typically projects that create stationary or deplorable barriers to protect areas upland of barriers that stop flood waters from coming onto land. They can include methods such as levees, berms and floodwalls. When these projects are constructed with the intent to protect a flood hazard area behind them rather than just a specific asset, this dataset will consider them neighborhood-scale. Neighborhoods are assessed for their risk to the 100-year floodplain and high-tide flooding areas.\nFor more information on the components of the data set, please visit OMB's Technical Appendix for the FY 2026 Climate Budgeting Publication. https://www.nyc.gov/assets/omb/downloads/pdf/exec25/exec25-nyccbta.pdf","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/7n9x-tbtd","update_datemadepublic":"09/30/2025","update_updatefrequency":"Annually","last_data_upda