        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"a7bv-5698","name":"DSNY Commercial Waste Zones (Map)","description":"While the NYC Department of Sanitation (DSNY) collects trash, recycling, and compostable material from residents, businesses are required to hire private carters to collect their waste. Following significant planning, analysis, and contract development, DSNY is overhauling the City's commercial waste industry mandated under Local Law 199 of 2019 to make our City cleaner and safer. Commercial Waste Zones create a regulatory framework that establishes new safety standards for workers in the commercial carting industry, improving service for businesses, and reducing harmful emissions from waste hauling vehicles. DSNY has broken the five boroughs into 20 Commercial Waste Zones and authorized three carters to offer curbside services in each zone. For more information, see:\n\nhttps://www.nyc.gov/site/dsny/businesses/commercial-waste-zones.page","type":"map","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/a7bv-5698","update_updatefrequency":"As needed","last_data_updated_date":"2026-03-24T10:00:06.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"7725","downloads":"4","parent_uid":"8ev8-jjxq","derived_view":true}
