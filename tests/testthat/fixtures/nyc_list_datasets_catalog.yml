        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"qfs9-xn8t","name":"NYCDCP Manhattan Bike Counts - On Street Weekday","description":"The Transportation Division of the New York City Department of City Planning (NYCDCP) has performed annual bike counts in Manhattan since 1999. The counts have been conducted along designated bicycle routes at 10 on-street and 5 off-street locations during the fall season. These locations have remained generally consistent. The data collected includes cyclist/user volumes, helmet usage, use of bike lane, gender, etc. The bike counts data can offer insights into the overall trends in user demographics and travel patterns over time.\r\n\r\nAll previously released versions of this data are available at <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BYTES of the BIG APPLE- Archive</a>","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/qfs9-xn8t","update_datemadepublic":"9/12/2016","update_updatefrequency":"Historical data","last_data_updated_date":"2016-09-12T20:52:01.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"5013","downloads":"2588","row_count":"108","column_count":"26","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"scjj-6yaf","name":"Bikes in Buildings Requests","description":"The Bicycle Access to Office Buildings Law aims to increase bicycle commuting by providing cyclists with the opportunity to securely park their bicycles in or close to their workplaces. The law allows tenants to request for access from landlords in commercial buildings, and for DOT to monitor the requests for access and their status.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/scjj-6yaf","update_datemadepublic":"12/27/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-03T18:04:38.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"3009","downloads":"7658","row_count":"2365","column_count":"54","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office of Climate and Environmental Justice (MOCEJ)","uid":"4vym-qrg3","name":"New York City's Flood Vulnerability Index Map","description":"The Flood Vulnerability Index (FVI) assesses the distribution of vulnerability to flooding across NYC in order to guide flood resilience policies and programs. Vulnerability contains three components: exposure to a hazard, susceptibility to harm from the exposure, and capacity to recover (Cutter et al., 2009). There are six hazard-specific FVIs, one for each of the six different flood hazard scenarios, which include current and two future storm surge scenarios and current and two future tidal flooding scenarios. Exposures vary for different types of flooding and different scenarios within each flood type.\r\n\r\nEach FVI consists of two component sub-indices: an exposure index and an index that reflects susceptibility to harm and capacity to recover. The exposure index is different in each FVI in order to capture the different exposures to each of the flood hazard scenarios. The sub-index that reflects susceptibility to harm and capacity to recover -- the Flood Susceptibility to Harm and Recovery Index (FSHRI) -- is the same for each FVI. It aggregates 12 socio-economic indicators correlated with various types of hardships that people may suffer due to flooding and different dimensions of ability to recover.\r\n\r\nFor additional information, please visit <a href=\"https://climate.cityofnewyork.us/initiatives/vulnerability-impacts-and-adaptation-analysis/\">this link</a>.","type":"map","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/4vym-qrg3","update_datemadepublic":"4/11/2024","update_updatefrequency":"As needed","last_data_updated_date":"2024-03-06T19:39:32.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"14483","downloads":"1","parent_uid":"mrjc-v9pm","derived_view":true}
