        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"bpea-2i5q","name":"DSNY Waste Characterization 2023 - Main Sort Results","description":"The NYC Department of Sanitation (DSNY) conducted the 2023 Waste Characterization Study in the Fall of 2022 and Spring of 2023. The 2023 Study determined the waste composition of several major sources from which DSNY collects: residential households, New York City Public Schools, the New York City Housing Authority (NYCHA), and on-street litter baskets. Waste from these generators was categorized into 96 main material categories, which are provided in this dataset by residential strata and time period. Results are presented in absolute terms as the quantity by weight of each material type, per stream. The quantity of each material is calculated by applying the percent composition to the total quantity of specified DSNY collections.","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/bpea-2i5q","update_datemadepublic":"5/2/2024","update_updatefrequency":"Historical data","last_data_updated_date":"2024-04-24T18:19:39.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"N/A","visits":"3017","downloads":"953","row_count":"2112","column_count":"11","derived_view":false}
