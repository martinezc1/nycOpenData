        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"wwcv-s7e7","name":"Quartersection_ZoningMapIndex","description":"Shapefile of zoning quartersection map index. Grid to determine which zoning quartersection map relates to specific areas of NYC.\r\n\r\nA sectional index grid to determine which Zoning Map refers to specific areas of New York City. Zoning maps show the boundaries of zoning districts throughout the city. The maps are regularly updated after the City Planning Commission and the City Council have approved proposed zoning changes. The set of 126 maps, which are part of the Zoning Resolution, are displayed in 35 sections. Each section is identified by a number from 1 to 35 and is further divided into one to four quarters, each identified by a letter a, b, c or d (map 8d or 33c for example). Each map covers an area of approximately 8,000 feet (north/south) by 12,500 feet (east/west).\r\n\r\nAll previously released versions of this data are available at <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BYTES of the BIG APPLE- Archive</a>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/wwcv-s7e7","update_datemadepublic":"9/12/2016","update_updatefrequency":"As needed","last_data_updated_date":"2019-09-10T14:50:17.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"516","downloads":"2132","row_count":"131","column_count":"14","derived_view":false}
