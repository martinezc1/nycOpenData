        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"kcfe-uypz","name":"Tree Contract Work Details","description":"Tree Contract Work Details contains information related to work performed on specific tree work contracts. This dataset can be joined to the Forestry Work Orders dataset (https://data.cityofnewyork.us/Environment/Forestry-Work-Orders/bdjm-n7q4) by joining work_order_id from Tree Contract Work Details to OBJECTID from Forestry Work Orders. There are many work_order_ids per single contract_number. Not all work orders in Forestry Work Orders are represented in this dataset because it is only used to track work on specific contracts.\n\nData Dictionary found here: https://docs.google.com/spreadsheets/d/1rAQL_d8yQ5axRIGl9vLxpr73rDmQUZ23VKQC8QQWIYI/edit?usp=sharing","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/kcfe-uypz","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T13:57:45.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1727","downloads":"2262","row_count":"325276","column_count":"11","derived_view":false}
