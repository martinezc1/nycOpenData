        ,{"datasetinformation_agency":"City Council (NYCC)","uid":"t474-a92g","name":"City Council Capital Budget","description":"The dataset reflects funded applications for capital funding allocated by the New York City Council.\n\nEach year, Members of the Council allocate funds to not-for-profit organizations for capital projects that will continue to serve a City purpose (i.e. \"limited to the purposes set forth in the New York City Charter\" according to Directive 10 from the Office of the Comptroller) for the project's entire useful life. These projects can involve property (acquisition, construction or reconstruction), or moveable property (equipment, furniture, or vehicles).\n\nRecipients of capital funding must:\n• hold not for profit status;\n• must already hold contracts with the city, with different contract requirements depending on funding type;\n• use the grant for stated capital investments at the location of the application.\n\nOrganizations must submit their Request Forms online via CapGrants.\n\nFor information on the process see: https://www.nyc.gov/site/capitalgrants/guidelines/guidelines.page\n\nFor Directive 10 from the Office of the Comptroller see: https://www.nyc.gov/assets/ddc/downloads/not-for-profit/Directive-10-Charges-to-the-Capital-Projects-Fund-Final%20-%20June%202019.pdf\n\nRecipients of capital funding must:\n• hold not for profit status;\n• must already hold contracts with the city, with different contract requirements depending on funding type;\n• use the grant for stated capital investments at the location of the application.\n\nOrganizations must submit their Request Forms online via CapGrants.\n\nFor more information on the process see: hhttps://www.nyc.gov/site/capitalgrants/guidelines/guidelines.page","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/t474-a92g","update_datemadepublic":"2/5/2025","update_updatefrequency":"Annually","last_data_updated_date":"2025-12-17T20:39:02.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"Yes","visits":"1573","downloads":"19064","row_count":"11503","column_count":"10","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"9n6h-pt9g","name":"Speed Reducer Tracking System (SRTS)","description":"This dataset contains information regarding placements of speed humps and speed cushions within the five boroughs. \r\n\r\nSpeed humps are traffic calming devices intended to slow traffic speeds on low volume, low speed roads. Speed humps are 3–4 inches high and 14–20 feet wide, with a ramp length of 3–6 feet, depending on target speed. Speed cushions are either speed humps or speed tables that include wheel cutouts to allow large vehicles to pass unaffected, while reducing passenger car speeds. They can be offset to allow unimpeded passage by emergency vehicles and are typically used on key emergency response routes. Speed humps are generally installed on local residential (non-truck route, non-bus route locations), while speed cushions are generally installed on designated truck route locations and bus route locations.\r\n\r\nThe requests for speed hump/cushion come through Commissioner Correspondences or from other sources and entered manually into the Speed Reducer Tracking System. The Speed Reducer Tracking System then tracks the results of request to determine whether a speed hump/cushion is feasible for installation.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/9n6h-pt9g","update_datemadepublic":"12/20/2019","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-24T06:00:44.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"4886","downloads":"4212","row_count":"58500","column_count":"43","derived_view":false}
        ,{"datasetinformation_agency":"Department of Small Business Services (SBS)","uid":"9a87-6m4x","name":"Industrial & Commercial Abatement Program (ICAP) Businesses that received EO50 certificate of approval from SBS","description":"This dataset contains a list of ICAP businesses that have successfully complied with Equal Employment Opportunity (EO 50) requirements and have received EO50 certificate of approval from the NYC Department of Small Business Services (SBS). Executive Order No. 50 was established in 1980 during Mayor Koch's tenure. It mandates that all contractors adhere to equal employment principles, explicitly prohibiting discriminatory hiring practices. This order safeguards individuals from discrimination based on ten protected categories: race, sex, creed, age, color, disability, national origin, marital status, sexual orientation, and citizenship status.","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/9a87-6m4x","update_datemadepublic":"6/20/2017","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-02-02T16:27:27.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"31869","downloads":"12101","row_count":"724","column_count":"16","derived_view":false}
