        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"gnyq-kf2y","name":"Permitted Nonpotable Wells","description":"A permit is required to install, drill, replace or operate a nonpotable water well in New York City used to supply water to any buildings or affiliated structures. This dataset contains a list of current permits for nonpotable water wells located in New York City.\n\nAll nonpotable water wells located in New York City need a permit to operate. Data is collected to track permit information of currently permitted nonpotable wells in New York City. \n\nData is collected online through the permitting web application. \n\nEach record represents a permit record for all currently permitted nonpotable wells in New York City. \n\nThis data can be used to verify the location and permit expiration date of currently permitted nonpotable wells in New York City.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/gnyq-kf2y","update_updatefrequency":"Annually","last_data_updated_date":"2025-03-25T15:43:01.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"1108","downloads":"1872","row_count":"2720","column_count":"14","derived_view":false}
