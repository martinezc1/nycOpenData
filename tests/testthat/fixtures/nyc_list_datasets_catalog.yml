        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"h2bn-gu9k","name":"Cool It! NYC 2020 - Cooling Sites","description":"This dataset represents amenities activated as a part of Cool It! NYC, a Citywide plan to increase the amount of cooling features available to the public during heat emergencies, particularly in neighborhoods that face the dangers of high heat. This is part of the Cool It! NYC 2020 Data Collection, which includes the following amenities:\r\n  \r\nDrinking Fountains: Indicates whether a drinking fountain is activated, not yet activated, broken, or under construction. \r\n\r\nSpray Showers: Indicates whether a spray shower installed before July 2020 is activated, not yet activated, broken, or under construction. At this time, spray showers are mapped to the middle of parks. \r\n \r\nCooling Sites: To measure neighborhoods that are the most at risk during extreme heat, NYC Health and Columbia University developed the New York City Heat Vulnerability Index, or HVI. Parks used this data to direct new cooling elements to neighborhoods with HVIs of 4 and 5.\r\n \r\nData Dictionary: https://docs.google.com/spreadsheets/d/1GpXHX9p0e520LcAf3gstOKTQm64wxkdDUiACjhMwd9Q/edit?usp=sharing","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/h2bn-gu9k","update_updatefrequency":"Historical data","last_data_updated_date":"2023-05-24T16:22:09.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"7437","downloads":"2324","row_count":"271","column_count":"10","derived_view":false}
        ,{"datasetinformation_agency":"Human Resources Administration (HRA)","uid":"g6pg-qint","name":"Cash Assistance and SNAP Cases Rejections","description":"Cash Assistance and SNAP case rejections ordered by NYS Welfare Management System (WMS) rejection reason code. When a Cash Assistance or SNAP application is rejected, NYS Welfare Management System (WMS) records the reason for the rejection using a reason code. This file includes the count of all Cash Assistance and SNAP case rejections during the specified quarter and year, with the different NYS WMS rejection reason codes in the rows. Each record is one case which may include one or many recipients.\n\n<b>NOTE: </b>Because asterisks represent values between 1 and 10, users should not sum values across columns or rows to determine the total number of cases within a quarter.  Accurate totals are represented in the rows and columns labeled “Total”.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/g6pg-qint","update_datemadepublic":"7/11/2023","update_updatefrequency":"Quarterly","last_data_updated_date":"2025-06-02T20:22:20.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1741","downloads":"1114","row_count":"2207","column_count":"75","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"pfwf-dpwc","name":"2013 School Survey","description":"Every year, all parents, all teachers, and students take the NYC School Survey. The survey ranks among the largest surveys of any kind ever conducted nationally. \nSurvey results provide insight into a school's learning environment and contribute a measure of diversification that goes beyond test scores on the Progress Report. Survey questions assess the community's opinions on academic expectations, communication, engagement, and safety and respect. School leaders can use survey results to better understand their own school's strengths and target areas for improvement.","type":"file","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/pfwf-dpwc","update_datemadepublic":"05/03/2019","update_updatefrequency":"Historical data","last_data_updated_date":"2019-05-03T19:25:02.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"344","downloads":"388","derived_view":false}
        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"2v4z-66xt","name":"LION","description":"A single line street base map representing the city's streets and other linear geographic features, along with feature names and address ranges for each addressable street segment.  This dataset includes the Nodes file.  The Nodes file contains a point feature and unique NodeID for each node that exists in the LION file. The Node_StreetName.txt file lists the street names associated with those nodes. Most nodes, representing intersections, will have at least 2 street names associated in the Node_StreetName.txt file.\n\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/lion\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 26a","type":"file","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/2v4z-66xt","update_datemadepublic":"9/13/2021","update_updatefrequency":"Quarterly","last_data_updated_date":"2013-01-28T21:35:00.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"Yes","visits":"21952","downloads":"27803","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"da76-p95d","name":"Parking Meters - Citywide Rate Zones (Map)","description":"NYCDOT sets parking meter rates across the five boroughs to be reflective of individual neighborhood parking conditions such as land use, density, and parking demand. Individual rate zones are represented in this dataset by large geographic areas. NYCDOT provides this map for informational purpose only. Confirm the rate at the parking meter or on the ParkNYC app before paying and observe all posted signs.","type":"map","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/da76-p95d","update_datemadepublic":"6/5/2019","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:10:21.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"Yes","visits":"19547","downloads":"228","parent_uid":"f72k-2u3b","derived_view":true}
        ,{"datasetinformation_agency":"Mayor's Office of Climate and Environmental Justice (MOCEJ)","uid":"38ps-fnsg","name":"New York City Climate Projections: Extreme Events and Sea Level Rise","description":"This report includes updated changes in extreme events (e.g., hot days, days with heavy rainfall, heat waves) for the 2030s, 2050s and 2080s; and sea level rise projections for the 2030s, 2050s, 2080s, 2100 and 2150 for the New York City region, based on those developed for the IPCC 6th Assessment report. The sea level rise projections are based on the CMIP6 models and SSP framework, and also incorporate advances in process understanding, improved and lengthened observational records, and improved ice-sheet modeling.\n\nThe New York City Panel on Climate Change (NPCC) started in 2009 and was codified in Local Law 42 of 2012 with a mandate to provide an authoritative and actionable source of scientific information on future climate change and its potential impacts.\n\nThe Intergovernmental Panel on Climate Change (IPCC) is the United Nations body for assessing the science related to climate change.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/38ps-fnsg","update_datemadepublic":"2/22/2024","update_updatefrequency":"Every 3 years","last_data_updated_date":"2024-02-22T14:00:45.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"6592","downloads":"1968","row_count":"21","column_count":"16","derived_view":false}
