        ,{"datasetinformation_agency":"Department of Consumer and Worker Protection (DCWP)","uid":"r9ax-4va4","name":"Waiting List Applications for Midtown Core Zone Vending License","description":"A General Vendor license is required to sell, lease, or offer to sell or lease goods or services in a public place that is not a store. There is no limit on the number of licenses issued to veterans or their surviving spouses or domestic partners. The number of licenses issued to non-veterans is limited to 853.\n\nGeneral Vendors who hold the Citywide Specialized vending license (Yellow) or Midtown Core Zone vending license (Blue) can vend in certain restricted areas and have priority to locations over other vendors. These licenses are for veterans with a service-related disability. The number of Blue licenses is limited to 105. To be placed on the Blue License waiting list, General Vendor must hold a Yellow License.\n\nDCWP collects this data to maintain a priority waiting list of applicants for Midtown Core Zone vending license (Blue). When the number of Blue licenses is below 105, the highest priority number on the waiting list is contacted to be offered the opportunity to apply for a Blue license. If the applicant does not receive a Blue license, the next person on the waiting list is offered the opportunity to apply for a Blue license.","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/r9ax-4va4","update_datemadepublic":"9/7/2023","update_updatefrequency":"Monthly","last_data_updated_date":"2023-08-23T20:12:22.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"793","downloads":"1256","row_count":"439","column_count":"12","derived_view":false}
        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"jxyc-rxiv","name":"DOF: Cooperative Comparable Rental Income – Manhattan– FY 2010/2011","description":"The Department of Finance (DOF) is required by NY State law to value condominiums or cooperatives as if they were residential rental apartment buildings.   DOF uses income information from rental properties similar in physical features and location to the condominiums or cooperatives. DOF applies this income data to the condominium or cooperative and determine its value in the same way DOF values rental apartment buildings.\r\nUpdate Frequency: Annually","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/jxyc-rxiv","update_datemadepublic":"10/11/2011","update_updatefrequency":"Historical data","last_data_updated_date":"2017-09-16T18:00:39.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1242","downloads":"4781","row_count":"2645","column_count":"57","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"peyw-qepe","name":"2016-17 - 2020-21 End-of-Year Borough Attendance and Chronic Absenteeism Data","description":"Overall attendance data include students in Districts 1-32 and 75 (Special Education). Students in District 79 (Alternative Schools & Programs), charter schools, home schooling, and home and hospital instruction are excluded. Pre-K data do not include NYC Early Education Centers or District Pre-K Centers; therefore, Pre-K data are limited to those who attend K-12 schools that offer Pre-K. Transfer schools are included in citywide, borough, and district counts but removed from school-level files.\nAttendance is attributed to the school the student attended at the time. If a student attends multiple schools in a school year, the student will contribute data towards multiple schools.\nStarting in 2020-21, the NYC DOE transitioned to NYSED's definition of chronic absenteeism. Students are considered chronically absent if they have an attendance of 90 percent or less (i.e. students who are absent 10 percent or more of the total days). In order to be included in chronic absenteeism calculations, students must be enrolled for at least 10 days (regardless of whether present or absent) and must have been present for at least 1 day. The NYSED chronic absenteeism definition is applied to all prior years in the report.\nSchool-level chronic absenteeism data reflect chronic absenteeism at a particular school. In order to eliminate double-counting students in chronic absenteeism counts, calculations at the district, borough, and citywide levels include all attendance data that contribute to the given geographic category. For example, if a student was chronically absent at one school but not at another, the student would only be counted once in the citywide calculation. For this reason, chronic absenteeism counts will not align across files.\nAll demographic data are based on a student's most recent record in a given year.\nStudents With Disabilities (SWD) data do not include Pre-K students since Pre-K students are screened for IEPs only at the parents' request.\nEnglish language learner (ELL) data do not include Pre-K students since the New York State Education Department only begins administering assessments to be identified as an ELL in Kindergarten.\nOnly grades PK-12 are shown, but calculations for \"All Grades\" also include students missing a grade level, so PK-12 may not add up to \"All Grades\". \nData include students missing a gender, but are not shown due to small cell counts.\nData for Asian students include Native Hawaiian or Other Pacific Islanders . Multi-racial and Native American students, as well as students missing ethnicity/race data are included in the \"Other\" ethnicity category.\nIn order to comply with the Family Educational Rights and Privacy Act (FERPA) regulations on public reporting of education outcomes, rows with five or fewer students are suppressed, and have been replaced with an \"s\". Using total days of attendance as a proxy , rows with 900 or fewer total days are suppressed. In addition, other rows have been replaced with an \"s\" when they could reveal, through addition or subtraction, the underlying numbers that have been redacted. Chronic absenteeism values are suppressed, regardless of total days, if the number of students who contribute  at least 20 days is five or fewer. \nDue to the COVID-19 pandemic and resulting shift to remote learning in March 2020, 2019-20 attendance data was only available for September 2019 through March 13, 2020. Interactions data from the spring of 2020 are reported on a separate tab.\nInteractions were reported by schools during remote learning, from April 6 2020 through June 26 2020 (a total of 57 instructional days, excluding special professional development days of June 4 and June 9). Schools were required to indicate any student from their roster that did not have an interaction on a given day. Schools were able to define interactions in a way that made sense for their students and families. Definitions of an interaction included:\n• Student submission of an assignment or completion of an","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/peyw-qepe","update_datemadepublic":"4/5/2022","update_updatefrequency":"Historical data","last_data_updated_date":"2022-04-05T16:25:10.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"1400","downloads":"971","row_count":"375","column_count":"11","derived_view":false}
