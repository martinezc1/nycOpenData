        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"h9ws-rfd9","name":"Low Income Housing Tax Credits Awarded by HPD: Building-Level (4% Awards)","description":"The Department of Housing Preservation and Development (HPD) receives a sub-allocation of 9% Low Income Housing Tax Credits and allocated its credits through one competitive round each calendar year.  It is also charged with allocating 4% Low Income Housing Tax Credits to projects receiving tax exempt bonds through New York City Housing Development Corporation.\r\nEach entry represents an allocation to a low income housing development project with households at or below 60% of Area Median Income.\r\n\r\nFor the Low Income Housing Tax Credits Awarded by HPD: Project-Level (4% Awards) dataset, please follow <a href=\"https://data.cityofnewyork.us/Housing-Development/Low-Income-Housing-Tax-Credits-Awarded-by-HPD-Proj/p8i7-ix2s\">this link</a>","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/h9ws-rfd9","update_datemadepublic":"04/18/2019","update_updatefrequency":"Annually","last_data_updated_date":"2025-11-13T21:02:08.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1614","downloads":"1818","row_count":"839","column_count":"3","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"tja3-yjvi","name":"Natural Turf Maintenance","description":"From May to mid-October, Parks performs routine natural turf maintenance across the city's parks. Natural turf is any lawn area consisting of non-synthetic grass that must be mowed on a regular basis. A park or park zone that includes sites with lawn areas large enough to require the use of mowing equipment is considered a 'turf site'. There can be multiple turf sites within a given park. There are three types of maintenance done at these sites: lawn mowing, trimming lawn edges, and blowing away clippings and debris that occurred during the mowing and trimming.\n\nAt the start of each day, crews receive an assignment designating which sites to visit and what work needs to be done at that site (in the data, this assignment is referred to as the \"\"assigned tasks\"\"). \n\nAt the conclusion of each site visit, a staff member is responsible for completing a survey that confirms what work was and was not completed. This data set is the compilation of those survey responses.\n\nExplore the <a href=\"https://docs.google.com/spreadsheets/d/1lwC4CSKo7OSITA8K-l6onyfq_MP_psIb44fdBRfPbps/edit?usp=sharing\">Data Dictionary</a>","type":"dataset","category":"Recreation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/tja3-yjvi","update_datemadepublic":"3/20/2025","update_updatefrequency":"Annually","last_data_updated_date":"2026-02-04T16:49:15.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"266","downloads":"588","row_count":"53325","column_count":"14","derived_view":false}
