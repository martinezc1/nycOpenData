        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"63ge-mke6","name":"2020 Census Tracts","description":"Census Tracts from the 2020 US Census for New York City clipped to the shoreline. These boundary files are derived from the US Census Bureau's TIGER project and have been geographically modified to fit the New York City base map. Because some census tracts are under water not all census tracts are contained in this file, only census tracts that are partially or totally located on land have been mapped in this file.\n\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/census-tracts\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 26a","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/63ge-mke6","update_datemadepublic":"9/13/2021","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-03-09T21:04:25.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"Yes","visits":"21056","downloads":"4965","row_count":"2325","column_count":"14","derived_view":false}
