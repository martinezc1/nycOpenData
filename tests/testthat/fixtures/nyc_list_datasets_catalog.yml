        ,{"datasetinformation_agency":"NYC Independent Budget Office (IBO)","uid":"sg72-pis5","name":"IBO Federal Stimulus Budget and Spending Tracker (ARPA and CRRSAA)","description":"This dataset contains budget and spending data for City Initiatives that use  American Rescue Plan Act of 2021 (ARPA) or Coronavirus Response and Relief Supplemental Appropriations Act of 2021 (CRRSAA) federal funds. Each row is a different \"Initiative Detailed\", which is IBO's understanding of the purpose of the funding. IBO developed seven categories of initiative to standardize the comparison of budgeted and spent amounts across agencies: \"Initiative Category\". The IBO definitions of these categories are below, in order of prioritization (e.g. if a budget code fits the definition of 2. COVID Response – Public Programs and 4. Programmatic Support, it is listed under 2). If readers require more detailed information on spending, the underlying data with the previous initiative names is available for download. \r\n\r\n1.\tCovid Response – City Operations: Spending to keep city agencies operating during the Covid pandemic, such as city employee leave for quarantining and vaccinations, air purifiers, personal protective equipment (PPE) for city employees, etc.\r\n2.\tCovid Response – Public Programs: Programs created to protect people in New York City from Covid-19.\r\n3.\tDirect Human Services: Public services provided to meet the financial, physical, or mental needs of New York City residents. This includes ongoing services for housing, food, addiction treatment, childcare, education, anti-poverty, etc. These services are either provided by the government or a nonprofit.\r\n4.\tProgrammatic Support: Funds used on temporary governmental programs. Note: this includes youth training and summer work programs because they are optional and extra-curricular, while public education and adult job training programs are direct human services.\r\n5.\tGovernment Operations: Federal funding supplemented lost revenue during the pandemic-related recession. These funds are for Other than Personal Spending, those administrative costs or public services provided in perpetuity (as opposed to services defined as Programmatic Support). \r\n6.\tPersonnel/Staffing: Federal funding supplemented lost revenue during the pandemic-related recession. These funds are for salaries and wages paid to city employees, often called “Personal Services.” Salaries and wages related to Covid response, temporary programs, and direct human services are excluded from this category.\r\n7.\tHiring & Attrition Management: Administrative costs related to managing the inflow and outflow of city employees.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/sg72-pis5","update_datemadepublic":"3/8/2023","update_updatefrequency":"Weekly","last_data_updated_date":"2023-10-05T14:32:53.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Weekly","legislativecompliance_removedrecords":"No","visits":"1330","downloads":"1388","row_count":"299","column_count":"12","derived_view":false}
