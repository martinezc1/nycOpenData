        ,{"datasetinformation_agency":"Mayor's Office of Management & Budget (OMB)","uid":"vn4m-mk4t","name":"Register of Community Board Budget Requests","description":"This dataset reports each of the projects and programs requested by the City’s 59 community boards. The Register is the charter mandated product of a dynamic and cyclical budget process for the 59 community boards. The community boards consult with agencies on the capital and expense needs of the district. After consulting, each community board develops and votes separate priorities for up to 40 capital and 25 expense budget requests which the agencies review and respond to in the Register of Community Board Requests for the Preliminary Budget in January. The Mayor’s Office of Management and Budget (OMB) reviews these same budget requests and updates the responses for the Executive and Adopted Budgets.  This dataset is updated three times per year after publication of the Preliminary, Executive and Adopted Budget, usually in January, April and June respectively.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/vn4m-mk4t","update_datemadepublic":"05/03/2018","update_updatefrequency":"Other","last_data_updated_date":"2026-02-24T14:56:30.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Tri-annually","legislativecompliance_removedrecords":"No","visits":"4549","downloads":"38599","row_count":"87771","column_count":"26","derived_view":false}
