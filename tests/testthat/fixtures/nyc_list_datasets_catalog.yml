        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"h3ce-uahi","name":"DEP Green Infrastructure Map (All Layers)","description":"This data collection contains the locations and detailed information of green infrastructure practices in NYC neighborhoods built primarily through NYC Green Infrastructure Program initiatives. Green infrastructure (GI) collects stormwater from streets, sidewalks, and other hard surfaces before it can enter the sewer system or cause local flooding. The GI practice data contained in this dataset includes the location, program area, status, and type of GI. This dataset is updated by the NYC Department of Environmental Protection on a monthly basis.\n\nSource Data: <a href=\"https://www.nyc.gov/dep/gimap\">DEP Green Infrastructure Program Map</a>","type":"map","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/h3ce-uahi","update_datemadepublic":"10/17/2017","update_updatefrequency":"Monthly","last_data_updated_date":"2025-10-02T14:30:20.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"N/A","visits":"2390","downloads":"9","parent_uid":"df32-vzax","derived_view":true}
        ,{"datasetinformation_agency":"Business Integrity Commission (BIC)","uid":"87fx-28ei","name":"Wholesale Markets","description":"Dataset notating the approved wholesale market companies in the various markets BIC regulates. Companies as of the most recent export date are authorized to operate as a wholesale market company.\r\n\r\nThis data is collected on the entities that apply with the Commission to operate as wholesale market companies throughout the City of New York\r\n\r\nEach record represents an entity that is approved to operate in the City of New York by the Commission. \r\n\r\nThe BIC Number field is unique to every company that applies to the Commission. For wholesale market companies, the beginning letters indicate the market for which the company is located:\r\n\r\nHPA - Hunts Point Adjacent Area\r\nHPP - Hunts Point Product Market\r\nHPM - Hunts Point Meat Market\r\nFFM - Hunts Point Fulton Fish Market \r\nGMM - Gansevoort Meat Market","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/87fx-28ei","update_datemadepublic":"4/4/2017","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-23T19:41:13.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"23032","downloads":"9579","row_count":"524530","column_count":"26","derived_view":false}
