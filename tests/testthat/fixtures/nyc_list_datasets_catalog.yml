        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"4xfb-z29j","name":"Citywide Mobility Survey - Survey Zones (Map)","description":"The Citywide Mobility Survey is a mixed-methodology survey of New York City residents' travel choices, behaviors, and perceptions. The Survey Zones dataset provides the shapefile that shows which neighborhood tabulation areas fit within each of the ten survey zones.","type":"map","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/4xfb-z29j","update_datemadepublic":"02/15/2018","update_updatefrequency":"Historical data","last_data_updated_date":"2024-05-22T17:22:58.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"6165","downloads":"692","parent_uid":"sx7h-iavd","derived_view":true}
        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"w6yt-hctp","name":"DOF: Condominium Comparable Rental Income – Brooklyn – FY 2009/2010","description":"The Department of Finance (DOF) is required by NY State law to value condominiums or cooperatives as if they were residential rental apartment buildings. DOF uses income information from rental properties similar in physical features and location to the condominiums or cooperatives. DOF applies this income data to the condominium or cooperative to determine its value in the same way DOF values rental apartment buildings.  This report includes information at a condominium suffix level which represents a subdivision of the condominium since DOF values condominiums at a suffix level. A condominium may have more than one suffix.\r\n\r\nEach record in this report for the subject condominium represents a condominium suffix which is a subdivision of a condominium.  Some condominiums may have more than a single suffix. DOF uses this information to value condominiums annually based on state law.  Each suffix identifies up to three comparable rentals included in this report.","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/w6yt-hctp","update_datemadepublic":"10/7/2011","update_updatefrequency":"Historical data","last_data_updated_date":"2017-09-11T16:50:35.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1613","downloads":"3616","row_count":"423","column_count":"46","derived_view":false}
