        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"rc2t-8fid","name":"High School Equivalency (HSE) Diplomas Awarded to NYCHA Residents by Borough – Local Law 163","description":"This datasets contains information about NYCHA residents who earned a high school equivalency (HSE) diploma in a given year. Only Pathways to Graduation HSE graduates are included. Pathways to Graduation is a full-time free NYC Department of Education program that helps students earn their HSE Diploma. Each row in the dataset represents the number of public housing residents on a Borough-level who earned a HSE diploma through participation in Pathways to Graduation. \nUp until December 2021, in New York State, HSE diplomas were awarded to students who passed the Test Assessing Secondary Completion (TASC) exam. In December 2021 New York Staten transitioned from using the TASC to the <a href=\"https://ged.com/\">GED Test</a> as the state’s HSE exam.\nFor datasets related to other services provided to NYCHA residents, view the data collection “Services available to NYCHA Residents - Local Law 163”.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/rc2t-8fid","update_datemadepublic":"5/17/2019","update_updatefrequency":"Annually","last_data_updated_date":"2025-12-02T16:08:46.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"937","downloads":"1302","row_count":"40","column_count":"3","derived_view":false}
