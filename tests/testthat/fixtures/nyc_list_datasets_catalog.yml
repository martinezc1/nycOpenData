        ,{"datasetinformation_agency":"Department of Consumer and Worker Protection (DCWP)","uid":"q5u8-89nv","name":"DARP-ROTOW Enrollment Status of Active Tow Truck Companies","description":"This dataset shows all active tow truck companies licensed by the NYC Department of Consumer and Worker Protection (DCWP) and the tow company's enrollment status in the Directed Accident Response Program (DARP) and/or the Rotation Tow Program (ROTOW). \n\nIn New York City, licensed tow companies enrolled in DARP or ROTOW may tow vehicles without the vehicle owner's consent.\n\nTow companies enrolled in DARP may tow vehicles that have been involved in an accident and cannot safely be driven under their own power.\n\nTow companies enrolled in ROTOW may tow stolen or abandoned vehicles that have been recovered, and when a vehicle is blocking driveways.\n\nA business may apply to participate in DARP and ROTOW after holding a Tow Truck Company license for more than one year.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/q5u8-89nv","update_datemadepublic":"3/9/2020","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-02T13:00:39.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"7053","downloads":"3706","row_count":"303","column_count":"27","derived_view":false}
