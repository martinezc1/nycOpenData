        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"rgyu-ii48","name":"DOF Property Abatement Detail","description":"Property tax abatement. \n\nThe Department of Finance administers a number of benefits for property owners in the form of exemptions and abatement. Exemptions lower the amount of taxes you owe by reducing your property's assessed value. Abatement reduce your taxes by applying credits to the amount of taxes you owe. This dataset includes only abatement data and exemption data is stored as a separate dataset on this portal. The abatement data is reported at the parcel, condominium, and cooperative level. The maximum EXTRACTDT value displays the current abatement data. All other records contain historical abatement data.  Only columns applicable to the abatement type are populated.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/rgyu-ii48","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-02-26T19:31:52.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"No","visits":"15893","downloads":"3237","row_count":"2927932","column_count":"101","derived_view":false}
