        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"2juy-aj8e","name":"Queens Air Quality Sensor Pilot (February - November 2024)","description":"This dataset is from an air quality monitoring pilot in Maspeth, Queens between February and November 2024 as part of the NYC Office of Technology and Innovation's (OTI) Smart City Testbed program (https://testbed.cityofnewyork.us/).\n\nThe Office of Technology and Innovation (OTI) partnered with the Department of Health and Mental Hygiene (DOHMH) to pilot Clarity Node-S air quality monitoring sensors (https://www.clarity.io/products/clarity-node-s) in order to evaluate their performance and generate real-time environmental data. The pilot also tested PAMARES model air quality improvement devices from StaticAir (https://www.staticair.com) to assess their effectiveness in reducing particulate matter in targeted areas. By combining continuous monitoring with physical air quality interventions, the initiative aimed to determine both the reliability of the sensor technology and the measurable impact of the air purification devices in urban settings.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/2juy-aj8e","update_datemadepublic":"10/24/2025","update_updatefrequency":"Historical data","last_data_updated_date":"2025-10-23T20:18:58.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"307","downloads":"249","row_count":"67607","column_count":"12","derived_view":false}
