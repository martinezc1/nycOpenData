        ,{"datasetinformation_agency":"Department of Youth and Community Development (DYCD)","uid":"p57r-4v4f","name":"Neighborhood Development Areas Map","description":"This map contains the shape of each NDA and borough it is located in. \r\n\r\nAs the designated Community Action Agency of New York City, DYCD administers the federal Community Services Block Grant (CSBG) program to combat poverty and provide emergency services to low-income people. In order to maximize the impact of the federal CSBG funding, DYCD targets funds to low-income communities, which it designates as Neighborhood Development Areas (NDAs).\r\n\r\nThe NDA Initiative, through the Neighborhood Advisory Boards (NABs), fosters community-level engagement to ensure that residents have opportunities to contribute to change in their neighborhoods and that services address the most pressing needs of each community.","type":"map","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/p57r-4v4f","update_datemadepublic":"2/28/2024","update_updatefrequency":"As needed","last_data_updated_date":"2024-02-27T20:53:09.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"Yes","visits":"3583","downloads":"1","parent_uid":"vd7c-qjsx","derived_view":true}
