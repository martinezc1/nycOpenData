        ,{"datasetinformation_agency":"Brooklyn Borough President (BPBK)","uid":"4j6i-9rmr","name":"Uniform Land Use Review Procedure (ULURP) Recommendations","description":"List of the Borough President's Recommendations on ULURP applications in Brooklyn.\r\n\r\nEach Borough President has a role in the ULURP process, as stipulated in the New York City Charter. The Borough President reviews each ULURP application in Brooklyn and provides policy recommendations to the City Planning Commission and the City Council. This data set indicates his recommendations for all applications reviewed during his term in office. Each record corresponds to a separate application, and provides the following information: the application name, the application's ULURP number(s), the affected Community Board(s), the affected Council District (s), the recommendation date, and the nature of the Borough President's recommendation. This dataset also provides access to the PDF document of the complete recommendation. This data can be used by the public to learn about recent land use proposals across the Borough, as well as specific community boards.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/4j6i-9rmr","update_datemadepublic":"10/8/2019","update_updatefrequency":"Annually","last_data_updated_date":"2021-06-29T14:51:04.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"1862","downloads":"1269","row_count":"91","column_count":"6","derived_view":false}
