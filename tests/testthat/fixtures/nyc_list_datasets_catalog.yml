        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"c3uy-2p5r","name":"Air Quality","description":"Dataset contains information on New York City air quality surveillance data.\n\nAir pollution is one of the most important environmental threats to urban populations and while all people are exposed, pollutant emissions, levels of exposure, and population vulnerability vary across neighborhoods. Exposures to common air pollutants have been linked to respiratory and cardiovascular diseases, cancers, and premature deaths. These indicators provide a perspective across time and NYC geographies to better characterize air quality and health in NYC. Data can also be explored online at the Environment and Health Data Portal: http://nyc.gov/health/environmentdata.\n\nReal-time air quality data can be found on the Environmental & Health Data Portal linked here: <a href=\"https://a816-dohbesp.nyc.gov/IndicatorPublic/data-features/realtime-air-quality/\">Real-Time Air Quality in NYC</a>","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/c3uy-2p5r","update_datemadepublic":"10/24/2014","update_updatefrequency":"As needed","last_data_updated_date":"2026-03-16T14:19:17.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"133643","downloads":"4816519","row_count":"18862","column_count":"12","derived_view":false}
