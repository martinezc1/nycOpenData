        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"k3ks-jzek","name":"DSNY Waste Characterization 2017 - Main Sort Results","description":"The Department conducted the 2017 NYC Residential, School, and NYCHA (NYC Housing Authority) Waste Characterization Study over three seasons: spring, summer, and fall. This study builds on decades of research and analysis into the evolving composition of NYC's waste stream. The study team hand sorted samples into 70 main sort categories. Results are presented in absolute terms as the quantity by weight of each material type. The quantity of each material is calculated by applying the percent composition to the total quantity of DSNY collections for fiscal year 2017 (July 2016-June 2017).","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/k3ks-jzek","update_updatefrequency":"As needed","last_data_updated_date":"2019-05-22T18:45:15.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"N/A","visits":"5575","downloads":"1775","row_count":"560","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"5mad-ntua","name":"VZV Speed Limits","description":"On November 7, 2014, New York City’s default speed limit was changed from 30 mph to 25 mph. Unless otherwise signed, all streets in New York City are governed by this 25 mph speed limit. Driving at or below 25 MPH decreases stopping distance, gives drivers and pedestrians more time to see each other and react, and improves drivers’ ability to avoid crashes. Pedestrians struck by vehicles traveling at 25 MPH are half as likely to die as those struck at 30 MPH. If crashes do occur, the severity of injuries is reduced a lower speeds. The information shown here was compiled by the New York City Department of Transportation for governmental purposes. The information is updated as soon as reasonably practicable. The public is advised that speed limits are subject to temporary or permanent change and that posted signage must be observed for compliance with laws and regulations.\r\n\r\nFor a complete list of Vision Zero maps, please follow <a href=\"https://data.cityofnewyork.us/browse?q=vzv&sortBy=last_modified&utf8=%E2%9C%93\">this link</a>","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/5mad-ntua","update_datemadepublic":"05/31/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:21:53.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"2452","downloads":"1480","row_count":"141444","column_count":"5","derived_view":false}
