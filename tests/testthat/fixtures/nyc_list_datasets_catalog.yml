        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"j7yn-nvq9","name":"DOF: Summary of Neighborhood Sales in Queens for Class 1-, 2- and 3-Family homes - 2006","description":"The Department of Finance (DOF) maintains records for all property sales in New York City, including sales of family homes in each borough. This list is a summary of neighborhood sales for Class 1-, 2- and 3-Family homes in Queens in 2006.\r\n\r\nThis list includes all sales of 1-, 2-, and 3-Family Homes' from January 1st, 2006 to December 31, 2006, whose sale price is equal to or more than $150,000.  The Building Class Category for Sales is based on the Building Class at the time of the sale.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/j7yn-nvq9","update_datemadepublic":"10/11/2011","update_updatefrequency":"Historical data","last_data_updated_date":"2013-06-26T17:03:49.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1446","downloads":"3613","row_count":"162","column_count":"7","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office of Contract Services (MOCS)","uid":"7kc8-z939","name":"FCRC Annual Concession Plan","description":"The Mayor’s Office of Contract Services oversees and certifies agency compliance with the applicable laws and regulations for franchises and concessions. In certain circumstances, franchises and concessions are also subject to the approval of the Franchise and Concession Review Committee (FCRC).\r\n\r\nFranchises are grants of the right to occupy or to use the City’s inalienable property, such as streets or parks, for a public service, e.g., transportation or telecommunications.\r\nConcessions are grants for the private use of city-owned property such as for food sales or recreational activity, with the City’s compensation typically tied to the concessionaire’s revenue. Concessions are also subject to the City's Concession Rules as codified in Title 12 of the Rules of the City of New York.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/7kc8-z939","update_datemadepublic":"4/22/2016","update_updatefrequency":"Annually","last_data_updated_date":"2016-04-22T22:03:20.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1405","downloads":"3184","row_count":"514","column_count":"18","derived_view":false}
        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"qn3b-9few","name":"DEP Green Infrastructure (Medians)","description":"This dataset contains the locations and detailed information of green infrastructure practices in NYC neighborhoods built primarily through NYC Green Infrastructure Program initiatives. Green infrastructure (GI) collects stormwater from streets, sidewalks, and other hard surfaces before it can enter the sewer system or cause local flooding. The GI practice data contained in this dataset includes the location, program area, status, and type of GI. This dataset is updated by the NYC Department of Environmental Protection on a monthly basis.    \n\nThe \"\"Medians\"\" polygon layer contains large-scale green infrastructure practices within City-owned medians to target water quality objectives and inland flooding challenges.","type":"map","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/qn3b-9few","update_datemadepublic":"10/2/2025","update_updatefrequency":"Monthly","last_data_updated_date":"2025-10-02T14:19:33.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"N/A","visits":"412","downloads":"2","parent_uid":"drep-uzs7","derived_view":true}
        ,{"datasetinformation_agency":"Department of Consumer and Worker Protection (DCWP)","uid":"wapz-jfhq","name":"DCWP Language Line Interpretation Services","description":"Department of Consumer and Worker Protection (DCWP) believes that limited English proficiency (LEP) should not be a hindrance to accessing the services and information the Agency provides. Without language access services consumers and workers and business with limited English proficiency could face substantial hurdles to knowing their consumer and worker rights; business owners could struggle to navigate the rules and regulations that govern commerce and the workplace in New York City, and potentially struggle to complete the license application process.\n\nDCWP provides telephonic translation services to anyone requesting such assistance.  Each month DCWP receives an invoice that records each time a translation request was made and general information in relation to each transaction, including the language requested and the DCWP division which made the request. This dataset is compiles these translation service invoices since January 2016, the earliest date this information is available.","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/wapz-jfhq","update_datemadepublic":"1/24/2022","update_updatefrequency":"Monthly","last_data_updated_date":"2026-01-28T17:14:33.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2337","downloads":"1363","row_count":"32293","column_count":"4","derived_view":false}
