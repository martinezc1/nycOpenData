        ,{"datasetinformation_agency":"Mayor's Office of Contract Services (MOCS)","uid":"a2w2-wg79","name":"Change Orders Cycle Time and Volume","description":"Change orders are agency-authorized, written documents that allow for modifications of a contract while the contract is being performed. Change orders are used to adjust the value of the contract or the time for performance, and are classified as either construction change orders or design change orders depending on the subject matter of a particular change order. Change orders allow the vendor to complete work included in the scope of the contract. They also allow the agency to make non-material changes to the scope, such as accounting for site conditions that were unknown at the time of contracting.  This report includes aggregate, annual count and dollar amount of change orders by City agency.","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/a2w2-wg79","update_datemadepublic":"6/30/2021","update_updatefrequency":"Annually","last_data_updated_date":"2021-06-07T18:55:31.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1966","downloads":"940","row_count":"52","column_count":"8","derived_view":false}
