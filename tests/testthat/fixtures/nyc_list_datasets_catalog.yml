        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"3wtp-43m9","name":"2021 Students In Temporary Housing","description":"Students in temporary housing (STH) are defined as students experiencing housing instability at any point, for any length of time, during the school year (from the first day of school to 7/2). This includes students and families that are \"doubled up\" (sharing the housing of others due to economic hardship), living in shelter (including NYC Department of Homeless Services family shelters or Human Resources Administration domestic violence shelters), or living in some other unstable, temporary housing. There were approximately 87,000 New York City district school students who resided in temporary housing in the 2020-21 school year, with about two thirds of them residing in doubled up living arrangements. Approximately 9,500 of those 87,000 students were residing in the DHS shelter system on any given night. The DOE works in close partnership with the Department of Homeless Services to provide streamlined support for students in shelter throughout each day.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/3wtp-43m9","update_datemadepublic":"12/06/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-12-06T21:20:35.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"7022","downloads":"2255","row_count":"1689","column_count":"9","derived_view":false}
