        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"wag2-kf63","name":"Parks Supervisor Inspections - Feature Findings","description":"Supervisor Inspections are conducted by Park Supervisors in order to assess the conditions and identify issues at parks in their districts. Park Supervisors follow the standards set out in the Parks Inspection Program (PIP) Inspection Manual but are not trained in the protocol to the same degree as PIP inspectors, and supervisor inspections are not subject to the thorough review that PIP inspections receive.  \r\n\r\nDuring the course of an inspection, Park Supervisors separately rate each feature within a park. This table contains the features inspected, with ratings and notes for each feature. \r\n\r\nOverall results and inspection-level records are contained in the Parks Supervisor Inspections - Inspection Results dataset; each row in this table represents one inspection of an individual property (park, playground, or zone). \r\n\r\nSpecific feature-level records are contained in the Parks Supervisor Inspections - Feature Findings dataset; each row in this table represents the specific feature's details/rating from each inspection.\r\n\r\nData Dictionary: https://docs.google.com/spreadsheets/d/17nwvIsPdAInf-DzGAcwq8hu6SXIzQYabUDktw3BwwLY/edit#gid=1553660070","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/wag2-kf63","update_updatefrequency":"Weekly","last_data_updated_date":"2026-03-20T13:43:14.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"886","downloads":"2057","row_count":"8919734","column_count":"8","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"mjux-q9d4","name":"2011-2012 School Progress Report - All Schools","description":"Schools Progress Report which focus on learning environment, student performance and progress.  Peer indexes are calculated differently depending on School Level. Schools are only compared to other schools in the same School Level (e.g., Elementary, K-8, Middle, High, Transfer)\n\n1) Elementary, K-8, Early Childhood - peer index is a value from 0-100. A composite demographic statistic based on % ELL, % Students with Disabilities, % Title I free lunch, and % Black/Hispanic is used. Higher values indicate student populations with higher need.\n\n2) Middle - peer index is a value from 1.00-4.50. For middle schools, the average 4th grade proficiency ratings in ELA and Math and the % Students with Disabilities is used. Lower values indicate student populations with higher need.\n\n3) High School - peer index is a value from 1.00-4.50. For high schools, the average 8th grade proficiency, the % Students with Disabilities, the % Self-contained, and the % overage is used. Lower values indicate student populations with higher need.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/mjux-q9d4","update_datemadepublic":"04/30/2019","update_updatefrequency":"Historical data","last_data_updated_date":"2019-04-30T19:49:31.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"960","downloads":"1789","row_count":"1743","column_count":"21","derived_view":false}
