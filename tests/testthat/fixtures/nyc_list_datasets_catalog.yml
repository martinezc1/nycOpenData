        ,{"datasetinformation_agency":"Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV)","uid":"2rb7-7eqa","name":"ENDGBV: The Intersection of Domestic Violence, Race/Ethnicity and Sex","description":"This data set contains New York City Police Department provided incident level data for domestic violence related offenses felony assaults, felony rapes and domestic incident reports) for calendar years 2020 and 2021. The data includes: date of incident, precinct of incident, borough of incident, suspect victim relationship, victim stated relationship description, victims race, victims sex, victims reported age, suspect race, suspect sex, suspect reported age, community district of incident, community district has high poverty rate, community district has low median household income, and high rate of unemployment. The following defines domestic violence incident report, domestic violence related felony assault and felony rapes: Domestic Violence Incident Report (DIR) is a form that police must complete every time they respond to a domestic incident, whether or not an arrest is made. A DIR would be filed for any domestic violence offense, including felony assault and felony rape.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/2rb7-7eqa","update_datemadepublic":"1/12/2023","update_updatefrequency":"Historical data","last_data_updated_date":"2022-12-15T21:50:43.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2741","downloads":"1648","row_count":"483790","column_count":"15","derived_view":false}
