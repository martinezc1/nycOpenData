        ,{"datasetinformation_agency":"Mayor's Office of Climate and Environmental Justice (MOCEJ)","uid":"75g4-kk7x","name":"Office of Climate and Sustainability: 2017 Fuel Oil Sales","description":"NYC Fuel Oil Deliveries - Companies that deliver heating oil and biodiesel to buildings in New York City are required by Local Law 43 of 2010 to disclose the amount in gallons of each fuel oil grade delivered to buildings by zip code (non-wholesale only) on an annual basis. The Local Law also requires minimum biodiesel content and limits sulfur levels in fuel oil.  This dataset details the amount of fuel oil delivered to each NYC Zip Code and offers a breakdown of the biodiesel blend.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/75g4-kk7x","update_datemadepublic":"9/13/2022","update_updatefrequency":"Historical data","last_data_updated_date":"2021-11-18T17:16:10.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"1049","downloads":"881","row_count":"342","column_count":"23","derived_view":false}
