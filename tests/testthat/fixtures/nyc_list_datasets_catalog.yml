        ,{"datasetinformation_agency":"Conflicts of Interest Board (COIB)","uid":"dx8z-6nev","name":"Donations to Not-for-Profit Organizations Affiliated with Elected Officials","description":"Pursuant to the Affiliated Not-for-Profits Law, found in Chapter 9 of Title 3 of the New York City Administrative Code, a not-for-profit organization affiliated with an elected official must report to COIB annually information about certain donations received. Specifically, “restricted\" organizations (that is, organizations that spend at least 10% of their expenditures on communications featuring the name, voice, or likeness of the affiliated elected official) are required to report information about any donation from the household of a person listed in the City’s Doing Business Database, as well as any other donation of $1,000 or more. All other \"unrestricted\" organizations are required to report information about donations of $5,000 or more. This dataset includes the names of donors; the value of the donation; the date of the donation; and a description of the donation.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/dx8z-6nev","update_datemadepublic":"3/19/2020","update_updatefrequency":"Annually","last_data_updated_date":"2025-08-28T16:10:28.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"2752","downloads":"2443","row_count":"7223","column_count":"12","derived_view":false}
