        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"mebz-ditc","name":"NYC Parks Districts","description":"In order to appropriately manage City parks and allocate resources, NYC Parks has implemented three tiers of management [below the Borough level]. These three tiers can be represented as administrative geographic boundaries and are defined below: \n\nDistrict - One or more parks that are combined and generally align with New York City Community Boards. \n\nSector - One or more Park Districts that are combined in order share resources for daily maintenance. \n\nRegion - One or more Park Sectors that are combined and assigned a regional managers who provides high-level, strategic planning and support for Parks managers, including maximizing resources between Districts and Sectors.\n\nData Dictionary: https://docs.google.com/spreadsheets/d/1-FS_NDOUx0-OfKploVC0fIJrwOSdNmh1HKpkfyeoD1E/edit?usp=sharing","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/mebz-ditc","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T13:40:57.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1891","downloads":"1721","row_count":"76","column_count":"7","derived_view":false}
        ,{"datasetinformation_agency":"Department of Youth and Community Development (DYCD)","uid":"graj-69em","name":"Department of Youth and Community Development (DYCD) Contracts","description":"This dataset provides information describing Department of Youth and Community Development (DYCD) contracts including dollar amounts funded and contract registration information. Contract information is displayed per fiscal year, though the total amount funded for a given contract across fiscal years is also given. For contracts that extend for more than one fiscal year, each year of the contract is represented by a separate row. For each row (contract-fiscal year pair), the DYCD business unit (Major Program), associated organization (Provider), start and end dates, Contract Status, RFP details, and DYCD internal contract identifiers are given.\n\nFor more information about programs, visit <a href=\"https://www1.nyc.gov/site/dycd/services/services.page\">https://www1.nyc.gov/site/dycd/services/services.page</a>\n or <a href=\"https://discoverdycd.dycdconnect.nyc/home\">https://discoverdycd.dycdconnect.nyc/home</a>.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/graj-69em","update_datemadepublic":"09/07/2023","update_updatefrequency":"Annually","last_data_updated_date":"2026-03-09T20:39:17.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"3154","downloads":"1217","row_count":"12592","column_count":"15","derived_view":false}
