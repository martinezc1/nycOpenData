        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"fudw-fgrp","name":"NYC Parks Events Listing – Event Listing","description":"The NYC Parks Events Listing database is used to store event information displayed on the Parks website, nyc.gov/parks. There are seven related tables that make up the this database: \r\n\r\n1. Events_Events table (This is the primary table that contains basic data about every event. Each record is an event.)\r\n2. Events_Categories (Each record is a category describing an event. One event can be in more than one category.)\r\n3. Events_Images (Each record is an image related to an event. One event can have more than one image.)\r\n4. Events_Links (Each record is a link with more information about an event. One event can have more than one link.)\r\n5. Events_Locations  (Each record is a location where an event takes place. One event can have more than one location.)\r\n6. Events_Organizers  (Each record contains a group or person organizing an event. One event can have more than one organizer.)\r\n7. Events_YouTube  (Each record is a link to a YouTube video about an event. One event can have more than one YouTube video.)\r\n\r\nThe Events_Events table is the primary table. All other tables can be related by joining on the event_id. This data contains records from  2013 and on. For a complete list of related datasets, please follow <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=NYC+Parks+Events&sortBy=alpha\">This Link</a>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/fudw-fgrp","update_datemadepublic":"06/11/2018","update_updatefrequency":"As needed","last_data_updated_date":"2021-08-02T05:28:16.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"No","visits":"6439","downloads":"52767","row_count":"74880","column_count":"15","derived_view":false}
        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"bibp-6ff7","name":"DSNY Waste Characterization - Comparative Results","description":"The NYC Department of Sanitation (DSNY) has conducted four waste characterization studies to date: 2005, 2013, 2017, and 2023. For each study, a representative sample of waste is sorted into distinct material categories and aggregated into statistically significant data on the composition of the City's discards. This dataset contains the change in the composition of the City's waste streams across all four studies.","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/bibp-6ff7","update_datemadepublic":"5/2/2024","update_updatefrequency":"Historical data","last_data_updated_date":"2024-05-02T20:39:29.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"N/A","visits":"1642","downloads":"869","row_count":"520","column_count":"10","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office of Management & Budget (OMB)","uid":"2t2c-qih9","name":"Full-Time And Full-Time Equivalent Staffing Levels","description":"This dataset contains estimated fiscal year-end headcount information for full-time and full-time equivalent employees (FTE). The information is summarized by agency, personnel type and funding. The amount fields are whole numbers. The numbers within can be summarized to match pages from the publication “Full-Time and Full-Time Equivalent Staffing Levels”.  This dataset is updated four times per year after publication of the First Quarter, Preliminary, Executive and Adopted Financial Plan, usually in November, January, April and June respectively.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/2t2c-qih9","update_datemadepublic":"6/17/2016","update_updatefrequency":"Other","last_data_updated_date":"2026-02-20T13:17:09.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"5360","downloads":"3451","row_count":"44607","column_count":"13","derived_view":false}
