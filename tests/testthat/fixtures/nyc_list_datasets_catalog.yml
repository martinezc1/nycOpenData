        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"mu46-p9is","name":"Forestry Service Requests","description":"Record of Forestry service requests for NYC Parks & Recreation. \r\n\r\nTwo-way integration with 311 is maintained in ForMS 2.0.  Forestry related Service Requests (SRs) created by a 311 operator or submitted by the caller through either the 311 website, 311 phone app, or the Parks website stream into the system.  Conversely, updates are sent from ForMS 2.0 to 311 when SRs are actioned.\r\n\r\nService Requests can be created directly in ForMS 2.0, however, it is important to note that they will NOT receive a 311 SEIBEL number or be visible in 311.  Internally generated SRs should be used to track correspondence, commissioner, or other requests that do not originate from 311.\r\n\r\nUser guide: https://docs.google.com/document/d/1PVPWFi-WExkG3rvnagQDoBbqfsGzxCKNmR6n678nUeU/edit?usp=sharing\r\n\r\nData dictionary: https://docs.google.com/spreadsheets/d/1yMfZgcsrvx9M0b3-ZdEQ3WCk2dFxgitCWytTrJSwEAs/edit?usp=sharing","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/mu46-p9is","update_datemadepublic":"3/8/2017","update_updatefrequency":"Every 2 weeks","last_data_updated_date":"2025-03-01T19:47:45.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"4372","downloads":"2783","row_count":"981941","column_count":"52","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"6ucq-tfej","name":"2021 City Council - September Attendance Report","description":"Attendance data include 3K-12 students in Districts 1-32 and 75 (Special Education). Students in District 79 (Alternative Programs), charter schools, home schooling, and home and hospital instruction are excluded. Infants in D79 (LYFE program) and students with a grade level \"AD\" (adult) are also excluded. Pre-K data do not include NYC Early Education Centers; therefore, Pre-K data are limited to those who attend K-12 schools that offer Pre-K and District Pre-K Centers.\nThis spreadsheet reports attendance rates (overall and remote) for September 13 through September 30, 2021. Data comprises attendance records for those dates reported by schools in ATS as of October 28, 2021.\nOverall Attendance Rate is defined as the percent of days where students have present attendance status, out of total days with reported attendance data, across 13 days of attendance data September 13-30. Remote Instruction Attendance Rate* is defined as the percent of days where students have present remote attendance status out of total days with a remote attendance record reported, across 13 days of attendance data. Full attendance definitions for SY2021-22 can be found here: https://infohub.nyced.org/school-year/school-year-2021-22/attendance\nStudents participating in the Shared Instruction (SHIN) model may have their attendance recorded at separate sites, but attendance records are attributed to students’ home school of record as of the date of attendance.\nStudent demographic data is based on student records in ATS pulled on October 28, 2021. Because a small number of students are missing demographics data in ATS, demographic disaggregations may not roll up to higher-level aggregations. Data for Asian students include Native Hawaiian or Other Pacific Islanders.\nStudents in temporary housing (STH) include all students who lack a fixed, regular, and adequate nighttime residence as defined by Section 725 of the McKinney-Vento Act. It includes students who are identified as \"doubled up\" (sharing the housing of others due to economic hardship), or living in some other unstable, temporary housing. It does not include students who are identified as residing in shelters.\nIn order to comply with the Family Educational Rights and Privacy Act (FERPA) regulations on public reporting of education outcomes, subgroups with fewer than 5 students are suppressed and have been replaced with an \"s\".\nInstances where there are no reported attendance data have been marked with an \"NA\".\n*Remote Instruction Attendance Rate includes students receiving Medically Necessary Instruction (MNI), students receiving remote instruction while quarantining, and system-wide remote learning days.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/6ucq-tfej","update_datemadepublic":"11/23/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-11-23T15:10:44.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"950","downloads":"871","row_count":"1601","column_count":"4","derived_view":false}
