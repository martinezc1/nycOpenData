        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"g5gn-bmye","name":"DOHMH Severe Maternal Morbidity","description":"Severe maternal morbidity (SMM) refers to life-threatening complications of labor and delivery that result in significant short- or long-term health consequences. SMM data are derived from linking NYC birth certificates for births occurring at NYC facilities with the mother's delivery hospitalization record from the New York Statewide Planning and Research Cooperative System. SMM is identified using an established algorithm developed by the Centers for Disease Control and Prevention that comprises 21 indicators that represent diagnoses of serious complications of pregnancy or delivery or procedures used to manage serious conditions. Each record represents the aggregated number and rate of SMM events in the population group specified for the year specified.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/g5gn-bmye","update_updatefrequency":"Annually","last_data_updated_date":"2020-10-19T18:21:11.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"3669","downloads":"1763","row_count":"43","column_count":"16","derived_view":false}
