        ,{"datasetinformation_agency":"Human Resources Administration (HRA)","uid":"ftyx-fhnc","name":"Work Progress Program (WPP) for NYCHA Residents - Local Law 163","description":"This datasets contains information about NYCHA residents who were employed by the Work Progress Program (WPP). WPP is a subsidized wage program designed to complement existing youth services by providing participating low-income young adults with work experience. Through WPP, HRA reimburses providers for wages paid to low-income young adults (aged 16-24) who have been placed in short-term jobs that typically last 12 weeks, with a special emphasis on serving opportunity or at-risk youth. \nWPP is not a stand-alone program. WPP provides wage reimbursements for nonprofits to provide subsidized jobs to their existing program participants. WPP supports providers that prioritize recruitment of NYCHA youth. NYCHA residency is self-reported in each providers intake and enrollment processes. Providers then report to Human Resources Administration (HRA) if someone is a NYC MAP resident or non-NYCHA MAP resident. The NYCHA MAP initiative includes 15 developments that were identified under the Mayoral Action Plan for Neighborhood Safety. \t\n\n\nFor datasets related to other services provided to NYCHA residents, view the data collection “Services available to NYCHA Residents - Local Law 163”.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/ftyx-fhnc","update_datemadepublic":"5/17/2019","update_updatefrequency":"Annually","last_data_updated_date":"2025-12-02T16:38:59.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativec