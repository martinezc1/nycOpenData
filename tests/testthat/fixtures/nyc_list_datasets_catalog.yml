        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"ji82-xba5","name":"Facilities Database","description":"The Department of City Planning aggregates information about 30,000+ facilities and program sites that are owned, operated, funded, licensed, or certified by a City, State, or Federal agency in the City of New York into a central database called the City Planning Facilities Database (FacDB). These facilities generally help to shape quality of life in the city's neighborhoods, and this dataset is the basis for a series of planning activities. This public data resource allows all New Yorkers to understand the breadth of government resources in their neighborhoods. The data is also complemented with a <b><a href=\"https://capitalplanning.nyc.gov/facilities\">new interactive web map</a></b> that enables users to easily filter the data for their needs. Users are strongly encouraged to read the database documentation, particularly with regard to analytical limitations.\n\nQuestions about this database can be directed to <b><a href=\"mailto:dcpopendata@planning.nyc.gov\">dcpopendata@planning.nyc.gov</a></b>.\n\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/facilities\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 25v2","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/ji82-xba5","update_updatefrequency":"Every 6 months","last_data_updated_date":"2025-10-14T16:33:24.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"Yes"