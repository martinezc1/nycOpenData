        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"jaw4-yuem","name":"Algorithmic Tools Compliance Report","description":"Under Local Law 35 of 2022 (LL 35), City agencies are required to annually report on their use of algorithmic tools, including descriptions of the tool's use and purpose, datasets used, and vendor involvement. The report is also published as a PDF on the OTI website: https://www.nyc.gov/content/oti/pages/reports.\r\n\r\nThe full text of LL 35 is available online: https://legistar.council.nyc.gov/LegislationDetail.aspx?ID=4265421&GUID=FBA29B34-9266-4B52-B438-A772D81B1CB5\r\n\r\nAn \"algorithmic tool\" is defined by the law as: \"Any technology or computerized process that is derived from machine learning, artificial intelligence, predictive analytics, or other similar methods of data analysis, that is used to make or assist in making decisions about and implementing policies that materially impact the rights, liberties, benefits, safety or interests of the public, including their access to available city services and resources for which they may be eligible. Such term includes, but is not limited to tools that analyze datasets to generate risk scores, make predictions about behavior, or develop classifications or categories that determine what resources are allocated to particular groups or individuals, but does not include tools used for basic computerized processes, such as calculators, spellcheck tools, autocorrect functions, spreadsheets, electronic communications, or any tool that relates only to internal management affairs such as ordering office supplies or processing payments, and does not materially affect the rights, liberties, benefits, safety or interests of the public.\"","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/jaw4-yuem","update_datemadepublic":"3/22/2024","update_updatefrequency":"Annually","last_data_updated_date":"2025-07-02T20:19:34.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"5311","downloads":"7063","row_count":"132","column_count":"22","derived_view":false}
