        ,{"datasetinformation_agency":"Police Department (NYPD)","uid":"r7rr-2vqh","name":"Motor Vehicle Collisions Summary Reports","description":"This is a breakdown of every collision in NYC by location and injury. This data is collected because the NYC Council passed Local Law #11 in 2011. This data is manually run every month and reviewed by the TrafficStat Unit before being posted on the NYPD website.  Each record represents a collision in NYC by city, borough, precinct and cross street. This data can be used by the public to see how dangerous/safe intersections are in NYC. The information is presented in pdf and excel format to allow the casual user to just view the information in the easy to read pdf format or use the excel files to do a more in depth analysis.","type":"href","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/r7rr-2vqh","update_datemadepublic":"3/12/2013","update_updatefrequency":"Monthly","last_data_updated_date":"2013-03-12T23:08:11.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"N/A","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"No","visits":"9103","downloads":"1000","derived_view":false}
