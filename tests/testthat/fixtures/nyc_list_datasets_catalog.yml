        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"ucdy-byxd","name":"Local Law 44 - Projects","description":"The Projects data table contains information about Housing Development Projects about which HPD is required to report pursuant to Local Law 44 of 2012.  This includes general project information such as start and completion dates, units, Borrower Legal Entity, general contractor (GC), and prevailing wage information.  There is a one-to-one relationship between this information and the project. This is part of the <a <a href='https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=HPD+Local+Law+44'>Housing Projects Receiving City Financial Assistance (Local Law 44) collection of data tables</a>.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/ucdy-byxd","update_datemadepublic":"01/23/2018","update_updatefrequency":"Every 6 months","last_data_updated_date":"2025-11-18T19:23:22.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"6812","downloads":"3422","row_count":"1014","column_count":"15","derived_view":false}
        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"bpt7-i8t8","name":"Zoning Map Index: Section","description":"Shapefile of zoning section map index, grid to determine which zoning section map relates to specific areas of NYC.\r\nA sectional index grid to determine which Zoning Map refers to specific areas of New York City. Zoning maps show the boundaries of zoning districts throughout the city. The maps are regularly updated after the City Planning Commission and the City Council have approved proposed zoning changes. The set of 126 maps, which are part of the Zoning Resolution, are displayed in 35 sections. Each section is identified by a number from 1 to 35. Each map covers an area of approximately 8,000 feet (north/south) by 12,500 feet (east/west).\r\n\r\nAll previously released versions of this data are available at <a href=\"https://www1.nyc.gov/site/planning/data-maps/open-data/bytes-archive.page?sorts[year]=0\">BYTES of the BIG APPLE- Archive</a>","type":"map","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/bpt7-i8t8","update_datemadepublic":"9/12/2016","update_updatefrequency":"As needed","last_data_updated_date":"2016-09-12T19:21:12.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"6751","downloads":"618","parent_uid":"jsdz-u4b8","derived_view":true}
