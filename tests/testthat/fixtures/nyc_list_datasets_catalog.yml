        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"eymt-yinc","name":"VZV Safe Streets For Seniors","description":"The Safe Streets for Seniors program is an initiative aimed at increasing safety for older New Yorkers. Based on factors such as senior population density, injury crashes, and senior trip generators, DOT has selected and studied Senior Pedestrian Focus Areas. Within these areas, DOT evaluates potential safety improvements and also conducts educational outreach to senior centers.\r\n\r\nFor a complete list of Vision Zero maps, please follow <a href=\"https://data.cityofnewyork.us/browse?q=vzv&sortBy=last_modified&utf8=%E2%9C%93\">this link</a>","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/eymt-yinc","update_datemadepublic":"05/31/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:17:03.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"Yes","visits":"478","downloads":"755","row_count":"34","column_count":"4","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office of Contract Services (MOCS)","uid":"u2m4-wh3s","name":"Local Law 1 City Council Report FY 2015","description":"New York City’s M/WBE Program is governed by Local Law 1 of 2013 (LL 1).  LL 1 was enacted after an updated disparity analysis undertaken by the City.   The law allows City agencies to set M/WBE participation goals on standardized, professional and construction services contracts.  The full provisions of LL 1 law are detailed in section 6-129 of the New York City Administrative Code.","type":"file","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/u2m4-wh3s","update_datemadepublic":"12/18/2015","update_updatefrequency":"Quarterly","last_data_updated_date":"2015-12-17T15:47:09.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"723","downloads":"590","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"6vys-sfk5","name":"Open Streets Locations (Map)","description":"New York City's Open Streets program transforms streets into public spaces open to all. These public spaces allows a variety of activities including education and cultural programming as well as building communities. For more information please visit: https://www.nyc.gov/html/dot/html/pedestrians/openstreets.shtml\nPlease note: there may be a delay in updates to the Open Data files.","type":"map","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/6vys-sfk5","update_datemadepublic":"5/15/2020","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:09:57.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"8480","downloads":"1","parent_uid":"uiay-nctu","derived_view":true}
        ,{"datasetinformation_agency":"School Construction Authority (SCA)","uid":"gzvm-na49","name":"Contractor / Sub Contractor Change Order Report","description":"The Contractor / Sub Contractor Change Order Report is a monthly Multi-Project SCA Change Management Report that lists who is currently responsible for Change Management Issues and the last stage/document of the Change Process.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/gzvm-na49","update_datemadepublic":"7/3/2013","update_updatefrequency":"Monthly","last_data_updated_date":"2021-11-08T20:06:22.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2633","downloads":"4303","row_count":"11266","column_count":"14","derived_view":false}
        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"he6d-2qns","name":"Land Cover Raster Data (2017) – 6in Resolution","description":"A 6-in resolution 8-class land cover dataset derived from the 2017 Light Detection and Ranging (LiDAR) data capture. This dataset was developed as part of an updated urban tree canopy assessment and therefore represents a ''top-down\" mapping perspective in which tree canopy overhanging features is assigned to the tree canopy class. The eight land cover classes mapped were: (1) Tree Canopy, (2) Grass\\Shrubs, (3) Bare Soil, (4) Water, (5) Buildings, (6) Roads, (7) Other Impervious, and (8) Railroads. The primary sources used to derive this land cover layer were 2017 LiDAR (1-ft post spacing) and 2016 4-band orthoimagery (0.5-ft resolution). Object based image analysis was used to automate land-cover features using LiDAR point clouds and derivatives, orthoimagery, and vector GIS datasets -- \n City Boundary (2017, NYC DoITT)\n Buildings (2017, NYC DoITT)\n Hydrography (2014, NYC DoITT)\n LiDAR Hydro Breaklines (2017, NYC DoITT)\n Transportation Structures (2014, NYC DoITT)\n Roadbed (2014, NYC DoITT)\n Road Centerlines (2014, NYC DoITT)\n Railroads (2014, NYC DoITT)\n Green Roofs (date unknown, NYC Parks)\n Parking Lots (2014, NYC DoITT)\n Parks (2016, NYC Parks)\n Sidewalks (2014, NYC DoITT)\n Synthetic Turf (2018, NYC Parks)\n Wetlands (2014, NYC Parks)\n Shoreline (2014, NYC DoITT)\n Plazas (2014, NYC DoITT)\n Utility Poles (2014, ConEdison via NYCEM)\n Athletic Facilities (2017, NYC Parks)\n\nFor the purposes of classification, only vegetation > 8 ft were classed as Tree Canopy. Vegetation below 8 ft was classed as Grass/Shrub.\n\nTo learn more about this dataset, visit the interactive \"Understanding the 2017 New York City LiDAR Capture\" Story Map -- https://maps.nyc.gov/lidar/2017/\nPlease see the following link for additional documentation on this dataset -- https://github.com/CityOfNewYork/nyc-geo-metadata/blob/master/Metadata/Metadata_LandCover.md","type":"file","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/he6d-2qns","update_datemadepublic":"12/12/2018","update_updatefrequency":"As needed","last_data_updated_date":"2018-12-07T18:45:20.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"19144","downloads":"6575","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"kcqe-vnci","name":"NYC Parks Active and Passive Recreation","description":"This dataset includes a list of public open spaces, primarily under the jurisdiction of and/or managed by NYC Parks, as well as the percentage of active and passive recreation in each space. It also includes Schoolyard to Playground (SYPG) sites under the jurisdiction of the NYC Department of Education (DOE), and sites managed in partnership with NYC Parks, such as Central Park, Brooklyn Bridge Park, and Battery Park City, among others.\n\nActive open space refers to areas used for sports, exercise, or active play, including but not limited to, playgrounds, sports fields, and fitness equipment. Passive open space refers to areas for relaxation, such as sitting, strolling, or picnicking. These areas may include plazas, beaches, walking paths, as well as features that contribute to the overall use of public open spaces, such as bathroom and maintenance structures, parking lots, and cultural institutions. While these latter features are not defined as 'passive' in the 2021 CEQR Open Space chapter, they will be included in the forthcoming updated version of the chapter.\n\nThis dataset is intended for use in completing an Open Space analysis as part of the City Environmental Quality Review (CEQR) process only. Please fully read the Data Dictionary linked below before using this dataset to complete a CEQR Open Space analysis. Additional research may be necessary to identify other open space resources within a given study area, including those managed by federal, state, and city agencies, as well as private entities. For more information on the Open Space analysis and lists of passive and active features as defined by CEQR, visit: https://www.nyc.gov/assets/oec/technical-manual/07_Open_Space_2021.pdf\"\t\t\n\nExplore the <a target=\"_blank\" href=\"https://docs.google.com/spreadsheets/d/1XIzNrCi9xPn-MJaYn6J0Ez72ZtiW36gNZQEacGERU-w/edit?usp=sharing\">Data Dictionary</a>","type":"dataset","category":"Recreation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/kcqe-vnci","update_datemadepublic":"2025/05/19","update_updatefrequency":"As needed","last_data_updated_date":"2025-10-16T19:28:51.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"Yes","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2397","downloads":"1688","row_count":"2919","column_count":"14","derived_view":false}
