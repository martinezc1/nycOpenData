        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"thbt-gfu9","name":"Bicycle Parking Shelters (Map)","description":"DOT, in coordination with our Coordinated Street Furniture vendor, JCDecaux, has installed bicycle parking shelters around the City. Each shelter contains stainless steel bike racks for eight bikes. The design closely resembles the award-winning Bus Shelter, using the same high-quality materials. Panels on the shelters display the annual NYC Cycling Map and other bicycle promotional materials.","type":"map","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/thbt-gfu9","update_datemadepublic":"8/11/2017","update_updatefrequency":"Annually","last_data_updated_date":"2025-12-09T16:17:19.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"11236","downloads":"13066","parent_uid":"dimy-qyej","derived_view":true}
        ,{"datasetinformation_agency":"Human Resources Administration (HRA)","uid":"5fs5-yi3e","name":"Cash Assistance and SNAP Cases Closed","description":"Cash Assistance and SNAP case closings ordered by NYS Welfare Management System (WMS) closing reason code. When an active Cash Assistance or SNAP case is closed, NYS Welfare Management System (WMS) records the reason for the closure using a reason code. This file includes the count of all Cash Assistance and SNAP case closings during the specified quarter and year, with the different NYS WMS closing reason codes in the rows. Each record is one case which may include one or many recipients.\n\n<b>NOTE: </b>Because asterisks represent values between 1 and 10, users should not sum values across columns or rows to determine the total number of cases within a quarter.  Accurate totals are represented in the rows and columns labeled “Total”.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/5fs5-yi3e","update_datemadepublic":"7/11/2023","update_updatefrequency":"Quarterly","last_data_updated_date":"2025-06-02T20:22:16.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1563","downloads":"835","row_count":"2871","column_count":"75","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"vmkw-p55f","name":"Parks Concession Transactions","description":"NYC Parks uses a Commercial Off-The-Shelf database for maintaining its concession-related data.  In its raw form, the Parks data within the Yardi Voyager database has a convoluted structure, the majority of which is not being used by Parks to store any data. In an effort to make the data more user friendly, the multitude of tables used by the source database have been distilled into two that contain the essential information for a concessions database. One table (Parks Concessions) represents the concession asset – the place and thing which is being operated – and who holds the contract.  The other (Parks Concession Transactions) represents transactions between those contract holders and NYC Parks.  Parks Concessions is here https://data.cityofnewyork.us/City-Government/Parks-Concessions/53m8-jdtg and can be joined to Parks Concession Transactions using  PersonID, PropertyID and UnitID.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/vmkw-p55f","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T13:55:13.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1346","downloads":"2955","row_count":"213146","column_count":"15","derived_view":false}
