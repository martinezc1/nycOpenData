        ,{"datasetinformation_agency":"Mayor's Office for Economic Opportunity","uid":"kvhd-5fmu","name":"NYC Benefits Platform: Benefits and Programs Dataset","description":"<p>This dataset provides benefit, program, and resource information for over 80 health and human services available to NYC residents in all eleven local law languages. The data is kept up-to-date, including the most recent applications, eligibility requirements, and application dates. Information in this dataset is used on ACCESS NYC, Generation NYC, and Growing Up NYC.\r\n</br>\r\nReach out to products@nycopportunity.nyc.gov if you have any questions about this dataset.\r\n</p>\r\n\r\nThis data makes it easier for NYC residents to discover and be aware of multiple benefits they may be eligible for. NYC Opportunity Product team works with 15+ government agencies to collect and update this data. Each record in the dataset represents a benefit or program. \r\n</br></p>\r\n<li>Blank fields are NULL values in this dataset.</li></p>\r\nThe data can be used to develop new websites or directory resources to help residents to discover benefits they need. For access to the multilingual version of this dataset, please follow this link: <a href=\"https://data.cityofnewyork.us/City-Government/Benefits-and-Programs-Multilingual-Dataset/yjpx-srhp\">https://data.cityofnewyork.us/City-Government/Benefits-and-Programs-Multilingual-Dataset/yjpx-srhp</a>","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/kvhd-5fmu","update_datemadepublic":"5/16/2019","update_updatefrequency":"Weekly","last_data_updated_date":"2026-03-02T15:13:30.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecomplianc