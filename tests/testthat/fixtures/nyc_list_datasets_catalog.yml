        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"df32-vzax","name":"DEP Green Infrastructure (Point Layer)","description":"This dataset contains the locations and detailed information of green infrastructure practices in NYC neighborhoods built primarily through NYC Green Infrastructure Program initiatives. Green infrastructure (GI) collects stormwater from streets, sidewalks, and other hard surfaces before it can enter the sewer system or cause local flooding. The GI practice data contained in this dataset includes the location, program area, status, and type of GI. This dataset is updated by the NYC Department of Environmental Protection on a monthly basis.  \n\nThis layer is part of a larger Green Infrastructure dataset. You can download the full dataset and the data dictionary below under “Attachments”.\n\nSource Data: <a href=\"https://www.nyc.gov/dep/gimap\">DEP Green Infrastructure Program Map</a>","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/df32-vzax","update_datemadepublic":"10/17/2017","update_updatefrequency":"Monthly","last_data_updated_date":"2025-10-02T14:30:20.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"Yes","visits":"3493","downloads":"1049","row_count":"14315","column_count":"35","derived_view":false}
        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"eguu-7ie3","name":"Digital Tax Map: Condominium Units","description":"This table represents Condominium Units that exists in the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Department+of+Finance+Digital+Tax+Map&sortBy=relevance&page=1&pageSize=20\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map Collection</a>.\n\n• <strong>Updates:</strong> Data is extracted from DOF’s internal system on the last Friday of each month and refreshed on ArcGIS Online on the 1st. The online map always shows the most recent version.\n\n• <strong>Accessing the Data:</strong>  \n  • <strong>Digital Tax Map on NYC Open Data:</strong> See the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Department+of+Finance+Digital+Tax+Map&sortBy=relevance&page=1&pageSize=20\" target=\"_blank\" rel=\"noreferrer\">complete collection</a>.  \n  • <strong>Individual layers:</strong> Downloadable from the <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/ArcGIS/rest/services/DTM_ETL_DAILY_view/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map Feature Server</a>.  \n  • <strong>Complete source:</strong> Available through the <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_A/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Digital Tax Map service</a>, which always points to the latest monthly release.\n\n<strong>Note:</strong> To ensure reliability, the Tax Map alternates between <em>Set A</em> and <em>Set B</em> each month. If one set has issues, the previous month’s copy remains online. Both sets are kept about a month apart and are available for download:  \n    &nbsp;&nbsp;&nbsp;&nbsp;• <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_A/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Set A link</a>  \n    &nbsp;&nbsp;&nbsp;&nbsp;• <a href=\"https://services6.arcgis.com/yG5s3afENB5iO9fj/arcgis/rest/services/DTM_MONTHLY_Set_B/FeatureServer\" target=\"_blank\" rel=\"noreferrer\">Set B link</a>\n\n• <strong>Digital Alteration Book (DAB):</strong> The DAB is the official log of map changes—such as new lots, merges, or boundary shifts—providing a clear record of how the Tax Map evolves. It is available through the <a href=\"https://propertyinformationportal.nyc.gov/\" target=\"_blank\" rel=\"noreferrer\">Property Information Portal</a>.\n\n<b>Disclaimer:</b>  \nThis dataset reflects formal applications submitted to DOF but may not reflect the latest changes in other City systems (e.g., exemptions or buildings data). It is provided for informational purposes only and is not guaranteed to be accurate as of today’s date.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/eguu-7ie3","update_updatefrequency":"Weekly","last_data_updated_date":"2026-03-01T15:04:08.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"Yes","visits":"1360","downloads":"494","row_count":"305692","column_count":"16","derived_view":false}
