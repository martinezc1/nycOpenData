        ,{"datasetinformation_agency":"Taxi and Limousine Commission (TLC)","uid":"t7ny-aygi","name":"2013 Yellow Taxi Trip Data","description":"These records are generated from the trip record submissions made by yellow taxi Technology Service Providers (TSPs). Each row represents a single trip in a yellow taxi. The trip records include fields capturing pick-up and drop-off dates/times, pick-up and drop-off taxi zone locations, trip distances, itemized fares, rate types, payment types, and driver-reported passenger counts.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/t7ny-aygi","update_datemadepublic":"2/19/2016","update_updatefrequency":"Historical data","last_data_updated_date":"2015-11-12T18:38:36.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"3488","downloads":"2387","row_count":"173179759","column_count":"20","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"t4re-ksn6","name":"NYC Parks Sectors","description":"In order to appropriately manage City parks and allocate resources, NYC Parks has implemented three tiers of management [below the Borough level]. These three tiers can be represented as administrative geographic boundaries and are defined below: \n\nDistrict - One or more parks that are combined and generally align with New York City Community Boards. \n\nSector - One or more Park Districts that are combined in order share resources for daily maintenance. \n\nRegion - One or more Park Sectors that are combined and assigned a regional managers who provides high-level, strategic planning and support for Parks managers, including maximizing resources between Districts and Sectors.\n\nData Dictionary: https://docs.google.com/spreadsheets/d/1-FS_NDOUx0-OfKploVC0fIJrwOSdNmh1HKpkfyeoD1E/edit?usp=sharing","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/t4re-ksn6","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T13:41:33.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1495","downloads":"1599","row_count":"45","column_count":"7","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"mnkj-myjb","name":"NYC Parks Events Listing – Event YouTube Links","description":"The NYC Parks Events Listing database is used to store event information displayed on the Parks website, nyc.gov/parks. There are seven related tables that make up the this database: \r\n\r\n1. Events_Events table (This is the primary table that contains basic data about every event. Each record is an event.)\r\n2. Events_Categories (Each record is a category describing an event. One event can be in more than one category.)\r\n3. Events_Images (Each record is an image related to an event. One event can have more than one image.)\r\n4. Events_Links (Each record is a link with more information about an event. One event can have more than one link.)\r\n5. Events_Locations  (Each record is a location where an event takes place. One event can have more than one location.)\r\n6. Events_Organizers  (Each record contains a group or person organizing an event. One event can have more than one organizer.)\r\n7. Events_YouTube  (Each record is a link to a YouTube video about an event. One event can have more than one YouTube video.)\r\n\r\nThe Events_Events table is the primary table. All other tables can be related by joining on the event_id. This data contains records from  2013 and on. For a complete list of related datasets, please follow <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=NYC+Parks+Events&sortBy=alpha\">This Link</a>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/mnkj-myjb","update_datemadepublic":"06/11/2018","update_updatefrequency":"As needed","last_data_updated_date":"2021-08-02T05:30:45.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"No","visits":"1059","downloads":"2705","row_count":"587","column_count":"2","derived_view":false}
