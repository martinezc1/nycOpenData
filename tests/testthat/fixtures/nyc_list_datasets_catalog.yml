        ,{"datasetinformation_agency":"Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV)","uid":"7t9i-jsfp","name":"Annual Report on Domestic Violence Initiatives, Indicators and Factors","description":"This dataset contains reporting required under NYC Local Law 38 of 2019, which mandates that the Mayor’s Office to End Domestic and Gender-Based Violence (ENDGBV) annually report on domestic violence initiatives, indicators, and factors to ensure transparency and monitoring of services for survivors. It covers ENDGBV activities, including Family Justice Center visits, unique clients served, services received, contracted legal staffing and languages, and on-site economic empowerment programs. The dataset also tracks ENDGBV’s citywide training, youth, parent, and staff workshops on healthy relationships, and outreach activities, including community events and remote notifications. In addition, it lists reports and publications released by ENDGBV.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/7t9i-jsfp","update_datemadepublic":"3/10/2020","update_updatefrequency":"Annually","last_data_updated_date":"2026-02-23T19:51:19.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"3193","downloads":"2620","row_count":"326","column_count":"8","derived_view":false}
