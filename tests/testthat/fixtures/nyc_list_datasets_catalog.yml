        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"ufzp-rrqu","name":"Pedestrian Ramp Locations","description":"Pedestrian ramps provide access on and off streets and sidewalks and are an essential tool for all pedestrians. This data is a comprehensive list of all pedestrian ramps throughout New York City.\r\n\r\nPlease note that measurements shown are not indicative of whether a particular ramp is compliant with design and construction standards pursuant to the Americans with Disabilities Act (ADA). DOT applies additional parameters in its compliance assessment of the data collected by Cyclomedia, including specific site constraints located at or near a pedestrian ramp, otherwise referred to as a technical infeasibility in the ADA. The constraints that constitute a technical infeasibility can include but are not limited to elements such as underground vaults, transit facilities, steep terrain conditions, and limited public right-of-way, which are not readily apparent through the data and imagery collected. As such, compliance determinations at some locations require further analysis and site inspection. These locations are noted as “Pending Technical Review” in the published assessment available at: https://www.nycpedramps.info/survey.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/ufzp-rrqu","update_datemadepublic":"11/20/2020","update_updatefrequency":"Historical data","last_data_updated_date":"2021-10-27T15:26:30.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"5102","downloads":"2633","row_count":"217679