        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"ridc-7qqg","name":"NYC Parks Events Listing – Event Links","description":"The NYC Parks Events Listing database is used to store event information displayed on the Parks website, nyc.gov/parks. There are seven related tables that make up the this database: \r\n\r\n1. Events_Events table (This is the primary table that contains basic data about every event. Each record is an event.)\r\n2. Events_Categories (Each record is a category describing an event. One event can be in more than one category.)\r\n3. Events_Images (Each record is an image related to an event. One event can have more than one image.)\r\n4. Events_Links (Each record is a link with more information about an event. One event can have more than one link.)\r\n5. Events_Locations  (Each record is a location where an event takes place. One event can have more than one location.)\r\n6. Events_Organizers  (Each record contains a group or person organizing an event. One event can have more than one organizer.)\r\n7. Events_YouTube  (Each record is a link to a YouTube video about an event. One event can have more than one YouTube video.)\r\n\r\nThe Events_Events table is the primary table. All other tables can be related by joining on the event_id. This data contains records from  2013 and on. For a complete list of related datasets, please follow <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=NYC+Parks+Events&sortBy=alpha\">This Link</a>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/ridc-7qqg","update_datemadepublic":"06/11/2018","update_updatefrequency":"As needed","last_data_updated_date":"2021-08-02T05:14:05.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","leg