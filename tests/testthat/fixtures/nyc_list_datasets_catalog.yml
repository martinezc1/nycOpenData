        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"dpfn-5ihn","name":"Parks Syringe Disposal Kiosks Map","description":"• One line of data represents single syringe collection kiosk location, its capacity, how it is mounted, and when it was installed.\n• Data is collected via an ArcGIS Online web application.\n• Data is updated as necessary as kiosks are installed, moved, or removed. However, there is a delay between these actions happening and when the data is updated to reflect them.\n• Only active kiosk locations are shown. Former kiosk locations have  been removed.\n• The installation date is known to be incomplete. Minor shifts in kiosk locations do not typically entail the creation of a new record, rather the point is simply moved.\n• Redundant values for the KioskType field have been removed.","type":"map","category":"Public Safety","url":"https://data.cityofnewyork.us/d/dpfn-5ihn","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-24T18:08:30.000","update_automation":"Yes","visits":"709","downloads":"11","parent_uid":"r465-fr2q","derived_view":true}
