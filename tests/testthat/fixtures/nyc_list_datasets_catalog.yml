        ,{"datasetinformation_agency":"Business Integrity Commission (BIC)","uid":"krx7-u82t","name":"Trade Waste Broker Registrants","description":"Companies listed as of the most recent export date have been issued trade waste broker's registrations by the Business Integrity Commission. They are authorized to broker agreements between business customers and trade waste removal\r\ncompanies and/or to conduct evaluations of the customers' waste stream in order to recommend cost efficient means of waste disposal or other changes.\r\n\r\nThis data is collected on the entities that apply with the commission to operate as Class 2 Brokers \r\n\r\nEach record represents an entity that is approved to operate in the City of New York by the Commission. \r\n\r\nThe  Application Type field denotes the class of application 'CL2-Broker'  noting the type of applicant which is a  Broker Registrant They are authorized to broker agreements between business customers and trade waste removal companies throughout the city.\r\n\r\nThe BIC Number field is unique to every company that applies to the Commission.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/krx7-u82t","update_datemadepublic":"4/4/2017","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-23T19:41:23.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"23744","downloads":"6292","row_count":"211372","column_count":"25","derived_view":false}
