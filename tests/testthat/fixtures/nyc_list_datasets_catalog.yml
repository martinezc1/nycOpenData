        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"rmhc-afj9","name":"DSNY - PlowNYC Data","description":"A table containing physical ID (a unique street segment identifier) and the date/time with which it was last associated with a GPS signal emitted by a NYC Department of Sanitation (DSNY) snow clearing vehicle. The PlowNYC website (https://plownyc.cityofnewyork.us/plownyc/) allows you to track the progress of DSNY snow removal vehicles. To learn more about DSNY’s Snow Response, visit: https://www.nyc.gov/site/dsny/what-we-do/snow-response.page.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/rmhc-afj9","update_datemadepublic":"1/11/2017","update_updatefrequency":"As needed","last_data_updated_date":"2026-02-25T20:09:17.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"4691","downloads":"1859","row_count":"475113323","column_count":"3","derived_view":false}
