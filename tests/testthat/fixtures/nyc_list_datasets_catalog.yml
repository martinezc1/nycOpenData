        ,{"datasetinformation_agency":"Mayor's Office of Operations (OPS)","uid":"fb86-vt7u","name":"Capital Projects Dashboard - Citywide Budget and Schedule","description":"All major capital infrastructure projects with a committed budget. Financial information and agency schedule details for each project are joined via FMS ID. Only projects in the design phase or later have project schedules displayed. This dataset is part of the <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Capital+Projects+Dashboard\">Capital Projects Dashboard</a>.\r\n\r\nNote: Each row is uniquely identified by its Financial Management Service (FMS) ID. FMS ID is the unique ID that OMB uses for the FMS (Financial Information System). This ID can be universally joined with any OMB dataset that has the same field. The Capital Projects Dashboard is the result of joining OMB’s fiscal data with the agency’s schedule data. FMS IDs and agency projects don't always have a one-to-one relationship (i.e., one project schedule may correlate to multiple FMS IDs, and one FMS may correct to multiple projects with different schedules).","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/fb86-vt7u","update_datemadepublic":"12/20/2023","update_updatefrequency":"Other","last_data_updated_date":"2025-12-26T15:00:25.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Tri-annually","legislativecompliance_removedrecords":"No","visits":"5323","downloads":"16682","row_count":"50452","column_count":"27","derived_view":false}
