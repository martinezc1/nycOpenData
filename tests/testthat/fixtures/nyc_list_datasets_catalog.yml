        ,{"datasetinformation_agency":"Office of Labor Relations (OLR)","uid":"w65z-zif5","name":"New York City Deferred Compensation Plan  - Summary of Administrative Revenues and Expenses","description":"The Deferred Compensation Plan is an umbrella program for three defined contribution plans, the 457 Plan, 401(k) Plan, and 401(a) Plan, and a deemed IRA called the New York City Employee (NYCE) IRA. The administration of the City of New York Deferred Compensation Plan is entirely self-funded. DCP receives revenue through a combination of participants’ quarterly administrative fees, amounts deducted from the net asset values, and interest earned on assets held in the DCP’s custodial account. These revenue sources cover custodial and recordkeeping expenses, communications, and administrative expenses.  DCP Annual Comprehensive Financial Audit is available on the DCP website at:  https://www.nyc.gov/site/olr/deferred/dcp-forms-and-downloads.page","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/w65z-zif5","update_datemadepublic":"5/23/2025","update_updatefrequency":"Annually","last_data_updated_date":"2025-04-30T19:12:48.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1289","downloads":"319","row_count":"40","column_count":"11","derived_view":false}
