        ,{"datasetinformation_agency":"Conflicts of Interest Board (COIB)","uid":"jsiv-zh9r","name":"Legal Defense Trust Donations","description":"Pursuant to the City's Legal Defense Trusts Law, found in Chapter 11 of Title 3 of the New York City Administrative Code, a public servant (or someone acting on behalf of a public servant) may set up a legal defense trust to raise funds to pay for certain legal bills and expenses connected with the public servant’s City employment. This dataset lists information about donations made to legal defense trusts in accordance with the City's Legal Defense Trusts Law. Specifically, it includes the names and addresses of all persons who made a donation of $100 or more; the date of the donation; the value of the donation; and, if applicable, a description of an in-kind donation or pro bono assistance.\n\nFor more information about legal defense trusts and the laws that govern them, visit https://www.nyc.gov/site/coib/the-law/legal-defense-trusts-law.page.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/jsiv-zh9r","update_datemadepublic":"12/23/2024","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-01-20T18:33:05.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"254","downloads":"1411","row_count":"800","column_count":"10","derived_view":false}
