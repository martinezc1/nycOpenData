        ,{"datasetinformation_agency":"Mayor's Office of Environmental Coordination (MOEC)","uid":"did2-qzw3","name":"CEQR Project Locations","description":"CEQR Open Data contains information on projects that are undergoing or have completed review through the City Environmental Quality Review (CEQR) process. Project information available at the Open Data Portal includes the CEQR Number, Project Name, the Project Description, the Lead Agency, project milestones, and geographical locations. CEQR Open Data contains information on CEQR projects, which were filed with the Mayor’s Office from January 1, 2005 to the present.  For associated documents, please follow the links to the CEQR Access Database.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/did2-qzw3","update_datemadepublic":"6/15/2016","update_updatefrequency":"As needed","last_data_updated_date":"2026-03-24T14:02:18.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"3268","downloads":"5287","row_count":"43807","column_count":"8","derived_view":false}
