        ,{"datasetinformation_agency":"Mayor's Office of Climate and Environmental Justice (MOCEJ)","uid":"au6c-jqvf","name":"LL87 Energy Audit Data","description":"Local Law 87 energy audits from 2019-2024. This dataset includes detailed building-level energy audit results, collected using the U.S. Department of Energy's Asset Score Audit Template (Audit Template) tool. \n \nThe structure of the LL87 dataset has been updated due to the transition to data collection via Audit Template. To access Audit Template, visit: https://buildingenergyscore.energy.gov.\n \nField definitions and column names have been expanded and standardized relative the previous dataset (2012-2018). The total number of fields has increased from approximately 1,000 to 2,000 due to greater system-level detail captured by the new reporting tool, including multiple HVAC systems, energy conservation measures, and tenant space characteristics. While a small number of fields remain unchanged, many new fields have been introduced, and several fields from the previous dataset are no longer used or have been replaced. Users should refer to the updated “Column Information” tab in the data dictionary for full details.","type":"file","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/au6c-jqvf","update_datemadepublic":"9/16/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-09-16T16:54:21.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"24625","downloads":"4062","derived_view":false}
