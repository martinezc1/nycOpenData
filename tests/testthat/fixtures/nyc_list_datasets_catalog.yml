        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"t9nb-zfe4","name":"2011 D75 School Surveys","description":"NYC Department of Education 2011 District 75 School Surveys.\nEvery year, all parents, all teachers, and students in grades 6 - 12 take the NYC School Survey. The survey ranks among the largest surveys of any kind ever conducted nationally. \nSurvey results provide insight into a school's learning environment and contribute a measure of diversification that goes beyond test scores on the Progress Report. NYC School Survey results contribute 10% - 15% of a school's Progress Report grade (the exact contribution to the Progress Report is dependant on school type). Survey questions assess the community's opinions on academic expectations, communication, engagement, and safety and respect. School leaders can use survey results to better understand their own school's strengths and target areas for improvement","type":"file","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/t9nb-zfe4","update_datemadepublic":"05/09/2019","update_updatefrequency":"Historical data","last_data_updated_date":"2019-05-09T14:28:07.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"N/A","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"378","downloads":"405","derived_view":false}
