        ,{"datasetinformation_agency":"Mayor's Office of Contract Services (MOCS)","uid":"rbvx-jqnh","name":"FCRC Annual Concession Plan Franchises","description":"The Mayor’s Office of Contract Services oversees and certifies agency compliance with the applicable laws and regulations for franchises and concessions. In certain circumstances, franchises and concessions are also subject to the approval of the Franchise and Concession Review Committee (FCRC).\r\n\r\nFranchises are grants of the right to occupy or to use the City’s inalienable property, such as streets or parks, for a public service, e.g., transportation or telecommunications.\r\nConcessions are grants for the private use of city-owned property such as for food sales or recreational activity, with the City’s compensation typically tied to the concessionaire’s revenue. Concessions are also subject to the City's Concession Rules as codified in Title 12 of the Rules of the City of New York.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/rbvx-jqnh","update_datemadepublic":"4/22/2016","update_updatefrequency":"Annually","last_data_updated_date":"2016-04-22T22:03:26.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"Yes","visits":"1371","downloads":"1736","row_count":"65","column_count":"18","derived_view":false}
