        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"wz6d-d3jb","name":"Bedbug Reporting","description":"Property owners are required to obtain bedbug infestation history from tenants or a dwelling unit owner. This dataset captures the bedbug infestation history as reported by the property owner. \r\n</p>\r\nLocal Law 69 of 2017 requires that all multiple dwelling property owners must attempt to obtain the bed bug infestation history from the tenant or unit owner, including whether eradication measures were employed for a bedbug infestation.  The information reported in this file is self-reported information filed annually by property owners. Once the Bed Bug Annual Report has been filed, the property owner is required to either provide the filing receipt to each tenant (upon commencement of a new lease and with each lease renewal) OR post the filing receipt in a prominent location in the building. In addition, the property owner must either distribute to each tenant or post the DOHMH Preventing and Getting Rid of Bedbugs Safely guide, which provides information on the prevention, detection, and removal of bedbugs.  Each record in the file represents a filing completed. If a property has submitted two records for the same period, the second filing is the active final submission for the period.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/wz6d-d3jb","update_datemadepublic":"4/10/2020","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-15T21:52:17.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecomplian