        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"gf36-w2jr","name":"2019-2020 Local Law 102 Physical Education Report -Final","description":"Local Law 102 enacted in 2015 requires the Department of Education of the New York City School District to submit to the Council an annual report concerning physical education for the prior school year.  This report provides information about the provision of physical education instruction, including the average PE class size, average frequency and average total minutes per week of physical education as defined in Local Law 102, adapted PE and the granting of PE substitutions, as reported through the STARS database for the 2019-20 school year. It is important to note that schools self-report their scheduling information in STARS.  Furthermore, with the shift to remote learning in March 2020, NYSED waived instructional seat time requirements for the remainder of the 2019-20 school year. As a result, PE instruction data is reported for all grade levels as of the midyear of the 2019-20 school year.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/gf36-w2jr","update_datemadepublic":"02/24/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-02-24T19:18:44.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1490","downloads":"909","row_count":"759","column_count":"8","derived_view":false}
