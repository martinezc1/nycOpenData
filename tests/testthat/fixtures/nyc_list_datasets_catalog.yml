        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"y9w2-ph8n","name":"2010 Census Blocks","description":"Census Blocks from the 2010 US Census for New York City clipped to the shoreline. These boundary files are derived from the US Census Bureau's TIGER project and have been geographically modified to fit the New York City base map. Because some census blocks are under water not all census blocks are contained in this file, only census blocks that are partially or totally located on land have been mapped in this file.\n\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/census-blocks\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 26a","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/y9w2-ph8n","update_datemadepublic":"1/31/2013","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-03-09T20:54:49.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Quarterly","legislativecompliance_removedrecords":"Yes","visits":"447","downloads":"409","row_count":"38797","column_count":"8","derived_view":false}
        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"uqmk-4y2w","name":"Youth Risk Behavior Survey (Middle School)","description":"The NYC Middle School Youth Risk Behavior Survey (MS YRBS) is conducted through an ongoing collaboration between the New York City Department of Health and Mental Hygiene (DOHMH), the Department of Education (DOE), and the National Centers for Disease Control and Prevention (CDC). The New York City's YRBS is part of the CDC's National Youth Risk Behavior Surveillance System (YRBSS). The survey's primary purpose is to monitor priority health risk behaviors that contribute to the leading causes of mortality, morbidity, and social problems among youth in New York City. For more information, visit https://www1.nyc.gov/site/doh/data/data-sets/nyc-youth-risk-behavior-survey.page","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/uqmk-4y2w","update_updatefrequency":"Every 2 years","last_data_updated_date":"2022-01-20T17:55:58.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Biennially","legislativecompliance_removedrecords":"No","visits":"2000","downloads":"1301","row_count":"3","column_count":"6","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office of Management & Budget (OMB)","uid":"ugzk-a6x4","name":"Revenue Budget & Financial Plan -- Exec\\Adpt\\Prel","description":"This dataset contains agency revenue data for Adopted, Modified and five years of Financial Plan by Revenue Class, Revenue Category and Revenue Source (Revenue Structure) or FPS Group name. The numbers within can be summarized to match pages from either the Supporting Schedule, Departmental Estimate or the Expense, Revenue, Contact Budget.  This dataset is updated three times per year after publication of the Preliminary, Executive and Adopted Budget, usually in January, April and June respectively.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/ugzk-a6x4","update_datemadepublic":"2/8/2017","update_updatefrequency":"Other","last_data_updated_date":"2026-02-19T21:55:30.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"6411","downloads":"2874","row_count":"53412","column_count":"23","derived_view":false}
        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"f9wb-g8mb","name":"NYC Cooling Tower System Inspection Results","description":"This dataset includes cooling tower regulatory inspection results from the NYC Health Department’s Office of Building Water Systems Oversight (BWSO). \r\n\r\nThe dataset includes results from two inspection types: cycle or non-cycle.  Cycle inspections are regular compliance inspections conducted by BWSO to confirm adherence with cooling tower regulations.  Non-cycle may include follow-up inspections or other regulatory inspections to evaluate public health risks.Cooling tower systems that are compliant at the time of inspection have the inspection date with blank values for the violation and citation columns. Building owners that are subject to financial penalties for a cited violation receive a notice of violation with a summons number, as shown in the dataset. The Office of Administrative Trial and Hearings (OATH) adjudicates the summons.\r\n\r\nHearing status and adjudication result are shown separately in the Cooling Tower Hearings dataset (a subset of the OATH Hearings Division Case Status dataset). The summons number in this dataset corresponds with the ticket number field in the Cooling Towers Hearings dataset.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/f9wb-g8mb","update_datemadepublic":"7/14/2023","update_updatefrequency":"Quarterly","last_data_updated_date":"2026-01-22T18:48:31.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"3535","downloads":"4544","row_count":