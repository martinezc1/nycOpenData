        ,{"datasetinformation_agency":"Civilian Complaint Review Board (CCRB)","uid":"keep-pkmh","name":"Civilian Complaint Review Board: Penalties","description":"A table listing recommended and final penalties for each officer with a substantiated complaint of misconduct since the year 2000. Non-charges cases go through the Department Advocate's Office (DAO) and are recorded as non-APU where relevant in the table, while charges cases are prosecuted by the Administrative Prosecution Unit (APU) and are marked as APU penalties and recommendations. In all cases the NYPD Commissioner will issue a final penalty, labeled as \"NYPD Officer Penalty\" in the dataset. \n\nThe dataset is part of a <a href=\"https://data.cityofnewyork.us/browse?q=&sortBy=newest&utf8=%E2%9C%93&pageSize=20&Data-Collection_Data-Collection=CCRB+Complaints+Database\">database of all public police misconduct records the Civilian Complaint Review Board (CCRB) maintains</a> on complaints against New York Police Department uniformed members of service received in CCRB's jurisdiction since the year 2000, when CCRB's database was first built. This data is published as four tables:\n\n<a href=\"https://data.cityofnewyork.us/d/2fir-qns4/\">Civilian Complaint Review Board: Police Officers</a>\n<a href=\"https://data.cityofnewyork.us/d/2mby-ccnw/\">Civilian Complaint Review Board: Complaints Against Police Officers</a>\n<a href=\"https://data.cityofnewyork.us/d/6xgr-kwjq/\">Civilian Complaint Review Board: Allegations Against Police Officers</a>\n<a href=\"https://data.cityofnewyork.us/d/keep-pkmh/\">Civilian Complaint Review Board: Penalties</a>\n\nA single complaint can include multiple allegations, and those allegations may include multiple subject officers and multiple complainants.\n\nPublic records exclude complaints and allegations that were closed as Mediated, Mediation Attempted, Administrative Closure, Conciliated (for some complaints prior to the year 2000), or closed as Other Possible Misconduct Noted.\n\nThis database is inclusive of prior datasets held on Open Data (previously maintained as \"Civilian Complaint Review Board (CCRB) - Complaints Received,\" \"Civilian Complaint Review Board (CCRB) - Complaints Closed,\" and \"Civilian Complaint Review Board (CCRB) - Allegations Closed\") but includes information and records made public by the June 2020 repeal of New York Civil Rights law 50-a, which precipitated a full revision of what CCRB data could be considered public.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/keep-pkmh","update_datemadepublic":"12/06/2022","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-24T14:03:50.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"3969","downloads":"9016","row_count":"14579","column_count":"13","derived_view":false}
