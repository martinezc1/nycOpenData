        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"h2wd-pfdx","name":"Forestry Inspections","description":"Record of Forestry inspections for NYC Parks & Recreation. Inspections are initiated by a service request or internal process and may result in a work order. \n\nInspections are used to record field observations.  ForMS 2.0 requires that Inspections can only be created from either a Tree Point or Planting Space based on the asset in question.  Inspection types vary depending on the inspector’s workflow: \n• level 1 (limited visual)\n• level 2 (basic) \n• level 3 (advanced)\n• Re-inspection\n• Sidewalk Rating (Trees and Sidewalks Inspections)\n• General – Planting Space (Street Tree Planting Inspections)\n\nThis dataset can be joined to the Forestry Tree Points dataset by joining TreePointGlobalID from Forestry Inspections to GLOBALID from Forestry Tree Points.\n\nUser guide: https://docs.google.com/document/d/1PVPWFi-WExkG3rvnagQDoBbqfsGzxCKNmR6n678nUeU/edit?usp=sharing\n\nData dictionary: https://docs.google.com/spreadsheets/d/1yMfZgcsrvx9M0b3-ZdEQ3WCk2dFxgitCWytTrJSwEAs/edit?usp=sharing","type":"map","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/h2wd-pfdx","update_datemadepublic":"3/8/2017","update_updatefrequency":"Every 2 weeks","last_data_updated_date":"2026-03-24T18:04:36.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"644","downloads":"42","parent_uid":"4pt5-3vv4","derived_view":true}
