        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"8s5k-n45n","name":"LinkNYC Kiosk Status (Archived)","description":"This dataset provides a historical listing of LinkNYC Kiosks, their location, and the status of the Link’s wifi, tablet, and phone.  To view the current days status on it own, visit the LinkNYC Kiosk Status dataset at the following link (https://data.cityofnewyork.us/City-Government/LinkNYC-Kiosk-Status/n6c5-95xh)\n.  \nLinkNYC is a first-of-its-kind communications network that will bring the fastest available free public Wi-Fi to millions of New Yorkers, small businesses, and visitors. Built at no cost to taxpayers, the five-borough LinkNYC network will, through advertising proceeds, generate more than $500 million in revenue for the City over the initiative’s first 12 years. Granted a franchise by the City in 2014, CityBridge will administer construction of the LinkNYC network.\nBy replacing the aging network of public pay telephones with state-of-the-art Links, CityBridge will transform the physical streetscape, enhance New Yorkers’ access to information, and create new local jobs for the development, servicing and maintenance of the structures.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/8s5k-n45n","update_datemadepublic":"6/28/2018","update_updatefrequency":"Historical data","last_data_updated_date":"2018-11-20T14:07:29.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1744","downloads":"2120","row_count":"288199","column_count":"25","derived_view":false}
