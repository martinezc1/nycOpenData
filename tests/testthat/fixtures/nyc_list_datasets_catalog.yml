        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"v7f4-yzyg","name":"VZV Vision Zero View Data","description":"Data that that populates the Vision Zero View map, which can be found at www.nycvzv.info Vision Zero is the City's goal for ending traffic deaths and injuries. The Vision Zero action plan can be found at http://www.nyc.gov/html/visionzero/pdf/nyc-vision-zero-action-plan.pdf Crash data is obtained from the Traffic Accident Management System (TAMS), which is maintained by the New York City Police Department (NYPD). Only crashes with valid geographic information are mapped. All midblock crashes are mapped to the nearest intersection. Injuries and fatalities are grouped by intersection and summarized by month and year. This data is queried and aggregated on a monthly basis and is current as of the query date. Current year data is January to the end of the latest full month. All mappable crash data is represented on the simplified NYC street model. Crashes occurring at complex intersections with multiple roadways are mapped onto a single point. Injury and fatality crashes occurring on highways are excluded from this data. Please note that this data is preliminary and may contain errors, accordingly, the data on this site is for informational purposes only. Although all attempts to provide the most accurate information are made, errors may be present and any person who relies upon this data does so at their own risk.","type":"href","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/v7f4-yzyg","update_datemadepublic":"7/22/2015","update_updatefrequency":"Monthly","last_data_updated_date":"2015-07-22T19:25:26.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"N/A","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternal