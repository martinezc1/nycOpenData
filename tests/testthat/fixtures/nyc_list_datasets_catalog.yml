        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"7i33-iphh","name":"VZV Taxi & Car Service Training Locations","description":"Taxi fleets, for-hire vehicle bases, and industry associations have been welcoming TLC into their establishments to discuss Vision Zero and traffic safety. TLC staff use a presentation to guide this discussion, and at the end of the session drivers sign the TLC Safe Driver Pledge.\r\n\r\nFor a complete list of Vision Zero maps, please follow <a href=\"https://data.cityofnewyork.us/browse?q=vzv&sortBy=last_modified&utf8=%E2%9C%93\">this link</a>","type":"map","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/7i33-iphh","update_datemadepublic":"05/31/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:23:11.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"1846","downloads":"360","parent_uid":"gq2c-wem9","derived_view":true}
