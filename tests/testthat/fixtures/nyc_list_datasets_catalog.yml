        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"a2gn-nyzs","name":"School Discharge Reporting (Local Law 42)","description":"This dataset provides annual reporting on New York City Department of Education student discharges and transfers, as required by Local Law 42. It includes the number of students discharged or transferred by grade or cohort, disaggregated by demographics (race/ethnicity, gender, age, English language learner status, and special education status) and summarized at multiple geographic levels (citywide, borough, district, and school). Discharge and transfer codes indicate the reason students exited or moved within the system.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/a2gn-nyzs","update_datemadepublic":"10/3/2025","update_updatefrequency":"Annually","last_data_updated_date":"2025-10-03T13:49:18.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"403","downloads":"294","row_count":"302088","column_count":"11","derived_view":false}
