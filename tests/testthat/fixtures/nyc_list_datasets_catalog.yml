        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"p937-wjvj","name":"Rodent Inspection","description":"Dataset contains information on rat inspections.\n\nRat Information Portal Data Release Notes        April 20, 2015\n\nThe Rat Information Portal (RIP) is a web-based mapping application where users can view rat inspection data. \n\nData sources: NYC Department of Health and Mental Hygiene (DOHMH), Division of Environmental Health Pest Control Database\n\nNotes on data limitations: Please note that if a property/taxlot does not appear in the file, that does not indicate an absence of rats - rather just that it has not been inspected. Similarly, neighborhoods with higher numbers properties with active rat signs may not actually have higher rat populations but simply have more inspections. \n\nSee our Data Disclaimer:\nhttp://www.nyc.gov/rats","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/p937-wjvj","update_datemadepublic":"12/16/2015","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-24T09:38:26.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"No","visits":"53931","downloads":"18265","row_count":"2446710","column_count":"34","derived_view":false}
        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"mdbu-nrqn","name":"Open Market Order (OMO) Charges","description":"The data set contains information on work orders created through HPD's Emergency Repair Program, Alternative Enforcement Program and Demolition programs and fees assessed against properties by HPD pursuant to the Housing Maintenance Code. The work orders are created to conduct emergency repair work when an owner fails to address a hazardous condition pursuant to the requirements of an HPD-issued violation, a Department of Buildings Declaration of Emergency, a Department of Health Commissioner's Order to Abate or an emergency violation issued by another City Agency. The work orders may be issued to a private vendor following the City's Procurement Rules or may be conducted by agency staff.\r\n\r\nThis is part of the <a href=https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=HPD+Charge+Data>HPD Charge Data collection of data tables.</a>","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/mdbu-nrqn","update_datemadepublic":"9/30/2014","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-24T15:37:00.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"17049","downloads":"17982","row_count":"501667","column_count":"32","derived_view":false}
