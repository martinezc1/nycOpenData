        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"95kh-h6zc","name":"Dewatered Solids and Biosolids Allocations per Biosolids Management Practice Site","description":"This dataset contains annual allocations of dewatered solids or biosolids from a specific dewatering facility to a specific management practice site in dry metric tons. 'Dewatered solids' are the solids remaining in digested sludge after removal of water in a dewatering facility. 'Biosolids', per the US Environmental Protection Agency (EPA), is treated sewage sludge that meets the EPA pollutant, pathogen & vector attraction requirements for land application and surface disposal, and the DEP has certified it with the EPA as such. \n\nBiosolids in this case are also dewatered. Depending on the material being managed (i.e., dewatered solids or biosolids), a 'management practice site' may be one of the following: 1) a third party vendor treatment facility (e.g., composting, dryer, alkaline treatment) that converts the dewatered solids into biosolids for beneficial reuse in various land application practices (e.g., agricultural land application, reclamation site application) or for distribution/marketing as a soil amendment or fertilizer; 2) a direct  land application site for agricultural use (typically a farm); or 3) a landfill. The dataset includes the pathogen (disease-causing organism) reduction and vector (an animal capable of transmitting disease such as flies or rodents) attraction reduction options employed as part of the treatment and the type of biosolids class produced, if applicable. There are different biosolids class types, each having specified treatment requirements for pollutants, pathogens and vector attraction reduction, as well as general requirements and management practices,  \n\nFor more information regarding biosolids compliance, treatment, uses and class types please refer to: <a href=\"https://www.epa.gov/biosolids\">https://www.epa.gov/biosolids</a>.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/95kh-h6zc","update_datemadepublic":"11/15/2023","update_updatefrequency":"Annually","last_data_updated_date":"2025-11-21T15:44:11.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"N/A","visits":"1334","downloads":"961","row_count":"206","column_count":"11","derived_view":false}
