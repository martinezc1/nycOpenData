        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"v8i9-yfpr","name":"Adding Chemicals to Water Supply Permits","description":"The Adding Chemicals to Water Supply permit is required for persons who engage in the business of chemically treating the drinking water supply within a building. This permit allows chemicals to be added only for anti-corrosion, anti-scaling or disinfection purposes. This dataset contains a list of current permittees who may add chemical treatment to a building's drinking water in New York City.  To learn more about this permit program and related health code, please visit<a href=\"https://www.nyc.gov/nycbusiness/description/adding-chemicals-to-water-supply-permit\" target=\"_blank\" rel=\"noopener noreferrer\"> https://www.nyc.gov/nycbusiness/description/adding-chemicals-to-water-supply-permit</a>\r\n</p>\r\nData is collected to track the adding chemicals to water supply permits issued by DOHMH and is managed by the Office of Public Health Engineering.\t\t\t\r\n</p>\r\nThis data can be used to find a company or individual that has a current adding chemicals to water supply permit in New York City. It can also be used to verify the permit for a business or persons that engages in the business of chemically treating the drinking water supply in a building.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/v8i9-yfpr","update_datemadepublic":"10/12/2023","update_updatefrequency":"Annually","last_data_updated_date":"2025-08-18T18:55:29.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1520