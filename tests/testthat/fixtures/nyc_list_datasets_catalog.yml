        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"v4se-2t5p","name":"2017-2018 Career and Technical Report LL174","description":"Local Law 174 enacted in 2016 requires the Department of Education of the New York City School District to submit to the Council an annual report concerning Career and Technical Education programs in New York city schools. \nThis report provides information about Career and Technical Education (CTE) programs and students in CTE programs and CTE-designated high schools, as defined in Local Law 174 as reported through the 2017-2018 STARS database. CTE Designated High Schools are those in which all students are engaged in NYC DOE-approved CTE sequences of instruction that integrate rigorous academic study with workforce skills in specific career pathways. It is important to note that schools self-report their scheduling information in STARS. The report also includes information regarding the number and ratio of certified CTE instructors.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/v4se-2t5p","update_datemadepublic":"12/22/2020","update_updatefrequency":"Historical data","last_data_updated_date":"2020-12-22T20:50:53.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"406","downloads":"833","row_count":"278","column_count":"11","derived_view":false}
