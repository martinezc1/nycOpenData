        ,{"datasetinformation_agency":"New York City Housing Authority (NYCHA)","uid":"5r5y-pvs3","name":"NYCHA Resident Data Book Summary","description":"Contains resident demographic data at a summary level.\nThe Resident Data Book is compiled to serve as an information source for queries involving resident demographic as well as a source of data for internal analysis.  Statistics are compiled via HUD mandated annual income reviews involving NYCHA Staff and residents. Data is then aggregated and compiled by development.  Each record pertains to a single public housing development.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/5r5y-pvs3","update_datemadepublic":"3/4/2013","update_updatefrequency":"Annually","last_data_updated_date":"2025-08-01T17:22:54.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"Yes","visits":"21676","downloads":"6540","row_count":"26","column_count":"43","derived_view":false}
