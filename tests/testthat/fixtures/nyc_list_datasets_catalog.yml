        ,{"datasetinformation_agency":"Mayor's Office of Environmental Remediation (OER)","uid":"r9ca-6t4q","name":"Historic Land Use Data","description":"Historic land uses on lots that were vacant, privately owned, and zoned for manufacturing in 2009.  Information came from a review of several years of historical Sanborn maps over the past 100 years.  \r\n</p>\r\nWhen the SPEED 1.0 mapping application was created in 2009, OER had its vendor examine historic land use maps on vacant, privately-owned, industrially-zoned tax lots.  Up to seven years of maps for each lot were examined, and information was recorded that indicated industrial uses or potential environmental contamination such as historic fill.  Data for an additional 139 lots requested by community-based organizations was added in 2014.  Each record represents the information from a map from a particular year on a particular tax lot at that time.  Limitations of funding determined the number of lots included and entailed that not all years were examined for each lot.","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/r9ca-6t4q","update_datemadepublic":"12/23/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-11-17T17:02:48.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"6049","downloads":"1672","row_count":"33963","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Landmarks Preservation Commission (LPC)","uid":"ncre-qhxs","name":"Designated and Calendared Buildings and Sites","description":"Provides information on all items designated or under consideration for designation (i.e. calendared) by the New York City Landmarks Preservation Commission (LPC). </br>\nThis dataset contains information on all items designated or under consideration for designation (i.e. calendared) by the New York City Landmarks Preservation Commission (LPC). The dataset contains records for each individual, scenic, or interior landmark, as well as properties or sites located within the boundaries of historic districts. Please note that points in this dataset represent individual buildings in addition to non-building sites (such as vacant lots or monuments) regulated by LPC. It is possible for a single property to have multiple designations (such as individual and interior designations, or individual and historic district). For this reason, it is not uncommon to see multiple points on a single tax lot and multiple records for a single property within the database. Please pay close attention to the \"MOST_CURRENT,\" \"BBL_STATUS and \"LAST_ACTION_ON_LP\" fields, which together denote the designation status of a site/property (see Attribute Definitions for more information). The geographic locations of the points in this dataset are derived primarily from the Department of City Planning's PLUTO data in combination with the Department of Information Technology & Telecommunication's building footprint information. Because this dataset is not automatically updated when changes occur in the underlying dataset, BIN numbers and tax lot information are potentially out of date. Please pay close attention to the field descriptions present in the file's metadata to understand how to use this data set.\n</p>\n<b><em>Time values are auto-generated and do not reflect the official time of any LPC action, including designation or calendaring.</em></b>","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/ncre-qhxs","update_datemadepublic":"3/11/2015","update_updatefrequency":"As needed","last_data_updated_date":"2026-02-02T21:09:00.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"7639","downloads":"3484","row_count":"39385","column_count":"29","derived_view":false}
