        ,{"datasetinformation_agency":"Mayor's Office of Contract Services (MOCS)","uid":"uyiw-98i7","name":"HHS Accelerator Prequalified Providers","description":"Provider organizations that have been prequalified to compete for City funding in specific health and human services areas. In HHS Accelerator, the City's system for procuring health and human services, prequalification is based on: experience providing the service; a key staff member able to provide the service; or a capability statement describing the organization's ability to expand into the service area. Prequalification in a service area does not necessarily indicate that an organization currently provides the service at this time. Addresses provided below indicate the organization's administrative office, and may not be the location at which services are provided. For more information on HHS Accelerator prequalification process, visit http://www.nyc.gov/html/hhsaccelerator/html/application/application.shtml","type":"filter","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/uyiw-98i7","update_datemadepublic":"12/4/2014","update_updatefrequency":"Monthly","last_data_updated_date":"2024-09-01T20:05:59.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"N/A","visits":"3815","downloads":"1796","row_count":"33542","column_count":"9","parent_uid":"crgf-7num","derived_view":true}
