        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"dsg6-ifza","name":"DOHMH Childcare Center Inspections (Historical)","description":"This dataset contains a list of all inspections conducted and any associated violations at active, city-regulated, center-based child care programs and summer camps over the past 3 years. The violations are pre-adjudicated. Violations that are subject to potential penalties (fines) are submitted to NYC Office of Administrative Trials and Hearing where they are adjudicated as either sustained/upheld or dismissed. The dataset also contains additional information on the programs, including license information. \n\nCurrently active NYC regulated childcare centers and their inspection results, as well as more information on child care in NYC, can be found here: https://www1.nyc.gov/site/doh/services/child-care.page.\n\n</p>\n<em>Note: Due to an ongoing upgrade, this dataset reflects data as of 5/14/2019. We will resume publishing updated data when the upgrade is completed. We apologize for any inconvenience.\"</em>","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/dsg6-ifza","update_datemadepublic":"7/1/2016","update_updatefrequency":"Daily","last_data_updated_date":"2023-04-26T14:15:15.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"38485","downloads":"22527","row_count":"27828","column_count":"34","derived_view":false}
        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"f7dc-2q9f","name":"SARS-CoV-2 concentrations measured in NYC Wastewater","description":"Results of sampling to determine the SARS-CoV-2 N gene levels in NYC DEP Wastewater Resource Recovery Facility (WRRF) influent, disaggregated by the WRRF where the sample was collected, date sample was collected, and date sample was tested.\n\nRT-qPCR was changed to digital PCR in April of 2023, resulting values are about 10-20 times higher than those of RT-qPCR. Please refer to this <a href=\"https://data.cityofnewyork.us/api/views/f7dc-2q9f/files/b96b4f2f-45d0-4690-a68e-2343f8e5967a?download=true&filename=OpenDataDtldDscrp-060823.docx\" target=\"_blank\" rel=\"noopener noreferrer\">supporting documentation</a> for more technical information\n\nData may be used to track trends in SARS-CoV-2 concentrations in NYC WRRF influent. Dataset does not include COVID-19 case rates.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/f7dc-2q9f","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-02T14:54:35.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"67679","downloads":"4595","row_count":"7462","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"qpgi-ckmp","name":"Athletic Facilities","description":"This dataset contains facilities that were designed specifically with sports in mind. These facilities are not the only places within parks where sports can be played. This layer contains all of the facilities that can be permitted for athletic activity and facilities that are specifically designated for sports but are not available for permitting. \n \nThis information is used by the Citywide Event Management System (CEMS) to book permits for Parks' athletic facilities. More information about athletic facility permits can be viewed at https://www.nycgovparks.org/permits/\n \nThis dataset uses the standard NYC projection of NAD_1983_StatePlane_New_York_Long_Island_FIPS_3104_Feet. Lengths are in feet and areas in square feet.\n\nData Dictionary: https://docs.google.com/spreadsheets/d/1iIhwuLBlIus2n1EQ2a329jX4oJciXt9dEaxOFPpHfE8/edit?usp=sharing","type":"map","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/qpgi-ckmp","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T14:07:39.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"3246","downloads":"17","parent_uid":"qnem-b8re","derived_view":true}
        ,{"datasetinformation_agency":"Fire Department of New York City (FDNY)","uid":"bi53-yph3","name":"Bureau of Fire Prevention - Active Violation Orders (Historical)","description":"<b>NOTE:</b> <i>The source database for this dataset has been decommissioned. No new data will be added to this dataset.</i>\r\n\r\nThis dataset contains active violation orders given by the Bureau of Fire Prevention. This dataset does not contain Violation Orders given by fire companies, or any Notices of Violation. For data on Notices of Violation, please refer to datasets provided by the Office of Administrative Trials and Hearings (OATH).","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/bi53-yph3","update_datemadepublic":"11/14/2017","update_updatefrequency":"Historical data","last_data_updated_date":"2019-03-07T19:01:26.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"11699","downloads":"2618","row_count":"52406","column_count":"21","derived_view":false}
        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"pvqr-7yc4","name":"Parking Violations Issued - Fiscal Year 2026","description":"This dataset provides data on Parking Violations Issued between July 1, 2025 to June 30, 2026.  In New York City, the fiscal year begins on July 1st of one calendar year and ends on June 30th of the following calendar year.  <a target=\"_blank\" href=\"https://www.nyc.gov/site/omb/faq/frequently-asked-questions.page#:~:text=our%20Careers%20page.-,The%20Expense%20Budget,-What%20is%20the\">Click here</a> to find out more about the NYC Fiscal Year.\n<br>Parking Violations Issuance datasets contain violations issued during the respective fiscal year. The Issuance datasets are not updated to reflect violation status, the information only represents the violation(s) at the time they are issued. Since appearing on an issuance dataset, a violation may have been paid, dismissed via a hearing, statutorily expired, or had other changes to its status. To see the current status of outstanding parking violations, please look at the <a target=\"_blank\" href=\"https://data.cityofnewyork.us/City-Government/Open-Parking-and-Camera-Violations/nc67-uf89\">Open Parking & Camera Violations</a> dataset.\n<br>You may find all of the Parking Violations Issued since fiscal year 2014 in this <a target=\"_blank\" href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=DOF+Parking+Violations+Issued&q=&sortBy=alpha&utf8=%E2%9C%93\">dataset collection</a>.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/pvqr-7yc4","update_datemadepublic":"8/24/2017","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-17T16:26:32.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"131540","downloads":"23540","row_count":"9984997","column_count":"44","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"5vb5-y6cv","name":"Walk-to-a-Park Service area","description":"The Walk to a Park initiative focuses on increasing access to parks and open spaces, concentrating on areas of the city that are under-resourced and where residents are living further than a walk to a park. NYC Parks calculates the number of New Yorkers within walking distance of a park and reports on this as part of the Mayor’s Management Report. “Walking distance” is defined as a 1/4-mile or less for sites such as small playgrounds and sitting areas; or a 1/2-mile or less for larger parks that serve a wider region, typically over 8 acres or situated on the waterfront. Certain properties in NYC Parks' portfolio, such as cemeteries, community gardens, or sites with no recreational equipment were not included in this analysis. Similarly, some parks and open-space amenities not under the jurisdiction of NYC Parks were included in this analysis, as they provide recreational value.\r\n\r\nThis dataset includes two ESRI shapefiles of access points, one for sites that get a 1/4-mile buffer and one for sites that get a 1/2-mile buffer. It also includes an ESRI shapefile of the combined polygon that is the output of this analysis. This polygon represents the total area within walking distance of a park. To generate the number of New Yorkers within that distance, the polygon is compared with data from the U.S. Census.\r\n\r\nThis information is only current as of the publication date. For more information about this analysis and the Walk to a Park Initiative, visit: https://www.nycgovparks.org/planning-and-building/planning/walk-to-a-park","type":"map","category":"Recreation","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/5vb5-y6cv","update_datemadepublic":"9/27/2017","update_updatefrequency":"As needed","last_data_updated_date":"2023-07-19T19:58:47.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"14130","downloads":"998","parent_uid":"99ii-hwh9","derived_view":true}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"n55z-cx8y","name":"Single Use Parking Permit - On Street","description":"Parking Permits issued for a particular purpose in designated parking zones or at specific locations for prearranged periods of time,and is not issued for commercial activities or to commercial vehicles.These permits are issued pursuant to Section 4-08 (o)(4) of Title 34 of the Rules of the City of New York.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/n55z-cx8y","update_datemadepublic":"01/06/2020","update_updatefrequency":"Every 6 months","last_data_updated_date":"2026-03-17T14:59:17.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2025","downloads":"2575","row_count":"1883","column_count":"16","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"bqye-aqft","name":"VZV Neighborhood Slow Zones","description":"The Neighborhood Slow Zone program is an application based program which takes a neighborhood area and reduces the speed limit to 20 mph. Areas are chosen based on crashes, presence of schools and other neighborhood amenities, and community support. The treatments include a mixture of markings, signage, and speed humps.\r\n\r\nFor a complete list of Vision Zero maps, please follow <a href=\"https://data.cityofnewyork.us/browse?q=vzv&sortBy=last_modified&utf8=%E2%9C%93\">this link</a>","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/bqye-aqft","update_datemadepublic":"05/31/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:14:50.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"Yes","visits":"726","downloads":"890","row_count":"28","column_count":"5","derived_view":false}
        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"yjub-udmw","name":"NYC Wi-Fi Hotspot Locations","description":"NYC Wi-Fi Hotspot Locations Wi-Fi Providers: \r\nCityBridge, LLC (Free Beta): LinkNYC 1 gigabyte (GB), Free Wi-Fi Internet Kiosks\r\nSpot On Networks (Free) NYC HOUSING AUTHORITY (NYCHA) Properties\r\nFiberless (Free): Wi-Fi access on Governors Island Free - up to 5 Mbps for users as the part of Governors Island Trust Governors Island Connectivity Challenge\r\nAT&T (Free): Wi-Fi access is free for all users at all times. \r\nPartners: In several parks, the NYC partner organizations provide publicly accessible Wi-Fi. Visit these parks to learn more information about their Wi-Fi service and how to connect. \r\nCable (Limited-Free): In NYC Parks provided by NYC DoITT Cable television franchisees. \r\nALTICEUSA previously known as “Cablevision” and SPECTRUM previously known as “Time Warner Cable” (Limited Free) Connect for 3 free 10 minute sessions every 30 days or purchase a 99 cent day pass through midnight. Wi-Fi service is free at all times to Cablevision’s Optimum Online and Time Warner Cable broadband subscribers. \r\nWi-Fi Provider: Chelsea Wi-Fi (Free) Wi-Fi access is free for all users at all times. \r\nChelsea Improvement Company has partnered with Google to provide Wi-Fi a free wireless Internet zone, a broadband region bounded by West 19th Street, Gansevoort Street, Eighth Avenue, and the High Line Park. \r\nWi-Fi Provider: Downtown Brooklyn Wi-Fi (Free) \r\nThe Downtown Brooklyn Partnership - the New York City Economic Development Corporation to provide Wi-Fi to the area bordered by Schermerhorn Street, Cadman Plaza West, Flatbush Avenue, and Tillary Street, along with select public spaces in the NYCHA Ingersoll and Whitman Houses. \r\nWi-Fi Provider: Manhattan Downtown Alliance Wi-Fi (Free) \r\nLower Manhattan Several public spaces all along Water Street, Front Street and the East River Esplanade south of Fulton Street and in several other locations throughout Lower Manhattan. \r\nWi-Fi Provider: Harlem Wi-Fi (Free) \r\nThe network will extend 95 city blocks, from 110th to 138th Streets between Frederick Douglass Boulevard and Madison Avenue is the free outdoor public wireless network. \r\nWi-Fi Provider: Transit Wireless (Free) \r\nWi-Fi Services in the New York City subway system is available in certain underground stations. For more information visit http://www.transitwireless.com/stations/. \r\nWi-Fi Provider: Public Pay Telephone Franchisees (Free) \r\nUsing existing payphone infrastructure, the City of New York has teamed up with private partners to provide free Wi-Fi service at public payphone kiosks across the five boroughs at no cost to taxpayers. \r\nWi-Fi Provider: New York Public Library \r\nUsing Wireless Internet Access (Wi-Fi): All Library locations offer free wireless access (Wi-Fi) in public areas at all times the libraries are open. \r\nConnecting to the Library's Wireless Network \r\n•You must have a computer or other device equipped with an 802.11b-compatible wireless card. \r\n•Using your computer's network utilities, look for the wireless network named \"NYPL.\" \r\n•The \"NYPL\" wireless network does not require a password to connect. \r\nLimitations and Disclaimers Regarding Wireless Access \r\n•The Library's wireless network is not secure. Information sent from or to your laptop can be captured by anyone else with a wireless device and the appropriate software, within three hundred feet. \r\n•Library staff is not able to provide technical assistance and no guarantee can be provided that you will be able to make a wireless connection. \r\n•The Library assumes no responsibility for the safety of equipment or for laptop configurations, security, or data files resulting from connection to the Library's network","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/yjub-udmw","update_datemadepublic":"7/14/2015","update_updatefrequency":"As needed","last_data_updated_date":"2019-09-26T16:24:40.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"34702","downloads":"10892","row_count":"3319","column_count":"38","derived_view":false}
        ,{"datasetinformation_agency":"Department of Sanitation (DSNY)","uid":"phkb-tkts","name":"DSNY Waste Characterization 2017 – Subsort Results","description":"The Department conducted the 2017 NYC Residential, School, and NYCHA (NYC Housing Authority) Waste Characterization Study over three seasons: spring, summer, and fall. This study builds on decades of research and analysis into the evolving composition of NYC's waste stream. The study team hand sorted samples into 70 main sort categories. Sub-sorting of an additional 172 categories was conducted to get a more detailed understanding of the wide variety of plastic products in the waste stream, as well as a sub-set of Paper products. Results are presented in absolute terms as the quantity by weight of each material type. The quantity of each material is calculated by applying the percent composition to the total quantity of DSNY collections for fiscal year 2017 (July 2016-June 2017).","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/phkb-tkts","update_updatefrequency":"As needed","last_data_updated_date":"2019-05-22T19:13:38.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"No","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"N/A","visits":"2731","downloads":"1511","row_count":"1832","column_count":"9","derived_view":false}
