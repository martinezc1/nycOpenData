        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"br6q-ssj3","name":"Housing Database Project Level Files","description":"The NYC Department of City Planning's (DCP) <a href=\"https://www.nyc.gov/site/planning/data-maps/open-data/dwn-housing-database.page#housingdevelopmentproject\">Housing Database</a> contains all NYC Department of Buildings (DOB) approved housing construction and demolition jobs filed or completed in NYC since January 1, 2010. It includes the three primary construction job types that add or remove residential units: new buildings, major alterations, and demolitions,  and can be used to determine the change in legal housing units across time and space. Records in the Housing Database Project-Level Files  are geocoded to the greatest level of precision possible, subject to numerous quality assurance and control checks, recoded for usability,  and joined to other housing data sources relevant to city planners and analysts.\nData are updated semiannually, at the end of the second and fourth quarters of each year.\nPlease see DCP's annual Housing Production Snapshot summarizing findings from the 21Q4 data release  <a href=\"https://storymaps.arcgis.com/stories/1c9138dc24064b2e8142ff156345a719\">here. Additional Housing and Economic analyses are also  <a href=\"https://www.nyc.gov/site/planning/planning-level/housing-economy/housing-economy.page\">available</a>.\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/housing-project-level\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 25q4","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/br6q-ssj3","update_datemadepublic":"5/21/2024","update_updatefrequency":"Every 6 months","last_data_updated_date":"2026-03-16T17:09:35.000","legislativecompliance_candatasetfeasiblybeautomated":"