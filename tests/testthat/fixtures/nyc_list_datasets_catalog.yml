        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"8yac-vygm","name":"Routes","description":"One of OPT’s main functions is to plan efficient and fiscally responsible school bus routes. OPT staff use a variety of systems to generate and share bus route information with bus vendors and the public. Specific bus route paths cannot be publicly disclosed because they could reveal personally identifiable information about individual students. In this dataset, OPT has provided all the route information that does not risk disclosing personally identifiable information. \r\nSchool-age service for students in grades K through 12 are contracted with bus vendors on a per route basis. OPT also manages bus service for Pre-K students who require curb-to-curb service as per a student’s Individualized Education Plan (IEP). This Pre-K bus service is contracted on a per student basis, instead of per route. As a consequence of this difference, OPT does not design bus routes for Pre-K service, so those routes are not included in this dataset.\r\nThere are a variety of different vehicles used on routes that serve students requiring curb-to-curb service because an Individualized Education Plan (IEP) indicates specific transportation needs. The standard bus is the only vehicle used for general education routes with students eligible for bus service but who do not have an IEP.\r\nUsers may occasionally see a route without a garage assignment. Because this dataset is derived from a snapshot of a transactional system, there may be routes that are in the process of being assigned to a garage. In those cases, the garage information will appear as NULL until the assignment is complete.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/8yac-vygm","update_datemadepublic":"3/28/2016","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:41:03.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"12773","downloads":"3741","row_count":"74147","column_count":"14","derived_view":false}
        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"nibs-na6y","name":"Advertised Lotteries on Housing Connect By Building","description":"This dataset contains information about housing lotteries that have been advertised on Housing Connect (<a href=\"https://housingconnect.nyc.gov/PublicWeb/\">https://housingconnect.nyc.gov/PublicWeb/</a>) since July 2020 at the building level. A Housing Connect lottery is a one-time advertising effort to solicit applications for a set of units or places on a waiting list for immediate occupancy, typically in a single building/development. Sometimes, a lottery may be for units spread across two or more buildings. You can find the number of buildings included in a lottery under the 'Building Count' column. You can connect the '<a href=\"https://data.cityofnewyork.us/d/vy5i-a666/about_data\">Advertised Lotteries on Housing Connect By Lottery</a>' dataset and the 'Advertised Lotteries on Housing Connect By Building' dataset by using the 'Lottery ID'. These datasets do not include 'mini lotteries', which are newly vacant re-rental or resale units that may be filled directly with eligible Housing Connect users who have opted to be considered for those. In the current version of the dataset, it also does not include lotteries advertised for the Mitchell-Lama developments since these are to replenish the waiting list for future vacancies. More information is available in the 'FAQ' (Frequently Asked Questions) tab. Note: We will be publishing a dataset on Housing Connect applicants (household size, income, demographics, etc.) in the future.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/nibs-na6y","update_datemadepublic":"12/19/2025","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-02T14:05:22.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"1188","downloads":"408","row_count":"1977","column_count":"30","derived_view":false}
        ,{"datasetinformation_agency":"Office of the Comptroller (COMPTROLLER)","uid":"rh3d-kgz3","name":"The Five-System Asset Allocation Chart","description":"Each of the five New York City Retirement Systems has its own Board of Trustees which, working with the Bureau of Asset Management and the Board’s consultants, makes decisions on the funds’ asset allocations based on factors including economic risk, return, performance, and beneficiary distributions.  Data and further information is also available here:  Asset Allocation : Office of the New York City Comptroller (nyc.gov).\n</p>\n\"1U.S. Fixed Income assets do not include cash.\n2Market Value of private market investments are reported on a lagged basis.\n3Cash includes Securities Lending, State Street Short Term and BNY‐Mellon CD accounts.\n4Totals may not add due to rounding.\n5Fiscal Year to Date begins July 1st. Information presented is current as of the date of this posting only. Past performance does not guarantee the future performance of any manager or strategy. The performance results and historical information provided herein may have been adversely or favorably impacted by events and economic conditions that will not prevail in the future. Therefore, these results are not indicative of the future performance of any strategy, index, fund, manager or group of managers.\"","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/rh3d-kgz3","update_updatefrequency":"To be determined","last_data_updated_date":"2026-01-14T21:23:27.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bimonthly ","legislativecompliance_removedrecords":"No","visits":"1