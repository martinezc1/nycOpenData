        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"smka-gz6w","name":"2020-2021 Demographic Snapshot Citywide","description":"To provide a snapshot of citywide student enrollment and demographic information across multiple years. Data is collected using multiple data sources, including DOE's Audited Register, biographic data from Automate The Schools (ATS) system and the Location Code Generation and Management System (LCGMS).  Data can be used to view citywide demographic and enrollment trends over time.                                                                                             Enrollment counts are based on the October 31 Audited Register for each school year.  Please note that October 31 enrollment is not audited for charter schools or Pre-K Early Education Centers(NYCEECs).  Charter schools are required to submit enrollment as of BEDS Day the first Wednesday in October to the New York State Education Department of Education. Enrollment counts will exceed operational enrollment counts due the fact that long term absence (LTA) students are excluded for funding purposes.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/smka-gz6w","update_datemadepublic":"11/18/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-11-18T18:12:52.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"987","downloads":"872","row_count":"5","column_count":"41","derived_view":false}
