        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"82jf-bykm","name":"Outdoor Pools Session Information","description":"The NYC Parks outdoor pool season typically runs from late June to the Sunday after Labor Day. During the season, Parks' staff record data via a mobile app survey at the end of each pool session. The survey includes questions on attendance, staffing, meals, issues, weather conditions, and closures for that specific session.\n\nNYC Parks operates two sessions at each pool every day of the pool season. First Session is from 11:00am - 3:00pm. Second Session is from 4:00pm - 7:00pm, with the requirement for Olympic / Intermediate pools to stay open for Extended Second Session from 7:00pm - 8:00pm when the City Heat Emergency Plan is activated.\n\nFor each pool season, every pool will have at least two survey submissions per day - one submission for the first session, and one submission for the second session. A pool will have a third submission if it stays open for an extended second session.\n\nData Dictionary: https://docs.google.com/spreadsheets/d/15lHSZF76W1cZnjwlWRSn7tzLh6EqVZVeZ2vwDFqXHMM/edit?usp=sharing\n\nFor reference, pool geography from Open Data can be found here: https://data.cityofnewyork.us/City-Government/Pools/3vjv-6tf5","type":"dataset","category":"Recreation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/82jf-bykm","update_datemadepublic":"1/15/2025","update_updatefrequency":"Annually","last_data_updated_date":"2026-02-04T16:49:57.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1081","downloads":"977","row_c