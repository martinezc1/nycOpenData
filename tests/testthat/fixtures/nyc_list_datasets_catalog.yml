        ,{"datasetinformation_agency":"Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV)","uid":"sw27-mp7d","name":"Rates of Intimate Partner Violence Across New York City: An Intersectional Analysis","description":"This data set contains New York City Police Department provided felony assault count data for calendar years 2020 and 2021. The data includes counts of the number of intimate-partner felony assaults and the number of expected intimate-partner felony assaults by: race (American Indian, Asian, Black, Hispanic and White) and sex (male, female) for New York City, each borough (Bronx, Brooklyn, Manhattan, Queens and Staten Island) and community district. The following defines felony assault: Felony assault requires that a victim suffer a physical injury and covers injuries caused either intentionally or recklessly and includes injuries caused by either a deadly weapon or dangerous instrument. See New York Penal Law § § 120.05, 120.10. The expected number of felony assaults were calculated by taking the total number of actual felony assaults for a given geography (New York City, the Bronx, Brooklyn, Manhattan, Queens and Staten Island) and proportioning them by demographic breakdown of the geographic area.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/sw27-mp7d","update_datemadepublic":"1/9/2024","update_updatefrequency":"Historical data","last_data_updated_date":"2023-10-18T18:56:44.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2333","downloads":"1200","row_count":"61","column_count":"36","derived_view":false}
