        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"uwim-9338","name":"Parks Supervisor Inspections - Inspection Results","description":"Supervisor Inspections are conducted by Park Supervisors in order to assess the conditions and identify issues at parks in their districts. Park Supervisors follow the standards set out in the Parks Inspection Program (PIP) Inspection Manual but are not trained in the protocol to the same degree as PIP inspectors, and supervisor inspections are not subject to the thorough review that PIP inspections receive.  \r\n\r\nDuring the course of an inspection, Park Supervisors separately rate each feature within a park. This table contains the features inspected, with ratings and notes for each feature. \r\n\r\nOverall results and inspection-level records are contained in the Parks Supervisor Inspections - Inspection Results dataset; each row in this table represents one inspection of an individual property (park, playground, or zone). \r\n\r\nSpecific feature-level records are contained in the Parks Supervisor Inspections - Feature Findings dataset; each row in this table represents the specific feature's details/rating from each inspection.\r\n\r\nData Dictionary: https://docs.google.com/spreadsheets/d/17nwvIsPdAInf-DzGAcwq8hu6SXIzQYabUDktw3BwwLY/edit#gid=1553660070","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/uwim-9338","update_updatefrequency":"Weekly","last_data_updated_date":"2026-03-20T13:06:13.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1387","downloads":"2207","