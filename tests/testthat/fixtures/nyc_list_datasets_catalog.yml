        ,{"datasetinformation_agency":"Department of Housing Preservation and Development (HPD)","uid":"3bkg-usya","name":"Local Law 159 of 2019: Vacate Relocation Charges By Building","description":"Local law 159 of 2019 allows HPD to be reimbursed for charges incurred for the relocation of occupants as a result of vacate orders that were issued by HPD, the Fire Department, the Department of Buildings, and other NYC agencies. Such charges, if not paid by the owner, become a tax lien against the property, and are charged to the owner through the Department of Finance statement of account for taxes. The Local Law 159 of 2019: Vacate Relocation Charges By Building dataset shows all aggregate building payments made by HPD in connection with charges incurred for the relocation of occupants as a result of vacate orders. Please see the data dictionary for more details about this dataset.","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/3bkg-usya","update_datemadepublic":"11/14/2022","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T19:31:16.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2560","downloads":"1792","row_count":"7336","column_count":"23","derived_view":false}
