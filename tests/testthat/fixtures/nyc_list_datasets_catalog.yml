        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"69wu-b929","name":"LinkNYC Usage Statistics (Historical Data)","description":"LinkNYC is replacing the City’s outdated public telephones with a network of kiosks that provide free high-speed Wi-Fi, nationwide calling, a dedicated 911 button, charging ports for mobile devices, and access to selected websites. This dataset contains data on how the LinkNYC kiosks are being used, including numbers of users, number of Wi-Fi sessions, amount of data transmitted, and other information.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/69wu-b929","update_datemadepublic":"7/1/2016","update_updatefrequency":"Historical data","last_data_updated_date":"2020-01-09T19:35:06.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"13209","downloads":"4539","row_count":"200","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"mxbm-493w","name":"Georeferenced NYC Zoning Maps","description":"The Georeferenced NYC Zoning Maps raster dataset is intended to be a spatial representation of the entire zoning map catalog for the City of New York as one seamless citywide raster zoning map sans title blocks. These maps are normally maintained as 126 individual quarter sections and printed periodically for inclusion in Vol III of the City's 2019 Zoning Resolution. This dataset encompasses recent changes to mapped zoning districts or zoning text amendments as they are adopted by the City Council as well as filed City Map changes.\n\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/gis-zoning-features\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 202512","type":"file","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/mxbm-493w","update_datemadepublic":"9/13/2021","update_updatefrequency":"Monthly","last_data_updated_date":"2016-09-12T19:26:56.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"Yes","visits":"6521","downloads":"3044","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"hv9n-xgy4","name":"Parks Signs","description":"One row of data represents a physical Sign (its location and attributes) that was surveyed or installed by NYC Parks. Data is collected and udpated on an ongoing basis per updates to signage policies, seasonal upgrades, and one-off requests. Some limitations to the data: missing photos of installed signs, occasional shifting of Points (geometry) surveyed by GIS and that NOT ALL SIGNS THAT HAVE BEEN INSTALLED ARE CURRENTLY CAPTURED IN THIS DATASET.","type":"dataset","category":"Recreation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/hv9n-xgy4","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T13:53:20.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"1718","downloads":"3811","row_count":"11942","column_count":"29","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"4j29-i5ry","name":"Parks Zones","description":"Larger NYC parks (generally >20 acres) are subdivided into smaller sections that make inspecting these parks feasible and efficient.  These sections are called \"zones.\"   The size and boundaries usually conform to one or more of the following criteria:  Zones should be inspectable in 1-2 hours; zone boundaries should follow the park’s features (paths, tree lines, etc) whenever possible; and/or conform to pre-existing boundaries used to divide the park for maintenance; and/or define a cohesive area within the park (ballfields, wooded areas, etc).  Besides zones, this layer contains a handful of Sitting Areas that are part of larger parks but could not be defined as zones due to their smaller size.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/4j29-i5ry","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T14:00:32.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"11965","downloads":"2836","row_count":"930","column_count":"20","derived_view":false}
