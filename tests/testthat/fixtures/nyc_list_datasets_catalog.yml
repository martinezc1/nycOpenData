        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"wnhd-n675","name":"Swim for Life: 2022 to current","description":"This dataset contains the location and attendance information for the NYC Parks Swim For Life program, an instructional swimming program which serves second grade public school students in NYC. The program runs during the school year, starting in October and concluding in June. This dataset contains Swim for Life program information from 2022 onwards.\n\nExplore the <a href=\"https://docs.google.com/spreadsheets/d/1SSicOpPqkUnCr58QlmRPP8p--hY5zRZi40Zsq1k4vXs/edit?usp=sharing\">Data Dictionary</a>\n\nView Open Data for Swim for Life data (2016 to 2020): <a href=\"https://data.cityofnewyork.us/Recreation/Swim-for-Life/mtt6-ywt4/about_data\">here</a>\n\nLearn more about this program on the NYC Parks website: <a href=\"https://www.nycgovparks.org/opportunities/support/swim-for-life\">Swim For Life</a>\n\nNote: Swim for Life program was on pause due to COVID-19 pandemic. The program resumed Spring 2022.","type":"dataset","category":"Recreation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/wnhd-n675","update_datemadepublic":"9/11/2025","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-20T13:53:50.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"N/A","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"219","downloads":"255","row_count":"7441","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"rvih-nhyn","name":"Privately Owned Public Spaces (POPS)","description":"Privately owned public spaces, also known by the acronym POPS, are outdoor  and indoor spaces provided for public enjoyment by private owners in exchange  for bonus floor area or waivers, an incentive first introduced into New York City's  zoning regulations in 1961. To find out more about POPS, visit the Department  of City Planning's website at http://nyc.gov/pops. This database contains detailed  information about each privately owned public space in New York City.\n\nData Source: Privately Owned Public Space Database (2018), owned and maintained  by the New York City Department of City Planning and created in collaboration  with Jerold S. Kayden and The Municipal Art Society of New York.\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/privately-owned-public-space\">DCP Website: BYTES of the BIG APPLE</a>. Current version: 25v2","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/rvih-nhyn","update_datemadepublic":"7/9/2019","update_updatefrequency":"Every 6 months","last_data_updated_date":"2025-10-14T16:23:32.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"Yes","visits":"13410","downloads":"12254","row_count":"392","column_count":"39","derived_view":false}
        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"n7f2-dyvt","name":"DEP Green Infrastructure (Porous Pavement Right of Way Practices)","description":"This dataset contains the locations and detailed information of green infrastructure practices in NYC neighborhoods built primarily through NYC Green Infrastructure Program initiatives. Green infrastructure (GI) collects stormwater from streets, sidewalks, and other hard surfaces before it can enter the sewer system or cause local flooding. The GI practice data contained in this dataset includes the location, program area, status, and type of GI. This dataset is updated by the NYC Department of Environmental Protection on a monthly basis.    \n\nThe “Porous_Permeable_Pavement” polygon layer contains constructed porous permeable pavement practices only, which fall under the ROW program area category. The three ROW Porous Permeable Pavement asset types in this shapefile are Porous Concrete, Permeable Pavement, and Porous Asphalt.\"\n\nThis layer is part of a larger Green Infrastructure dataset. You can download the full dataset and the data dictionary below under “Attachments”.\n\nSource Data: <a href=\"https://www.nyc.gov/dep/gimap\">DEP Green Infrastructure Program Map</a>","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/n7f2-dyvt","update_datemadepublic":"10/17/2017","update_updatefrequency":"Monthly","last_data_updated_date":"2025-10-02T14:31:15.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Bi-annually","legislativecompliance_removedrecords":"Yes","visits":"746","downloads":"345","row_count":"623","column_count":"32","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"ycrg-ses3","name":"Bus Lanes - Local Streets","description":"Bus lanes are travel lanes that are restricted to buses during certain hours of the day. All bus lanes have signs posted along the route with specific regulations; lanes marked \"Bus Only\" and /or painted red. Bus lanes help to keep buses from getting stuck in traffic, generally making travel for bus riders faster and reliable and improving the overall traffic flow of a corridor. Each record represents a segment of a bus lane based on the LION geographic base file of NYC streets. User may use the SegmentID field in this dataset to join with the LION data for more information.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/ycrg-ses3","update_datemadepublic":"12/7/2020","update_updatefrequency":"Annually","last_data_updated_date":"2025-09-16T18:23:25.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"8952","downloads":"2782","row_count":"3783","column_count":"29","derived_view":false}
