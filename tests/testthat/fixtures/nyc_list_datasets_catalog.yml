        ,{"datasetinformation_agency":"Taxi and Limousine Commission (TLC)","uid":"5ufr-wvc5","name":"2021 High Volume FHV Trip Records","description":"These records are generated from the trip record submissions made by High Volume For-Hire Vehicle (FHV) bases. On August 14, 2018, Mayor de Blasio signed Local Law 149 of 2018, creating a new license category for TLC-licensed FHV businesses that currently dispatch or plan to dispatch more than 10,000 FHV trips in New York City per day under a single brand, trade, or operating name, referred to as High-Volume For-Hire Services (HVFHS). This law went into effect on Feb 1, 2019. Each row represents a single trip in a FHV dispatched by a high volume base.  The trip records include fields capturing the high volume license number, the pickup and drop-off date, time, and taxi zone location ID, which correspond with the NYC Taxi Zones open dataset.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/5ufr-wvc5","update_datemadepublic":"12/15/2023","update_updatefrequency":"Historical data","last_data_updated_date":"2023-10-31T11:46:29.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"2511","downloads":"1477","row_count":"174596652","column_count":"24","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"ii5c-g6sq","name":"VZV Bike Priority Areas","description":"Priority Bicycle Districts are neighborhoods with comparatively high numbers of cyclist KSI (Killed or Seriously Injured) and few dedicated bicycle facilities. These districts, seven in Brooklyn and three in Queens, represent 14% of the City’s bicycle lane network and 23% of cyclist KSI. NYC DOT identified these areas in the 2017 report “Safer Cycling: Bicycle Ridership and Safety in New York City.” The agency has prioritized these areas for bicycle network expansion.\r\n\r\nFor a complete list of Vision Zero maps, please follow <a href=\"https://data.cityofnewyork.us/browse?q=vzv&sortBy=last_modified&utf8=%E2%9C%93\">this link</a>","type":"map","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/ii5c-g6sq","update_datemadepublic":"05/31/2018","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-01T11:13:17.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Monthly","legislativecompliance_removedrecords":"No","visits":"4717","downloads":"427","parent_uid":"83yx-cgpy","derived_view":true}
