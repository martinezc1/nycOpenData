        ,{"datasetinformation_agency":"Department for the Aging (NYC Aging)","uid":"cqc8-am9x","name":"Department for the Aging (NYC Aging) - All Contracted Providers","description":"The Department for the Aging (NYC Aging) provides a wide array of services to older adults (age 60 and older) in the five boroughs of New York City. To accomplish this, NYC Aging contracts out to external organizations (mainly non-profits) to provide the services.\n\nThis dataset contains a listing of all Older Adult Center (formerly Senior Center), Abuse Prevention, Home Care, Legal Services, NORC, Transportation, Case Management, Home Delivered Meal and Caregiver contracts managed by NYC Aging in the current Fiscal Year.  It also includes the contact information for the agencies providing the services.","type":"dataset","category":"Social Services","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/cqc8-am9x","update_datemadepublic":"9/27/2019","update_updatefrequency":"Monthly","last_data_updated_date":"2026-01-20T15:35:42.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"4348","downloads":"2103","row_count":"468","column_count":"38","derived_view":false}
