        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"k66c-pzws","name":"Walk to a Park Service Area for CEQR Open Space Assessment","description":"This dataset builds on the Walk to A Park Service Area (https://data.cityofnewyork.us/Recreation/Walk-to-a-Park-Service-area/5vb5-y6cv) to provide a dataset that can be viewed as an on-line map or downloaded to support the preparation of an Open Space assessment pursuant to City Environment Quality Review Technical Manual. The data has been modified to ensure that if 50% or more of a tax lot is within a Walk to a Park Service area, then the entire lot is shown as served.\r\n\r\nNew York City, as part of the OneNYC 2050 Building a Strong and Fair City plan, has put forth a goal of 85 percent of New York City residents living within a walking distance of a park by 2030. The Walk to a Park initiative focuses on increasing access to parks and open spaces, concentrating on areas of the city that are under-resourced and where residents are living further than a walk to a park. NYC Parks calculates the number of New Yorkers within walking distance of a park and reports on this as part of the Mayor’s Management Report. “Walking distance” is defined as a 1/4-mile or less for sites such as small playgrounds and sitting areas; or a 1/2-mile or less for larger parks that serve a wider region, typically over 6 acres or with access to recreation center. Certain properties in NYC Parks' portfolio, such as cemeteries, community gardens, or sites with no recreational equipment were not included in this analysis. Similarly, some publicly accessible parks and open-space amenities not under the jurisdiction of NYC Parks were included in this analysis, as they provide recreational value.\r\n\r\nThis information is periodically updated and is only current as of the last publication date. The analysis is performed in part using secondary data. Data accuracy is limited by the scale and accuracy of the original sources. For more information about this analysis and the Walk to a Park Initiative, visit: https://www.nycgovparks.org/planning-and-building/planning/walk-to-a-park\r\n\r\nData Dictionary: https://docs.google.com/spreadsheets/d/16VtACcFyKR_hYJNwrYYtFcvMVV9ybmALIWdvce7uJww/edit?usp=sharing","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/k66c-pzws","update_updatefrequency":"As needed","last_data_updated_date":"2026-03-20T13:51:47.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"N/A","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"1345","downloads":"1104","row_count":"27218","column_count":"2","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"mjm3-8dw8","name":"Graduation results for Cohorts 2012 to 2019 (Classes of 2016 to 2023)","description":"This report includes Graduation Outcomes as calculated by the New York State Education Department.\n\nThe New York State calculation method was first adopted for the Cohort of 2001 (Class of 2005).  The cohort consists of all students who first entered 9th grade in a given school year (e.g., the Cohort of 2006 entered 9th grade in the 2006-2007 school year).  Graduates are defined as those students earning either a Local or Regents diploma.","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/mjm3-8dw8","update_datemadepublic":"9/19/2024","update_updatefrequency":"Annually","last_data_updated_date":"2024-04-04T20:54:10.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1769","downloads":"4269","row_count":"321002","column_count":"29","derived_view":false}
