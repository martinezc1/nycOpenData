        ,{"datasetinformation_agency":"NYC Independent Budget Office (IBO)","uid":"6ggx-itps","name":"NYC Independent Budget Office (IBO) Debt Service Since FY 2000","description":"New York City Annual Debt Service Expense from FY2000 – FY2020\nDollars in millions\n\nSOURCES: IBO; Mayor's Office of Management and Budget (OMB); New York City Comprehensive Annual Financial Report of the Comptroller (various years); Annual Report of the Comptroller on Capital Debt and Obligations (various years); New York City Municipal Water Finance Authority Comprehensive Annual Financial Report (various years).</p>\n\nNOTES:</br>\n(1) Debt service is the cost to New York City of repaying its outstanding debt, including both principal and interest. The figures in the table have been adjusted to reflect debt service that was originally scheduled for payment in each year since 2000.</br>\n\n(2) New York City is required to have a balanced annual budget. In years when it runs a surplus, the primary means the city uses to comply with this requirement is to use up some or all of the surplus by prepaying some of the subsequent years' debt service expenses. As a result, the cash outlay for debt service in a given year is not an accurate representation of the true cost of debt service in that year.</br>\n\n(3) The defeasance of $536 million of GO bonds in 2007 reduced debt service in 2008, 2009, and 2010. Debt service in the table is presented as if the defeasance had not occurred.</br>\n\n(4) The defeasance of $1.986 billion of GO bonds in 2008 reduced debt service in 2010. Debt service in the table is presented as if the defeasance had not occurred.</br>\n\n(5) The defeasance of $718 million of TFA bonds in 2007 reduced debt service in 2008, 2009, and 2010. Debt service in the table is presented as if the defeasance had not occurred.</br>\n\n(6) The defeasance of $196 million of TFA bonds in 2013 reduced debt service in 2014, 2015, and 2016. Debt service in the table is presented as if the defeasance had not occurred.</br>\n\n(7) The defeasance of $637 million of TFA bonds in 2015 with savings from Sales Tax Asset Receivable Corporation (STAR) reduced debt service in 2015, 2016, 2017 and 2018. Debt service in the table is presented as if the defeasance had not occurred.</br>\n\n(8) The defeasance of $65 million of Jay Street Development Corporation (JSDC) bonds in 2007 reduced debt service in 2009 and 2010. Debt service in the table is presented as if the defeasance had not occurred.</br>\n\n(9) TFA BARBs and TSASC are not included in OMB's or the Comptroller's definitions of New York City outstanding debt. For an explanation of these items, and their inclusion in NYC IBO's definition of New York City outstanding debt, please see New Outstanding Debt.</br>\n\n(10) In 2006, TSASC restructured its outstanding indebtedness. This included a one time expense of $161 million for redeeming all bonds issued under a secured loan agreement with the United States Department of Transportation, via the department's Transportation Infrastructure Finance and Innovation Act (TIFIA) program. Additionally, all prior year TSASC bond series were defeased, leaving only series 2006-1 bonds outstanding. </br>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/6ggx-itps","update_datemadepublic":"3/6/2014","update_updatefrequency":"Annually","last_data_updated_date":"2021-06-25T15:59:34.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1441","downloads":"4167","row_count":"25","column_count":"22","derived_view":false}
