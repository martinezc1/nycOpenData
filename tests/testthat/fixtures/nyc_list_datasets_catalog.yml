        ,{"datasetinformation_agency":"Department of Environmental Protection (DEP)","uid":"b3mq-yvvr","name":"Wastewater Co-digestion and Biogas-to-grid Performance Indicators","description":"This dataset contains monthly performance indicators for Wastewater Resource Recovery Facilities (WRRFs) that operate co-digestion and biogas-to-grid programs. The New York City Department of Environmental Protection (DEP) treats the solid component of the City’s wastewater using anaerobic digestion. This biological process produces biosolids, which can be used as fertilizer, and biogas, a renewable energy source.\n\nCo-digestion is the process of digesting food scraps alongside sewage sludge. The biogas generated is used on-site in boilers to heat the digesters and provide space heating. Excess biogas undergoes biogas-to-grid treatment, where it is purified and upgraded to renewable natural gas (RNG). Following purification, the RNG is exported to the natural gas pipeline as a direct replacement to fossil fuels. Excess biogas is flared during temporary system outages of the biogas cleaning system due to maintenance, operational constraints, or emergency events.\n\nThe co-digestion and biogas-to-grid program provides a local recycling outlet for food scraps, transforming waste into renewable energy. Together, they reduce greenhouse gas emissions by replacing a portion of fossil natural gas with RNG and avoiding the methane emissions that would occur if the food scraps were disposed of in a landfill. For more information visit: https://www.nyc.gov/site/dep/whats-new/resource-recovery.page","type":"dataset","category":"Environment","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/b3mq-yvvr","update_datemadepublic":"9/24/2024","update_updatefrequency":"Quarterly","last_data_updated_date":"2025-08-19T19:24:25.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1940","downloads":"1072","row_count":"27","column_count":"9","derived_view":false}
