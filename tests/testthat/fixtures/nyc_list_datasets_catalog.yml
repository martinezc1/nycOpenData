        ,{"datasetinformation_agency":"Civilian Complaint Review Board (CCRB)","uid":"2mby-ccnw","name":"Civilian Complaint Review Board: Complaints Against Police Officers","description":"The primary table for all public data on complaints, including dates, locations and the outcomes of closed complaints received since the year 2000.\n\nThe dataset is part of a <a href=\"https://data.cityofnewyork.us/browse?q=Data-Collection_Data-Collection%3DCCRB+Complaints+Database&sortBy=relevance&page=1&pageSize=20\">database of all public police misconduct records the Civilian Complaint Review Board (CCRB) maintains</a> on complaints against New York Police Department uniformed members of service received in CCRB's jurisdiction since the year 2000, when CCRB's database was first built. This data is published as four tables:\n\n<a href=\"https://data.cityofnewyork.us/d/2fir-qns4/\">Civilian Complaint Review Board: Police Officers</a>\n<a href=\"https://data.cityofnewyork.us/d/2mby-ccnw/\">Civilian Complaint Review Board: Complaints Against Police Officers</a>\n<a href=\"https://data.cityofnewyork.us/d/6xgr-kwjq/\">Civilian Complaint Review Board: Allegations Against Police Officers</a>\n<a href=\"https://data.cityofnewyork.us/d/keep-pkmh/\">Civilian Complaint Review Board: Penalties</a>\n\nA single complaint can include multiple allegations, and those allegations may include multiple subject officers and multiple complainants.\n\nPublic records exclude complaints and allegations that were closed as Mediated, Mediation Attempted, Administrative Closure, Conciliated (for some complaints prior to the year 2000), or closed as Other Possible Misconduct Noted.\n\nThis database is inclusive of prior datasets held on Open Data (previously maintained as \"Civilian Complaint Review Board (CCRB) - Complaints Received,\" \"Civilian Complaint Review Board (CCRB) - Complaints Closed,\" and \"Civilian Complaint Review Board (CCRB) - Allegations Closed\") but includes information and records made public by the June 2020 repeal of New York Civil Rights law 50-a, which precipitated a full revision of what CCRB data could be considered public.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/2mby-ccnw","update_datemadepublic":"12/06/2022","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-24T14:07:21.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"9209","downloads":"9745","row_count":"138933","column_count":"14","derived_view":false}
        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"ezy6-djsf","name":"Street Closures due to Construction Activities by Block and Intersection","description":"New York City street closure locations stipulated in the NYC DOT Street Construction Permits. This is subject to a full closure, restricting through traffic, for the purpose of conducting construction related activity on a City street. Details about DOT construction permits can be found at Street Works Manual, http://streetworksmanual.nyc. Full Closure Permits are issued for a period of time during which the street may be closed to through traffic for only a portion of the time, and open at other times.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/ezy6-djsf","update_datemadepublic":"12/22/2025","update_updatefrequency":"Weekly","last_data_updated_date":"2026-03-23T11:54:23.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"689","downloads":"290","row_count":"463132","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"869v-vr48","name":"Parking Violations Issued - Fiscal Year 2023","description":"This dataset provides data on Parking Violations Issued between July 1, 2022 to June 30, 2023.  In New York City, the fiscal year begins on July 1st of one calendar year and ends on June 30th of the following calendar year.  <a target=\"_blank\" href=\"https://www.nyc.gov/site/omb/faq/frequently-asked-questions.page#:~:text=our%20Careers%20page.-,The%20Expense%20Budget,-What%20is%20the\">Click here</a> to find out more about the NYC Fiscal Year.\n<br>Parking Violations Issuance datasets contain violations issued during the respective fiscal year. The Issuance datasets are not updated to reflect violation status, the information only represents the violation(s) at the time they are issued. Since appearing on an issuance dataset, a violation may have been paid, dismissed via a hearing, statutorily expired, or had other changes to its status. To see the current status of outstanding parking violations, please look at the <a target=\"_blank\" href=\"https://data.cityofnewyork.us/City-Government/Open-Parking-and-Camera-Violations/nc67-uf89\">Open Parking & Camera Violations</a> dataset.\n<br>You may find all of the Parking Violations Issued since fiscal year 2014 in this <a target=\"_blank\" href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=DOF+Parking+Violations+Issued&q=&sortBy=alpha&utf8=%E2%9C%93\">dataset collection</a>.\n\n<b>NOTE:</b> This dataset includes the records from the first month of FY2024.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/869v-vr48","update_datemadepublic":"11/14/2023","update_updatefrequency":"Historical data","last_data_updated_date":"2026-01-15T21:27:00.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_has