        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"vajk-p37e","name":"DOHMH COVID-19 Antibody-by-Neighborhood Poverty","description":"This dataset contains information on antibody testing for COVID-19: the number of people who received a test, the number of people with positive results, the percentage of people tested who tested positive, and the rate of testing per 100,000 people, stratified by ZIP Code Tabulation Area (ZCTA) neighborhood poverty group. These data can also be accessed here: https://github.com/nychealth/coronavirus-data/blob/master/totals/antibody-by-poverty.csv \n\n\nExposure to COVID-19 can be detected by measuring antibodies to the disease in a person’s blood, which can indicate that a person may have had an immune response to the virus. Antibodies are proteins produced by the body’s immune system that can be found in the blood. People can test positive for antibodies after they have been exposed, sometimes when they no longer test positive for the virus itself. It is important to note that the science around COVID-19 antibody tests is evolving rapidly and there is still much uncertainty about what individual antibody test results mean for a single person and what population-level antibody test results mean for understanding the epidemiology of COVID-19 at a population level.\n\nThese data only provide information on people tested. People receiving an antibody test do not reflect all people in New York City; therefore, these data may not reflect antibody prevalence among all New Yorkers. Increasing instances of screening programs further impact the generalizability of these data, as screening programs influence who and how many people are tested over time. Examples of screening programs in NYC include: employers screening their workers (e.g., hospitals), and long-term care facilities screening their residents.\n\nIn addition, there may be potential biases toward people receiving an antibody test who have a positive result because people who were previously ill are preferentially seeking testing, in addition to the testing of persons with higher exposure (e.g., health care workers, first responders.)\n\nNeighborhood-level poverty groups were classified in a manner consistent with Health Department practices to describe and monitor disparities in health in NYC. Neighborhood poverty measures are defined as the percentage of people earning below the Federal Poverty Threshold (FPT) within a ZCTA. The standard cut-points for defining categories of neighborhood-level poverty in NYC are:\n•\tLow: <10% of residents in ZCTA living below the FPT\n•\tMedium: 10% to <20%\n•\tHigh: 20% to <30%\n•\tVery high: ≥30% residents living below the FPT\nThe ZCTAs used for classification reflect the first non-missing address within NYC for each person reported with an antibody test result.\n\nRates were calculated using interpolated intercensal population estimates updated in 2019. These rates differ from previously reported rates based on the 2000 Census or previous versions of population estimates. The Health Department produced these population estimates based on estimates from the U.S. Census Bureau and NYC Department of City Planning. Rates for poverty were calculated using direct standardization for age at diagnosis and weighting by the US 2000 standard population.\nAntibody tests are categorized based on the date of specimen collection and are aggregated by full weeks starting each Sunday and ending on Saturday. For example, a person whose blood was collected for antibody testing on Wednesday, May 6 would be categorized as tested during the week ending May 9. A person tested twice in one week would only be counted once in that week. This dataset includes testing data beginning April 5, 2020.\n\nData are updated daily, and the dataset preserves historical records and source data changes, so each extract date reflects the current copy of the data as of that date. For example, an extract date of 11/04/2020 and extract date of 11/03/2020 will both contain all records as they were as of that extract date. Without filtering or grouping by extract date, an analysis will almost certain","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/vajk-p37e","update_updatefrequency":"Daily","last_data_updated_date":"2024-07-03T04:07:36.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"N/A","visits":"2602","downloads":"2189","row_count":"4","column_count":"5","derived_view":false}
        ,{"datasetinformation_agency":"Department of Education (DOE)","uid":"qnpk-nwm4","name":"School Bus Routing Report October_2021_89C_21-996","description":"Student ride times were reported as defined by the time difference between the scheduled stop time and the school session time. This was reported at the student level as this is a more useful metric for judging service provided. A full route, including all pick ups and drop offs would not be reflective of the time any individual student spent on the bus.\nCurrent curb-to-school routing systems do not capture scheduled pick up times, therefore this metric could not be calculated. Pick up times are estimated by school bus companies and communicated to parents directly.\nFor stop-to-school routes the average scheduled student ride time was provided. As stated above, this could not be calculated for curb-to-school service as our current data structure does not support this\nStudents with blank to school Monday session time were excluded.\nDry run reporting was submitted with the April 2021 report","type":"dataset","category":"Education","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/qnpk-nwm4","update_datemadepublic":"11/23/2021","update_updatefrequency":"Historical data","last_data_updated_date":"2021-11-23T14:28:59.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"1035","downloads":"851","row_count":"18","column_count":"3","derived_view":false}
