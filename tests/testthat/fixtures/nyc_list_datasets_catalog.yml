        ,{"datasetinformation_agency":"NYC Independent Budget Office (IBO)","uid":"mric-ye48","name":"Annual Tax Effort in NYC since 1929","description":"Taxes are grouped into six major categories: property, general sales, personal income, business income, real estate-related, and other. We also separate non-exported and exported taxes, that is, taxes levied on New York City resident households and businesses and taxes levied on nonresidents. Taxes in the former category enter into the calculation of New York City tax effort. The latter category includes sales and other taxes on hotel occupancy, city income taxes paid by commuters into the city, and portions of state and MTA auto rental taxes remitted in the city. We could not, however, estimate and net out non-hotel sales and other taxes paid by visitors to the city. Nor could we account, as we did in our previous report, for any New York City tax imports, that is, taxes of other, non-overlapping jurisdictions paid by city residents.1 \r\nFor brief descriptions of the tables and figures along with methodological notes please see the Tax Effort Background and Methodology document.","type":"file","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/mric-ye48","update_datemadepublic":"08/27/2018","update_updatefrequency":"As needed","last_data_updated_date":"2018-08-27T14:54:43.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"1712","downloads":"1040","derived_view":false}
