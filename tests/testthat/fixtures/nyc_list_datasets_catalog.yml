        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"xzj8-i3jk","name":"Asset Management Parks System (AMPS) – Labor","description":"This table contains work order labor records. Each record in this table corresponds to one labor entry and includes general information about that piece of labor. The primary key is BOO_CODE. The BOO_EVENT field can be joined to the Work Orders table on EVT_CODE to know how much labor was booked to each work order.\r\n\r\nFor the User Guide, please follow <a href=\"https://docs.google.com/document/d/1UwyGGncb6oFMiOfgz73G-iM8Yea9ubz4931hPeBO9YQ/edit?usp=sharing\">this link</a>\r\nFor the Data Dictionary, please follow <a href=\"https://docs.google.com/spreadsheets/d/1pDr-BUe4LS7DvATfbOnd8UrV6s77krJgzqdq_gVYWqc/edit?usp=sharing\">this link </a>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"YES","url":"https://data.cityofnewyork.us/d/xzj8-i3jk","update_datemadepublic":"01/29/2018","update_updatefrequency":"As needed","last_data_updated_date":"2026-03-23T07:56:48.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"1516","downloads":"3321","row_count":"2504222","column_count":"18","derived_view":false}
        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"jk6k-yab4","name":"NYC Parks Events Listing – Event Organizers","description":"The NYC Parks Events Listing database is used to store event information displayed on the Parks website, nyc.gov/parks. There are seven related tables that make up the this database: \r\n\r\n1. Events_Events table (This is the primary table that contains basic data about every event. Each record is an event.)\r\n2. Events_Categories (Each record is a category describing an event. One event can be in more than one category.)\r\n3. Events_Images (Each record is an image related to an event. One event can have more than one image.)\r\n4. Events_Links (Each record is a link with more information about an event. One event can have more than one link.)\r\n5. Events_Locations  (Each record is a location where an event takes place. One event can have more than one location.)\r\n6. Events_Organizers  (Each record contains a group or person organizing an event. One event can have more than one organizer.)\r\n7. Events_YouTube  (Each record is a link to a YouTube video about an event. One event can have more than one YouTube video.)\r\n\r\nThe Events_Events table is the primary table. All other tables can be related by joining on the event_id. This data contains records from  2013 and on. For a complete list of related datasets, please follow <a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=NYC+Parks+Events&sortBy=alpha\">This Link</a>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/jk6k-yab4","update_datemadepublic":"06/11/2018","update_updatefrequency":"As needed","last_data_updated_date":"2021-08-02T05:16:49.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"No","visits":"1352","downloads":"2689","row_count":"96968","column_count":"2","derived_view":false}
