        ,{"datasetinformation_agency":"Department of Consumer and Worker Protection (DCWP)","uid":"ayx3-dixq","name":"Pedicab Registration Plate Lottery Applications","description":"Pedicabs may not operate in New York City without a DCWP-issued pedicab registration plate. By law, the City can only issue new pedicab registration plates when the number of registered pedicabs falls below 840.  Every year, DCWP solicits applications to enter a lottery for any pedicab registration plates available, up to the statutory limit of 850.\r\n\r\nIn each lottery cycle, applications are assigned an application order number based on when they are submitted. Applications that qualify for the lottery are randomly assigned a \"\"Pedicab Lottery Priority Number\"\".  Qualified applications are selected from the lottery in priority number order until the number of available plates have been awarded.","type":"dataset","category":"Business","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/ayx3-dixq","update_datemadepublic":"8/14/2023","update_updatefrequency":"Annually","last_data_updated_date":"2023-05-04T16:41:56.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"1245","downloads":"3258","row_count":"2375","column_count":"19","derived_view":false}
