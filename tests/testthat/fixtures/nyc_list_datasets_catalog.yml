        ,{"datasetinformation_agency":"Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV)","uid":"rvmf-4sg6","name":"The relationship between domestic violence and shooting incidents in New York City","description":"This data set contains New York City Police Department provided domestic violence incident data for calendar years 2020, 2021 and 2022. In addition, ENDGBV obtained through Open Data the number of shooting incidents for calendar years 2020, 2021 and 2022. The data includes counts of the number of domestic violence incidents, shooting incidents and the number of expected domestic violence incidents and shooting incidents by: race (American Indian/Alaska Native, Asian/Pacific Islander, Black, and White) and sex (male, female) for New York City, each borough (Bronx, Brooklyn, Manhattan, Queens and Staten Island). It also provides the count and rate of domestic violence and shooting incidents by police precinct.  The expected number of domestic violence incidents and shooting incidents were calculated by taking the total number of actual domestic violence and shooting incidents for a given geography (New York City, the Bronx, Brooklyn, Manhattan, Queens and Staten Island) and proportioning them by demographic breakdown of the geographic area.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/rvmf-4sg6","update_datemadepublic":"1/14/2025","update_updatefrequency":"Historical data","last_data_updated_date":"2025-01-14T15:27:14.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Historical","legislativecompliance_removedrecords":"No","visits":"1478","downloads":"1242","row_count":"83",