        ,{"datasetinformation_agency":"Department of Finance (DOF)","uid":"9ck6-2jew","name":"DOF Condominium Comparable Rental Income in NYC","description":"The Department of Finance (DOF) is required by NY State law to value condominiums or cooperatives as if they were residential rental apartment buildings. DOF uses income information from rental properties similar in physical features and location to the condominiums or cooperatives. DOF applies this income data to the condominium or cooperative to determine its value in the same way DOF values rental apartment buildings.  This report includes information at a condominium suffix level which represents a subdivision of the condominium since DOF values condominiums at a suffix level. A condominium may have more than one suffix.\r\n\r\nThis data set contains the reports from 2012-2018.","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"N/A","url":"https://data.cityofnewyork.us/d/9ck6-2jew","update_updatefrequency":"Annually","last_data_updated_date":"2023-07-12T18:13:18.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"N/A","visits":"8639","downloads":"5784","row_count":"31575","column_count":"61","derived_view":false}
