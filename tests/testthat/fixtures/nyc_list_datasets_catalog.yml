        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"5ery-qagt","name":"DOHMH School Cafeteria Inspections (2020-Present)","description":"This is an official DOHMH dataset. Creating derivative/community datasets based on this dataset is allowed so long as it is done in a manner that is not misleading and does not imply endorsement of such datasets by DOHMH. \nThe dataset contains current inspection data for cafeterias permitted in public, private, and parochial schools in NYC. Data for cafeterias that have ceased operations and any violations cited during the inspection that were dismissed during adjudication are excluded from this dataset. During COVID-19 public health emergency, Health Department inspections have followed a modified inspection protocol designed to reduce the risk of COVID-19 transmission among inspectors and staff of facilities being inspected. As a result, there may be differences in the\ndata collected during this time period compared to data collected prior to March 2020.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/5ery-qagt","update_datemadepublic":"3/24/2023","update_updatefrequency":"Weekly","last_data_updated_date":"2026-03-24T10:01:11.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Daily","legislativecompliance_removedrecords":"No","visits":"10342","downloads":"8408","row_count":"18972","column_count":"25","derived_view":false}
        ,{"datasetinformation_agency":"Department of Health and Mental Hygiene (DOHMH)","uid":"rsgh-akpg","name":"DOHMH Dog Bite Data","description":"NYC Reported Dog Bites.\n\nSection 11.03 of NYC Health Code requires all animals bites to be reported within 24 hours of the event.\n\nInformation reported assists the Health Department to determine if the biting dog is healthy ten days after the person was bitten in order to avoid having the person bitten receive unnecessary rabies shots. Data is collected from reports received online, mail, fax or by phone to 311 or NYC DOHMH Animal Bite Unit. Each record represents a single dog bite incident.   Information on breed, age, gender and Spayed or Neutered status have not been verified by DOHMH and is listed only as reported to DOHMH. A blank space in the dataset means no data was available.","type":"dataset","category":"Health","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/rsgh-akpg","update_datemadepublic":"7/11/2018","update_updatefrequency":"As needed","last_data_updated_date":"2025-08-19T14:49:57.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"40653","downloads":"12724","row_count":"34033","column_count":"9","derived_view":false}
        ,{"datasetinformation_agency":"Office of Technology and Innovation (OTI)","uid":"vfx9-tbb6","name":"NYC Planimetric Database: Sidewalk","description":"Planimetric basemap polygon layer containing sidewalk features. \r\nPlease see the following link for additional documentation- https://github.com/CityOfNewYork/nyc-planimetrics/blob/master/Capture_Rules.md.","type":"map","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/vfx9-tbb6","update_datemadepublic":"7/8/2014","update_updatefrequency":"As needed","last_data_updated_date":"2024-04-24T20:20:22.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"Yes","visits":"35022","downloads":"3883","parent_uid":"52n9-sdep","derived_view":true}
        ,{"datasetinformation_agency":"Police Department (NYPD)","uid":"h9gi-nx95","name":"Motor Vehicle Collisions - Crashes","description":"The Motor Vehicle Collisions crash table contains details on the crash event. Each row represents a crash event. The Motor Vehicle Collisions data tables contain information from all police reported motor vehicle collisions in NYC. The police report (MV104-AN) is required to be filled out for collisions where someone is injured or killed, or where there is at least $1000 worth of damage (https://www.nhtsa.gov/sites/nhtsa.dot.gov/files/documents/ny_overlay_mv-104an_rev05_2004.pdf).  It should be noted that the data is preliminary and subject to change when the MV-104AN forms are amended based on revised crash details.For the most accurate, up to date statistics on traffic fatalities, please refer to the <a href=\"https://www1.nyc.gov/site/nypd/stats/traffic-data/traffic-data-collision.page\" style=\"color:#187bcd;\">NYPD Motor Vehicle Collisions page</a> (updated weekly) or <a href=\"http://www.nycvzv.info/\" style=\"color:#187bcd;\">Vision Zero View</a> (updated monthly).\r\n\r\n</p>\r\nDue to success of the CompStat program, NYPD began to ask how to apply the CompStat principles  to other problems.  Other than homicides, the fatal incidents with which police have the most contact with the public are fatal traffic collisions.  Therefore in April 1998, the Department implemented TrafficStat, which uses the CompStat model to work towards improving traffic safety.  Police officers complete form MV-104AN  for all vehicle collisions.  The MV-104AN is a New York State form that has all of the details of a traffic collision.  Before implementing Trafficstat, there was no uniform traffic safety data collection procedure for all of the NYPD precincts.  Therefore, the Police Department implemented the Traffic Accident Management System (TAMS) in July 1999 in order to collect traffic data in a uniform method across the City.  TAMS required the precincts manually enter a few selected MV-104AN fields to collect very basic intersection traffic crash statistics which included the number of accidents, injuries and fatalities. As the years progressed, there grew a need for additional traffic data so that more detailed analyses could be conducted. The Citywide traffic safety initiative, Vision Zero started in the year 2014.  Vision Zero further emphasized the need for the collection of more traffic data in order to work towards the Vision Zero goal, which is to eliminate traffic fatalities.  Therefore, the Department in March 2016 replaced the TAMS with the new Finest Online Records Management System (FORMS).  FORMS enables the police officers to electronically, using a Department cellphone or computer, enter all of the MV-104AN data fields and stores all of the MV-104AN data fields in the Department’s crime data warehouse.  Since all of the MV-104AN data fields are now stored for each traffic collision, detailed traffic safety analyses can be conducted as applicable.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"NO","url":"https://data.cityofnewyork.us/d/h9gi-nx95","update_datemadepublic":"5/7/2014","update_updatefrequency":"Daily","last_data_updated_date":"2026-03-23T23:23:06.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"831494","downloads":"356058","row_count":"2250155","column_count":"33","derived_view":false}
