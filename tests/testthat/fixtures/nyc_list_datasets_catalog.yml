        ,{"datasetinformation_agency":"Department of City Planning (DCP)","uid":"vhqf-adkz","name":"Greater Transit Zone","description":"The Greater Transit Zone boundaries are used for several zoning rules. They determine where special rules for Qualifying Residential Sites are applicable and how non-residential parking is calculated in some zoning districts. Qualifying Residential Sites are defined in ZR# 12-10. Being located within the Greater Transit Zone may allow for more or different development opportunities. \n\nThe Greater Transit Zone is broken up into separate areas where special rules governing residential parking are applied. They include; Manhattan Core and Long Island City parking areas, the Inner Transit Zone, the Outer Transit Zone, and the areas governed by the special ZR# 25-241 parking provisions. The boundaries for the Greater Transit Zone for Qualifying Residential Sites differs from the defined Transit Zones where they overlap with Special Coastal Risk Districts. (See the Transit Zones dataset at https://data.cityofnewyork.us/d/6ztr-wgff).\n\nAll previously released versions of this data are available on the <a href=\"https://www.nyc.gov/content/planning/pages/resources/datasets/greater-transit-zone\">DCP Website: BYTES of the BIG APPLE</a>","type":"dataset","category":"Housing & Development","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/vhqf-adkz","update_datemadepublic":"12/16/2025","update_updatefrequency":"As needed","last_data_updated_date":"2025-12-09T21:37:59.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"As-Needed","legislativecompliance_removedrecords":"No","visits":"612","downloads":"160","row_count":"1",