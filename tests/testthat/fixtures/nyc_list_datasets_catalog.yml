        ,{"datasetinformation_agency":"Department of Transportation (DOT)","uid":"d83i-6us7","name":"Street Seats (2014 - 2019)","description":"Street Seats is a citywide program where partners apply to transform underused streets into vibrant, social public spaces between the months of March through December (the Season). Street Seats are installed in the roadbed along the curb line to create an attractive setting for eating, reading, working, meeting a friend or taking a rest.\r\n\r\nFor additional information on Street Seats, please visit the DOT website: https://www1.nyc.gov/html/dot/html/pedestrians/streetseats.shtml\r\nFor current data, please search for Street Seats (current year)\r\n\r\nThis data was collected to track information regarding each locations and the partners that manage each StreetSeat. The data is collected via Excel and tracked throughout the Season. Each record represents one Street Seat location. This data can be used to geolocate all of the Street Seats within 2018 Season. The data gets updated throughout the Season to include more details.","type":"dataset","category":"Transportation","legislativecompliance_datasetfromtheopendataplan":"Yes","url":"https://data.cityofnewyork.us/d/d83i-6us7","update_datemadepublic":"12/23/2019","update_updatefrequency":"Historical data","last_data_updated_date":"2019-12-23T14:18:40.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"Yes","legislativecompliance_geocoded":"Yes","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"3027","downloads":"1965","row_count":"24","column_count":"32","derived_view":false}
