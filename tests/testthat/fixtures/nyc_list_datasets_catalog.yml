        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"ab4a-qhzt","name":"Parks Zones Map","description":"Larger NYC parks (generally >20 acres) are subdivided into smaller sections that make inspecting these parks feasible and efficient.  These sections are called \"zones.\"   The size and boundaries usually conform to one or more of the following criteria:  Zones should be inspectable in 1-2 hours; zone boundaries should follow the park’s features (paths, tree lines, etc) whenever possible; and/or conform to pre-existing boundaries used to divide the park for maintenance; and/or define a cohesive area within the park (ballfields, wooded areas, etc).  Besides zones, this layer contains a handful of Sitting Areas that are part of larger parks but could not be defined as zones due to their smaller size.","type":"map","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/ab4a-qhzt","update_updatefrequency":"Monthly","last_data_updated_date":"2026-03-19T14:00:32.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"No","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"3487","downloads":"5","parent_uid":"4j29-i5ry","derived_view":true}
