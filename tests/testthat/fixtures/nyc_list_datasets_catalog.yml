        ,{"datasetinformation_agency":"Department of Parks and Recreation (DPR)","uid":"yv25-wqf9","name":"Social Distancing and Enforcement: Parks Patrol Data","description":"Note: Due to important notes and changes to this dataset over time, we recommend you review the data dictionary prior to using this data. \n\nDuring the Covid-19 response, NYC Parks deployed staff from the Urban Parks Rangers and Parks Enforcement Patrol divisions across NYC parks to educate patrons on social distancing and enforce tresspassing violations when patrons are in closed areas of the park. This dataset contains encounters and non-encounter patrols recorded by these staff.\n\nThis is part of the NYC Parks Covid-19 Social Distancing and Enforcement Data Collection: https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=NYC+Parks+Covid-19+Social+Distancing+and+Enforcement&q=nyc+parks+covid\n\nData Dictionary:\n\nhttps://docs.google.com/spreadsheets/d/1dr6-cOUsk1LIynjqeXi02I4p4riV2ZVr4_R4LNwI2MI/edit?usp=sharing","type":"dataset","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/yv25-wqf9","update_datemadepublic":"07/09/2020","update_updatefrequency":"As needed","last_data_updated_date":"2026-03-24T13:03:39.000","legislativecompliance_candatasetfeasiblybeautomated":"Yes","update_automation":"Yes","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"No","legislativecompliance_externalfrequencyll1102015":"N/A","legislativecompliance_removedrecords":"No","visits":"2436","downloads":"2815","row_count":"93286","column_count":"24","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office to End Domestic and Gender-Based Violence (ENDGBV)","uid":"qiwj-eg47","name":"Intimate Partner Violence Related Snapshots: New York City Community Board Districts","description":"The dataset contains annual count data for the number of intimate partner related domestic incident reports, intimate partner-related felony assaults, domestic violence related felony assaults, intimate partner-related rapes and domestic violence related rapes.\r\n\r\nThe Mayor's Office to Combat Domestic Violence (OCDV) formulates policies and programs, coordinates the citywide delivery of domestic violence services and works with diverse communities and community leaders to increase awareness of domestic violence. OCDV collaborates closely with government and nonprofit agencies that assist domestic violence survivors and operates the New York City Family Justice Centers. These co‐located multidisciplinary domestic violence service centers provide vital social service, civil legal and criminal justice assistance for survivors of intimate partner violence and their children under one roof. OCDV also has a Policy and Training Institute that provides trainings on intimate partner violence to other City agencies. The New York City Healthy Relationship Academy, with is part of the Policy and Training Institute,  provides peer lead workshops on healthy relationships and teen dating violence to individuals between the age of 13 and 24, their parents and staff of agencies that work with youth in that age range.  The dataset is collected to produce an annual report on the number of family-related and domestic violence related incidents that occur at the community board district level in New York City. The New York City Police Department provides OCDV with count data on: Intimate partner related domestic incident reports, intimate partner related felony assaults, domestic violence felony assaults, intimate partner related rapes and domestic violence related rapes.","type":"dataset","category":"Public Safety","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/qiwj-eg47","update_datemadepublic":"8/29/2018","update_updatefrequency":"Annually","last_data_updated_date":"2020-08-05T02:02:46.000","legislativecompliance_candatasetfeasiblybeautomated":"No","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_removedrecords":"No","visits":"5740","downloads":"2742","row_count":"281","column_count":"8","derived_view":false}
        ,{"datasetinformation_agency":"Mayor's Office of Management & Budget (OMB)","uid":"3z69-v9cd","name":"NYC Climate Budgeting Report: Forecast of Emissions and PM 2.5 Reductions from City Actions","description":"This dataset contains the estimated greenhouse gas emissions and particulate matter reductions from city actions. Mayor’s Office of Management and Budget's (OMB) Environmental Sustainability and Resiliency (ESR) Taskforce analyzed a set of city actions, a collection of policies and commitments the city is making to reduce citywide emissions to complete the New York City (NYC) forecast. The city actions and a short description of them can be found in figure 3.36 in the \"New York City’s Anticipated Progress\" sub-section of the FY25 New York City Climate Budgeting publication (https://www.nyc.gov/assets/omb/downloads/pdf/exec24-nyccb.pdf).  For additional detail of city actions, please refer to sections 6.b., 6.c., 6.d., 6.e., and 6.f. of the New York City Climate Budgeting Technical Appendices (https://www.nyc.gov/assets/omb/downloads/pdf/exec24-nyccbta.pdf). This dataset is going to be updated once a year during the Executive Budget.\r\n\r\nYou can find the complete collection of Climate Budget data by<a href=\"https://data.cityofnewyork.us/browse?Data-Collection_Data-Collection=Climate+Budgeting\" rel=\"noopener noreferrer\" target=\"_blank\"> clicking here.</a>","type":"dataset","category":"City Government","legislativecompliance_datasetfromtheopendataplan":"No","url":"https://data.cityofnewyork.us/d/3z69-v9cd","update_updatefrequency":"Annually","last_data_updated_date":"2025-05-08T16:40:15.000","legislativecompliance_candatasetfeasiblybeautomated":"N/A","update_automation":"No","legislativecompliance_hasdatadictionary":"Yes","legislativecompliance_containsaddress":"No","legislativecompliance_geocoded":"N/A","legislativecompliance_existsexternallyll1102015":"Yes","legislativecompliance_externalfrequencyll1102015":"Annually","legislativecompliance_r